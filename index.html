<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUXNET | OFFENSIVE UNIT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00ff41;
            --danger: #ff3e3e;
            --bg: #0a0a0a;
            --panel: #111;
            --glow: 0 0 10px rgba(0, 255, 65, 0.4);
        }

        body {
            background-color: var(--bg);
            color: #e0e0e0;
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* تأثير الخلفية الشبكي */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        nav {
            background: #000;
            padding: 15px 5%;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #1a1a1a;
            box-shadow: var(--glow);
        }

        .logo {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            margin-right: 15px;
            border: 1px solid var(--primary);
        }

        .brand-name {
            color: var(--primary);
            font-size: 1.5rem;
            letter-spacing: 5px;
            text-shadow: var(--glow);
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        .terminal-window {
            background: var(--panel);
            border: 1px solid #222;
            padding: 30px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .status-header {
            border-left: 3px solid var(--primary);
            padding-left: 15px;
            margin-bottom: 30px;
            font-size: 0.8rem;
            color: var(--primary);
            opacity: 0.8;
        }

        .field-group { margin-bottom: 25px; }

        .field-label {
            font-size: 0.7rem;
            color: #666;
            margin-bottom: 8px;
            display: block;
            letter-spacing: 2px;
        }

        input, textarea {
            width: 100%;
            background: #050505;
            border: 1px solid #333;
            color: var(--primary);
            padding: 15px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: var(--glow);
        }

        .exec-btn {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 12px 30px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .exec-btn:hover:not(:disabled) {
            background: var(--primary);
            color: #000;
            box-shadow: var(--glow);
        }

        .exec-btn:disabled {
            filter: grayscale(1);
            opacity: 0.3;
            cursor: not-allowed;
        }

        .vault-section {
            margin-top: 40px;
            border-top: 1px solid #222;
            padding-top: 30px;
        }

        .hash-box {
            background: #000;
            padding: 15px;
            font-size: 0.85rem;
            border-radius: 3px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px dashed #333;
        }

        #clock { color: var(--danger); font-weight: bold; }

        .social-nodes {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .node-link {
            text-decoration: none;
            color: #888;
            font-size: 0.8rem;
            padding: 10px 15px;
            border: 1px solid #222;
            transition: 0.3s;
        }

        .node-link:hover {
            color: var(--primary);
            border-color: var(--primary);
        }

        /* تحسينات الأنيميشن */
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .blinking { animation: pulse 1.5s infinite; }
    </style>
</head>
<body>

<nav>
    <img src="https://i.ibb.co/sp35zdbh/IMG-9090.jpg" alt="Logo" class="logo">
    <span class="brand-name">STUXNET_V3</span>
</nav>

<div class="container">
    <div class="terminal-window">
        <div class="status-header">
            <div>[ STATUS: ONLINE ]</div>
            <div>[ ACCESS: LEVEL_04_OPERATOR ]</div>
            <div class="blinking">[ ENCRYPTION: AES-256 ACTIVE ]</div>
        </div>

        <form id="opsForm">
            <div class="field-group">
                <span class="field-label">TARGET_NODE_IDENTIFIER</span>
                <input type="text" id="node" required placeholder="Ex: SERVER_ALPHA_01">
            </div>
            
            <div class="field-group">
                <span class="field-label">ENCRYPTED_PAYLOAD_DATA</span>
                <textarea id="packet" rows="4" required placeholder="Enter transmission string..."></textarea>
            </div>
            
            <button type="submit" id="execBtn" class="exec-btn">INITIATE_TRANSMISSION</button>
            <p id="cooldown-msg" style="display:none; color: var(--danger); font-size: 0.8rem; margin-top: 15px;">
                SYSTEM_LOCK: PLEASE WAIT <span id="clock">05:00</span>s
            </p>
        </form>

        <div class="vault-section">
            <span class="field-label">CONTRIBUTION_VAULT (USDT_TRC20)</span>
            <div class="hash-box">
                <code id="v_hash">TQhuYaGhhpXEg322iELNesuLXCyziPhJxC</code>
                <i class="fas fa-copy" onclick="copyHash()" style="cursor:pointer; color:var(--primary)"></i>
            </div>
        </div>

        <div class="social-nodes">
            <a href="https://t.me/xstuxnet_" class="node-link"><i class="fab fa-telegram"></i> NODE_TG</a>
            <a href="mailto:devilnet320121@proton.me" class="node-link"><i class="fas fa-envelope"></i> SECURE_MAIL</a>
        </div>
    </div>
</div>

<script>
    // بيانات الـ Bot
    const CONFIG = {
        TOKEN: "8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU",
        CHAT_ID: "5446862709",
        COOLDOWN_TIME: 5 * 60 * 1000
    };

    const execBtn = document.getElementById('execBtn');
    const cooldownMsg = document.getElementById('cooldown-msg');
    const clockDisplay = document.getElementById('clock');

    function updateCooldown() {
        const lastOp = localStorage.getItem('last_op');
        if (lastOp) {
            const remaining = CONFIG.COOLDOWN_TIME - (Date.now() - parseInt(lastOp));
            if (remaining > 0) {
                startTimer(remaining);
                return true;
            }
        }
        return false;
    }

    function startTimer(ms) {
        execBtn.disabled = true;
        cooldownMsg.style.display = 'block';
        let timeLeft = Math.floor(ms / 1000);

        const timer = setInterval(() => {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            clockDisplay.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            
            if (--timeLeft < 0) {
                clearInterval(timer);
                execBtn.disabled = false;
                cooldownMsg.style.display = 'none';
            }
        }, 1000);
    }

    document.getElementById('opsForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const node = document.getElementById('node').value;
        const packet = document.getElementById('packet').value;

        execBtn.innerText = "SENDING...";
        execBtn.disabled = true;

        try {
            const response = await fetch(`https://api.telegram.org/bot${CONFIG.TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CONFIG.CHAT_ID,
                    text: `🛠 **STUXNET UPLINK**\n\n👤 **Source:** \`${node}\`\n📦 **Payload:**\n\`\`\`\n${packet}\n\`\`\`\n\n🕒 ${new Date().toLocaleString()}`,
                    parse_mode: "Markdown"
                })
            });

            if (response.ok) {
                alert("✓ DATA_ACKNOWLEDGED: TRANSMISSION SUCCESSFUL");
                localStorage.setItem('last_op', Date.now());
                startTimer(CONFIG.COOLDOWN_TIME);
                e.target.reset();
            }
        } catch (err) {
            alert("❌ CONNECTION_ERROR: FAILED TO REACH UPLINK");
            execBtn.disabled = false;
        } finally {
            execBtn.innerText = "INITIATE_TRANSMISSION";
        }
    });

    function copyHash() {
        const hash = document.getElementById('v_hash').innerText;
        navigator.clipboard.writeText(hash).then(() => {
            alert("HASH_COPIED_TO_CLIPBOARD");
        });
    }

    window.onload = updateCooldown;
</script>

</body>
</html>
