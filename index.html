<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميرو سوشيال ميديا | إدارة الصفحات الاحترافية</title>
    <meta name="description" content="إدارة سوشيال ميديا احترافية - نخلي صفحتك تبيع وتربح. حمل علينا هم التصوير والنشر والإعلانات.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --accent: #f59e0b;
            --success: #10b981;
            --dark: #0f172a;
            --dark-secondary: #1e293b;
            --gray: #64748b;
            --gray-light: #94a3b8;
            --light: #f8fafc;
            --white: #ffffff;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            line-height: 1.8;
            color: var(--dark);
            background: var(--white);
            overflow-x: hidden;
        }
        
        /* ========== HEADER ========== */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            box-shadow: 0 2px 30px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
        }
        
        .nav-container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--dark);
            text-decoration: none;
        }
        
        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, var(--primary) 0%, #8b5cf6 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
        }
        
        .logo-text span {
            background: linear-gradient(135deg, var(--primary) 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .nav-links {
            display: flex;
            align-items: center;
            gap: 2rem;
            list-style: none;
        }
        
        .nav-links a {
            color: var(--dark-secondary);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .nav-links a:hover {
            color: var(--primary);
        }
        
        .nav-cta {
            background: linear-gradient(135deg, var(--primary) 0%, #8b5cf6 100%);
            color: white !important;
            padding: 0.75rem 1.75rem;
            border-radius: 50px;
            font-weight: 700 !important;
        }
        
        .nav-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
        }
        
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--dark);
            cursor: pointer;
        }

            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        
        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, transparent 70%);
            animation: float 20s ease-in-out infinite;
        }
        
        .hero::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, transparent 70%);
            animation: float 15s ease-in-out infinite reverse;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(30px, 30px) rotate(5deg); }
        }
        
        .hero-container {
            max-width: 1300px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
            position: relative;
            z-index: 1;
        }
        
        .hero-content h1 {
            font-size: clamp(2.2rem, 5vw, 3.8rem);
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: 1.5rem;
            color: var(--dark);
        }
        
        .hero-content h1 .highlight {
            background: linear-gradient(135deg, var(--primary) 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
        }
        
        .hero-content h1 .highlight::after {
            content: '';
            position: absolute;
            bottom: 5px;
            left: 0;
            width: 100%;
            height: 8px;
            background: var(--accent);
            opacity: 0.3;
            z-index: -1;
            border-radius: 4px;
        }
        
        .hero-content p {

            margin-bottom: 2rem;
            max-width: 500px;
        }
        
        .hero-buttons {

            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 3rem;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 1rem 2.2rem;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, #8b5cf6 100%);
            color: white;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(99, 102, 241, 0.4);
        }
        
        .btn-secondary {
            background: white;
            color: var(--primary);
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        
        .btn-secondary:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-3px);
        }
        
        .hero-stats {
            display: flex;
            gap: 3rem;
            padding-top: 2rem;
            border-top: 2px solid rgba(99, 102, 241, 0.1);
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-number {
            font-size: 2rem;
            font-weight: 900;
            color: var(--primary);
        }
        
        .stat-label {
            font-size: 0.85rem;
            color: var(--gray);
        }
        
        .hero-visual {
            position: relative;
        }
        
        .hero-image {
            width: 100%;
            max-width: 550px;
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15);
            animation: floatImage 6s ease-in-out infinite;
        }
        
        @keyframes floatImage {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        .floating-card {
            position: absolute;
            background: white;
            padding: 1rem 1.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            animation: float 4s ease-in-out infinite;
        }
        
        .fc-1 {
            top: 10%;
            right: -20px;
            animation-delay: 0s;
        }
        
        .fc-2 {
            bottom: 20%;
            left: -30px;
            animation-delay: 1s;
        }
        
        .fc-icon {
            width: 40px;
            height: 40px;
            background: #dbeafe;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }
        
        .fc-text h4 {
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 0.2rem;
        }
        
        .fc-text p {
            font-size: 0.8rem;
            color: var(--success);
            margin: 0;
        }
        
        /* ========== PROBLEMS SECTION ========== */
        .problems {
            padding: 100px 2rem;
            background: var(--dark);
        }
        
        .problems .section-header {
            text-align: center;
            margin-bottom: 4rem;
        }
        
        .problems h2 {
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            font-weight: 900;
            color: white;
            margin-bottom: 1rem;
        }
        
        .problems p {
            color: var(--gray-light);
            max-width: 600px;
            margin: 0 auto;
        }
        
        .problems-grid {
            max-width: 1300px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        
        .problem-card {
            background: rgba(255,255,255,0.05);
            padding: 2rem;
            border-radius: 20px;
            border-right: 4px solid var(--accent);
            transition: all 0.3s ease;
        }
        
        .problem-card:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-5px);
        }
        
        .problem-icon {
            width: 50px;
            height: 50px;
            background: rgba(245, 158, 11, 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            margin-bottom: 1rem;
        }
        
        .problem-card h3 {
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        
        .problem-card p {
            color: var(--gray-light);
            font-size: 0.9rem;
            line-height: 1.7;
        }
        
        /* ========== SERVICES SECTION ========== */
        .services {
            padding: 100px 2rem;
            background: var(--light);
        }
        
        .services .section-header {
            text-align: center;
            margin-bottom: 4rem;
        }
        
        .services h2 {
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            font-weight: 900;
            color: var(--dark);
            margin-bottom: 1rem;
        }
        
        .services-header p {
            color: var(--gray);
            max-width: 600px;
            margin: 0 auto;
        }
        
        .services-grid {
            max-width: 1300px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }
        
        .service-card {
            background: white;
            padding: 2.5rem;
            border-radius: 25px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.06);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }
        
        .service-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), #8b5cf6);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s ease;
        }
        
        .service-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }
        
        .service-card:hover::before {
            transform: scaleX(1);
        }
        
        .service-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #e0e7ff 0%, #ede9fe 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            margin-bottom: 1.5rem;
            color: var(--primary);
        }
        
        .service-card h3 {
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 1rem;
            color: var(--dark);
        }
        
        .service-card p {
            color: var(--gray);
            font-size: 0.95rem;
        }
        
        .service-features {
            margin-top: 1.5rem;
            list-style: none;
        }
        
        .service-features li {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            color: var(--dark-secondary);
            margin-bottom: 0.5rem;
        }
        
        .service-features li i {
            color: var(--success);
            font-size: 0.8rem;
        }
        
        /* ========== PLATFORMS SECTION ========== */
        .platforms {
            padding: 80px 2rem;
            background: white;
        }
        
        .platforms-container {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 3rem;
        }
        
        .platform-item {
            text-align: center;
        }
        
        .platform-icon {
            width: 70px;
            height: 70px;
            background: var(--light);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin-bottom: 0.75rem;
            transition: all 0.3s ease;
        }
        
        .platform-item:hover .platform-icon {
            background: var(--primary);
            color: white;
            transform: scale(1.1);
        }
        
        .platform-item h4 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--dark);
        }
        
        /* ========== OFFER SECTION ========== */
        .offer {
            padding: 100px 2rem;
            background: linear-gradient(135deg, var(--primary) 0%, #8b5cf6 100%);
            position: relative;
            overflow: hidden;
        }
        
        .offer::before {
            content: '🔥';
            position: absolute;
            font-size: 20rem
