<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUXNET | OFFICIAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-green: #39FF14;
            --accent-purple: #9d4edd;
            --usdt-teal: #26a17b;
            --bg-dark: #050505;
            --card-bg: #0d0d0d;
        }

        * { box-sizing: border-box; transition: 0.3s; }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
            /* أنيميشن الدخول السريع */
            opacity: 0;
            transform: translateY(10px);
            animation: fadeIn siteEntrance 0.8s ease forwards;
        }

        @keyframes siteEntrance {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        header { text-align: center; margin: 30px 0; width: 100%; }
        
        .logo {
            width: clamp(90px, 25vw, 120px); 
            height: clamp(90px, 25vw, 120px);
            border-radius: 50%;
            border: 3px solid var(--primary-green);
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.2);
            margin-bottom: 15px;
        }

        .brand-info h1 {
            margin: 0; font-size: clamp(1.6rem, 7vw, 2.2rem); letter-spacing: 2px;
            background: linear-gradient(to right, var(--primary-green), var(--accent-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .brand-info p { margin: 8px 0 0; font-size: 13px; color: #777; letter-spacing: 1px; }

        .container { 
            width: 100%; 
            max-width: 480px; 
        }

        .section-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid #1a1a1a;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .label {
            font-size: 11px; color: var(--accent-purple);
            text-transform: uppercase; letter-spacing: 2px;
            margin-bottom: 15px; display: block; font-weight: bold;
        }

        .donate-header { display: flex; justify-content: center; align-items: center; gap: 8px; margin-bottom: 15px; }
        .usdt-circle { background: var(--usdt-teal); width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; color: white; }
        
        .address-container {
            background: #000;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #222;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .address-text {
            font-family: 'Courier New', monospace;
            font-size: clamp(10px, 3.2vw, 13px);
            color: #aaa;
            word-break: break-all;
            flex: 1;
            text-align: left;
        }

        .join-btn {
            background: linear-gradient(45deg, rgba(157, 78, 221, 0.1), rgba(57, 255, 20, 0.05));
            border: 1px solid var(--accent-purple);
            color: #fff; text-decoration: none;
            padding: 14px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            font-weight: bold; margin-top: 10px;
        }

        .join-btn:hover { background: rgba(157, 78, 221, 0.2); transform: translateY(-2px); }

        input, textarea {
            width: 100%; background: #000; border: 1px solid #222;
            color: #fff; padding: 14px; margin-bottom: 15px;
            border-radius: 12px; outline: none; font-size: 14px;
        }

        input:focus, textarea:focus { border-color: var(--primary-green); }

        .submit-btn {
            width: 100%; 
            background: linear-gradient(45deg, var(--accent-purple), #5a189a);
            border: none; color: #fff; padding: 16px; border-radius: 12px;
            font-weight: bold; cursor: pointer; font-size: 15px;
        }

        .submit-btn:active { transform: scale(0.98); }

    </style>
</head>
<body>

<header>
    <img src="https://i.ibb.co/sp35zdbh/IMG-9090.jpg" alt="STUXNET" class="logo">
    <div class="brand-info">
        <h1>STUXNET OFFICIAL</h1>
        <p>Security • Development • Community</p>
    </div>
</header>

<div class="container">

    <div class="section-card">
        <div class="donate-header">
            <div class="usdt-circle">₮</div>
            <span style="font-weight: bold; font-size: 15px; color: var(--accent-purple);">DONATE STUXNET</span>
        </div>
        <p style="font-size: 11px; color: #555; margin-bottom: 12px; text-align: center;">USDT TRC20 ADDRESS:</p>
        <div class="address-container">
            <span class="address-text" id="wallet">TQhuYaGhhpXEg322iELNesuLXCyziPhJxC</span>
            <i class="fas fa-copy" style="color: var(--primary-green); cursor: pointer;" onclick="copyWallet()"></i>
        </div>
    </div>

    <div class="section-card">
        <span class="label">Latest Updates</span>
        <a href="https://t.me/xstuxnet" target="_blank" class="join-btn">
            <i class="fab fa-telegram-plane" style="color: #229ED9;"></i> JOIN CHANNEL
        </a>
    </div>

    <div class="section-card">
        <span class="label">Contact Admin</span>
        <form id="contactForm">
            <input type="text" id="name" placeholder="Your Name" required>
            <textarea id="message" rows="3" placeholder="Your Message..." required></textarea>
            <button type="submit" class="submit-btn" id="sendBtn">SEND MESSAGE</button>
        </form>
    </div>

</div>

<script>
    const CONFIG = {
        TOKEN: "8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU",
        CHAT_ID: "5446862709"
    };

    function copyWallet() {
        navigator.clipboard.writeText(document.getElementById('wallet').innerText);
        alert("USDT Address Copied!");
    }

    document.getElementById('contactForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('sendBtn');
        const originalText = btn.innerText;
        btn.innerText = "SENDING...";
        btn.style.opacity = "0.7";
        
        const payload = `👤 FROM: ${document.getElementById('name').value}\n💬 MSG: ${document.getElementById('message').value}`;

        try {
            const response = await fetch(`https://api.telegram.org/bot${CONFIG.TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CONFIG.CHAT_ID, text: payload })
            });

            if (response.ok) {
                alert("Sent Successfully!");
                e.target.reset();
            } else {
                alert("Error Sending!");
            }
        } catch (err) { 
            alert("Connection Error!");
        } finally {
            btn.innerText = originalText;
            btn.style.opacity = "1";
        }
    });
</script>

</body>
</html>
