<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUXNET | OFFICIAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-green: #39FF14;
            --accent-purple: #9d4edd;
            --usdt-teal: #26a17b;
            --bg-dark: #000000;
        }

        * { box-sizing: border-box; transition: 0.3s; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-dark);
            background-image: 
                linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                url('https://media4.giphy.com/media/v1.Y2lkPTZjMDliOTUyYWUyOTEycmZiM2FsZXlwMXJyZzRpMWVnYzdicGRzZ285a2RhYWtzOSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/UQo9nB9v6vp3nVADDl/giphy.gif');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-top: 40px;
            margin-bottom: 30px;
        }

        .logo-container {
            position: relative;
            display: inline-block;
            margin-bottom: 15px;
        }

        /* تأثير النار ورا اللوجو مباشرة */
        .logo-container::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 140px; height: 140px;
            background: radial-gradient(circle, rgba(255,100,0,0.6) 0%, transparent 70%);
            filter: blur(15px);
            z-index: 0;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 0.8; }
            100% { opacity: 0.5; }
        }

        .logo {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid var(--primary-green);
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.5);
            position: relative;
            z-index: 1;
        }

        .brand-info h1 {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 1px;
            background: linear-gradient(to right, var(--primary-green), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .brand-info p {
            font-size: 13px;
            color: #ccc;
            margin-top: 5px;
            letter-spacing: 0.5px;
        }

        .container {
            width: 100%;
            max-width: 420px;
        }

        .section-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .card-header span {
            font-weight: bold;
            color: var(--accent-purple);
            font-size: 14px;
            text-transform: uppercase;
        }

        .address-box {
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #333;
        }

        .address-text {
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: #eee;
            word-break: break-all;
            margin-right: 10px;
        }

        .copy-btn {
            color: var(--primary-green);
            cursor: pointer;
            font-size: 1.2rem;
        }

        .label-small {
            font-size: 10px;
            color: var(--accent-purple);
            margin-bottom: 15px;
            display: block;
            letter-spacing: 2px;
        }

        .join-btn {
            background: rgba(0, 0, 0, 0.4);
            border: 1.5px solid var(--accent-purple);
            color: #fff;
            text-decoration: none;
            padding: 14px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: bold;
            font-size: 14px;
        }

        form input, form textarea {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 1px solid #333;
            color: #fff;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            outline: none;
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(45deg, var(--accent-purple), #5a189a);
            border: none;
            color: #fff;
            padding: 16px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        .submit-btn:disabled {
            background: #222;
            color: #666;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <img src="https://i.ibb.co/sp35zdbh/IMG-9090.jpg" alt="STUXNET" class="logo">
    </div>
    <div class="brand-info">
        <h1>STUXNET OFFICIAL</h1>
        <p>Security • Development • Community</p>
    </div>
</header>

<div class="container">
    <div class="section-card">
        <div class="card-header">
            <div style="background: var(--usdt-teal); width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px;">₮</div>
            <span>DONATE STUXNET</span>
        </div>
        <div class="address-box">
            <span class="address-text" id="wallet">TQhuYaGhhpXEg322iELNesuLXCyziPhJxC</span>
            <i class="fas fa-copy copy-btn" onclick="copyWallet()"></i>
        </div>
    </div>

    <div class="section-card">
        <span class="label-small">LATEST UPDATES</span>
        <a href="https://t.me/xstuxnet" target="_blank" class="join-btn">
            <i class="fab fa-telegram-plane"></i> JOIN CHANNEL
        </a>
    </div>

    <div class="section-card">
        <span class="label-small">CONTACT ADMIN</span>
        <form id="contactForm">
            <input type="text" id="name" placeholder="Your Name" required>
            <textarea id="message" rows="3" placeholder="Your Message..." required></textarea>
            <button type="submit" class="submit-btn" id="sendBtn">SEND MESSAGE</button>
        </form>
    </div>
</div>

<script>
    const CONFIG = {
        TOKEN: "8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU",
        CHAT_ID: "5446862709"
    };

    window.onload = checkCooldown;

    function copyWallet() {
        navigator.clipboard.writeText(document.getElementById('wallet').innerText);
        alert("Copied!");
    }

    function checkCooldown() {
        const btn = document.getElementById('sendBtn');
        const lastSent = localStorage.getItem('lastSentTime');
        if (lastSent) {
            const timePassed = Date.now() - lastSent;
            if (timePassed < 10000) {
                startTimer(Math.ceil((10000 - timePassed) / 1000));
            }
        }
    }

    function startTimer(seconds) {
        const btn = document.getElementById('sendBtn');
        btn.disabled = true;
        const timer = setInterval(() => {
            btn.innerText = `WAIT ${seconds}S`;
            seconds--;
            if (seconds < 0) {
                clearInterval(timer);
                btn.disabled = false;
                btn.innerText = "SEND MESSAGE";
                localStorage.removeItem('lastSentTime');
            }
        }, 1000);
    }

    document.getElementById('contactForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('sendBtn');
        btn.innerText = "SENDING...";
        const payload = `👤 FROM: ${document.getElementById('name').value}\n💬 MSG: ${document.getElementById('message').value}`;
        try {
            const response = await fetch(`https://api.telegram.org/bot${CONFIG.TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CONFIG.CHAT_ID, text: payload })
            });
            if (response.ok) {
                localStorage.setItem('lastSentTime', Date.now());
                startTimer(10);
                e.target.reset();
            }
        } catch (err) { 
            btn.innerText = "SEND MESSAGE";
        }
    });
</script>

</body>
</html>
