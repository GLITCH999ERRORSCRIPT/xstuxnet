<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUXNET | OFFICIAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-green: #39FF14;
            --accent-purple: #9d4edd;
            --usdt-teal: #26a17b;
            --bg-dark: #050505;
            --card-bg: #0d0d0d;
        }

        * { box-sizing: border-box; transition: 0.3s; }

        body {
            background-color: var(--bg-dark);
            background-image: linear-gradient(rgba(5, 5, 5, 0.8), rgba(5, 5, 5, 0.8)), 
                              url('https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueHNoZ3ZueXJ6eXF6eXJ6eXF6eXJ6eXF6eXJ6eXF6eXJ6eSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3o7TKMGpxx8mY99O8w/giphy.gif');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header { text-align: center; margin: 30px 0; width: 100%; position: relative; z-index: 1; }
        
        .logo {
            width: 100px; height: 100px; border-radius: 50%;
            border: 3px solid var(--primary-green);
            box-shadow: 0 0 25px rgba(57, 255, 20, 0.3);
            margin-bottom: 15px; object-fit: cover;
        }

        .brand-info h1 {
            margin: 0; font-size: 1.6rem; letter-spacing: 2px;
            background: linear-gradient(to right, var(--primary-green), var(--accent-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: bold; display: flex; justify-content: center;
            white-space: nowrap;
        }

        .brand-info p { margin: 8px 0 0; font-size: 13px; color: #aaa; }

        .container { width: 100%; max-width: 450px; position: relative; z-index: 1; }

        .section-card {
            background: rgba(13, 13, 13, 0.9); border-radius: 18px;
            padding: 20px; margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05); width: 100%; text-align: center;
            backdrop-filter: blur(5px);
        }

        .label { font-size: 11px; color: var(--accent-purple); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; display: block; }

        .address-container {
            background: #000; padding: 12px; border-radius: 10px;
            border: 1px solid #222; display: flex; align-items: center; gap: 10px; margin-top: 10px;
        }

        .address-text { font-family: monospace; font-size: 11px; color: #ccc; word-break: break-all; flex: 1; text-align: left; }

        .join-btn {
            background: rgba(157, 78, 221, 0.1); border: 1px solid var(--accent-purple);
            color: #fff; text-decoration: none; padding: 12px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: bold;
        }

        input, textarea { width: 100%; background: #000; border: 1px solid #222; color: #fff; padding: 12px; margin-bottom: 15px; border-radius: 10px; outline: none; }

        .submit-btn {
            width: 100%; background: linear-gradient(45deg, var(--accent-purple), #5a189a);
            border: none; color: #fff; padding: 14px; border-radius: 10px;
            font-weight: bold; cursor: pointer;
        }

        .submit-btn:disabled { background: #222; color: #555; cursor: not-allowed; }

    </style>
</head>
<body>

<header>
    <img src="https://i.ibb.co/sp35zdbh/IMG-9090.jpg" alt="STUXNET" class="logo">
    <div class="brand-info">
        <h1>STUXNET OFFICIAL</h1>
        <p>Security • Development • Community</p>
    </div>
</header>

<div class="container">
    <div class="section-card">
        <div style="display: flex; justify-content: center; align-items: center; gap: 8px; margin-bottom: 15px;">
            <div style="background: var(--usdt-teal); width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; color: white;">₮</div>
            <span style="font-weight: bold; font-size: 15px; color: var(--accent-purple);">DONATE STUXNET</span>
        </div>
        <div class="address-container">
            <span class="address-text" id="wallet">TQhuYaGhhpXEg322iELNesuLXCyziPhJxC</span>
            <i class="fas fa-copy" style="color: var(--primary-green); cursor: pointer;" onclick="copyWallet()"></i>
        </div>
    </div>

    <div class="section-card">
        <span class="label">Latest Updates</span>
        <a href="https://t.me/xstuxnet" target="_blank" class="join-btn">
            <i class="fab fa-telegram-plane"></i> JOIN CHANNEL
        </a>
    </div>

    <div class="section-card">
        <span class="label">Contact Admin</span>
        <form id="contactForm">
            <input type="text" id="name" placeholder="Your Name" required>
            <textarea id="message" rows="3" placeholder="Your Message..." required></textarea>
            <button type="submit" class="submit-btn" id="sendBtn">SEND MESSAGE</button>
        </form>
    </div>
</div>

<script>
    const CONFIG = {
        TOKEN: "8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU",
        CHAT_ID: "5446862709"
    };

    window.onload = checkCooldown;

    function copyWallet() {
        navigator.clipboard.writeText(document.getElementById('wallet').innerText);
        alert("Copied!");
    }

    function checkCooldown() {
        const btn = document.getElementById('sendBtn');
        const lastSent = localStorage.getItem('lastSentTime');
        if (lastSent) {
            const currentTime = Date.now();
            const timePassed = currentTime - lastSent;
            if (timePassed < 10000) {
                startTimer(Math.ceil((10000 - timePassed) / 1000));
            }
        }
    }

    function startTimer(seconds) {
        const btn = document.getElementById('sendBtn');
        btn.disabled = true;
        const timer = setInterval(() => {
            btn.innerText = `WAIT ${seconds}S`;
            seconds--;
            if (seconds < 0) {
                clearInterval(timer);
                btn.disabled = false;
                btn.innerText = "SEND MESSAGE";
                localStorage.removeItem('lastSentTime');
            }
        }, 1000);
    }

    document.getElementById('contactForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('sendBtn');
        btn.innerText = "SENDING...";
        const payload = `👤 FROM: ${document.getElementById('name').value}\n💬 MSG: ${document.getElementById('message').value}`;
        try {
            const response = await fetch(`https://api.telegram.org/bot${CONFIG.TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CONFIG.CHAT_ID, text: payload })
            });
            if (response.ok) {
                localStorage.setItem('lastSentTime', Date.now());
                startTimer(10);
                e.target.reset();
            }
        } catch (err) { 
            btn.innerText = "SEND MESSAGE";
        }
    });
</script>

</body>
</html>
