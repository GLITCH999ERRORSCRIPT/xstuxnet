<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Terminal Access</title>
    <style>
        body { font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .top-layer { position: absolute; top: 0; width: 100%; height: 25%; background-color: #00a884; z-index: -1; }
        .v-shell { background: white; width: 90%; max-width: 420px; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        .v-icon { width: 65px; height: 65px; margin-bottom: 15px; }
        .v-title { color: #41525d; font-size: 19px; font-weight: 600; margin-bottom: 8px; }
        .v-badge { background: #e7f3f3; color: #128c7e; padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; margin-bottom: 15px; display: inline-block; text-transform: uppercase; }
        .v-alert { background: #fff3cd; color: #856404; padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 15px; border: 1px solid #ffeeba; line-height: 1.4; }
        .v-steps { color: #3b4a54; font-size: 14px; line-height: 1.7; margin-bottom: 20px; text-align: justify; border-left: 3px solid #00a884; padding-left: 10px; }
        .v-red { color: #d91e1e; font-weight: bold; text-decoration: underline; }
        .v-box { background-color: #f8f9fa; border: 2px dashed #cfd8dc; padding: 15px; border-radius: 8px; display: inline-block; min-width: 85%; }
        #v-stream { font-size: 34px; font-weight: bold; color: #128c7e; letter-spacing: 3px; font-family: 'Courier New', monospace; }
        [dir="rtl"] .v-steps { text-align: right; border-left: none; border-right: 3px solid #00a884; padding-right: 10px; }
    </style>
</head>

        <div id="node_1" class="v-badge"></div>
        <div id="node_2" class="v-alert"></div>
        <div id="node_3" class="v-steps"></div>
        <div class="v-box"><div id="v-stream">...</div></div>
    </div>
