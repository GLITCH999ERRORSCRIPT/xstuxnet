<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚫ VIP BET PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #1a1a1a;
            --accent: #00ff88;
            --gold: #ffd700;
            --red: #ff4444;
            --white: #ffffff;
            --glass: rgba(255,255,255,0.05);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Cairo', sans-serif; 
            background: var(--bg-primary);
            color: var(--white);
            min-height: 100vh;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 80%, rgba(120,119,198,0.3) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(255,119,198,0.3) 0%, transparent 50%),
                        radial-gradient(circle at 40% 40%, rgba(120,219,255,0.3) 0%, transparent 50%);
            z-index: -1;
            animation: pulse 20s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        .header {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { 
            font-size: 2.5em; 
            font-weight: 900; 
            background: linear-gradient(45deg, var(--accent), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .user-info { display: flex; align-items: center; gap: 20px; }
        .user-avatar { 
            width: 50px; height: 50px; 
            border-radius: 50%; 
            background: var(--accent); 
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1.2em;
        }
        .balance-display { text-align: center; }
        .balance-amount { 
            font-size: 1.8em; 
            font-weight: 900; 
            color: var(--gold);
        }
        
        /* Glass Cards */
        .glass-card { 
            background: var(--glass);
            backdrop-filter: blur(25px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 30px;
            margin: 20px 0;
            transition: all 0.4s ease;
        }
        .glass-card:hover { 
            transform: translateY(-5px); 
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0,255,136,0.1);
        }
        
        /* Forms */
        .form-group { margin: 20px 0; }
        input, textarea, select {
            width: 100%; padding: 18px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            color: var(--white);
            font-size: 16px;
            font-family: 'Cairo';
            transition: all 0.3s;
        }
        input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.5); }
        input:focus, textarea:focus { 
            outline: none; 
            border-color: var(--accent); 
            box-shadow: 0 0 20px rgba(0,255,136,0.3);
        }
        
        /* Buttons */
        .btn {
            width: 100%; padding: 20px;
            border: none; border-radius: 15px;
            font-size: 18px; font-weight: 700;
            cursor: pointer; transition: all 0.3s;
            position: relative; overflow: hidden;
            font-family: 'Cairo';
        }
        .btn-primary { 
            background: linear-gradient(45deg, var(--accent), #00cc6a);
            color: var(--bg-primary);
        }
        .btn-success { 
            background: linear-gradient(45deg, var(--gold), #ffed4a);
            color: var(--bg-primary);
        }
        .btn-danger { 
            background: linear-gradient(45deg, var(--red), #ff6666);
            color: white;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0,0,0,0.3); }
        .btn:active { transform: translateY(-1px); }
        
        /* Payment Section */
        .payment-section {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0;
        }
        .payment-card {
            background: rgba(0,255,136,0.1);
            border: 2px solid var(--accent);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
        }
        .phone-number {
            font-size: 2em; font-weight: 900;
            background: linear-gradient(45deg, var(--accent), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }
        
        /* File Upload */
        .file-upload {
            border: 3px dashed rgba(255,255,255,0.3);
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .file-upload:hover { border-color: var(--accent); background: rgba(0,255,136,0.1); }
        .file-upload input { display: none; }
        .file-preview { 
            max-width: 100%; 
            max-height: 200px; 
            border-radius: 10px; 
            margin-top: 15px;
            display: none;
        }
        
        /* Games */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }
        .game-card {
            background: rgba(255,255,255,0.03);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
        }
        .game-card::before {
            content: ''; position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; background: var(--accent);
            opacity: 0; transition: opacity 0.3s;
        }
        .game-card:hover::before { opacity: 0.1; }
        .game-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--accent);
        }
        .game-icon { font-size: 4em; margin-bottom: 15px; }
        .game-title { font-size: 1.6em; font-weight: 700; margin-bottom: 10px; }
        
        /* Modal */
        .modal {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            z-index: 1000; align-items: center; justify-content: center;
        }
        .modal-content {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px; width: 90%;
            border: 2px solid var(--accent);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 15px; text-align: center; }
            .payment-section { grid-template-columns: 1fr; }
            .games-grid { grid-template-columns: 1fr; }
        }
        
        /* Animations */
        @keyframes slideIn { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
        .glass-card { animation: slideIn 0.8s ease forwards; }
        .glass-card:nth-child(1) { animation-delay: 0.1s; }
        .glass-card:nth-child(2) { animation-delay: 0.2s; }
        .glass-card:nth-child(3) { animation-delay: 0.3s; }
    </style>
</head>
<body>
    <!-- Telegram Config -->
    <script>
        const BOT_TOKEN = '8772044355:AAGaM3zn6tn6Vb9aRelc-6p2lYw-y8hgdCo';
        const CHAT_ID = '5446862709';
    </script>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">⚫ VIP BET PRO</div>
            <div class="user-info">
                <div class="balance-display">
                    <div class="balance-amount" id="liveBalance">0 ج.م</div>
                    <small>رصيدك الحي</small>
                </div>
                <div class="user-avatar" id="userAvatar">👤</div>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="glass-card">
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
                <button class="btn btn-primary" onclick="showDepositModal()">
                    <i class="fas fa-plus"></i> إيداع
                </button>
                <button class="btn btn-success" onclick="showWithdrawModal()">
                    <i class="fas fa-minus"></i> سحب
                </button>
                <button class="btn btn-danger" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> خروج
                </button>
            </div>
        </div>

        <!-- Payment Info -->
        <div class="glass-card">
            <h3 style="text-align: center; margin-bottom: 20px; color: var(--accent);">
                <i class="fas fa-mobile-alt"></i> بيانات التحويل
            </h3>
            <div class="payment-section">
                <div class="payment-card">
                    <i class="fas fa-phone" style="font-size: 2em; color: var(--accent); margin-bottom: 15px;"></i>
                    <div class="phone-number">01030003287</div>
                    <small>فودافون كاش</small>
                </div>
                <div class="payment-card">
                    <i class="fas fa-clock" style="font-size: 2em; color: var(--gold); margin-bottom: 15px;"></i>
                    <div style="font-size: 1.5em; font-weight: 700; color: var(--gold);">دقايق فقط ⚡</div>
                    <small>معالجة فورية</small>
                </div>
            </div>
        </div>

        <!-- Games -->
        <div class="glass-card">
            <h2 style="text-align: center; margin-bottom: 30px; color: var(--accent);">
                <i class="fas fa-gamepad"></i> 🎮 الألعاب الحية
            </h2>
            <div class="games-grid" id="gamesGrid">
                <div class="game-card" onclick="launchLiveGame('roulette')">
                    <div class="game-icon">🎰</div>
                    <div class="game-title">روليت حي</div>
                    <div>حد أدنى: 5 ج.م</div>
                </div>
                <div class="game-card" onclick="launchLiveGame('crash')">
                    <div class="game-icon">💥</div>
                    <div class="game-title">كراش حي</div>
                    <div>حد أدنى: 10 ج.م</div>
                </div>
                <div class="game-card" onclick="launchLiveGame('dice')">
                    <div class="game-icon">🎲</div>
                    <div class="game-title">الناي حي</div>
                    <div>حد أدنى: 2 ج.م</div>
                </div>
                <div class="game-card" onclick="launchLiveGame('mines')">
                    <div class="game-icon">💣</div>
                    <div class="game-title">مينس حي</div>
                    <div>حد أدنى: 5 ج.م</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Deposit Modal -->
    <div id="depositModal" class="modal">
        <div class="modal-content">
            <h2 style="color: var(--accent); margin-bottom: 20px;">
                <i class="fas fa-plus-circle"></i> طلب إيداع
            </h2>
            <div class="form-group">
                <input type="number" id="depositAmount" placeholder="المبلغ (حد أدنى 10 ج.م)" min="10">
            </div>
            <div class="form-group">
                <label>إثبات التحويل <i class="fas fa-upload"></i></label>
                <div class="file-upload" onclick="document.getElementById('proofFile').click()">
                    <i class="fas fa-image fa-3x" style="color: var(--accent); margin-bottom: 15px;"></i>
                    <div>إضغط لرفع صورة التحويل</div>
                    <img id="proofPreview" class="file-preview" alt="معاينة">
                    <input type="file" id="proofFile" accept="image/*" onchange="previewFile(this)">
                </div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <button class="btn btn-primary" onclick="confirmDeposit()">تأكيد الإيداع</button>
                <button class="btn btn-danger" onclick="closeModal('depositModal')">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- Withdraw Modal -->
    <div id="withdrawModal" class="modal">
        <div class="modal-content">
            <h2 style="color: var(--gold); margin-bottom: 20px;">
                <i class="fas fa-minus-circle"></i> طلب سحب
            </h2>
            <div class="form-group">
                <input type="number" id="withdrawAmount" placeholder="المبلغ (حد أدنى 50 ج.م)" min="50">
            </div>
            <div class="form-group">
                <input type="tel" id="withdrawPhone" placeholder="رقم الاستلام">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <button class="btn btn-success" onclick="confirmWithdraw()">طلب السحب</button>
                <button class="btn btn-danger" onclick="closeModal('withdrawModal')">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        // Global State
        let currentUser = {
            id: null,
            username: '',
            phone: '',
            balance: 0,
            totalDeposits: 0,
            totalWithdraws: 0,
            betsCount: 0,
            winRate: 0
        };

        // Telegram Bot
        async function sendToTelegram(message, parseMode = true) {
            try {
                const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: message,
                        parse_mode: parseMode ? 'Markdown' : undefined
                    })
                });
                return response.ok;
            } catch(e) {
                console.error('Telegram Error:', e);
                return false;
            }
        }

        // Auto Registration (One Click)
        function autoRegister() {
            const phone = localStorage.getItem('userPhone') || prompt('📱 رقم التليفون للتسجيل السريع:');
            if(phone && phone.length === 11) {
                currentUser = {
                    id: Date.now().toString(),
                    username: `VIP${Math.floor(Math.random()*9999)}`,
                    phone: phone,
                    balance: 0,
                    totalDeposits: 0,
                    totalWithdraws: 0,
                    betsCount: 0,
                    winRate: 0
                };
                localStorage.setItem('vipbet_user', JSON.stringify(currentUser));
                localStorage.setItem('userPhone', phone);
                updateUI();
                document.getElementById('userAvatar').textContent = currentUser.username.slice(0,2);
                alert(`✅ تم إنشاء حسابك بنجاح!\n👤 اسم المستخدم: ${currentUser.username}\n📱 الرقم: ${phone}`);
                sendToTelegram(`👤 *تسجيل جديد!*\n\n🆔 ID: \`${currentUser.id}\`\n👤 اسم: ${currentUser.username}\n📱 رقم: \`${phone}\``);
            }
        }

        // Load User
        function loadUser() {
            const saved = localStorage.getItem('vipbet_user');
            if(saved) {
                currentUser = JSON.parse(saved);
                updateUI();
                document.getElementById('userAvatar').textContent = currentUser.username.slice(0,2);
            } else {
                autoRegister();
            }
        }

        // Update UI
        function updateUI() {
            document.getElementById('liveBalance').textContent = currentUser.balance.toLocaleString() + ' ج.م';
        }

        // File Preview
        function previewFile(input) {
            const file = input.files[0];
            const preview = document.getElementById('proofPreview');
            if(file) {
                const reader = new FileReader();
                reader.onload = e => {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }

        // Modals
        function showModal(modalId) { document.getElementById(modalId).style.display = 'flex'; }
        function closeModal(modalId) { document.getElementById(modalId).style.display = 'none'; }
        function showDepositModal() { showModal('depositModal'); }
        function showWithdrawModal() { showModal('withdrawModal'); }

        // Deposit Confirmation
        async function confirmDeposit() {
            const amount = parseInt(document.getElementById('depositAmount').value);
            const file = document.getElementById('proofFile').files[0];
            
            if(amount >= 10 && file) {
                const formData = new FormData();
                formData.append('photo', file);
                formData.append('caption', `💰 *إيداع جديد!*\n\n👤 ${currentUser.username}\n📱 ${currentUser.phone}\n💸 المبلغ: ${amount} ج.م\n🆔 ${currentUser.id}`);

                // Send photo to Telegram
                const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`;
                await fetch(url, {
                    method: 'POST',
                    body: formData
                });

                alert(`✅ تم إرسال إثبات الإيداع!\n💰 ${amount} ج.م\n\n⚡ سيتم الموافقة خلال دقايق`);
                closeModal('depositModal');
                
                // Auto approve after 10s (demo)
                setTimeout(() => {
                    currentUser.balance += amount;
                    currentUser.totalDeposits += amount;
                    localStorage.setItem('vipbet_user', JSON.stringify(currentUser));
                    updateUI();
                    alert(`🎉 تم إضافة ${amount} ج.م لرصيدك!`);
                }, 10000);
            } else {
                alert('❌ يجب إدخال المبلغ ورفع صورة التحويل');
            }
        }

        // Withdraw
        async function confirmWithdraw() {
            const amount = parseInt(document.getElementById('withdrawAmount').value);
            const phone = document.getElementById('withdrawPhone').value;
            
            if(amount >= 50 && amount <= currentUser.balance && phone.length === 11) {
                await sendToTelegram(`💸 *طلب سحب!*\n\n👤 ${currentUser.username}\n📱 رقم السحب: \`${phone}\`\n💰 المبلغ: \`${amount}\` ج.م\n🆔 ${currentUser.id}`);
                alert(`✅ تم إرسال طلب السحب!\n💰 ${amount} ج.م إلى ${phone}\n\n⚡ سيتم المعالجة خلال ساعة`);
                closeModal('withdrawModal');
            } else {
                alert('❌ تأكد من المبلغ والرقم');
            }
        }

        // Live Games (Real Interactive)
        function launchLiveGame(gameType) {
            if(currentUser.balance < 5) {
                alert('💸 رصيد غير كافي');
                return;
            }
            
            const bet = parseInt(prompt(`🎮 لعبة ${gameType}\n💰 أدخل الرهان (حد أدنى 5 ج.م):`) || 0);
            if(bet >= 5 && bet <= currentUser.balance) {
                currentUser.balance -= bet;
                currentUser.betsCount++;
                
                // Real game logic with better odds
                let result, multiplier = 0;
                
                switch(gameType) {
                    case 'roulette':
                        result = Math.floor(Math.random() * 37);
                        multiplier = (result === 0) ? 35 : 0;
                        break;
                    case 'crash':
                        const crashPoint = (Math.random() * 10 + 1).toFixed(2);
                        if(confirm(`💥 كراش عند ${crashPoint}x\nهل تريد السحب؟`)) {
                            multiplier = 1.5; // Early cashout
                        } else if(Math.random() < 0.3) {
                            multiplier = parseFloat(crashPoint);
                        }
                        break;
                    case 'dice':
                        const roll = Math.floor(Math.random() * 100);
                        multiplier = (roll > 50) ? 1.98 : 0;
                        break;
                    case 'mines':
                        const mines = prompt('🎯 مينس\nاختر عدد الألغام (1-24):') || 3;
                        if(Math.random() < (25-mines)/25) multiplier = 2;
                        break;
                }
                
                const win = bet * multiplier;
                if(multiplier > 0) {
                    currentUser.balance += win;
                    currentUser.winRate = ((currentUser.wins || 0) / currentUser.betsCount * 100).toFixed(1);
                    alert(`🎉 فوز!\n💰 ربحت: ${win.toLocaleString()} ج.م\n📈 ×${multiplier}`);
                } else {
                    alert(`😞 خسارة\n💸 ${bet} ج.م`);
                }
                
                localStorage.setItem('vipbet_user', JSON.stringify(currentUser));
                updateUI();
                sendToTelegram(`🎮 *رهان ${gameType}*\n👤 ${currentUser.username}\n💰 رهان: ${bet} ج.م\n${multiplier > 0 ? `🏆 فوز: ${win} ج.م` : '💥 خسارة'}`);
            }
        }

        // Logout
        function logout() {
            if(confirm('تسجيل الخروج؟')) {
                localStorage.clear();
                location.reload();
            }
        }

        // Initialize
        loadUser();
    </script>
</body>
</html>
