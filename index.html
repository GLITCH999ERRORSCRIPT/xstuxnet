<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUXNET | OFFICIAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-green: #39FF14;
            --accent-purple: #9d4edd;
            --bg-dark: #050505;
            --card-bg: rgba(13, 13, 13, 0.9);
        }

        * { box-sizing: border-box; transition: 0.3s; }

        /* خلفية اللهب الشفاف */
        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at bottom, rgba(157, 78, 221, 0.15) 0%, transparent 70%);
            z-index: -2;
        }

        /* أنيميشن اللهب الخفيف */
        .fire-bg {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.1; z-index: -1; animation: flameMove 8s infinite alternate;
        }

        @keyframes flameMove {
            from { transform: translateY(0) scale(1); opacity: 0.1; }
            to { transform: translateY(-20px) scale(1.05); opacity: 0.2; }
        }

        header { text-align: center; margin-bottom: 40px; z-index: 1; }
        .logo {
            width: 100px; height: 100px; border-radius: 50%;
            border: 3px solid var(--primary-green);
            box-shadow: 0 0 25px rgba(57, 255, 20, 0.3);
            margin-bottom: 15px;
        }

        .brand-info h1 {
            margin: 0; font-size: 24px; letter-spacing: 2px;
            background: linear-gradient(to right, var(--primary-green), var(--accent-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .container { width: 100%; max-width: 450px; z-index: 1; }

        .section-card {
            background: var(--card-bg); border-radius: 18px;
            padding: 20px; margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05); text-align: center;
            backdrop-filter: blur(5px);
        }

        .address-container {
            background: #000; padding: 12px; border-radius: 10px;
            border: 1px solid #222; display: flex; align-items: center; gap: 10px;
        }

        .address-text {
            font-family: monospace; font-size: 10px; color: #ccc;
            word-break: break-all; flex: 1; text-align: left;
        }

        .tg-frame {
            width: 100%; height: 500px; border-radius: 12px;
            border: none; background: #000; margin-top: 10px;
        }

        input, textarea {
            width: 100%; background: #000; border: 1px solid #222;
            color: #fff; padding: 12px; margin-bottom: 15px;
            border-radius: 10px; outline: none; font-size: 14px;
        }

        .submit-btn {
            width: 100%; background: #222; color: #555;
            border: none; padding: 14px; border-radius: 10px;
            font-weight: bold; cursor: not-allowed; transition: 0.5s;
        }

        .submit-btn.active {
            background: linear-gradient(45deg, var(--accent-purple), var(--primary-green));
            color: #fff; cursor: pointer;
            box-shadow: 0 0 20px rgba(157, 78, 221, 0.4);
        }

        #timer-msg { color: #ff4444; font-size: 12px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="fire-bg"></div>

<audio id="actionSound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio>

<header>
    <img src="https://i.ibb.co/sp35zdbh/IMG-9090.jpg" alt="STUXNET" class="logo">
    <div class="brand-info">
        <h1>STUXNET OFFICIAL</h1>
        <p style="color:#777; font-size:13px; margin-top:8px;">Security • Development • Community</p>
    </div>
</header>

<div class="container">

    <div class="section-card">
        <span style="font-weight: bold; font-size: 14px; color: var(--accent-purple);">DONATE STUXNET</span>
        <div class="address-container" style="margin-top:15px;">
            <span class="address-text" id="wallet">TQhuYaGhhpXEg322iELNesuLXCyziPhJxC</span>
            <i class="fas fa-copy" style="color: var(--accent-purple); cursor: pointer;" onclick="copyWallet()"></i>
        </div>
    </div>

    <div class="section-card">
        <span style="font-size: 11px; color: var(--accent-purple); text-transform: uppercase; letter-spacing: 2px;">Latest Updates</span>
        <iframe src="https://t.me/s/xstuxnet" class="tg-frame"></iframe>
    </div>

    <div class="section-card">
        <span style="font-size: 11px; color: var(--accent-purple); text-transform: uppercase; letter-spacing: 2px;">Direct Contact</span>
        <form id="contactForm" style="margin-top: 20px;">
            <input type="text" id="name" placeholder="Your Name" required oninput="handleInput()" onfocus="playActionSound()">
            <textarea id="message" rows="3" placeholder="Your Message..." required oninput="handleInput()" onfocus="playActionSound()"></textarea>
            <button type="submit" class="submit-btn" id="sendBtn" disabled onclick="playActionSound()">SEND MESSAGE</button>
            <div id="timer-msg">Please wait <span id="seconds">60</span>s before next transmission.</div>
        </form>
    </div>

</div>

<script>
    const CONFIG = { TOKEN: "8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU", CHAT_ID: "5446862709" };

    function playActionSound() {
        const sound = document.getElementById('actionSound');
        sound.currentTime = 0;
        sound.play().catch(() => {});
    }

    function handleInput() {
        validateForm();
    }

    function validateForm() {
        const name = document.getElementById('name').value;
        const msg = document.getElementById('message').value;
        const btn = document.getElementById('sendBtn');
        const onCooldown = localStorage.getItem('cooldown_end') > Date.now();

        if(name.length > 0 && msg.length > 0 && !onCooldown) {
            btn.classList.add('active');
            btn.disabled = false;
        } else {
            btn.classList.remove('active');
            btn.disabled = true;
        }
    }

    function startCooldown(duration) {
        const endTime = Date.now() + (duration * 1000);
        localStorage.setItem('cooldown_end', endTime);
        runTimer();
    }

    function runTimer() {
        const timerMsg = document.getElementById('timer-msg');
        const secondsSpan = document.getElementById('seconds');
        const btn = document.getElementById('sendBtn');

        const interval = setInterval(() => {
            const remaining = Math.round((localStorage.getItem('cooldown_end') - Date.now()) / 1000);
            if (remaining <= 0) {
                clearInterval(interval);
                timerMsg.style.display = 'none';
                validateForm();
            } else {
                timerMsg.style.display = 'block';
                secondsSpan.innerText = remaining;
                btn.disabled = true;
                btn.classList.remove('active');
            }
        }, 1000);
    }

    window.onload = () => {
        if (localStorage.getItem('cooldown_end') > Date.now()) runTimer();
    };

    function copyWallet() {
        playActionSound();
        navigator.clipboard.writeText(document.getElementById('wallet').innerText);
        alert("Address Copied!");
    }

    document.getElementById('contactForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('sendBtn');
        btn.innerText = "SENDING...";

        const payload = `👤 FROM: ${document.getElementById('name').value}\n💬 MSG: ${document.getElementById('message').value}`;

        try {
            await fetch(`https://api.telegram.org/bot${CONFIG.TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CONFIG.CHAT_ID, text: payload })
            });
            alert("Transmission Successful!");
            e.target.reset();
            startCooldown(60); 
        } catch (err) { alert("Error!"); }
        finally { btn.innerText = "SEND MESSAGE"; }
    });
</script>

</body>
</html>
