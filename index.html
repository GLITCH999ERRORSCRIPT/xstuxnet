<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUXNET | OFFICIAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-green: #39FF14;
            --accent-purple: #9d4edd;
            --deep-purple: #5a189a;
            --usdt-color: #26a17b;
            --bg: #050505;
            --card: #0d0d0d;
        }

        * { box-sizing: border-box; transition: 0.3s; }
        body {
            background-color: var(--bg); color: #fff;
            font-family: 'JetBrains Mono', monospace;
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center;
        }

        header {
            width: 100%; max-width: 800px; padding: 40px 20px;
            display: flex; align-items: center; gap: 20px;
        }

        .logo {
            width: 70px; height: 70px; border-radius: 50%;
            border: 2px solid var(--primary-green);
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.3);
        }

        .brand h1 { margin: 0; font-size: 22px; color: var(--primary-green); letter-spacing: 1px; }
        .brand p { margin: 5px 0 0; font-size: 11px; color: #555; text-transform: uppercase; }

        .container { width: 100%; max-width: 800px; padding: 0 15px 60px; }

        /* DONATE CARD */
        .card-donate {
            background: var(--card); border-radius: 15px; padding: 25px;
            margin-bottom: 25px; border-left: 4px solid var(--accent-purple);
            position: relative; overflow: hidden;
        }

        .card-donate::after {
            content: "\f15a"; font-family: "Font Awesome 5 Free"; font-weight: 900;
            position: absolute; top: -10px; right: -10px; font-size: 80px;
            color: rgba(157, 78, 221, 0.03); transform: rotate(-15deg);
        }

        .usdt-title { display: flex; align-items: center; gap: 10px; color: var(--accent-purple); font-weight: bold; margin-bottom: 15px; }

        .wallet-box {
            background: #000; padding: 15px; border-radius: 10px;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 13px; border: 1px solid #1a1a1a; position: relative; z-index: 2;
        }

        /* FEED SECTION */
        .feed-container {
            background: var(--card); border-radius: 15px; padding: 20px;
            margin-bottom: 25px; border: 1px solid #1a1a1a;
        }

        .join-link {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            background: rgba(157, 78, 221, 0.1); border: 1px solid var(--accent-purple);
            color: #fff; text-decoration: none; padding: 12px; border-radius: 10px;
            margin-bottom: 20px; font-weight: bold; font-size: 14px;
        }

        .join-link:hover { background: var(--accent-purple); }

        /* CONTACT CARD */
        .card-contact { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid #1a1a1a; }

        input, textarea {
            width: 100%; background: #000; border: 1px solid #222; color: #fff;
            padding: 15px; margin-bottom: 20px; border-radius: 10px; outline: none; font-family: inherit;
        }

        input:focus { border-color: var(--accent-purple); }

        .btn-exec {
            width: 100%; background: linear-gradient(45deg, var(--deep-purple), var(--accent-purple));
            color: #fff; border: none; padding: 15px; border-radius: 10px;
            font-weight: bold; cursor: pointer; font-size: 15px;
        }

        .label-tech { display: block; text-align: center; font-size: 10px; color: #444; margin-bottom: 15px; letter-spacing: 2px; }
    </style>
</head>
<body>

<audio id="clickSound" src="https://www.soundjay.com/communication/sounds/typewriter-key-1.mp3"></audio>

<header>
    <img src="https://i.ibb.co/sp35zdbh/IMG-9090.jpg" alt="LOGO" class="logo">
    <div class="brand">
        <h1>STUXNET_OFFICIAL</h1>
        <p>Advanced Intelligence Hub</p>
    </div>
</header>

<div class="container">
    
    <div class="card-donate">
        <div class="usdt-title">
            <i class="fas fa-microchip" style="color: var(--usdt-color)"></i>
            DONATE STUXNET
        </div>
        <p style="font-size: 11px; color: #666; margin-bottom: 15px;">NETWORK MAINTENANCE (USDT TRC20):</p>
        <div class="wallet-box">
            <span id="addr">TQhuYaGhhpXEg322iELNesuLXCyziPhJxC</span>
            <i class="fas fa-copy" style="color: var(--accent-purple); cursor: pointer;" onclick="copyAddr()"></i>
        </div>
    </div>

    <div class="feed-container">
        <span class="label-tech">LIVE_DATA_STREAM</span>
        <a href="https://t.me/xstuxnet" target="_blank" class="join-link" onclick="playSound()">
            <i class="fab fa-telegram-plane"></i> JOIN THE CHANNEL
        </a>
        
        <div style="width: 100%; min-height: 400px;">
            <script async src="https://telegram.org/js/telegram-widget.js?22" 
                    data-telegram-post-list="xstuxnet" 
                    data-limit="10" data-dark="1"></script>
        </div>
    </div>

    <div class="card-contact">
        <span class="label-tech">SECURE_UPLINK</span>
        <form id="contact">
            <input type="text" id="name" placeholder="IDENTIFIER" required>
            <textarea id="msg" rows="4" placeholder="MESSAGE DATA..." required></textarea>
            <button type="submit" id="btn" class="btn-exec" onclick="playSound()">INITIATE SEND</button>
            <p id="cd" style="display:none; text-align:center; color:var(--accent-purple); font-size:11px; margin-top:15px;">
                LOCKOUT ACTIVE: <span id="time">60</span>s
            </p>
        </form>
    </div>

</div>

<script>
    const CONFIG = {
        TOKEN: "8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU",
        CHAT_ID: "5446862709"
    };

    function playSound() {
        const a = document.getElementById('clickSound');
        a.currentTime = 0; a.play().catch(()=>{});
    }

    function copyAddr() {
        playSound();
        navigator.clipboard.writeText(document.getElementById('addr').innerText);
        alert("ADDRESS COPIED");
    }

    document.getElementById('contact').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn');
        btn.innerText = "SENDING...";

        const text = `📡 **NEW MESSAGE**\n\n👤 **From:** ${document.getElementById('name').value}\n💬 **Data:** ${document.getElementById('msg').value}`;

        try {
            await fetch(`https://api.telegram.org/bot${CONFIG.TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CONFIG.CHAT_ID, text: text })
            });
            alert("TRANSMITTED");
            e.target.reset();
        } catch (err) { alert("ERROR"); }
        finally { btn.innerText = "INITIATE SEND"; }
    });
</script>
</body>
</html>
