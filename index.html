<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميرو سوشيال ميديا | إدارة صفحات احترافية</title>
    <meta name="description" content="إدارة سوشيال ميديا احترافية - تصوير، محتوى، إعلانات ممولة، وزيادة متابعين حقيقيين">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #ff4757;
            --primary-light: #ff6b81;
            --secondary: #5f27cd;
            --accent: #00d2d3;
            --yellow: #ff9f43;
            --dark: #2d3436;
            --dark-light: #57606f;
            --white: #ffffff;
            --bg: #f8f9fa;
            --bg2: #fff0f3;
            --gradient: linear-gradient(135deg, #ff4757 0%, #5f27cd 100%);
            --gradient2: linear-gradient(135deg, #5f27cd 0%, #00d2d3 100%);
            --gradient3: linear-gradient(135deg, #ff4757 0%, #ff9f43 100%);
            --shadow: 0 10px 40px rgba(0,0,0,0.1);
            --shadow2: 0 20px 60px rgba(0,0,0,0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--dark);
            line-height: 1.7;
            overflow-x: hidden;
        }

        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 30px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            text-transform: uppercase;
        }

        .btn-primary {
            background: var(--gradient);
            color: white;
            box-shadow: 0 10px 30px rgba(255,71,87,0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255,71,87,0.5);
        }

        .btn-whatsapp {
            background: #25D366;
            color: white;
            box-shadow: 0 10px 30px rgba(37,211,102,0.4);
        }

        .btn-whatsapp:hover {
            background: #20ba5a;
            transform: translateY(-3px);
        }

        .btn-outline {
            background: transparent;
            color: white;
            border: 2px solid white;
        }

        .btn-outline:hover {
            background: white;
            color: var(--primary);
        }

        .section-title {
            font-size: 2.5rem;
            font-weight: 900;
            text-align: center;
            margin-bottom: 10px;
        }

        .section-title span {
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .section-subtitle {
            text-align: center;
            color: var(--dark-light);
            font-size: 1.1rem;
            margin-bottom: 50px;
        }

        /* Navbar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(10px);
            z-index: 1000;
            padding: 12px 0;
            box-shadow: 0 2px 20px rgba(0,0,0,0.08);
        }

        .navbar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--dark);
        }

        .logo i {
            color: var(--primary);
            font-size: 1.7rem;
        }

        .logo span {
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .nav-links a {
            font-weight: 600;
            color: var(--dark);
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .nav-whatsapp {
            background: #25D366;
            color: white;
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-whatsapp:hover {
            background: #20ba5a;
        }

        /* Hero */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 120px 0 80px;
            background: linear-gradient(135deg, #ffeaa7 0%, #fd79a8 25%, #a29bfe 50%, #74b9ff 75%, #81ecec 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.9);
        }

        .hero .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: white;
            padding: 10px 20px;
            border-radius: 50px;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .hero-content h1 {
            font-size: 3rem;
            font-weight: 900;
            color: var(--dark);
            line-height: 1.3;
            margin-bottom: 15px;
        }

        .hero-content h1 .highlight {
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-desc {
            font-size: 1.1rem;
            color: var(--dark-light);
            margin-bottom: 25px;
        }

        .problems-box {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: var(--shadow);
            border-right: 5px solid var(--primary);
        }

        .problems-box h3 {
            color: var(--primary);
            font-size: 1rem;
            margin-bottom: 15px;
        }

        .problems-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .problem-item {
            color: var(--dark-light);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .problem-item i {
            color: var(--primary);
            font-size: 0.7rem;
        }

        .hero-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        .trust-badges {
            display: flex;
            gap: 20px;
        }

        .badge-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            color: var(--dark-light);
        }

        .badge-item i {
            color: var(--secondary);
        }

        .hero-card {
            background: white;
            border-radius: 25px;
            padding: 40px;
            box-shadow: var(--shadow2);
            position: relative;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .offer-badge {
            position: absolute;
            top: -15px;
            right: -10px;
            background: var(--gradient3);
            color: white;
            padding: 10px 22px;
            border-radius: 50px;
            font-weight: 800;
            box-shadow: var(--shadow);
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        .hero-card-icon {
            width: 90px;
            height: 90px;
            background: var(--gradient);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2.5rem;
            color: white;
            transform: rotate(-5deg);
        }

        .hero-card h3 {
            text-align: center;
            font-size: 1.4rem;
            margin-bottom: 20px;
        }

        .hero-features-list li {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
        }

        .hero-features-list li i {
            color: var(--secondary);
        }

        .hero-card .btn {
            width: 100%;
            margin-top: 15px;
        }

        /* Services */
        .services {
            padding: 100px 0;
            background: white;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .service-card {
            background: white;
            border-radius: 22px;
            padding: 30px;
            transition: 0.3s;
            border: 2px solid #f0f0f0;
        }

        .service-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow2);
            border-color: var(--primary);
        }

        .service-icon {
            width: 75px;
            height: 75px;
            background: var(--gradient);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            font-size: 1.8rem;
            color: white;
        }

        .service-card:nth-child(2) .service-icon {
            background: var(--gradient2);
        }

        .service-card:nth-child(3) .service-icon {
            background: linear-gradient(135deg, #ff9f43 0%, #ff4757 100%);
        }

        .service-card:nth-child(4) .service-icon {
            background: linear-gradient(135deg, #00d2d3 0%, #5f27cd 100%);
        }

        .service-card:nth-child(5) .service-icon {
            background: linear-gradient(135deg, #fd79a8 0%, #a29bfe 100%);
        }

        .service-card:nth-child(6) .service-icon {
            background: linear-gradient(135deg, #55efc4 0%, #00b894 100%);
        }

        .service-card h3 {
            font-size: 1.2rem;
            margin-bottom: 12px;
        }

        .service-card p {
            color: var(--dark-light);
            font-size: 0.95rem;
            margin-bottom: 15px;
        }

        .service-check li {
            color: var(--dark-light);
            font-size: 0.9rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .service-check li i {
            color: var(--primary);
            font-size: 0.8rem;
        }

        /* Features */
        .features {
            padding: 100px 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .features .section-title,
        .features .section-subtitle {
            color: white;
        }

        .features .section-title span {
            color: #ffd93d;
            -webkit-text-fill-color: #ffd93d;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
        }

        .feature-card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .feature-card:hover {
            background: rgba(255,255,255,0.25);
            transform: translateY(-5px);
        }

        .feature-icon {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px;
            font-size: 1.8rem;
            color: var(--primary);
        }

        .feature-card h3 {
            color: white;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        .feature-card p {
            color: rgba(255,255,255,0.85);
            font-size: 0.9rem;
        }

        /* Offers */
        .offers {
            padding: 100px 0;
            background: var(--bg);
        }

        .offers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            align-items: start;
        }

        .offer-card {
            background: white;
            border-radius: 22px;
            padding: 35px;
            text-align: center;
            transition: 0.3s;
            box-shadow: var(--shadow);
            position: relative;
        }

        .offer-card:hover {
            transform: translateY(-8px);
        }

        .offer-card.main-offer {
            border: 3px solid var(--primary);
            transform: scale(1.05);
        }

        .offer-card.main-offer:hover {
            transform: scale(1.05) translateY(-8px);
        }

        .offer-badge-main {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gradient);
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .offer-card h3 {
            font-size: 1.4rem;
            margin-bottom: 20px;
            margin-top: 10px;
        }

        .offer-price {
            margin-bottom: 25px;
        }
