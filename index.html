<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STUXNET VIP | Games & Betting</title>
    <style>
        :root { --primary: #f0b90b; --bg: #0b0e11; --card: #1e2329; --text: #eaecef; --danger: #ff4d4d; --success: #00ff88; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
        
        /* Header */
        .header { background: var(--card); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000; }
        .balance-card { background: rgba(240, 185, 11, 0.1); padding: 5px 15px; border-radius: 20px; border: 1px solid var(--primary); font-weight: bold; }

        /* Tabs */
        .tabs { display: flex; background: var(--card); overflow-x: auto; padding: 10px; gap: 10px; border-bottom: 1px solid #333; }
        .tab-btn { background: #2b3139; border: none; color: #fff; padding: 8px 20px; border-radius: 20px; white-space: nowrap; cursor: pointer; }
        .tab-btn.active { background: var(--primary); color: #000; font-weight: bold; }

        /* Game Screens */
        .page { display: none; padding: 15px; padding-bottom: 80px; }
        .page.active { display: block; }

        /* Crash Game (الطيارة) */
        .crash-container { background: #000; height: 220px; border-radius: 15px; position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: center; border: 2px solid #333; }
        #crash-mult { font-size: 60px; font-weight: bold; color: var(--primary); z-index: 5; }
        .plane { position: absolute; bottom: 20px; left: -50px; font-size: 40px; transition: 0.1s linear; }

        /* Sports (الماتشات) */
        .match-card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; text-align: right; }
        .match-teams { display: flex; justify-content: space-around; align-items: center; margin: 10px 0; }
        .odds-container { display: flex; gap: 10px; margin-top: 10px; }
        .odd-btn { flex: 1; background: #2b3139; border: 1px solid #444; color: var(--primary); padding: 8px; border-radius: 5px; font-size: 14px; }

        /* Generic UI */
        input { width: 100%; padding: 12px; margin: 10px 0; background: #2b3139; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; }
        .btn-main { background: var(--primary); color: #000; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 18px; margin-top: 10px; cursor: pointer; }
        
        /* Bottom Nav */
        .nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { color: #848e9c; text-decoration: none; font-size: 12px; text-align: center; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight:bold; color:var(--primary)">STUXNET PRO</div>
        <div class="balance-card">💰 <span id="user-bal">0.00</span> ج.م</div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showPage('crash')">🚀 الطيارة</button>
        <button class="tab-btn" onclick="showPage('sports')">⚽ الماتشات</button>
        <button class="tab-btn" onclick="showPage('casino')">🎰 الكازينو</button>
        <button class="tab-btn" onclick="showPage('deposit')">💳 شحن</button>
    </div>

    <div id="crash" class="page active">
        <div class="crash-container">
            <div id="crash-mult">1.00x</div>
            <div id="plane" class="plane">🚀</div>
        </div>
        <div style="margin-top: 20px;">
            <input type="number" id="bet-amt" placeholder="مبلغ الرهان">
            <button id="crash-btn" class="btn-main" onclick="startCrash()">ابدأ الرهان</button>
        </div>
    </div>

    <div id="sports" class="page">
        <h3>مباريات اليوم (مباشر)</h3>
        <div class="match-card">
            <div>الدوري الإنجليزي 🏴󠁧󠁢󠁥󠁮󠁧󠁿</div>
            <div class="match-teams">
                <span>ليفربول</span> <b>VS</b> <span>مان سيتي</span>
            </div>
            <div class="odds-container">
                <button class="odd-btn" onclick="betMatch('ليفربول', 2.10)">فوز 1 <br> 2.10</button>
                <button class="odd-btn" onclick="betMatch('تعادل', 3.40)">تعادل <br> 3.40</button>
                <button class="odd-btn" onclick="betMatch('سيتي', 1.95)">فوز 2 <br> 1.95</button>
            </div>
        </div>
        <div class="match-card">
            <div>دوري أبطال أفريقيا 🌍</div>
            <div class="match-teams">
                <span>الأهلي</span> <b>VS</b> <span>الترجي</span>
            </div>
            <div class="odds-container">
                <button class="odd-btn" onclick="betMatch('الأهلي', 1.50)">فوز 1 <br> 1.50</button>
                <button class="odd-btn" onclick="betMatch('تعادل', 2.80)">تعادل <br> 2.80</button>
                <button class="odd-btn" onclick="betMatch('الترجي', 4.20)">فوز 2 <br> 4.20</button>
            </div>
        </div>
    </div>

    <div id="deposit" class="page">
        <div style="background:var(--card); padding:20px; border-radius:15px; border:1px solid var(--primary)">
            <h3>إيداع فودافون كاش</h3>
            <p>حول لـ: <b style="font-size:22px; color:var(--primary)">01030003287</b></p>
            <input type="number" id="dep-val" placeholder="المبلغ المحول">
            <input type="file" id="dep-img" accept="image/*">
            <button class="btn-main" onclick="submitDeposit()">تأكيد وإرسال للبوت</button>
        </div>
    </div>

    <nav class="nav">
        <a href="#" class="nav-item active" onclick="showPage('crash')">🏠<br>الرئيسية</a>
        <a href="#" class="nav-item" onclick="showPage('sports')">⚽<br>رياضة</a>
        <a href="#" class="nav-item" onclick="showPage('deposit')">💳<br>شحن</a>
        <a href="#" class="nav-item" id="user-id-nav">👤<br>حسابي</a>
    </nav>

    <script>
        let user = JSON.parse(localStorage.getItem('stux_v3')) || { id: "STX"+Math.floor(Math.random()*90000), bal: 0.00 };
        localStorage.setItem('stux_v3', JSON.stringify(user));
        document.getElementById('user-id-nav').innerHTML = `👤<br>${user.id}`;

        function updateUI() { 
            document.getElementById('user-bal').innerText = user.bal.toFixed(2);
            localStorage.setItem('stux_v3', JSON.stringify(user));
        }
        updateUI();

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // --- ميكانيكا الطيارة (Crash) ---
        let isFlying = false;
        let currentMult = 1.00;
        function startCrash() {
            let amt = parseFloat(document.getElementById('bet-amt').value);
            if(isNaN(amt) || amt > user.bal || amt <= 0) return alert("رصيدك غير كافي!");
            
            user.bal -= amt; updateUI();
            isFlying = true; currentMult = 1.00;
            const btn = document.getElementById('crash-btn');
            btn.innerText = "اسحب الربح!";
            btn.style.background = "var(--success)";
            btn.onclick = () => cashOut(amt);

            let crashPoint = (Math.random() * 2.5 + 1.1).toFixed(2);
            let loop = setInterval(() => {
                if(!isFlying) { clearInterval(loop); return; }
                currentMult += 0.01;
                document.getElementById('crash-mult').innerText = currentMult.toFixed(2) + "x";
                document.getElementById('plane').style.left = (currentMult * 25) + "px";
                if(currentMult >= crashPoint) {
                    clearInterval(loop);
                    isFlying = false;
                    document.getElementById('crash-mult').style.color = "var(--danger)";
                    document.getElementById('crash-mult').innerText = "BOOM!";
                    resetCrash();
                }
            }, 100);
        }
        function cashOut(amt) {
            if(!isFlying) return;
            let win = amt * currentMult;
            user.bal += win; updateUI();
            isFlying = false;
            alert(`مبروك! كسبت ${win.toFixed(2)} ج.م`);
            resetCrash();
        }
        function resetCrash() {
            const btn = document.getElementById('crash-btn');
            btn.innerText = "ابدأ الرهان"; btn.style.background = "var(--primary)";
            btn.onclick = startCrash;
            setTimeout(() => { document.getElementById('crash-mult').style.color = "var(--primary)"; document.getElementById('plane').style.left = "-50px"; }, 2000);
        }

        // --- الماتشات ---
        function betMatch(team, odds) {
            let amt = prompt(`أدخل مبلغ الرهان على ${team}:`);
            if(amt && parseFloat(amt) <= user.bal) {
                user.bal -= parseFloat(amt); updateUI();
                alert(`تم وضع الرهان بنجاح على ${team}. في انتظار النتيجة!`);
            } else { alert("رصيد غير كافي"); }
        }

        // --- الشحن للبوت ---
        async function submitDeposit() {
            const amt = document.getElementById('dep-val').value;
            const file = document.getElementById('dep-img').files[0];
            if(!amt || !file) return alert("ارفع السكرين واكتب المبلغ!");
            
            let fd = new FormData();
            fd.append("chat_id", "5446862709");
            fd.append("photo", file);
            fd.append("caption", `💰 إيداع جديد\nالحساب: ${user.id}\nالمبلغ: ${amt} ج.م`);

            await fetch("https://api.telegram.org/bot8772044355:AAGaM3zn6tn6Vb9aRelc-6p2lYw-y8hgdCo/sendPhoto", {method:"POST", body:fd});
            alert("تم إرسال طلبك للأدمن.. سيظهر الرصيد فور التأكيد.");
        }
    </script>
</body>
</html>
