<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUXNET | OFFICIAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-green: #39FF14;
            --accent-purple: #9d4edd;
            --usdt-teal: #26a17b;
            --bg-dark: #050505;
            --card-bg: #0d0d0d;
        }

        * { box-sizing: border-box; transition: 0.3s; }

        /* لودر مرن يظبط نفسه على أي شاشة */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            transition: transform 0.8s cubic-bezier(0.87, 0, 0.13, 1), opacity 0.6s ease;
        }

        .typing-text {
            color: var(--primary-green);
            font-family: monospace;
            /* حجم خط مرن بيصغر ويكبر حسب الشاشة */
            font-size: clamp(1.2rem, 5vw, 2rem); 
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            border-right: 3px solid var(--primary-green);
            width: 0;
            animation: typing 1.5s steps(20, end) forwards, blink 0.5s step-end infinite;
        }

        @keyframes typing { 
            from { width: 0; } 
            to { width: 100%; } 
        }
        @keyframes blink { from, to { border-color: transparent } 50% { border-color: var(--primary-green) } }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
            opacity: 0;
            filter: blur(10px);
            transform: scale(0.95);
            transition: opacity 1s ease, filter 1.2s ease, transform 1s ease;
            min-height: 100vh;
        }

        body.loaded {
            opacity: 1;
            filter: blur(0);
            transform: scale(1);
        }

        header { text-align: center; margin: 20px 0 30px; width: 100%; }
        
        .logo {
            width: clamp(80px, 20vw, 110px); 
            height: clamp(80px, 20vw, 110px);
            border-radius: 50%;
            border: 3px solid var(--primary-green);
            box-shadow: 0 0 25px rgba(57, 255, 20, 0.3);
            margin-bottom: 15px;
        }

        .brand-info h1 {
            margin: 0; font-size: clamp(1.5rem, 6vw, 2rem); letter-spacing: 2px;
            background: linear-gradient(to right, var(--primary-green), var(--accent-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .container { 
            width: 100%; 
            max-width: 500px; /* بيفرد لحد 500 بيكسل على الكمبيوتر ويصغر على الموبايل */
        }

        .section-card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: clamp(15px, 5vw, 25px);
            margin-bottom: 20px;
            border: 1px solid #1a1a1a;
            width: 100%;
        }

        .address-container {
            background: #000;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #222;
            display: flex;
            align-items: center;
            gap: 10px;
            overflow: hidden; /* عشان العنوان ميكسرش التصميم في الموبايل */
        }

        .address-text {
            font-family: monospace;
            font-size: clamp(9px, 3vw, 12px);
            color: #ccc;
            word-break: break-all;
            flex: 1;
            text-align: left;
        }

        .join-btn {
            background: rgba(157, 78, 221, 0.1); border: 1px solid var(--accent-purple);
            color: #fff; text-decoration: none; padding: 12px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: bold; margin-bottom: 15px;
        }

        input, textarea { width: 100%; background: #000; border: 1px solid #222; color: #fff; padding: 12px; margin-bottom: 15px; border-radius: 10px; outline: none; font-size: 14px; }
        .submit-btn { width: 100%; background: linear-gradient(45deg, var(--accent-purple), #5a189a); border: none; color: #fff; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
    </style>
</head>
<body>

<div id="loader">
    <div class="typing-text">WELCOME TO STUXNET</div>
</div>

<header>
    <img src="https://i.ibb.co/sp35zdbh/IMG-9090.jpg" alt="STUXNET" class="logo">
    <div class="brand-info">
        <h1>STUXNET OFFICIAL</h1>
        <p style="color:#777; font-size: 13px;">Security • Development • Community</p>
    </div>
</header>

<div class="container">
    <div class="section-card">
        <div style="display: flex; justify-content: center; align-items: center; gap: 8px; margin-bottom: 15px;">
            <div style="background: var(--usdt-teal); width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold;">₮</div>
            <span style="font-weight: bold; color: var(--accent-purple);">DONATE STUXNET</span>
        </div>
        <div class="address-container">
            <span class="address-text" id="wallet">TQhuYaGhhpXEg322iELNesuLXCyziPhJxC</span>
            <i class="fas fa-copy" style="color: var(--accent-purple); cursor: pointer;" onclick="copyWallet()"></i>
        </div>
    </div>

    <div class="section-card">
        <span style="font-size: 11px; color: var(--accent-purple); text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 15px;">Latest Updates</span>
        <a href="https://t.me/xstuxnet" target="_blank" class="join-btn">
            <i class="fab fa-telegram-plane"></i> JOIN CHANNEL
        </a>
    </div>

    <div class="section-card">
        <form id="contactForm">
            <input type="text" id="name" placeholder="Your Name" required>
            <textarea id="message" rows="3" placeholder="Your Message..." required></textarea>
            <button type="submit" class="submit-btn" id="sendBtn">SEND MESSAGE</button>
        </form>
    </div>
</div>

<script>
    const CONFIG = {
        TOKEN: "8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU",
        CHAT_ID: "5446862709"
    };

    window.addEventListener('load', () => {
        setTimeout(() => {
            const loader = document.getElementById('loader');
            loader.style.transform = 'scale(1.5)';
            loader.style.opacity = '0';
            document.body.classList.add('loaded');
            setTimeout(() => { loader.style.display = 'none'; }, 800);
        }, 2000); 
    });

    function copyWallet() {
        navigator.clipboard.writeText(document.getElementById('wallet').innerText);
        alert("Copied!");
    }

    document.getElementById('contactForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('sendBtn');
        btn.innerText = "SENDING...";
        const payload = `👤 FROM: ${document.getElementById('name').value}\n💬 MSG: ${document.getElementById('message').value}`;
        try {
            await fetch(`https://api.telegram.org/bot${CONFIG.TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CONFIG.CHAT_ID, text: payload })
            });
            alert("Sent!");
            btn.innerText = "SEND MESSAGE";
            e.target.reset();
        } catch (err) { alert("Error!"); btn.innerText = "SEND MESSAGE"; }
    });
</script>

</body>
</html>
