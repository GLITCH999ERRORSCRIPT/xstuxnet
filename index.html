<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUXNET | OFFICIAL PORTAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-green: #39FF14;
            --accent-purple: #9d4edd;
            --deep-purple: #5a189a;
            --usdt-green: #26a17b;
            --bg-dark: #080808;
            --card-bg: #121212;
            --text-gray: #b0b0b0;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        header {
            width: 100%; max-width: 800px;
            padding: 40px 20px; display: flex;
            align-items: center; justify-content: flex-start; gap: 20px;
        }

        .logo {
            width: 85px; height: 85px; border-radius: 50%;
            border: 3px solid var(--primary-green);
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.2);
        }

        .brand-info h1 {
            margin: 0; font-size: 28px;
            background: linear-gradient(to left, var(--primary-green), var(--accent-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .container { width: 100%; max-width: 800px; padding: 0 20px 60px; }

        /* USDT Section */
        .donate-section {
            background: linear-gradient(145deg, #161616, #0f0f0f);
            border: 1px solid rgba(157, 78, 221, 0.2);
            padding: 25px; border-radius: 20px; margin-bottom: 35px;
            border-right: 4px solid var(--accent-purple);
        }

        .donate-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        
        /* Real USDT Icon */
        .usdt-icon {
            width: 30px; height: 30px;
            background-color: var(--usdt-green);
            color: #fff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: bold;
            box-shadow: 0 0 10px rgba(38, 161, 123, 0.5);
        }

        .donate-title { color: var(--accent-purple); font-size: 18px; font-weight: bold; }

        .address-box {
            background: #000; padding: 15px; border-radius: 10px;
            display: flex; justify-content: space-between; align-items: center;
            font-family: monospace; border: 1px solid #222;
        }

        /* Feed Section */
        .feed-section {
            background: var(--card-bg); border-radius: 20px;
            padding: 20px; margin-bottom: 35px; border: 1px solid #1a1a1a;
        }

        .section-label {
            text-align: center; font-size: 12px; color: var(--accent-purple);
            text-transform: uppercase; margin-bottom: 20px; letter-spacing: 2px; display: block;
        }

        .join-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            background: rgba(157, 78, 221, 0.1); border: 1px solid var(--accent-purple);
            color: #fff; text-decoration: none; padding: 15px; border-radius: 12px;
            margin-bottom: 25px; font-weight: bold;
        }

        /* Contact Section */
        .contact-card {
            background: var(--card-bg); padding: 30px; border-radius: 20px; border: 1px solid #1a1a1a;
        }

        input, textarea {
            width: 100%; background: #080808; border: 1px solid #222; color: #fff;
            padding: 15px; margin-top: 10px; margin-bottom: 20px; border-radius: 12px; outline: none;
        }

        .btn-submit {
            width: 100%; background: linear-gradient(45deg, var(--deep-purple), var(--accent-purple));
            color: #fff; border: none; padding: 16px; font-weight: bold; font-size: 16px;
            border-radius: 12px; cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <img src="https://i.ibb.co/sp35zdbh/IMG-9090.jpg" alt="STUXNET" class="logo">
    <div class="brand-info">
        <h1>STUXNET OFFICIAL</h1>
        <p>Security • Development • Community</p>
    </div>
</header>

<div class="container">
    
    <div class="donate-section">
        <div class="donate-header">
            <div class="usdt-icon">₮</div> <span class="donate-title">DONATE STUXNET</span>
        </div>
        <p style="font-size: 12px; color: var(--text-gray); margin-bottom: 12px;">Your support helps us continue (USDT TRC20):</p>
        <div class="address-box">
            <span id="wallet" style="font-size: 14px;">TQhuYaGhhpXEg322iELNesuLXCyziPhJxC</span>
            <i class="fas fa-copy" style="color: var(--accent-purple); cursor: pointer;" onclick="copyWallet()"></i>
        </div>
    </div>

    <div class="feed-section">
        <span class="section-label">LATEST UPDATES FROM TELEGRAM</span>
        <a href="https://t.me/xstuxnet" target="_blank" class="join-btn">
            <i class="fab fa-telegram-plane"></i> JOIN CHANNEL
        </a>
        <div style="width: 100%; min-height: 500px; border-radius: 15px; overflow: hidden; background: #000;">
            <script async src="https://telegram.org/js/telegram-widget.js?22" 
                    data-telegram-post-list="xstuxnet" 
                    data-limit="5" 
                    data-dark="1" 
                    data-width="100%"></script>
        </div>
    </div>

    <div class="contact-card">
        <span class="section-label">SEND MESSAGE TO STUXNET</span>
        <form id="contactForm">
            <input type="text" id="username" placeholder="Your Name" required>
            <textarea id="message" rows="4" placeholder="Your Message..." required></textarea>
            <button type="submit" id="execBtn" class="btn-submit">SEND MESSAGE</button>
        </form>
    </div>

</div>

<script>
    const CONFIG = {
        TOKEN: "8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU",
        CHAT_ID: "5446862709"
    };

    function copyWallet() {
        navigator.clipboard.writeText(document.getElementById('wallet').innerText);
        alert("USDT Address Copied!");
    }

    document.getElementById('contactForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('execBtn');
        btn.innerText = "SENDING...";
        const payload = `👤 FROM: ${document.getElementById('username').value}\n💬 MESSAGE: ${document.getElementById('message').value}`;

        try {
            await fetch(`https://api.telegram.org/bot${CONFIG.TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CONFIG.CHAT_ID, text: payload })
            });
            alert("Sent!");
            e.target.reset();
        } catch (err) { alert("Error!"); }
        finally { btn.innerText = "SEND MESSAGE"; }
    });
</script>

</body>
</html>
