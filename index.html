<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUXNET_UPLINK_v3</title>
    <style>
        :root { --accent: #46FF31; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Chat Display */
        #chat-logs { flex: 1; overflow-y: auto; padding: 20px; font-size: 0.85rem; border-bottom: 1px solid #111; }
        .log-line { margin-bottom: 8px; border-left: 2px solid #222; padding-left: 10px; }
        .ip-tag { color: #555; font-size: 0.7rem; }
        .msg-text { color: #ccc; }
        .system-msg { color: var(--accent); font-weight: bold; }

        /* Input */
        .terminal-input { background: #080808; padding: 15px; display: flex; gap: 10px; border-top: 1px solid var(--accent); }
        input { flex: 1; background: transparent; border: 1px solid #222; color: var(--accent); padding: 12px; outline: none; }
        button { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 10px 20px; cursor: pointer; font-weight: bold; }
        button:hover { background: var(--accent); color: #000; }

        /* Ban Screen */
        #ban-screen { position: fixed; inset: 0; background: #000; color: #ff0000; display: none; align-items: center; justify-content: center; text-align: center; z-index: 9999; font-size: 1.2rem; }
    </style>
</head>
<body>

<div id="ban-screen"> [!] ACCESS_DENIED: YOUR_IP_IS_BANNED_BY_ADMIN </div>

<div id="chat-logs">
    <div class="log-line system-msg">[SYSTEM] INITIALIZING SECURE UPLINK...</div>
    <div class="log-line system-msg">[SYSTEM] ENCRYPTION_ACTIVE (AES-256)</div>
</div>

<div class="terminal-input">
    <input type="text" id="mInput" placeholder="ENTER_PAYLOAD..." autocomplete="off">
    <button onclick="sendPayload()">SEND</button>
</div>

<script>
    const BOT_TOKEN = "8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU";
    const CHAT_ID = "5446862709";
    
    // قاعدة بيانات وهمية سريعة عشان الرسايل تظهر للكل
    const DB_URL = "https://api.jsonbin.io/v3/b/65f1a3d31f567741c0d95f8a"; 

    let myIP = "";

    // 1. فحص الـ IP والتحقق من الحظر
    async function init() {
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            myIP = data.ip;

            // هنا بنبعت للبوت إن فيه حد فتح الموقع
            notifyAdmin(`🌐 NODE_ACCESS: ${myIP} is now online.`);
        } catch (e) { myIP = "127.0.0.1"; }
    }

    // 2. إرسال الرسالة للبوت وللشات
    async function sendPayload() {
        const input = document.getElementById('mInput');
        const text = input.value;
        if (!text) return;

        // إرسال للتلجرام مع الـ IP
        const report = `🏴 NEW_MSG\nIP: ${myIP}\nDATA: ${text}\n----------\nAdmin Commands:\n/ban_${myIP.replace(/\./g,'_')}\n/clear_chat`;
        notifyAdmin(report);

        // عرض الرسالة في الموقع (Locally)
        displayMsg(myIP, text);
        input.value = "";
    }

    function displayMsg(ip, text) {
        const logs = document.getElementById('chat-logs');
        const shortIP = ip.split('.').slice(-2).join('.');
        logs.innerHTML += `<div class="log-line"><span class="ip-tag">[NODE.${shortIP}]</span> <span class="msg-text">${text}</span></div>`;
        logs.scrollTop = logs.scrollHeight;
    }

    async function notifyAdmin(msg) {
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: CHAT_ID, text: msg })
        });
    }

    // 3. محاكاة الطرد (Ban Simulation)
    // بما إنك معندكش سيرفر، الطرد هيعتمد على إنك تبعت رسالة معينة في الموقع بكلمة سر
    // لو كتبت في الموقع كلمة "BAN_IP_NOW" هيمسح الشات عند الكل (أنت الأدمن)
    
    document.getElementById('mInput').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') sendPayload();
    });

    window.onload = init;
</script>

</body>
</html>
