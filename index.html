<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUXNET | OFFICIAL PORTAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-green: #39FF14;
            --accent-purple: #9d4edd;
            --deep-purple: #5a189a;
            --bg-dark: #080808;
            --card-bg: #121212;
            --text-gray: #b0b0b0;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* خلفية ضوئية خفيفة */
        body::before {
            content: "";
            position: fixed;
            top: -10%; left: -10%;
            width: 40%; height: 40%;
            background: radial-gradient(circle, rgba(157, 78, 221, 0.05) 0%, transparent 70%);
            z-index: -1;
        }

        header {
            width: 100%;
            max-width: 800px;
            padding: 40px 20px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 20px;
        }

        .logo-container {
            position: relative;
        }

        .logo {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: 3px solid var(--primary-green);
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.2);
        }

        .brand-info h1 {
            margin: 0;
            font-size: 28px;
            background: linear-gradient(to left, var(--primary-green), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .brand-info p {
            margin: 5px 0 0;
            font-size: 14px;
            color: var(--text-gray);
            letter-spacing: 1px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 0 20px 60px;
        }

        /* قسم الدعم المطور */
        .donate-section {
            background: linear-gradient(145deg, #161616, #0f0f0f);
            border: 1px solid rgba(157, 78, 221, 0.2);
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 35px;
            position: relative;
            overflow: hidden;
        }

        .donate-section::before {
            content: "";
            position: absolute;
            top: 0; right: 0;
            width: 4px; height: 100%;
            background: var(--accent-purple);
        }

        .donate-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .coin-icon {
            font-size: 24px;
            color: #ff9e00; /* لون ذهبي للعملة */
            filter: drop-shadow(0 0 8px rgba(255, 158, 0, 0.4));
            animation: rotateCoin 3s infinite linear;
        }

        @keyframes rotateCoin {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        .donate-title {
            color: var(--accent-purple);
            font-size: 18px;
            font-weight: bold;
        }

        .address-box {
            background: #000;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
            border: 1px solid #222;
        }

        .address-text {
            color: #eee;
            font-size: 14px;
            word-break: break-all;
        }

        /* قسم منشورات القناة */
        .feed-section {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 35px;
            border: 1px solid #1a1a1a;
        }

        .section-label {
            text-align: center;
            font-size: 12px;
            color: var(--accent-purple);
            text-transform: uppercase;
            margin-bottom: 20px;
            letter-spacing: 2px;
            display: block;
        }

        /* فورم المراسلة */
        .contact-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #1a1a1a;
        }

        input, textarea {
            width: 100%;
            background: #080808;
            border: 1px solid #222;
            color: #fff;
            padding: 15px;
            margin-top: 10px;
            margin-bottom: 20px;
            border-radius: 12px;
            outline: none;
        }

        input:focus, textarea:focus {
            border-color: var(--accent-purple);
            box-shadow: 0 0 10px rgba(157, 78, 221, 0.1);
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(45deg, var(--deep-purple), var(--accent-purple));
            color: #fff;
            border: none;
            padding: 16px;
            font-weight: bold;
            font-size: 16px;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(157, 78, 221, 0.3);
        }

        /* الموبايل */
        @media (max-width: 600px) {
            header { flex-direction: column; text-align: center; }
            .brand-info h1 { font-size: 22px; }
        }
    </style>
</head>
<body>

<audio id="clickSound" src="https://www.soundjay.com/communication/sounds/typewriter-key-1.mp3"></audio>

<header>
    <div class="logo-container">
        <img src="https://i.ibb.co/sp35zdbh/IMG-9090.jpg" alt="STUXNET" class="logo">
    </div>
    <div class="brand-info">
        <h1>STUXNET OFFICIAL</h1>
        <p>Security • Development • Community</p>
    </div>
</header>

<div class="container">
    
    <div class="donate-section">
        <div class="donate-header">
            <i class="fas fa-coins coin-icon"></i>
            <span class="donate-title">دونيت STUXNET</span>
        </div>
        <p style="font-size: 12px; color: var(--text-gray); margin-bottom: 12px;">دعمك يساعدنا على الاستمرار (USDT TRC20):</p>
        <div class="address-box">
            <span class="address-text" id="wallet">TQhuYaGhhpXEg322iELNesuLXCyziPhJxC</span>
            <i class="fas fa-copy" style="color: var(--accent-purple); cursor: pointer; font-size: 18px;" onclick="copyWallet()"></i>
        </div>
    </div>

    <div class="feed-section">
        <span class="section-label">آخر التحديثات من التليجرام</span>
        <div id="tg-wrapper" style="min-height: 400px;">
            <script async src="https://telegram.org/js/telegram-widget.js?22" data-telegram-channel="xstuxnet" data-limit="5" data-dark="1"></script>
        </div>
    </div>

    <div class="contact-card">
        <span class="section-label">تواصل مباشر</span>
        <form id="contactForm">
            <input type="text" id="username" placeholder="الاسم الخاص بك" required>
            <textarea id="message" rows="4" placeholder="اكتب رسالتك هنا..." required></textarea>
            <button type="submit" id="execBtn" class="btn-submit" onclick="playSound()">إرسال الرسالة</button>
            <p id="cooldown-msg" style="display:none; text-align: center; color:var(--accent-purple); font-size: 12px; margin-top: 15px;">
                يرجى الانتظار <span id="clock">60</span> ثانية لإرسال رسالة أخرى
            </p>
        </form>
    </div>

</div>

<script>
    const CONFIG = {
        TOKEN: "8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU",
        CHAT_ID: "5446862709"
    };

    function playSound() {
        const audio = document.getElementById('clickSound');
        audio.currentTime = 0;
        audio.play().catch(()=>{}); // منع خطأ المتصفح إذا لم يتفاعل المستخدم
    }

    function copyWallet() {
        playSound();
        const address = document.getElementById('wallet').innerText;
        navigator.clipboard.writeText(address);
        alert("تم نسخ العنوان بنجاح!");
    }

    function startTimer(ms) {
        const btn = document.getElementById('execBtn');
        const msg = document.getElementById('cooldown-msg');
        const clock = document.getElementById('clock');
        btn.disabled = true;
        btn.style.opacity = "0.5";
        msg.style.display = 'block';
        let timeLeft = Math.floor(ms / 1000);
        const countdown = setInterval(() => {
            clock.innerText = timeLeft;
            if (--timeLeft < 0) {
                clearInterval(countdown);
                btn.disabled = false;
                btn.style.opacity = "1";
                msg.style.display = 'none';
            }
        }, 1000);
    }

    document.getElementById('contactForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const user = document.getElementById('username').value;
        const msg = document.getElementById('message').value;
        const btn = document.getElementById('execBtn');

        btn.innerText = "جاري الإرسال...";
        const payload = `💎 **رسالة جديدة من الموقع**\n\n👤 الاسم: ${user}\n📝 الرسالة: ${msg}`;

        try {
            const res = await fetch(`https://api.telegram.org/bot${CONFIG.TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CONFIG.CHAT_ID, text: payload })
            });
            if(res.ok) {
                alert("تم إرسال رسالتك بنجاح!");
                startTimer(60000);
                e.target.reset();
            }
        } catch (err) {
            alert("حدث خطأ في الإرسال.");
        } finally {
            btn.innerText = "إرسال الرسالة";
        }
    });
</script>

</body>
</html>
