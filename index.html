<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUXNET | OFFICIAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-green: #39FF14;
            --accent-purple: #9d4edd;
            --usdt-teal: #26a17b;
            --bg-dark: #000000;
        }

        /* تأثير الدخول الكلاسيكي */
        @keyframes siteAppear {
            0% {
                opacity: 0;
                transform: scale(1.1); /* يبدأ من ورا (كبير شوية) */
                filter: blur(10px);
            }
            100% {
                opacity: 1;
                transform: scale(1); /* يستقر في مكانه */
                filter: blur(0);
            }
        }

        * { box-sizing: border-box; transition: 0.3s; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-dark);
            background-image: 
                linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                url('https://media4.giphy.com/media/v1.Y2lkPTZjMDliOTUyYWUyOTEycmZiM2FsZXlwMXJyZzRpMWVnYzdicGRzZ285a2RhYWtzOSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/UQo9nB9v6vp3nVADDl/giphy.gif');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            /* تطبيق حركه الدخول على الموقع بالكامل */
            animation: siteAppear 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        header {
            text-align: center;
            margin-top: 40px;
            margin-bottom: 30px;
        }

        .logo-container {
            position: relative;
            display: inline-block;
            margin-bottom: 15px;
        }

        .logo-container::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 140px; height: 140px;
            background: radial-gradient(circle, rgba(255,100,0,0.6) 0%, transparent 70%);
            filter: blur(15px);
            z-index: 0;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 0.8; }
            100% { opacity: 0.5; }
        }

        .logo {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid var(--primary-green);
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.5);
            position: relative;
            z-index: 1;
        }

        .brand-info h1 {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 1px;
            background: linear-gradient(to right, var(--primary-green), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .container {
            width: 100%;
            max-width: 420px;
        }

        .section-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .address-box {
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #333;
        }

        .address-text {
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: #eee;
            word-break: break-all;
        }

        .copy-btn {
            color: var(--primary-green);
            cursor: pointer;
            font-size: 1.2rem;
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(45deg, var(--accent-purple), #5a189a);
            border: none;
            color: #fff;
            padding: 16px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        input, textarea, input[type="file"] {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 1px solid #333;
            color: #fff;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            outline: none;
        }

        input[type="file"] {
            border: 1px dashed var(--accent-purple);
            font-size: 12px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <img src="https://i.ibb.co/sp35zdbh/IMG-9090.jpg" alt="STUXNET" class="logo">
    </div>
    <div class="brand-info">
        <h1>STUXNET OFFICIAL</h1>
        <p>Security • Development • Community</p>
    </div>
</header>

<div class="container">
    <div class="section-card">
        <div class="address-box">
            <span class="address-text" id="wallet">TQhuYaGhhpXEg322iELNesuLXCyziPhJxC</span>
            <i class="fas fa-copy copy-btn" onclick="copyWallet()"></i>
        </div>
    </div>

    <div class="section-card">
        <a href="https://t.me/xstuxnet" target="_blank" style="text-decoration:none;" class="submit-btn">JOIN CHANNEL</a>
    </div>

    <div class="section-card">
        <form id="contactForm">
            <input type="text" id="name" placeholder="Your Name" required>
            <textarea id="message" rows="3" placeholder="Your Message..." required></textarea>
            <input type="file" id="fileInput">
            <button type="submit" class="submit-btn" id="sendBtn">SEND MESSAGE</button>
        </form>
    </div>
</div>

<script>
    const CONFIG = {
        TOKEN: "8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU",
        CHAT_ID: "5446862709"
    };

    function copyWallet() {
        navigator.clipboard.writeText(document.getElementById('wallet').innerText);
        alert("Copied!");
    }

    document.getElementById('contactForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('sendBtn');
        const file = document.getElementById('fileInput').files[0];
        btn.innerText = "SENDING...";
        btn.disabled = true;

        const formData = new FormData();
        formData.append('chat_id', CONFIG.CHAT_ID);
        const caption = `👤 FROM: ${document.getElementById('name').value}\n💬 MSG: ${document.getElementById('message').value}`;

        let url = `https://api.telegram.org/bot${CONFIG.TOKEN}/sendMessage`;
        if (file) {
            url = `https://api.telegram.org/bot${CONFIG.TOKEN}/sendDocument`;
            formData.append('document', file);
            formData.append('caption', caption);
        } else {
            formData.append('text', caption);
        }

        try {
            const response = await fetch(url, { method: 'POST', body: formData });
            if (response.ok) {
                btn.innerText = "SENT!";
                e.target.reset();
                setTimeout(() => { btn.innerText = "SEND MESSAGE"; btn.disabled = false; }, 3000);
            }
        } catch (err) {
            btn.innerText = "ERROR";
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
