<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUXNET | ELITE OFFENSIVE INTELLIGENCE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #030303;
            --card-bg: rgba(15, 15, 15, 0.7);
            --accent: #ff003c; /* أحمر نيون احترافي */
            --accent-glow: rgba(255, 0, 60, 0.3);
            --text-dim: #888;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, sans-serif; }

        body {
            background-color: var(--bg);
            color: #fff;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 0, 60, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 0, 60, 0.05) 0%, transparent 40%);
            min-height: 100vh;
        }

        /* Background Grid */
        .grid-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--glass) 1px, transparent 1px), linear-gradient(90deg, var(--glass) 1px, transparent 1px);
            background-size: 40px 40px; z-index: -1; opacity: 0.5;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 60px 20px; }

        /* Header */
        header { text-align: center; margin-bottom: 80px; animation: fadeInDown 1s ease; }
        .logo-container { position: relative; display: inline-block; }
        .logo { width: 110px; height: 110px; border-radius: 25px; border: 1px solid var(--accent); padding: 5px; filter: grayscale(0.5); }
        .logo-glow { position: absolute; top: 0; left: 0; width: 100%; height: 100%; box-shadow: 0 0 40px var(--accent-glow); border-radius: 25px; z-index: -1; }
        
        h1 { font-size: 2.5rem; font-weight: 900; letter-spacing: -1px; margin-top: 20px; text-transform: uppercase; }
        .badge { background: var(--accent); color: #fff; font-size: 10px; padding: 4px 12px; border-radius: 100px; vertical-align: middle; margin-left: 10px; letter-spacing: 1px; }

        /* Dashboard Grid */
        .dashboard { display: grid; grid-template-columns: 300px 1fr; gap: 30px; }

        /* Sidebar Tabs */
        .sidebar { display: flex; flex-direction: column; gap: 15px; }
        .nav-item {
            background: var(--card-bg); border: 1px solid var(--glass);
            padding: 20px; border-radius: 16px; cursor: pointer;
            display: flex; align-items: center; gap: 15px; backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .nav-item i { font-size: 20px; color: var(--text-dim); }
        .nav-item h3 { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); }
        
        .nav-item:hover, .nav-item.active { border-color: var(--accent); transform: translateX(10px); background: rgba(255, 0, 60, 0.05); }
        .nav-item.active i, .nav-item.active h3 { color: var(--accent); }

        /* Content Area */
        .main-content {
            background: var(--card-bg); border: 1px solid var(--glass);
            border-radius: 24px; padding: 40px; backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; overflow: hidden;
        }

        .op-section { display: none; animation: fadeIn 0.5s ease forwards; }
        .op-section.active { display: block; }

        h2 { font-size: 20px; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
        h2::before { content: ''; width: 4px; height: 20px; background: var(--accent); border-radius: 4px; display: inline-block; }

        /* Modern Form Elements */
        .form-group { margin-bottom: 20px; }
        input, select, textarea {
            width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
            padding: 16px; border-radius: 12px; color: #fff; font-size: 14px; outline: none;
        }
        input:focus { border-color: var(--accent); background: rgba(255, 255, 255, 0.05); }

        .submit-btn {
            width: 100%; background: var(--accent); color: #fff; border: none;
            padding: 18px; border-radius: 12px; font-weight: 700; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
            margin-top: 10px;
        }
        .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 25px var(--accent-glow); }

        /* Payment Row */
        .payment-row {
            margin-top: 30px; padding: 20px; background: rgba(255, 255, 255, 0.02);
            border-radius: 16px; border: 1px solid var(--glass);
        }
        .crypto-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 12px; }
        .crypto-item span:last-child { font-family: monospace; color: #ffae00; cursor: pointer; }

        /* Animations */
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .dashboard { grid-template-columns: 1fr; }
            .sidebar { flex-direction: row; overflow-x: auto; padding-bottom: 10px; }
            .nav-item { min-width: 160px; padding: 15px; }
        }
    </style>
</head>
<body>

<div class="grid-overlay"></div>

<div class="container">
    <header>
        <div class="logo-container">
            <img src="https://i.ibb.co/sp35zdbh/IMG-9090.jpg" alt="STUXNET" class="logo">
            <div class="logo-glow"></div>
        </div>
        <h1>Stuxnet Intelligence<span class="badge">V5.0 ELITE</span></h1>
    </header>

    <div class="dashboard">
        <div class="sidebar">
            <div class="nav-item active" onclick="switchTab(this, 'mobile')">
                <i class="fas fa-mobile-alt"></i>
                <h3>Mobile OS</h3>
            </div>
            <div class="nav-item" onclick="switchTab(this, 'workstation')">
                <i class="fas fa-desktop"></i>
                <h3>Workstation</h3>
            </div>
            <div class="nav-item" onclick="switchTab(this, 'infrastructure')">
                <i class="fas fa-network-wired"></i>
                <h3>Infrastructure</h3>
            </div>
        </div>

        <div class="main-content">
            <div id="mobile" class="op-section active">
                <h2>Mobile Offensive Module</h2>
                <form onsubmit="handleSend(event, 'MOBILE')">
                    <input type="text" name="user" placeholder="TELEGRAM @ID" required>
                    <input type="text" name="target" placeholder="TARGET PHONE NUMBER" required>
                    <select name="action">
                        <option value="Full Access">FULL_REMOTE_CONTROL</option>
                        <option value="Data Exfil">EXTRACT_SENSITIVE_DATA</option>
                        <option value="System Wipe">PERMANENT_WIPE</option>
                    </select>
                    <textarea name="notes" rows="3" placeholder="SPECIFIC MISSION OBJECTIVES..."></textarea>
                    <button type="submit" class="submit-btn">Initialize Operation</button>
                </form>
            </div>

            <div id="workstation" class="op-section">
                <h2>Workstation Intrusion</h2>
                <form onsubmit="handleSend(event, 'PC')">
                    <input type="text" name="user" placeholder="TELEGRAM @ID" required>
                    <input type="text" name="target" placeholder="TARGET IP / MAC / HOSTNAME" required>
                    <select name="action">
                        <option value="Ransomware">ENCRYPT_INFRASTRUCTURE</option>
                        <option value="Backdoor">PERSISTENT_BACKDOOR</option>
                        <option value="Spying">KEYLOGGER_SURVEILLANCE</option>
                    </select>
                    <button type="submit" class="submit-btn">Execute PC Strike</button>
                </form>
            </div>

            <div id="infrastructure" class="op-section">
                <h2>Infrastructure Strike</h2>
                <form onsubmit="handleSend(event, 'WEB')">
                    <input type="text" name="user" placeholder="TELEGRAM @ID" required>
                    <input type="url" name="target" placeholder="TARGET DOMAIN (URL)" required>
                    <select name="action">
                        <option value="DDoS">DDoS_SHUTDOWN</option>
                        <option value="SQLi">DATABASE_SQL_BREACH</option>
                        <option value="Deface">SYSTEM_DEFACEMENT</option>
                    </select>
                    <button type="submit" class="submit-btn">Start Network Attack</button>
                </form>
            </div>

            <div class="payment-row">
                <div class="crypto-item">
                    <span>MONERO (XMR)</span>
                    <span onclick="copyValue('43xSN...jNg')">43xSNqUuVfn...PjbPou5jNg</span>
                </div>
                <div class="crypto-item">
                    <span>VODA CASH</span>
                    <span onclick="copyValue('01030003287')">+201030003287</span>
                </div>
            </div>
        </div>
    </div>

    <p class="footer-text">SECURE TERMINAL // NO LOGS // END-TO-END ENCRYPTED</p>
</div>

<script>
    const CONFIG = {
        TOKEN: "8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU",
        CHAT_ID: "5446862709"
    };

    function switchTab(el, id) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.querySelectorAll('.op-section').forEach(s => s.classList.remove('active'));
        el.classList.add('active');
        document.getElementById(id).classList.add('active');
    }

    function copyValue(val) {
        navigator.clipboard.writeText(val);
        alert("Value Copied to Clipboard");
    }

    async function handleSend(e, module) {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        const formData = new FormData(e.target);
        btn.innerText = "UPLOADING TO NODE...";
        btn.disabled = true;

        let msg = `🛰️ [NEW MISSION INITIALIZED]\nMODULE: ${module}\n`;
        for (let [key, value] of formData.entries()) {
            msg += `${key.toUpperCase()}: ${value}\n`;
        }

        try {
            const res = await fetch(`https://api.telegram.org/bot${CONFIG.TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CONFIG.CHAT_ID, text: msg })
            });
            if (res.ok) {
                btn.innerText = "MISSION ACCEPTED";
                btn.style.background = "#39FF14";
                btn.style.color = "#000";
            }
        } catch (err) { btn.innerText = "LINK FAILED"; btn.disabled = false; }
    }
</script>

</body>
</html>
