<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأثير النار حول الشعار</title>
    <style>
        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .logo-container {
            position: relative;
            width: 200px; /* اضبط الحجم حسب شعارك */
            height: 200px;
            border-radius: 50%;
            background-color: #fff; /* خلفية اختيارية */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo {
            width: 80%;
            height: 80%;
            z-index: 10;
        }

        /* النار الأساسية */
        .fire {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 150px;
            border-radius: 50px;
            background: radial-gradient(#ff0000 0%, #ff8000 30%, #ffff00 60%, transparent 100%);
            opacity: 0.8;
            filter: blur(10px);
            animation: burn 1.5s linear infinite, wobble 1s ease-in-out infinite;
        }

        /* اللهب العلوي */
        .flame {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 80px;
            border-radius: 20px;
            background: radial-gradient(#ffff00 0%, #ff8000 50%, transparent 100%);
            opacity: 0.6;
            filter: blur(8px);
            animation: burn 1.2s linear infinite, wobble 0.8s ease-in-out infinite;
        }

        /* تأثير الحركة */
        @keyframes burn {
            0% {
                transform: translateX(-50%) translateY(0) scaleY(1);
                opacity: 0.8;
            }
            100% {
                transform: translateX(-50%) translateY(-50px) scaleY(1.2);
                opacity: 0;
            }
        }

        /* تأثير التأرجح */
        @keyframes wobble {
            0%, 100% {
                transform: translateX(-52%) translateY(0);
            }
            50% {
                transform: translateX(-48%) translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <img src="your_logo.png" alt="شعارك" class="logo">
        <div class="fire"></div>
        <div class="flame"></div>
    </div>

    <script>
        // هذا النص الاختياري يُضيف تأثيرًا عشوائيًا خفيفًا على النار
        const fire = document.querySelector('.fire');
        const flame = document.querySelector('.flame');

        function randomizeFire() {
            fire.style.animationDuration = (Math.random() * 0.5 + 1.25) + 's';
            flame.style.animationDuration = (Math.random() * 0.4 + 1.0) + 's';
        }

        setInterval(randomizeFire, 2000);
    }
    </script>
</body>
</html>
