<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUXNET | OFFENSIVE UNIT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --primary: #00ff41;
            --danger: #ff3e3e;
            --bg: #050505;
            --panel: #0d0d0d;
            --glow: 0 0 15px rgba(0, 255, 65, 0.3);
            --border: #1a1a1a;
        }

        body {
            background-color: var(--bg);
            color: #e0e0e0;
            font-family: 'JetBrains Mono', monospace;
            margin: 0;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* تأثير الـ Scanline */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 100;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        nav {
            background: rgba(0, 0, 0, 0.9);
            padding: 12px 5%;
            display: flex;
            align-items: center;
            border-bottom: 2px solid var(--primary);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 15px;
            border: 2px solid var(--primary);
            filter: drop-shadow(var(--glow));
        }

        .brand-name {
            color: var(--primary);
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .container {
            max-width: 700px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .terminal-window {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 35px;
            border-radius: 8px;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .terminal-window::after {
            content: "SECURE_ENVIRONMENT";
            position: absolute;
            top: -10px; right: 20px;
            background: var(--primary);
            color: #000;
            padding: 2px 10px;
            font-size: 10px;
            font-weight: bold;
        }

        .status-header {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #222;
        }

        .status-item {
            font-size: 11px;
            color: var(--primary);
            text-transform: uppercase;
        }

        .field-group { margin-bottom: 25px; }

        .field-label {
            font-size: 11px;
            color: #555;
            margin-bottom: 8px;
            display: block;
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            background: #000;
            border: 1px solid #222;
            color: var(--primary);
            padding: 14px;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        input:focus, textarea:focus {
            border-color: var(--primary);
            outline: none;
            background: #080808;
        }

        .exec-btn {
            width: 100%;
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 15px;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
        }

        .exec-btn:hover:not(:disabled) {
            background: rgba(0, 255, 65, 0.1);
            box-shadow: var(--glow);
        }

        .exec-btn:active { transform: scale(0.98); }

        .vault-section {
            margin-top: 40px;
            background: rgba(255, 255, 255, 0.02);
            padding: 20px;
            border-radius: 4px;
        }

        .hash-box {
            background: #000;
            padding: 12px;
            font-size: 12px;
            border: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #v_hash { color: #aaa; }

        .social-nodes {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .node-link {
            color: #444;
            text-decoration: none;
            font-size: 12px;
            transition: 0.3s;
        }

        .node-link:hover { color: var(--primary); }

        .blinking { animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.3; } }

        /* مخصص للإشعارات */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            background: var(--panel);
            border-left: 4px solid var(--primary);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            display: none;
            z-index: 9999;
        }
    </style>
</head>
<body>

<nav>
    <img src="https://i.ibb.co/sp35zdbh/IMG-9090.jpg" alt="Logo" class="logo">
    <span class="brand-name">STUXNET_V3</span>
</nav>

<div class="container">
    <div class="terminal-window">
        <div class="status-header">
            <div class="status-item"><i class="fas fa-circle blinking"></i> SYST_ACTIVE</div>
            <div class="status-item"><i class="fas fa-shield-alt"></i> AES_256_ON</div>
            <div class="status-item"><i class="fas fa-user-shield"></i> LVL_04_OP</div>
        </div>

        <form id="opsForm">
            <div class="field-group">
                <span class="field-label">TARGET_NODE_IDENTIFIER</span>
                <input type="text" id="node" required placeholder="IDENTIFY_TARGET_HOST...">
            </div>
            
            <div class="field-group">
                <span class="field-label">ENCRYPTED_PAYLOAD_DATA</span>
                <textarea id="packet" rows="5" required placeholder="WAITING_FOR_DATA_STREAM..."></textarea>
            </div>
            
            <button type="submit" id="execBtn" class="exec-btn">INITIATE_TRANSMISSION</button>
            <div id="cooldown-msg" style="display:none; color: var(--danger); text-align: center; margin-top: 15px; font-size: 12px;">
                SYSTEM LOCKOUT: <span id="clock">05:00</span>
            </div>
        </form>

        <div class="vault-section">
            <span class="field-label">CONTRIBUTION_VAULT (USDT_TRC20)</span>
            <div class="hash-box">
                <code id="v_hash">TQhuYaGhhpXEg322iELNesuLXCyziPhJxC</code>
                <i class="fas fa-copy" onclick="copyHash()" style="cursor:pointer; color:var(--primary)"></i>
            </div>
        </div>

        <div class="social-nodes">
            <a href="https://t.me/xstuxnet_" target="_blank" class="node-link"><i class="fab fa-telegram"></i> TELEGRAM</a>
            <a href="mailto:devilnet320121@proton.me" class="node-link"><i class="fas fa-envelope"></i> SECURE_MAIL</a>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    const CONFIG = {
        TOKEN: "8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU",
        CHAT_ID: "5446862709",
        COOLDOWN: 5 * 60 * 1000
    };

    const execBtn = document.getElementById('execBtn');
    const toast = document.getElementById('toast');

    function showNotification(msg, color = "#00ff41") {
        toast.innerText = msg;
        toast.style.borderLeftColor = color;
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 4000);
    }

    function checkCooldown() {
        const lastOp = localStorage.getItem('last_op');
        if (lastOp) {
            const diff = Date.now() - parseInt(lastOp);
            if (diff < CONFIG.COOLDOWN) {
                startTimer(CONFIG.COOLDOWN - diff);
                return true;
            }
        }
        return false;
    }

    function startTimer(ms) {
        execBtn.disabled = true;
        document.getElementById('cooldown-msg').style.display = 'block';
        let remaining = Math.floor(ms / 1000);

        const countdown = setInterval(() => {
            const m = Math.floor(remaining / 60);
            const s = remaining % 60;
            document.getElementById('clock').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            
            if (--remaining < 0) {
                clearInterval(countdown);
                execBtn.disabled = false;
                document.getElementById('cooldown-msg').style.display = 'none';
            }
        }, 1000);
    }

    document.getElementById('opsForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const node = document.getElementById('node').value.trim();
        const packet = document.getElementById('packet').value.trim();

        if(!node || !packet) return;

        execBtn.innerText = "UPLOADING...";
        execBtn.disabled = true;

        const text = `🛠 **STUXNET SYSTEM REPORT**\n\n` +
                     `📡 **Node:** \`${node}\`\n` +
                     `💾 **Payload:** \`\`\`\n${packet}\n\`\`\`\n` +
                     `⏰ **Time:** ${new Date().toLocaleString()}`;

        try {
            const res = await fetch(`https://api.telegram.org/bot${CONFIG.TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CONFIG.CHAT_ID,
                    text: text,
                    parse_mode: "Markdown"
                })
            });

            if (res.ok) {
                showNotification("✓ TRANSMISSION_COMPLETE");
                localStorage.setItem('last_op', Date.now());
                startTimer(CONFIG.COOLDOWN);
                e.target.reset();
            } else {
                throw new Error();
            }
        } catch (err) {
            showNotification("❌ UPLINK_FAILURE", "#ff3e3e");
            execBtn.disabled = false;
        } finally {
            execBtn.innerText = "INITIATE_TRANSMISSION";
        }
    });

    function copyHash() {
        navigator.clipboard.writeText(document.getElementById('v_hash').innerText);
        showNotification("✓ HASH_COPIED");
    }

    window.onload = checkCooldown;
</script>

</body>
</html>
