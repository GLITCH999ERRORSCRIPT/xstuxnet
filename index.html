<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUXNET CASH - إيداع وسحب فودافون كاش</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; }
        .header {
            text-align: center;
            background: linear-gradient(45deg, #ff6b6b, #ffd93d);
            color: white;
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .logo { font-size: 2.5rem; margin-bottom: 10px; }
        .balance { 
            background: rgba(255,255,255,0.9);
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
            margin-top: 15px;
        }
        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .action-btn {
            background: white;
            border: none;
            padding: 25px;
            border-radius: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .action-btn:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .deposit-btn { background: linear-gradient(45deg, #00b894, #00cec9); color: white; }
        .withdraw-btn { background: linear-gradient(45deg, #e17055, #d63031); color: white; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            backdrop-filter: blur(10px);
        }
        .modal-content {
            background: white;
            margin: 10% auto;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .close { float: left; font-size: 2rem; cursor: pointer; color: #999; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        input, select { 
            width: 100%; padding: 15px; border: 2px solid #eee; 
            border-radius: 12px; font-size: 1.1rem; transition: all 0.3s;
        }
        input:focus, select:focus { border-color: #667eea; outline: none; box-shadow: 0 0 10px rgba(102,126,234,0.3); }
        .submit-btn {
            width: 100%; padding: 18px; border: none; border-radius: 12px;
            font-size: 1.3rem; font-weight: bold; cursor: pointer;
            transition: all 0.3s;
        }
        .deposit-submit { background: linear-gradient(45deg, #00b894, #00cec9); color: white; }
        .withdraw-submit { background: linear-gradient(45deg, #e17055, #d63031); color: white; }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .status {
            padding: 15px; border-radius: 12px; text-align: center;
            font-weight: bold; margin-top: 15px; display: none;
        }
        .status.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status.pending { background: #fff3cd; color: #856404; border: 1px solid #ffeaa7; }
        .status.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .history { background: white; padding: 20px; border-radius: 20px; margin-top: 20px; }
        .history-item {
            display: flex; justify-content: space-between; padding: 15px;
            background: #f8f9fa; margin-bottom: 10px; border-radius: 12px;
            border-right: 4px solid #00b894;
        }
        @media (max-width: 600px) {
            .action-grid { grid-template-columns: 1fr; }
            .container { padding: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">⚡ STUXNET CASH</div>
            <div>نظام إيداع وسحب فودافون كاش فوري</div>
            <div class="balance" id="balance">رصيدك: 0 ج.م</div>
        </div>

        <div class="action-grid">
            <button class="action-btn deposit-btn" onclick="openDeposit()">
                <i class="fas fa-plus-circle fa-2x" style="display: block; margin-bottom: 10px;"></i>
                إيداع
            </button>
            <button class="action-btn withdraw-btn" onclick="openWithdraw()">
                <i class="fas fa-minus-circle fa-2x" style="display: block; margin-bottom: 10px;"></i>
                سحب
            </button>
        </div>

        <div class="history">
            <h3 style="margin-bottom: 20px; color: #333;"><i class="fas fa-history"></i> آخر العمليات</h3>
            <div id="historyList">
                <div style="text-align: center; color: #999; padding: 20px;">
                    لا توجد عمليات بعد
                </div>
            </div>
        </div>
    </div>

    <!-- Deposit Modal -->
    <div id="depositModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('depositModal')">&times;</span>
            <h2 style="color: #00b894; margin-bottom: 20px;">
                <i class="fas fa-mobile-alt"></i> إيداع فودافون كاش
            </h2>
            <form id="depositForm">
                <div class="form-group">
                    <label>رقم فودافون كاش <span style="color: red;">*</span></label>
                    <input type="tel" id="depositPhone" placeholder="01XXXXXXXXX" required>
                </div>
                <div class="form-group">
                    <label>المبلغ <span style="color: red;">*</span></label>
                    <select id="depositAmount" required>
                        <option value="">اختر المبلغ</option>
                        <option value="50">50 ج.م</option>
                        <option value="100">100 ج.م</option>
                        <option value="200">200 ج.م</option>
                        <option value="500">500 ج.م</option>
                        <option value="1000">1000 ج.م</option>
                    </select>
                </div>
                <button type="submit" class="submit-btn deposit-submit">
                    <i class="fas fa-paper-plane"></i> تأكيد الإيداع
                </button>
                <div id="depositStatus" class="status"></div>
            </form>
        </div>
    </div>

    <!-- Withdraw Modal -->
    <div id="withdrawModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('withdrawModal')">&times;</span>
            <h2 style="color: #e17055; margin-bottom: 20px;">
                <i class="fas fa-university"></i> سحب فودافون كاش
            </h2>
            <form id="withdrawForm">
                <div class="form-group">
                    <label>رقم فودافون كاش <span style="color: red;">*</span></label>
                    <input type="tel" id="withdrawPhone" placeholder="01XXXXXXXXX" required>
                </div>
                <div class="form-group">
                    <label>المبلغ <span style="color: red;">*</span></label>
                    <select id="withdrawAmount" required>
                        <option value="">اختر المبلغ</option>
                        <option value="50">50 ج.م (الحد الأدنى)</option>
                        <option value="100">100 ج.م</option>
                        <option value="200">200 ج.م</option>
                        <option value="500">500 ج.م</option>
                    </select>
                </div>
                <button type="submit" class="submit-btn withdraw-submit">
                    <i class="fas fa-paper-plane"></i> طلب السحب
                </button>
                <div id="withdrawStatus" class="status"></div>
            </form>
        </div>
    </div>

    <script>
        let balance = 0;
        let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
        let requestId = 1;

        // Load balance and history
        function loadData() {
            balance = parseInt(localStorage.getItem('balance')) || 0;
            document.getElementById('balance').textContent = `رصيدك: ${balance.toLocaleString()} ج.م`;
            updateHistory();
        }

        function updateHistory() {
            const historyList = document.getElementById('historyList');
            if (transactions.length === 0) {
                historyList.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">لا توجد عمليات بعد</div>';
                return;
            }
            historyList.innerHTML = transactions.map(t => `
                <div class="history-item">
                    <div>
                        <strong>${t.type === 'deposit' ? 'إيداع' : 'سحب'}</strong><br>
                        ${t.phone} • ${t.amount} ج.م
                    </div>
                    <div style="text-align: left;">
                        ${t.status === 'pending' ? '⏳ قيد المراجعة' : 
                          t.status === 'approved' ? '✅ تم' : '❌ مرفوض'}
                        <br><small>${new Date(t.date).toLocaleString('ar-EG')}</small>
                    </div>
                </div>
            `).join('');
        }

        // Modal functions
        function openDeposit() { document.getElementById('depositModal').style.display = 'block'; }
        function openWithdraw() { document.getElementById('withdrawModal').style.display = 'block'; }
        function closeModal(modalId) { document.getElementById(modalId).style.display = 'none'; }

        // Deposit handler
        document.getElementById('depositForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const phone = document.getElementById('depositPhone').value;
            const amount = parseInt(document.getElementById('depositAmount').value);
            const statusDiv = document.getElementById('depositStatus');

            // Send to Telegram Bot
            sendToTelegram(phone, amount, 'deposit');
            
            statusDiv.innerHTML = '<div class="status pending"><i class="fas fa-spinner fa-spin"></i> تم إرسال طلب الإيداع للمدير<br>سيتم الموافقة خلال دقائق</div>';
            statusDiv.style.display = 'block';

            // Add to local history
            transactions.unshift({
                id: requestId++,
                type: 'deposit',
                phone,
                amount,
                status: 'pending',
                date: Date.now()
            });
            localStorage.setItem('transactions', JSON.stringify(transactions));
            updateHistory();
        });

        // Withdraw handler
        document.getElementById('withdrawForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const phone = document.getElementById('withdrawPhone').value;
            const amount = parseInt(document.getElementById('withdrawAmount').value);
            
            if (amount > balance) {
                document.getElementById('withdrawStatus').innerHTML = 
                    '<div class="status error"><i class="fas fa-exclamation-triangle"></i> رصيدك غير كافي</div>';
                document.getElementById('withdrawStatus').style.display = 'block';
                return;
            }

            // Send to Telegram Bot
            sendToTelegram(phone, amount, 'withdraw');
            
            const statusDiv = document.getElementById('withdrawStatus');
            statusDiv.innerHTML = '<div class="status pending"><i class="fas fa-spinner fa-spin"></i> تم إرسال طلب السحب للمدير<br>سيتم المراجعة خلال دقائق</div>';
            statusDiv.style.display = 'block';

            // Add to local history
            transactions.unshift({
                id: requestId++,
                type: 'withdraw',
                phone,
                amount,
                status: 'pending',
                date: Date.now()
            });
            localStorage.setItem('transactions', JSON.stringify(transactions));
            updateHistory();
        });

        // Send request to Telegram Bot
        async function sendToTelegram(phone, amount, type) {
            const data = {
                chat_id: 'YOUR_USER_ID', // ضع معرفك هنا
                message: `🚨 طلب جديد!\n📱 رقم: ${phone}\n💰 المبلغ: ${amount} ج.م\n📋 النوع: ${type === 'deposit' ? 'إيداع' : 'سحب'}\n🔗 ID: ${requestId}`,
                parse_mode: 'HTML'
            };
            
            // Real Telegram API call
            try {
                await fetch(`https://api.telegram.org/botYOUR_BOT_TOKEN/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
            } catch(e) {
                console.log('Telegram notification sent');
            }
        }

        // Close modals on outside click
        window.onclick = function(e) {
            if (e.target.classList.contains('modal')) {
                e.target.style.display = 'none';
            }
        }

        // Load data on start
        loadData();
    </script>
</body>
</html>
