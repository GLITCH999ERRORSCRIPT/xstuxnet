<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mero Social Media - إدارة سوشيال ميديا احترافية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --dark: #2C3E50;
            --light: #ECF0F1;
            --purple: #A55EEA;
            --gradient: linear-gradient(135deg, #FF6B6B, #A55EEA, #4ECDC4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--light);
            overflow-x: hidden;
        }

        /* Floating Shapes Background */
        .shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        .shape:nth-child(1) {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, rgba(255,107,107,0.2), rgba(165,94,234,0.2));
            top: -100px;
            right: -100px;
            animation-delay: 0s;
        }

        .shape:nth-child(2) {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, rgba(78,205,196,0.2), rgba(255,230,109,0.2));
            bottom: 20%;
            left: -50px;
            animation-delay: 2s;
        }

        .shape:nth-child(3) {
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, rgba(165,94,234,0.3), rgba(255,107,107,0.3));
            top: 40%;
            right: 10%;
            animation-delay: 4s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        /* Navigation */
        nav {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--dark);
            font-weight: 600;
            transition: 0.3s;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 3px;
            background: var(--gradient);
            bottom: -5px;
            right: 0;
            border-radius: 10px;
            transition: 0.3s;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .whatsapp-btn {
            background: #25D366;
            color: white !important;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: 700;
        }

        .whatsapp-btn::after {
            display: none !important;
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 20px 60px;
            text-align: center;
            position: relative;
        }

        .hero-content {
            max-width: 900px;
        }

        .hero h1 {
            font-size: 60px;
            font-weight: 900;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .hero h1 span {
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 22px;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.8;
        }

        .hero-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 18px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            border: none;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: var(--gradient);
            color: white;
            box-shadow: 0 10px 30px rgba(255,107,107,0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255,107,107,0.5);
        }

        .btn-secondary {
            background: white;
            color: var(--dark);
            border: 3px solid var(--purple);
        }

        .btn-secondary:hover {
            background: var(--purple);
            color: white;
        }

        /* Floating Icons */
        .floating-icons {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .floating-icon {
            position: absolute;
            font-size: 40px;
            animation: bounce 2s ease-in-out infinite;
            opacity: 0.8;
        }

        .floating-icon:nth-child(1) { top: 20%; left: 10%; animation-delay: 0s; color: #FF6B6B; }
        .floating-icon:nth-child(2) { top: 30%; right: 15%; animation-delay: 0.5s; color: #4ECDC4; }
        .floating-icon:nth-child(3) { bottom: 30%; left: 20%; animation-delay: 1s; color: #A55EEA; }
        .floating-icon:nth-child(4) { bottom: 25%; right: 10%; animation-delay: 1.5s; color: #FFE66D; }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Services Section */
        .services {
            padding: 80px 20px;
            background: white;
        }

        .section-title {
            text-align: center;
            margin-bottom: 60px;
        }

        .section-title h2 {
            font-size: 45px;
            font-weight: 900;
            margin-bottom: 15px;
            color: var(--dark);
        }

        .section-title p {
            font-size: 20px;
            color: #666;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .service-card {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            transition: 0.4s;
            border: 3px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .service-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: var(--gradient);
            transform: scaleX(0);
            transition: 0.4s;
        }

        .service-card:hover::before {
            transform: scaleX(1);
        }

        .service-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            border-color: var(--secondary);
        }

        .service-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 35px;
            color: white;
        }

        .service-card:nth-child(1) .service-icon { background: linear-gradient(135deg, #FF6B6B, #FF8E8E); }
        .service-card:nth-child(2) .service-icon { background: linear-gradient(135deg, #4ECDC4, #6EE7DE); }
        .service-card:nth-child(3) .service-icon { background: linear-gradient(135deg, #A55EEA, #C49BFF); }
        .service-card:nth-child(4) .service-icon { background: linear-gradient(135deg, #FFE66D, #FFF09D); }
        .service-card:nth-child(5) .service-icon { background: linear-gradient(135deg, #FF6B6B, #A55EEA); }
        .service-card:nth-child(6) .service-icon { background: linear-gradient(135deg, #4ECDC4, #A55EEA); }

        .service-card h3 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--dark);
        }

        .service-card p {
            font-size: 16px;
            color: #666;
            line-height: 1.7;
        }

        /* Problems Section */
        .problems {
            padding: 80px 20px;
            background: var(--dark);
            color: white;
            text-align: center;
        }

        .problems h2 {
            font-size: 45px;
            font-weight: 900;
            margin-bottom: 50px;
        }

        .problems-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .problem-item {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 600;
            border: 2px solid rgba(255,255,255,0.2);
            transition: 0.3s;
        }

        .problem-item:hover {
            background: rgba(255,107,107,0.3);
            border-color: var(--primary);
            transform: scale(1.05);
        }

        .problem-item strong {
            color: var(--primary);
            margin-left: 10px;
        }

        /* Solutions Section */
        .solutions {
            padding: 80px 20px;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
        }

        .solutions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .solution-item {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            transition: 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .solution-item:hover {
            transform: translateY(-5px);
        }

        .solution-item .icon {
            font-size: 40px;
            margin-bottom: 15px;
        }

        .solution-item h4 {
            font-size: 18px;
            color: var(--dark);
        }

        /* Offers Section */
        .offers {
            padding: 80px 20px;
            background: var(--gradient);
            color: white;
            text-align: center;
        }

        .offers h2 {
            font-size: 45px;
            font-weight: 900;
            margin-bottom: 15px;
        }

        .offers .subtitle {
            font-size: 22px;
            margin-bottom: 50px;
            opacity: 0.9;
        }

        .offers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .offer-card {
            background: white;
            color: var(--dark);
            padding: 40px 30px;
            border-radius: 20px;
            transition: 0.3s;
        }

        .offer-card:hover {
            transform: scale(1.05);
        }

        .offer-card .discount {
            background: var(--primary);
            color: white;
            padding: 10px 25px;
            border-radius: 25px;
            font-size: 20px;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 20px;
        }

        .offer-card h3 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .offer-card p {
            font-size: 16px;
            color: #666;
        }

        /* Platforms Section */
        .platforms {
            padding: 80px 20px;
            background: white;
            text-align: center;
        }

        .platforms h2 {
            font-size: 40px;
            font-weight: 900;
            margin-bottom: 50px;
            color: var(--dark);
        }

        .platforms-icons {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 30px;
            max-width: 900px;
            margin: 0 auto;
        }

        .platform {
            width: 100px;
            height: 100px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            color: white;
            transition: 0.3s;
        }

        .platform:hover {
            transform: scale(1.15);
        }

        .platform:nth-child(1) { background: #1877F2; }
        .platform:nth-child(2) { background: linear-gradient(45deg, #F77737, #FCAF45, #9146FF); }
        .platform:nth-child(3) { background: #000000; }
        .platform:nth-child(4) { background: #1DA1F2; }
        .platform:nth-child(5) { background: #0088CC; }
        .platform:nth-child(6) { background: #FF0000; }

        /* Contact Section */
        .contact {
            padding: 80px 20px;
            background: linear-gradient(135deg, var(--dark) 0%, #1a252f 100%);
            color: white;
            text-align: center;
        }

        .contact h2 {
            font-size: 45px;
            font-weight: 900;
            margin-bottom: 20px;
        }

        .contact p {
            font-size: 22px;
            margin
