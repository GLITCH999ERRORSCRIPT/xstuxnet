<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUXNET | OFFICIAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-green: #39FF14;
            --accent-purple: #9d4edd;
            --usdt-teal: #26a17b;
            --bg-dark: #050505;
            --card-bg: #0d0d0d;
        }

        /* لودر احترافي */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            transition: transform 0.8s cubic-bezier(0.87, 0, 0.13, 1), opacity 0.6s ease;
        }

        .typing-text {
            color: var(--primary-green);
            font-family: monospace;
            font-size: 1.3rem;
            white-space: nowrap;
            overflow: hidden;
            border-right: 3px solid var(--primary-green);
            width: 0;
            animation: typing 1.5s steps(25, end) forwards, blink 0.5s step-end infinite;
        }

        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink { from, to { border-color: transparent } 50% { border-color: var(--primary-green) } }

        /* حركة ظهور محتوى الموقع */
        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            opacity: 0;
            filter: blur(10px);
            transform: scale(0.9);
            transition: opacity 1s ease, filter 1.2s ease, transform 1s ease;
        }

        body.loaded {
            opacity: 1;
            filter: blur(0);
            transform: scale(1);
        }

        header { text-align: center; margin-bottom: 40px; width: 100%; }
        .logo {
            width: 100px; height: 100px; border-radius: 50%;
            border: 3px solid var(--primary-green);
            box-shadow: 0 0 25px rgba(57, 255, 20, 0.3);
            margin-bottom: 15px;
        }
        .brand-info h1 {
            margin: 0; font-size: 24px; letter-spacing: 2px;
            background: linear-gradient(to right, var(--primary-green), var(--accent-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .brand-info p { margin: 8px 0 0; font-size: 13px; color: #777; }
        .container { width: 100%; max-width: 450px; }
        .section-card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid #1a1a1a;
            text-align: center;
        }
        .label {
            font-size: 11px; color: var(--accent-purple);
            text-transform: uppercase; letter-spacing: 2px;
            margin-bottom: 15px; display: block;
        }
        .donate-header { display: flex; justify-content: center; align-items: center; gap: 8px; margin-bottom: 15px; }
        .usdt-circle { background: var(--usdt-teal); width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; }
        .address-container { background: #000; padding: 12px; border-radius: 10px; border: 1px solid #222; display: flex; align-items: center; gap: 10px; }
        .address-text { font-family: monospace; font-size: 11px; color: #ccc; word-break: break-all; flex: 1; text-align: left; }
        .join-btn {
            background: rgba(157, 78, 221, 0.1); border: 1px solid var(--accent-purple);
            color: #fff; text-decoration: none; padding: 12px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: bold; margin-bottom: 15px;
        }
        input, textarea { width: 100%; background: #000; border: 1px solid #222; color: #fff; padding: 12px; margin-bottom: 15px; border-radius: 10px; outline: none; font-size: 14px; }
        .submit-btn { width: 100%; background: linear-gradient(45deg, var(--accent-purple), #5a189a); border: none; color: #fff; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; display: block; }
        .submit-btn:disabled { background: #222; color: #555; cursor: not-allowed; }
    </style>
</head>
<body>

<div id="loader">
    <div class="typing-text">WELCOME TO STUXNET</div>
</div>

<header>
    <img src="https://i.ibb.co/sp35zdbh/IMG-9090.jpg" alt="STUXNET" class="logo">
    <div class="brand-info">
        <h1>STUXNET OFFICIAL</h1>
        <p>Security • Development • Community</p>
    </div>
</header>

<div class="container">
    <div class="section-card">
        <div class="donate-header">
            <div class="usdt-circle">₮</div>
            <span style="font-weight: bold; font-size: 14px; color: var(--accent-purple);">DONATE STUXNET</span>
        </div>
        <p style="font-size: 11px; color: #555; margin-bottom: 12px;">USDT TRC20 ADDRESS:</p>
        <div class="address-container">
            <span class="address-text" id="wallet">TQhuYaGhhpXEg322iELNesuLXCyziPhJxC</span>
            <i class="fas fa-copy" style="color: var(--accent-purple); cursor: pointer;" onclick="copyWallet()"></i>
        </div>
    </div>

    <div class="section-card">
        <span class="label">Latest Updates</span>
        <a href="https://t.me/xstuxnet" target="_blank" class="join-btn">
            <i class="fab fa-telegram-plane"></i> JOIN CHANNEL
        </a>
        <div style="border-radius: 12px; overflow: hidden; background: #000;">
            <script async src="https://telegram.org/js/telegram-widget.js?22" 
                    data-telegram-post-list="xstuxnet" 
                    data-limit="3" data-dark="1" data-width="100%"></script>
        </div>
    </div>

    <div class="section-card">
        <span class="label">Send Message to STUXNET</span>
        <form id="contactForm">
            <input type="text" id="name" placeholder="Your Name" required>
            <textarea id="message" rows="3" placeholder="Your Message..." required></textarea>
            <button type="submit" class="submit-btn" id="sendBtn">SEND MESSAGE</button>
        </form>
    </div>
</div>

<script>
    const CONFIG = {
        TOKEN: "8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU",
        CHAT_ID: "5446862709"
    };

    // التعديل هنا: مدة اللودر وطريقة الظهور
    window.addEventListener('load', () => {
        checkCooldown();
        setTimeout(() => {
            const loader = document.getElementById('loader');
            loader.style.transform = 'scale(2)'; // حركة زووم للخارج
            loader.style.opacity = '0';
            
            document.body.classList.add('loaded'); // تفعيل حركة دخول الموقع
            
            setTimeout(() => {
                loader.style.display = 'none';
            }, 800);
        }, 2000); // يظهر لمدة ثانيتين بالظبط
    });

    function copyWallet() {
        navigator.clipboard.writeText(document.getElementById('wallet').innerText);
        alert("USDT Address Copied!");
    }

    function checkCooldown() {
        const lastSent = localStorage.getItem('lastSentStuxnet');
        if (lastSent) {
            const timeLeft = Math.floor((60000 - (Date.now() - lastSent)) / 1000);
            if (timeLeft > 0) startTimer(timeLeft);
        }
    }

    function startTimer(seconds) {
        const btn = document.getElementById('sendBtn');
        btn.disabled = true;
        const timer = setInterval(() => {
            seconds--;
            btn.innerText = `WAIT ${seconds}S`;
            if (seconds <= 0) {
                clearInterval(timer);
                btn.disabled = false;
                btn.innerText = "SEND MESSAGE";
                localStorage.removeItem('lastSentStuxnet');
            }
        }, 1000);
    }

    document.getElementById('contactForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('sendBtn');
        btn.innerText = "SENDING...";
        const payload = `👤 FROM: ${document.getElementById('name').value}\n💬 MSG: ${document.getElementById('message').value}`;

        try {
            const response = await fetch(`https://api.telegram.org/bot${CONFIG.TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CONFIG.CHAT_ID, text: payload })
            });

            if (response.ok) {
                alert("Sent Successfully!");
                localStorage.setItem('lastSentStuxnet', Date.now());
                startTimer(60);
                e.target.reset();
            } else {
                alert("Error!");
                btn.innerText = "SEND MESSAGE";
            }
        } catch (err) { 
            btn.innerText = "SEND MESSAGE";
        }
    });
</script>

</body>
</html>
