<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUXNET | OFFICIAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-green: #39FF14;
            --accent-purple: #9d4edd;
            --usdt-teal: #26a17b;
            --bg-dark: #000000;
            --card-bg: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; transition: 0.3s; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-dark);
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://media4.giphy.com/media/v1.Y2lkPTZjMDliOTUyYWUyOTEycmZiM2FsZXlwMXJyZzRpMWVnYzdicGRzZ285a2RhYWtzOSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/UQo9nB9v6vp3nVADDl/giphy.gif');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #fff; font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px;
        }

        header { text-align: center; margin-top: 40px; margin-bottom: 30px; }

        .logo {
            width: 110px; height: 110px; border-radius: 50%; border: 2px solid var(--primary-green);
            box-shadow: 0 0 25px rgba(57, 255, 20, 0.3); object-fit: cover;
        }

        .brand-info h1 {
            font-size: 1.8rem; font-weight: 900; letter-spacing: 2px;
            background: linear-gradient(to right, var(--primary-green), var(--accent-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase;
        }

        .container { width: 100%; max-width: 400px; }

        .section-card {
            background: var(--card-bg); backdrop-filter: blur(12px); border-radius: 20px;
            padding: 22px; margin-bottom: 20px; border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .label-small { font-size: 10px; color: var(--accent-purple); margin-bottom: 15px; display: block; letter-spacing: 2px; font-weight: 800; }

        input, textarea {
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 14px; border-radius: 10px; margin-bottom: 12px; outline: none; font-size: 14px;
        }

        /* Style for File Input */
        .file-input-wrapper {
            position: relative; margin-bottom: 15px; text-align: left;
        }
        
        input[type="file"] {
            padding: 10px; font-size: 12px; border: 1px dashed var(--accent-purple); cursor: pointer;
        }

        .submit-btn {
            width: 100%; background: linear-gradient(45deg, var(--accent-purple), #5a189a);
            border: none; color: #fff; padding: 15px; border-radius: 10px;
            font-weight: 700; cursor: pointer; text-transform: uppercase;
        }

        .submit-btn:disabled { background: #1a1a1a; color: #555; }
    </style>
</head>
<body>

<header>
    <img src="https://i.ibb.co/sp35zdbh/IMG-9090.jpg" alt="STUXNET" class="logo">
    <div class="brand-info">
        <h1>STUXNET OFFICIAL</h1>
        <p>Security • Development • Community</p>
    </div>
</header>

<div class="container">
    <div class="section-card">
        <span class="label-small">SUBMIT REPORT / INQUIRY</span>
        <form id="contactForm">
            <input type="text" id="name" placeholder="Name / Alias" required>
            <textarea id="message" rows="3" placeholder="Message content..." required></textarea>
            
            <div class="file-input-wrapper">
                <span style="font-size: 11px; color: #aaa; margin-bottom: 5px; display: block;">ATTACH SCREENSHOT (OPTIONAL):</span>
                <input type="file" id="imageInput" accept="image/*">
            </div>

            <button type="submit" class="submit-btn" id="sendBtn">SEND TO ADMIN</button>
        </form>
    </div>
</div>

<script>
    const API_CONFIG = {
        TOKEN: "8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU",
        CHAT_ID: "5446862709",
        COOLDOWN_MS: 10000
    };

    document.getElementById('contactForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('sendBtn');
        const imageFile = document.getElementById('imageInput').files[0];
        const caption = `[STUXNET REPORT]\n\nUser: ${document.getElementById('name').value}\nMessage: ${document.getElementById('message').value}`;

        btn.innerText = "UPLOADING...";
        btn.disabled = true;

        const formData = new FormData();
        formData.append('chat_id', API_CONFIG.CHAT_ID);
        
        let url = `https://api.telegram.org/bot${API_CONFIG.TOKEN}/sendMessage`;
        
        if (imageFile) {
            // If there's an image, use sendPhoto
            url = `https://api.telegram.org/bot${API_CONFIG.TOKEN}/sendPhoto`;
            formData.append('photo', imageFile);
            formData.append('caption', caption);
        } else {
            // Just text
            formData.append('text', caption);
        }

        try {
            const response = await fetch(url, {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                btn.innerText = "SUCCESSFUL";
                setTimeout(() => {
                    btn.innerText = "SEND TO ADMIN";
                    btn.disabled = false;
                    e.target.reset();
                }, 3000);
            } else {
                throw new Error();
            }
        } catch (err) {
            btn.innerText = "ERROR - TRY AGAIN";
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
