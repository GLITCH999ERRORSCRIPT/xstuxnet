<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUXNET | DARK MARKET</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-red: #ff3131;
            --accent-green: #39FF14;
            --monero-orange: #ff6600;
            --bg-dark: #050505;
            --card-bg: #111111;
        }

        @keyframes scanline { 0% { bottom: 100%; } 100% { bottom: 0%; } }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        * { box-sizing: border-box; transition: 0.3s; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-dark);
            background-image: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)), url('https://i.giphy.com/media/v1.Y2lkPTZjMDliOTUyeGZueGZueGZueGZueGZueGZueGZueGZueGZueGZueGZueGZueCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3o7TKSjPqcKGRZaT9S/giphy.gif');
            color: #fff; font-family: 'Courier New', monospace;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px;
        }

        body::before {
            content: " ";
            position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        header { text-align: center; margin-bottom: 30px; z-index: 3; }
        .logo { width: 100px; height: 100px; border: 2px solid var(--primary-red); box-shadow: 0 0 15px var(--primary-red); filter: grayscale(1); }
        
        .main-title { 
            font-size: 2rem; font-weight: 900; letter-spacing: 5px; color: #fff;
            text-shadow: 2px 2px var(--primary-red); margin-top: 10px;
        }

        .container { width: 100%; max-width: 600px; z-index: 3; }
        
        .market-status { 
            background: #000; border: 1px solid #333; padding: 10px; 
            font-size: 10px; color: var(--accent-green); margin-bottom: 20px;
            display: flex; justify-content: space-between;
        }

        .section-title { 
            font-size: 12px; color: var(--primary-red); margin-bottom: 15px; 
            border-left: 3px solid var(--primary-red); padding-left: 10px;
            text-transform: uppercase; font-weight: bold;
        }

        .services-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .service-card {
            background: var(--card-bg); border: 1px solid #222; padding: 15px;
            position: relative; overflow: hidden;
        }
        .service-card:hover { border-color: var(--primary-red); cursor: crosshair; }
        .service-card i { color: var(--primary-red); font-size: 20px; margin-bottom: 10px; }
        .service-name { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #eee; }
        .service-price { font-size: 14px; color: var(--accent-green); font-weight: bold; }

        .payment-box { 
            background: #0a0a0a; border: 1px solid #222; padding: 20px; border-radius: 4px;
            margin-bottom: 20px;
        }

        .address-row {
            margin-bottom: 15px; background: #000; padding: 10px; border: 1px solid #333;
            cursor: pointer; position: relative;
        }
        .address-text { font-size: 10px; word-break: break-all; color: var(--monero-orange); font-family: monospace; }
        
        /* FORM STYLING */
        .form-dark input, .form-dark textarea {
            width: 100%; background: #000; border: 1px solid #333; color: var(--accent-green);
            padding: 12px; margin-bottom: 10px; font-family: 'Courier New', monospace; font-size: 12px;
        }

        /* الإضافة الجديدة: خانة درجة الخطورة/الأولوية بشكل هكر */
        .priority-container {
            display: flex; gap: 10px; margin-bottom: 15px;
        }
        .priority-box {
            flex: 1; text-align: center; padding: 10px; border: 1px solid #333;
            font-size: 10px; cursor: pointer; color: #555;
        }
        .priority-box.active {
            border-color: var(--primary-red); color: var(--primary-red);
            box-shadow: inset 0 0 10px rgba(255, 49, 49, 0.2);
            animation: pulse 1.5s infinite;
        }

        .submit-btn {
            width: 100%; background: #900; color: #fff; border: none; padding: 15px;
            font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
        }
        .submit-btn:hover { background: var(--primary-red); box-shadow: 0 0 15px var(--primary-red); }

        .footer { text-align: center; font-size: 9px; color: #444; margin-top: 30px; letter-spacing: 2px; }
    </style>
</head>
<body>

<header>
    <img src="https://i.ibb.co/sp35zdbh/IMG-9090.jpg" alt="STUXNET" class="logo">
    <h1 class="main-title">STUXNET.XMR</h1>
</header>

<div class="container">
    <div class="market-status">
        <span>STATUS: <span style="color:var(--accent-green)">ONLINE</span></span>
        <span>ENCRYPTION: AES-256</span>
        <span>UPLINK: ACTIVE</span>
    </div>

    <div class="section-title">Available Exploits</div>
    <div class="services-grid">
        <div class="service-card">
            <i class="fas fa-terminal"></i>
            <span class="service-name">Web Exploitation</span>
            <span class="service-price">1500 EGP</span>
        </div>
        <div class="service-card">
            <i class="fab fa-android"></i>
            <span class="service-name">Android RAT</span>
            <span class="service-price">1000 EGP</span>
        </div>
    </div>

    <div class="section-title">Priority Level</div>
    <div class="priority-container">
        <div class="priority-box active" onclick="setPriority(this, 'LOW')">LOW_TRACE</div>
        <div class="priority-box" onclick="setPriority(this, 'MEDIUM')">MID_STRIKE</div>
        <div class="priority-box" onclick="setPriority(this, 'HIGH')">FULL_CRASH</div>
    </div>

    <div class="section-title">Execute Request</div>
    <form class="form-dark" id="contactForm">
        <input type="text" id="name" placeholder="ID / TELEGRAM USERNAME" required>
        <input type="text" id="target" placeholder="TARGET IP / DOMAIN / PHONE" required>
        <textarea id="message" rows="4" placeholder="OPERATION DETAILS..." required></textarea>
        <button type="submit" class="submit-btn" id="sendBtn">START TRANSMISSION</button>
    </form>

    <div class="footer">
        STUXNET OFFENSIVE INTELLIGENCE &copy; 2026<br>
        SYSTEM_READY_V.4.0
    </div>
</div>

<script>
    let selectedPriority = "LOW";
    const CONFIG = {
        TOKEN: "8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU",
        CHAT_ID: "5446862709"
    };

    function setPriority(el, val) {
        document.querySelectorAll('.priority-box').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        selectedPriority = val;
    }

    function copyValue(id, msg) {
        const text = document.getElementById(id).innerText;
        navigator.clipboard.writeText(text);
        alert(msg);
    }

    document.getElementById('contactForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('sendBtn');
        btn.innerText = "UPLOADING TO SERVER...";
        
        const caption = `[NEW ORDER RECEIVED]\n👤 FROM: @${document.getElementById('name').value}\n🎯 TARGET: ${document.getElementById('target').value}\n⚡ PRIORITY: ${selectedPriority}\n📝 DETAILS: ${document.getElementById('message').value}`;

        try {
            await fetch(`https://api.telegram.org/bot${CONFIG.TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CONFIG.CHAT_ID, text: caption })
            });
            btn.innerText = "TRANSMISSION SUCCESS";
            e.target.reset();
        } catch (err) { btn.innerText = "CONNECTION FAILED"; }
    });
</script>

</body>
</html>
