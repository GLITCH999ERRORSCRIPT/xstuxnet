<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUXNET | OFFICIAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-green: #39FF14;
            --accent-purple: #9d4edd;
            --usdt-teal: #26a17b;
            --bg-dark: #050505;
            --card-bg: rgba(13, 13, 13, 0.9);
        }

        /* Animated Flame Background */
        body {
            background-color: var(--bg-dark);
            background: radial-gradient(circle at bottom, #1a052e 0%, #050505 70%);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.1; z-index: -1;
        }

        /* Light Flame Effect Animation */
        @keyframes flame {
            0% { box-shadow: 0 -10px 20px rgba(157, 78, 221, 0.2); }
            50% { box-shadow: 0 -20px 40px rgba(57, 255, 20, 0.2); }
            100% { box-shadow: 0 -10px 20px rgba(157, 78, 221, 0.2); }
        }

        header { text-align: center; margin-top: 20px; margin-bottom: 40px; z-index: 1; }

        .logo {
            width: 110px; height: 110px; border-radius: 50%;
            border: 3px solid var(--primary-green);
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.3);
            margin-bottom: 15px; animation: flame 3s infinite;
        }

        .brand-info h1 {
            margin: 0; font-size: 28px; letter-spacing: 2px;
            background: linear-gradient(to right, var(--primary-green), var(--accent-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .container { width: 100%; max-width: 480px; z-index: 1; }

        .section-card {
            background: var(--card-bg);
            border-radius: 20px; padding: 25px; margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center; backdrop-filter: blur(10px);
        }

        /* Wallet Box */
        .address-container {
            background: #000; padding: 15px; border-radius: 12px;
            border: 1px solid #222; display: flex; flex-direction: column;
            align-items: center; gap: 12px;
        }

        .copy-btn {
            background: rgba(157, 78, 221, 0.2); color: var(--accent-purple);
            padding: 8px 20px; border-radius: 8px; font-size: 12px;
            cursor: pointer; font-weight: bold;
        }

        /* Telegram Feed */
        .tg-frame-container {
            width: 100%; height: 500px; border-radius: 15px;
            overflow: hidden; background: #000; border: 1px solid #222;
        }

        /* Form & Dynamic Button */
        input, textarea {
            width: 100%; background: #000; border: 1px solid #222;
            color: #fff; padding: 15px; margin-bottom: 15px;
            border-radius: 12px; outline: none; font-size: 14px;
        }

        input:focus, textarea:focus { border-color: var(--primary-green); }

        /* الزرار مطفي في البداية */
        .submit-btn {
            width: 100%; background: #222; color: #555;
            border: none; padding: 16px; border-radius: 12px;
            font-weight: bold; cursor: not-allowed; transition: 0.5s;
        }

        /* الزرار ينور لما الفورم تتملي */
        .submit-btn.active {
            background: linear-gradient(45deg, var(--deep-purple), var(--accent-purple));
            color: #fff; cursor: pointer;
            box-shadow: 0 0 20px rgba(157, 78, 221, 0.4);
        }

        #cooldown-timer {
            color: #ff4444; font-size: 12px; margin-top: 10px; display: none;
        }
    </style>
</head>
<body onclick="playClick()">

<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<header>
    <img src="https://i.ibb.co/sp35zdbh/IMG-9090.jpg" alt="STUXNET" class="logo">
    <div class="brand-info">
        <h1>STUXNET OFFICIAL</h1>
        <p>Security • Development • Community</p>
    </div>
</header>

<div class="container">

    <div class="section-card">
        <span style="font-weight: bold; color: var(--accent-purple);">DONATE STUXNET</span>
        <div class="address-container" style="margin-top:15px;">
            <span style="font-family: monospace; font-size: 11px;" id="wallet">TQhuYaGhhpXEg322iELNesuLXCyziPhJxC</span>
            <div class="copy-btn" onclick="copyWallet()">COPY ADDRESS</div>
        </div>
    </div>

    <div class="section-card">
        <iframe src="https://t.me/s/xstuxnet" width="100%" height="450" frameborder="0" style="border-radius:12px;"></iframe>
    </div>

    <div class="section-card">
        <p style="font-size: 13px; color: var(--accent-purple); font-weight: bold;">SEND MESSAGE TO STUXNET</p>
        <form id="contactForm">
            <input type="text" id="name" placeholder="Name" required oninput="validateForm()" onfocus="playClick()">
            <textarea id="message" rows="3" placeholder="Message..." required oninput="validateForm()" onfocus="playClick()"></textarea>
            <button type="submit" class="submit-btn" id="sendBtn" disabled>SEND MESSAGE</button>
            <div id="cooldown-timer">Please wait <span id="seconds">60</span>s before next transmission.</div>
        </form>
    </div>

</div>

<script>
    const CONFIG = {
        TOKEN: "8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU",
        CHAT_ID: "5446862709"
    };

    // صوت التكة عند اللمس
    function playClick() {
        const audio = document.getElementById('clickSound');
        audio.currentTime = 0;
        audio.play().catch(()=>{});
    }

    // تفعيل الزرار عند الكتابة
    function validateForm() {
        const name = document.getElementById('name').value;
        const msg = document.getElementById('message').value;
        const btn = document.getElementById('sendBtn');
        if(name.length > 0 && msg.length > 0) {
            btn.classList.add('active');
            btn.disabled = false;
        } else {
            btn.classList.remove('active');
            btn.disabled = true;
        }
    }

    function copyWallet() {
        playClick();
        navigator.clipboard.writeText(document.getElementById('wallet').innerText);
        alert("Copied!");
    }

    document.getElementById('contactForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('sendBtn');
        const timerDiv = document.getElementById('cooldown-timer');
        const secondsSpan = document.getElementById('seconds');

        btn.disabled = true;
        btn.classList.remove('active');
        btn.innerText = "SENDING...";

        const payload = `🚨 **MSG**\n👤 FROM: ${document.getElementById('name').value}\n💬: ${document.getElementById('message').value}`;

        try {
            await fetch(`https://api.telegram.org/bot${CONFIG.TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CONFIG.CHAT_ID, text: payload })
            });
            alert("Transmission Successful.");
            e.target.reset();

            // نظام الانتظار دقيقة
            let timeLeft = 60;
            timerDiv.style.display = 'block';
            const interval = setInterval(() => {
                timeLeft--;
                secondsSpan.innerText = timeLeft;
                if(timeLeft <= 0) {
                    clearInterval(interval);
                    timerDiv.style.display = 'none';
                    validateForm();
                }
            }, 1000);

        } catch (err) { 
            alert("Error!"); 
            validateForm();
        }
        finally { btn.innerText = "SEND MESSAGE"; }
    });
</script>

</body>
</html>
