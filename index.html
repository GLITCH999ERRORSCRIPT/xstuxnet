<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUXNET | OFFICIAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-green: #39FF14;
            --accent-purple: #9d4edd;
            --usdt-teal: #26a17b;
            --bg-dark: #000000;
            --card-bg: rgba(255, 255, 255, 0.08);
        }

        * { 
            box-sizing: border-box; 
            transition: 0.3s; 
            margin: 0; 
            padding: 0; 
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                url('https://media4.giphy.com/media/v1.Y2lkPTZjMDliOTUyYWUyOTEycmZiM2FsZXlwMXJyZzRpMWVnYzdicGRzZ285a2RhYWtzOSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/UQo9nB9v6vp3nVADDl/giphy.gif');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-top: 40px;
            margin-bottom: 30px;
        }

        .logo-container {
            position: relative;
            display: inline-block;
            margin-bottom: 15px;
        }

        .logo-container::before {
            content: '';
            position: absolute;
            top: 50%; 
            left: 50%;
            transform: translate(-50%, -50%);
            width: 140px; 
            height: 140px;
            background: radial-gradient(circle, rgba(157, 78, 221, 0.4) 0%, transparent 70%);
            filter: blur(15px);
            z-index: 0;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; transform: translate(-50%, -50%) scale(0.9); }
            50% { opacity: 0.7; transform: translate(-50%, -50%) scale(1.1); }
            100% { opacity: 0.4; transform: translate(-50%, -50%) scale(0.9); }
        }

        .logo {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 2px solid var(--primary-green);
            box-shadow: 0 0 25px rgba(57, 255, 20, 0.3);
            position: relative;
            z-index: 1;
            object-fit: cover;
        }

        .brand-info h1 {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(to right, var(--primary-green), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .brand-info p {
            font-size: 12px;
            color: #aaa;
            margin-top: 5px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        .section-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 22px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 18px;
        }

        .card-header span {
            font-weight: 700;
            color: #fff;
            font-size: 13px;
            letter-spacing: 1px;
        }

        .usdt-icon {
            background: var(--usdt-teal);
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        .address-box {
            background: rgba(0, 0, 0, 0.5);
            padding: 14px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .address-text {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 11px;
            color: #ddd;
            word-break: break-all;
            text-align: left;
        }

        .copy-btn {
            color: var(--primary-green);
            cursor: pointer;
            font-size: 1.1rem;
            margin-left: 10px;
        }

        .copy-btn:hover {
            filter: brightness(1.2);
            transform: scale(1.1);
        }

        .label-small {
            font-size: 10px;
            color: var(--accent-purple);
            margin-bottom: 15px;
            display: block;
            letter-spacing: 2px;
            font-weight: 800;
        }

        .join-btn {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--accent-purple);
            color: #fff;
            text-decoration: none;
            padding: 14px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 700;
            font-size: 14px;
        }

        .join-btn:hover {
            background: var(--accent-purple);
            box-shadow: 0 0 20px rgba(157, 78, 221, 0.4);
        }

        input, textarea {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 14px;
            border-radius: 10px;
            margin-bottom: 12px;
            outline: none;
            font-size: 14px;
        }

        input:focus, textarea:focus {
            border-color: var(--accent-purple);
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(45deg, var(--accent-purple), #5a189a);
            border: none;
            color: #fff;
            padding: 15px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .submit-btn:disabled {
            background: #1a1a1a;
            color: #555;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <img src="https://i.ibb.co/sp35zdbh/IMG-9090.jpg" alt="STUXNET" class="logo">
    </div>
    <div class="brand-info">
        <h1>STUXNET OFFICIAL</h1>
        <p>Security • Development • Community</p>
    </div>
</header>

<div class="container">
    <div class="section-card">
        <div class="card-header">
            <div class="usdt-icon">₮</div>
            <span>DONATE ADDRESS</span>
        </div>
        <div class="address-box">
            <span class="address-text" id="wallet">TQhuYaGhhpXEg322iELNesuLXCyziPhJxC</span>
            <i class="fas fa-copy copy-btn" onclick="copyWallet()"></i>
        </div>
    </div>

    <div class="section-card">
        <span class="label-small">LATEST UPDATES</span>
        <a href="https://t.me/xstuxnet" target="_blank" class="join-btn">
            <i class="fab fa-telegram-plane"></i> JOIN CHANNEL
        </a>
    </div>

    <div class="section-card">
        <span class="label-small">DIRECT INQUIRY</span>
        <form id="contactForm">
            <input type="text" id="name" placeholder="Name / Alias" required>
            <textarea id="message" rows="3" placeholder="Message content..." required></textarea>
            <button type="submit" class="submit-btn" id="sendBtn">SEND MESSAGE</button>
        </form>
    </div>
</div>

<script>
    const API_CONFIG = {
        TOKEN: "8254072521:AAGs0le9FRacWKgYcdk3CzHXhEiTXZb8dZU",
        CHAT_ID: "5446862709",
        COOLDOWN_MS: 10000
    };

    window.onload = checkCooldown;

    function copyWallet() {
        const walletText = document.getElementById('wallet').innerText;
        navigator.clipboard.writeText(walletText).then(() => {
            alert("Address Copied");
        });
    }

    function checkCooldown() {
        const btn = document.getElementById('sendBtn');
        const lastSent = localStorage.getItem('lastSentTime');
        if (lastSent) {
            const timePassed = Date.now() - lastSent;
            if (timePassed < API_CONFIG.COOLDOWN_MS) {
                startTimer(Math.ceil((API_CONFIG.COOLDOWN_MS - timePassed) / 1000));
            }
        }
    }

    function startTimer(seconds) {
        const btn = document.getElementById('sendBtn');
        btn.disabled = true;
        const timer = setInterval(() => {
            btn.innerText = `WAIT ${seconds}S`;
            seconds--;
            if (seconds < 0) {
                clearInterval(timer);
                btn.disabled = false;
                btn.innerText = "SEND MESSAGE";
                localStorage.removeItem('lastSentTime');
            }
        }, 1000);
    }

    document.getElementById('contactForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('sendBtn');
        const name = document.getElementById('name').value;
        const message = document.getElementById('message').value;

        btn.innerText = "SENDING...";
        btn.disabled = true;

        const text = `[NEW INQUIRY]\n\nUser: ${name}\nMessage: ${message}`;
        
        try {
            const response = await fetch(`https://api.telegram.org/bot${API_CONFIG.TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: API_CONFIG.CHAT_ID,
                    text: text
                })
            });

            if (response.ok) {
                localStorage.setItem('lastSentTime', Date.now());
                startTimer(10);
                e.target.reset();
            } else {
                throw new Error('API_ERROR');
            }
        } catch (err) {
            btn.innerText = "FAILED - RETRY";
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
